                          items:[
                            { id:'q-u1-1a', assertion:'No trecho, Caminha prioriza a descrição física dos habitantes sobre considerações religiosas ou administrativas.', options:['Certo','Errado'], key:'Certo', comments:'O recorte apresentado é descritivo-etnográfico. Caminha registra aparência, gestos e disposição antes de discutir catequese.', difficulty:'very-easy', reference:'CACD 2018', topics:['t_brcol_desc'], tags:['tg_cabral'] },
                            { id:'q-u1-1b', assertion:'A expressão "maneira de avermelhados" reforça o projeto português de classificar os povos originários como europeus tropicais, apagando diferenças.', options:['Certo','Errado'], key:'Errado', comments:'A expressão tem caráter meramente descritivo, não projeta uma categoria colonial unificadora — essa é uma leitura anacrônica.', recommendation:'Releia o trecho evitando projetar categorias do século XIX sobre o texto de 1500.', difficulty:'easy', reference:'CACD 2019', topics:['t_brcol_desc'], tags:['tg_cabral'] },
                            { id:'q-u1-1c', assertion:'O destinatário imediato da carta é o papa Alexandre VI, a quem Portugal devia prestar contas dos domínios recém-encontrados.', options:['Certo','Errado'], key:'Errado', comments:'A carta é dirigida a D. Manuel I, rei de Portugal. O papa nunca foi o destinatário do texto.', difficulty:'regular', reference:'CACD 2020', topics:['t_brcol_desc'], tags:['tg_cabral'] }
                          ]

                        {

                          modelAnswer:'Resposta integral esperada combinando os três critérios.',
                          modelAnswers:[
                            { title:'Modelo A — Abordagem cronológica', author:'Banca examinadora', score:'9/10', body:'A expedição de Pedro Álvares Cabral, iniciada em março de 1500, insere-se no contexto da rivalidade ibérica pelo controle das rotas comerciais do Índico. O Tratado de Tordesilhas (1494), celebrado entre Portugal e Espanha, delimitava áreas de influência, mas a real extensão do Atlântico ocidental permanecia incerta. A frota de treze naus partiu com destino a Calicute, na Índia, seguindo a rota inaugurada por Vasco da Gama em 1498. A manobra conhecida como volta do mar, que consistia em desviar para oeste para aproveitar os ventos alísios, levou ao avistamento do Monte Pascoal em 22 de abril.\n\nO encontro com os povos Tupiniquins do litoral baiano foi documentado pela Carta de Caminha, que combina registro administrativo e impressões etnográficas. A reação portuguesa oscilou entre curiosidade e a lógica da expansão cristã, que justificava a posse territorial pela evangelização. Os primeiros contatos foram marcados pelo escambo de objetos, padrão que se repetiria nas décadas seguintes.\n\nA expedição revelou ao Portugal a existência de um território que, embora secundário em relação à rota das especiarias, se tornaria peça fundamental do império colonial português a partir do ciclo do pau-brasil.' },
                            { title:'Modelo B — Abordagem temática', author:'Prof. Dr. Boris Fausto', score:'8/10', body:'O contexto político que antecede a expedição de 1500 é marcado pela centralização monárquica sob D. Manuel I e pela competição com Castela no campo das navegações. O Tratado de Tordesilhas, mediado pelo Papa Alexandre VI, refletia o equilíbrio de forças entre as duas coroas ibéricas, mas deixava margens de ambiguidade que favoreciam Portugal no Atlântico Sul.\n\nEconomicamente, a expedição de Cabral buscava consolidar a rota do comércio de especiarias aberta por Vasco da Gama. A frota era grande demais para uma simples passagem — levava homens como Bartolomeu Dias e Pero Vaz de Caminha, o que sugere alguma expectativa de parada ou descoberta.\n\nO encontro com os Tupiniquins, descrito por Caminha com riqueza etnográfica, marca o início de uma relação assimétrica que se aprofundaria ao longo do século XVI, com a exploração do pau-brasil via escambo e, posteriormente, com o sistema de capitanias hereditárias.' },
                            { title:'Modelo C — Abordagem crítica', author:'Candidato aprovado CACD 2020', score:'10/10', body:'A expedição cabralina de 1500 deve ser compreendida à luz de três vetores: a geopolítica ibérica, a economia das especiarias e a mentalidade expansionista portuguesa do final do século XV.\n\nNo plano geopolítico, o Tratado de Tordesilhas (1494) já assegurava a Portugal direitos sobre terras a leste do meridiano fixado a 370 léguas de Cabo Verde. A historiografia debate se o achamento do Brasil foi intencional — hipótese sustentada pela dimensão da frota e pela presença de tripulantes especializados — ou mero resultado da volta do mar.\n\nNo plano econômico, o comércio de especiarias era o motor da expansão. Calicute representava o acesso direto às redes comerciais do Índico, e a expedição de Cabral era a segunda tentativa de estabelecer uma feitoria permanente na Índia.\n\nQuanto ao encontro com os povos originários, a Carta de Caminha oferece um registro singular, mas enviesado. Escrita do ponto de vista do colonizador, ela oscila entre admiração pelo corpo indígena e projetos de catequese. A ausência de vozes indígenas neste registro é, em si, um dado histórico que revela os limites da documentação colonial.\n\nA expedição de 1500, portanto, não foi um evento isolado, mas o desdobramento de décadas de expansão marítima e negociação diplomática que redefiniriam a geopolítica global.' }

                      html:'<p>Em <strong>1534</strong>, D. João III dividiu a colônia em quinze capitanias hereditárias, concedidas a fidalgos e funcionários régios — os <em>donatários</em>. O modelo tentava transferir os custos da ocupação à iniciativa privada.</p><p>Das quinze capitanias originais, apenas duas prosperaram de imediato: <strong>Pernambuco</strong> (Duarte Coelho) e <strong>São Vicente</strong> (Martim Afonso de Souza). As demais fracassaram por conflitos com indígenas, falta de recursos e distância.</p>' },

/* ════════════════════════════════════════════════════════════════════
   UBIQUE STORE BRIDGE
   Estratégia: window.COURSES original é o TEMPLATE FIXO (com modules,
   coordinators, ratings etc.). O UbiqueStore só patcha os campos
   editáveis pelo admin (title, subtitle, description, cover, sigla,
   status). Isso garante que NUNCA percamos os dados mockados.

   Lookup: por slug (preferencial) → por nome normalizado (fallback).
   ════════════════════════════════════════════════════════════════════ */
(function(){
  if(typeof window.UbiqueStore === 'undefined'){
    console.warn('[bridge] UbiqueStore não carregado — usando dados mock estáticos.');
    return;
  }

  // Snapshot IMUTÁVEL dos cursos originais (os mockados — nunca tocados)
  const ORIGINAL_COURSES = (window.COURSES || []).slice();

  /**
   * SEED dinâmico de modules/chapters/units no UbiqueStore a partir do
   * window.COURSE mockado. Roda apenas se o store estiver vazio dessas
   * entidades (evita sobrescrever edições do admin).
   */
  (function seedHierarchyFromMock(){
    try{
      // v4+: a hierarquia mockada agora vem embutida no SEED do
      // ubique-shared.js. Esta função fica como fallback defensivo
      // caso o store esteja completamente vazio (raro).
      const hasModules = UbiqueStore.modules.list().length > 0;
      if(hasModules) return;

      const courseSlug = window.COURSE && window.COURSE.slug;
      if(!courseSlug) return;

      // Acha o subject correspondente no store
      const subj = UbiqueStore.subjects.list().find(s =>
        (s.slug || '') === courseSlug || ((s.subject||'').toLowerCase() === (window.COURSE.title||'').toLowerCase())
      );
      if(!subj){ console.warn('[seed] subject historia-brasil não encontrado no store'); return; }

      let modCounter = 0, chCounter = 0, uCounter = 0;
      (window.COURSE.modules || []).forEach((m, mi) => {
        modCounter++;
        const modItem = {
          subject_id: subj.id,
          title: m.title || ('Módulo ' + (mi+1)),
          number: m.number || String(mi+1),
          subtitle: m.subtitle || '',
          description: m.description || '',
          cover_url: m.cover || '',
          status: 'published',
          position: mi,
          _origMockId: m.id,
        };
        const savedMod = UbiqueStore.modules.add(modItem);

        (m.chapters || []).forEach((c, ci) => {
          chCounter++;
          const chItem = {
            module_id: savedMod.id,
            title: c.title || ('Capítulo ' + (ci+1)),
            number: c.number || String(ci+1),
            description: c.description || '',
            status: 'published',
            position: ci,
            _origMockId: c.id,
          };
          const savedCh = UbiqueStore.chapters.add(chItem);

          (c.units || []).forEach((u, ui) => {
            uCounter++;
            const savedUnit = UbiqueStore.units.add({
              chapter_id: savedCh.id,
              title: u.title || ('Unidade ' + (ui+1)),
              number: u.number || String(ui+1).padStart(2,'0'),
              subtitle: u.subtitle || '',
              description: u.description || '',
              cover_url: u.cover || '',
              duration_min: u.duration || null,
              status: 'published',
              position: ui,
              _origMockId: u.id,
            });

            // Seed default sections for every unit. Para "A Chegada" usa as
            // duas seções pedidas; demais unidades começam com uma "Seção 1".
            try{
              const isAChegada = (u.title||'').trim().toLowerCase() === 'a chegada' || u._origMockId === 'a-chegada';
              const existing = (UbiqueStore.unit_sections.list() || [])
                .filter(s => s.unit_id === savedUnit.id);
              if(!existing.length){
                if(isAChegada){
                  UbiqueStore.unit_sections.add({ unit_id: savedUnit.id, title: 'O Atlântico', position: 0 });
                  UbiqueStore.unit_sections.add({ unit_id: savedUnit.id, title: 'O encontro',  position: 1 });
                } else {
                  UbiqueStore.unit_sections.add({ unit_id: savedUnit.id, title: 'Seção 1', position: 0 });
                }
              }
            }catch(_){}
          });
        });
      });

      // Migração best-effort: para unidades pré-existentes sem nenhuma seção,
      // cria "Seção 1" e atribui blocos órfãos a ela.
      try{
        const allUnits     = UbiqueStore.units.list();
        const allSections  = UbiqueStore.unit_sections.list();
        const allBlocks    = UbiqueStore.unit_blocks.list();
        allUnits.forEach(u => {
          const has = allSections.some(s => s.unit_id === u.id);
          if(!has){
            const sec = UbiqueStore.unit_sections.add({ unit_id: u.id, title: 'Seção 1', position: 0 });
            allBlocks.filter(b => b.unit_id === u.id && !b.section_id).forEach(b => {
              UbiqueStore.unit_blocks.update(b.id, { section_id: sec.id });
            });
          }
        });
      }catch(_){}

      console.log('[seed] hierarquia mockada → store: '
        + modCounter + ' módulos, '
        + chCounter + ' capítulos, '
        + uCounter + ' unidades.');
    }catch(e){
      console.warn('[seed] erro ao popular hierarquia:', e);
    }
  })();

  /**
   * Mapeia um bloco do mock legado (window.COURSE) para o formato
   * armazenado em UbiqueStore.unit_blocks.
   *
   * Y1 — PRESERVAÇÃO TOTAL: não simplifica nada. Apenas normaliza o `type`
   * e copia 100% dos campos do bloco mock dentro de `content`, intactos.
   * Os campos meta (id, type, title, description, topics, tags) sobem
   * para o nível raiz do unit_block. O `id` original do mock é guardado
   * em `_origMockId` para rastreabilidade e dedup ao re-seedar.
   */
  function mapMockBlockToStore(blk, unitId, sectionId, position){
    if(!blk || !blk.type) return null;

    // Normalização de nomes de tipo (mock → canônico).
    const typeMap = {
      'textgallery': 'text',
      'figures':     'gallery',
      'quotes':      'citations',
      'quote':       'citations',
      'bios':        'biography',
      'bio':         'biography',
      'sources':     'references',
      'comments':    'discussion',
      'table':       'tables'
      // 'text', 'video', 'quiz', 'essay', 'flashcards', 'timeline',
      // 'glossary', 'gallery', 'keypoints', 'compound', 'integrated',
      // 'tables', 'biography', 'citations', 'references', 'discussion'
      // mantêm o nome.
    };
    const normalizedType = typeMap[blk.type] || blk.type;

    // Separa campos meta do resto. Tudo que sobra (paragraphs, fragments,
    // items, slides, events, points, options, cards, groups, comments, …)
    // entra em `content` intacto.
    const { id, type, title, description, topics, tags, ...rest } = blk;

    return {
      unit_id:     unitId,
      section_id:  sectionId,
      position:    position,
      type:        normalizedType,
      title:       title       || '',
      description: description || '',
      topics:      topics      || [],
      tags:        tags        || [],
      status:      'published',
      content:     rest,
      _origMockId: id
    };
  }

  /**
   * Semeia blocos e seções (vindos de window.COURSE.modules[].chapters[].units[].groups[].blocks[])
   * no UbiqueStore — só executa se unit_blocks estiver vazio. Reaproveita seções
   * já criadas (idênticas por título) ou cria novas.
   */
  (function seedMockBlocksOnce(){
    try{
      if(!window.UbiqueStore || !window.COURSE) return;

      const storeUnits = UbiqueStore.units.list();
      // Conjunto de _origMockId já presentes em unit_blocks — usado para
      // evitar duplicação ao re-rodar o seed (re-roda automaticamente
      // sempre que STORE_KEY/versão muda).
      const existingMockIds = new Set(
        UbiqueStore.unit_blocks.list()
          .map(function(b){ return b._origMockId; })
          .filter(Boolean)
      );

      let added = 0;

      (window.COURSE.modules || []).forEach(function(m){
        (m.chapters || []).forEach(function(c){
          (c.units || []).forEach(function(mockUnit){
            const storeUnit = storeUnits.find(function(su){ return su._origMockId === mockUnit.id; });
            if(!storeUnit) return;

            const groups = mockUnit.groups || [];
            groups.forEach(function(grp, gi){
              const wantedTitle = grp.title || ('Seção ' + (gi + 1));
              // Always re-query sections (we may have added new ones in this loop)
              const currentSections = UbiqueStore.unit_sections.list();
              let section = currentSections.find(function(s){
                return s.unit_id === storeUnit.id && s.title === wantedTitle;
              });
              if(!section){
                section = UbiqueStore.unit_sections.add({
                  unit_id: storeUnit.id,
                  title: wantedTitle,
                  position: gi,
                  _origMockId: grp.id
                });
              }

              (grp.blocks || []).forEach(function(blk, bi){
                // Dedup: se o id original já foi semeado, pula.
                if(blk && blk.id && existingMockIds.has(blk.id)) return;
                const mapped = mapMockBlockToStore(blk, storeUnit.id, section.id, bi);
                if(mapped){
                  UbiqueStore.unit_blocks.add(mapped);
                  if(mapped._origMockId) existingMockIds.add(mapped._origMockId);
                  added++;
                }
              });
            });
          });
        });
      });

      if(added > 0){
        console.log('[seed-blocks] populated UbiqueStore.unit_blocks from window.COURSE (added ' + added + ' blocks)');
      }
    }catch(e){
      console.warn('[seed-blocks] error:', e);
    }
  })();

  /**
   * MIGRATION (idempotente) — completa schema rico em unit_blocks já
   * semeados em versões antigas do app, sem APAGAR nada.
   *
   * Problema: seeds antigos salvavam apenas alguns campos em `content`
   * (audio_url, html) e perdiam os ricos (paragraphs, fragments, slides,
   * items, events, points, cards, comments, references, etc.). O seed
   * novo (com spread `...rest`) só roda se unit_blocks está vazio —
   * então blocos legacy nunca foram atualizados.
   *
   * Estratégia: pra cada unit_block com _origMockId, encontra o bloco
   * original em window.COURSE pelo id e COMPLETA os campos de content
   * que estão vazios no store. NÃO sobrescreve nada que já tenha valor
   * (preserva edições do usuário).
   */
  (function migrateMissingMockContentOnce(){
    try{
      if(!window.UbiqueStore || !window.COURSE) return;

      // Índice flat de todos os blocos do mock por id original.
      const mockBlocksById = {};
      (window.COURSE.modules || []).forEach(function(m){
        (m.chapters || []).forEach(function(c){
          (c.units || []).forEach(function(u){
            (u.groups || []).forEach(function(g){
              (g.blocks || []).forEach(function(b){
                if(b && b.id) mockBlocksById[b.id] = b;
              });
            });
          });
        });
      });

      let migrated = 0;
      UbiqueStore.unit_blocks.list().forEach(function(sb){
        const mock = sb && sb._origMockId ? mockBlocksById[sb._origMockId] : null;
        if(!mock) return;
        // Campos meta do mock — ficam de fora do content.
        const { id, type, title, description, topics, tags, ...mockRest } = mock;
        const sbContent = sb.content || {};
        const newContent = Object.assign({}, sbContent);
        let changed = false;

        Object.keys(mockRest).forEach(function(key){
          const mockVal = mockRest[key];
          if(mockVal == null) return;
          const cur = sbContent[key];
          const isEmpty =
            cur == null ||
            (typeof cur === 'string' && cur === '') ||
            (Array.isArray(cur) && cur.length === 0) ||
            (typeof cur === 'object' && !Array.isArray(cur) && Object.keys(cur).length === 0);
          if(isEmpty){
            newContent[key] = mockVal;
            changed = true;
          }
        });

        if(changed){
          UbiqueStore.unit_blocks.update(sb.id, { content: newContent });
          migrated++;
        }
      });

      if(migrated > 0){
        console.log('[migrate-blocks] completed rich schema for ' + migrated + ' legacy unit_blocks (no destructive changes)');
      }
    }catch(e){
      console.warn('[migrate-blocks] error:', e);
    }
  })();

  /**
   * Y3 Fase F — Migração idempotente de blocos de questões objetivas legacy
   * pro novo schema (Y3 Fases B-D).
   *
   * Converte:
   *   - type 'quiz' → type 'objective_questions'
   *   - content.groups[].items[]   → content.groups[].questions[]
   *     - it.assertion        → q.statement
   *     - it.options[strings] → q.options[{label,text,correct}] (MC) OU C/E
   *     - it.key              → q.correct (bool) OU opção marcada como correct
   *     - it.comments         → q.comment
   *     - it.reference (str)  → q.origin (auto-detecta padrão #G-N/YYYY)
   *     - it.context          → q.reference_text
   *     - it.image_url        → q.reference_image
   *   - content.groups[].reference.text.{label,title,body,source} +
   *                         .media.url
   *                                → content.groups[].reference_text (HTML) +
   *                                  content.groups[].reference_image
   *   - content.groups[].enunciado → content.groups[].description
   *   - Remove campo `difficulty` (foi removido na Fase B)
   *
   * Idempotente: se um campo Y3 já está preenchido, não sobrescreve.
   * Detecta migração já feita pela existência de g.questions[].
   */
  (function migrateObjectiveQuestionsLegacyOnce(){
    try{
      if(!window.UbiqueStore) return;

      function _migrateItemToQuestion(item){
        if(!item || typeof item !== 'object') return null;
        const q = {
          id: item.id || ('q-mig-' + Date.now() + '-' + Math.floor(Math.random() * 9000)),
          origin:          item.origin          || '',
          reference_text:  item.reference_text  || item.context || item.support_text || '',
          reference_image: item.reference_image || item.image_url || item.image || '',
          statement:       item.statement       || item.assertion || '',
          comment:         item.comment         || item.comments  || '',
          tags:            Array.isArray(item.tags) ? item.tags.slice() : [],
          stats:           item.stats && typeof item.stats === 'object' ? item.stats : { correct_pct: 0, wrong_pct: 0, guess_pct: 0 }
        };
        // Origin: se vier vazio mas houver `reference` legacy (string tipo "#15-2/2023"
        // ou "[#150/2025]"), usa como origin. Se for "CACD 2018" (só prosa) não bate
        // no parser e a tag vai cair pro fallback de string.
        if(!q.origin && item.reference){
          q.origin = String(item.reference).trim();
        }
        // source_type: se origin existe e bate no padrão → past_exam; senão ubique
        if(item.source_type === 'past_exam' || item.source_type === 'ubique'){
          q.source_type = item.source_type;
        } else if(q.origin && q.origin.trim()){
          q.source_type = 'past_exam';
        } else {
          q.source_type = 'ubique';
        }

        // Detecta tipo a partir das opções
        const opts = Array.isArray(item.options) ? item.options : [];
        const isCE2 = opts.length === 2 &&
          /^(certo|errado|true|false|c|e|v|f|verdadeiro|falso)$/i.test(String(opts[0])) &&
          /^(certo|errado|true|false|c|e|v|f|verdadeiro|falso)$/i.test(String(opts[1]));
        if(isCE2){
          q.type = 'true_false';
          const key = String(item.key || '').toLowerCase().trim();
          q.correct = /^(certo|true|c|v|verdadeiro)$/.test(key);
        } else if(opts.length > 0){
          q.type = 'multiple_choice';
          q.options = opts.map(function(o, i){
            const text = typeof o === 'string' ? o : (o.text || o.value || '');
            const label = (typeof o === 'object' && o.label) ? o.label : String.fromCharCode(65 + i);
            // Match do gabarito: key pode ser o texto da opção OU a letra
            const keyStr = String(item.key || '');
            const correct = keyStr === text ||
                            keyStr.toUpperCase() === label ||
                            (typeof o === 'object' && o.correct === true);
            return { label: label, text: text, correct: !!correct };
          });
          // Garante ao menos uma opção correta
          if(!q.options.some(function(o){ return o.correct; }) && q.options.length){
            q.options[0].correct = true;
          }
        } else {
          // Sem opções definidas — default C/E
          q.type = 'true_false';
          q.correct = true;
        }
        return q;
      }

      function _migrateGroup(g){
        // Se já tem questions[], assume migrado — não toca
        if(Array.isArray(g.questions)) return { group: g, changed: false };
        const ng = Object.assign({}, g);
        let changed = false;
        // Reference legacy {text,media} → reference_text/reference_image
        if(g.reference && (g.reference.text || g.reference.media)){
          if(g.reference.text && !ng.reference_text){
            const t = g.reference.text;
            const parts = [];
            if(t.label)  parts.push('<p><strong>' + String(t.label) + '</strong></p>');
            if(t.title)  parts.push('<h4>' + String(t.title) + '</h4>');
            if(t.body)   parts.push('<p>' + String(t.body) + '</p>');
            if(t.source) parts.push('<p><em>' + String(t.source) + '</em></p>');
            ng.reference_text = parts.join('\n');
            changed = true;
          }
          if(g.reference.media && g.reference.media.url && !ng.reference_image){
            ng.reference_image = g.reference.media.url;
            changed = true;
          }
        }
        // enunciado → description
        if(g.enunciado && !ng.description){
          ng.description = g.enunciado;
          changed = true;
        }
        // items[] → questions[]
        if(Array.isArray(g.items) && g.items.length){
          ng.questions = g.items.map(_migrateItemToQuestion).filter(Boolean);
          changed = true;
        }
        return { group: ng, changed: changed };
      }

      const blocks = UbiqueStore.unit_blocks.list() || [];
      let migratedTypes = 0;
      let migratedSchemas = 0;

      blocks.forEach(function(b){
        if(!b) return;
        let blockType = b.type;
        let blockChanged = false;

        // 1. type 'quiz' → 'objective_questions'
        if(blockType === 'quiz'){
          blockType = 'objective_questions';
          blockChanged = true;
          migratedTypes++;
        }

        // 2. Só migra schema pros dois tipos
        if(blockType !== 'objective_questions') return;

        const content = b.content || {};
        let contentChanged = false;
        const newContent = Object.assign({}, content);

        if(Array.isArray(content.groups)){
          let anyGroupChanged = false;
          newContent.groups = content.groups.map(function(g){
            if(!g || typeof g !== 'object') return g;
            const res = _migrateGroup(g);
            if(res.changed) anyGroupChanged = true;
            // Remove campo difficulty (Fase B) + adiciona source_type onde faltar
            if(Array.isArray(res.group.questions)){
              res.group.questions.forEach(function(q){
                if(q && 'difficulty' in q){ delete q.difficulty; anyGroupChanged = true; }
                if(q && !('source_type' in q)){
                  q.source_type = (q.origin && String(q.origin).trim()) ? 'past_exam' : 'ubique';
                  anyGroupChanged = true;
                }
              });
            }
            return res.group;
          });
          if(anyGroupChanged){ contentChanged = true; migratedSchemas++; }
        }
        // Passada extra: ungrouped[] também ganha source_type
        if(Array.isArray(content.ungrouped)){
          let ungroupedChanged = false;
          content.ungrouped.forEach(function(q){
            if(q && 'difficulty' in q){ delete q.difficulty; ungroupedChanged = true; }
            if(q && !('source_type' in q)){
              q.source_type = (q.origin && String(q.origin).trim()) ? 'past_exam' : 'ubique';
              ungroupedChanged = true;
            }
          });
          if(ungroupedChanged){
            newContent.ungrouped = content.ungrouped;
            contentChanged = true;
          }
        }

        // 3. Garante ungrouped como array (mesmo vazio)
        if(blockType === 'objective_questions' && !Array.isArray(newContent.ungrouped)){
          // Não força se já há ungrouped; só inicializa se ausente
          if(content.ungrouped == null){
            // não cria explicitamente — fica undefined até o admin criar uma avulsa.
            // Só normaliza se já existia mas não-array
          } else {
            newContent.ungrouped = [];
            contentChanged = true;
          }
        }

        if(blockChanged || contentChanged){
          const patch = {};
          if(blockChanged) patch.type = blockType;
          if(contentChanged) patch.content = newContent;
          UbiqueStore.unit_blocks.update(b.id, patch);
        }
      });

      if(migratedTypes > 0 || migratedSchemas > 0){
        console.log('[migrate-oq] ' + migratedTypes + ' tipo(s) quiz→objective_questions, ' + migratedSchemas + ' bloco(s) com schema migrado pro novo formato (Y3 Fase F)');
      }
    }catch(e){
      console.warn('[migrate-oq] error:', e);
    }
  })();

  /**
   * Y3 Fase G — Migração das questões INLINE pro banco canônico
   * (UbiqueStore.questions). Idempotente: só toca em questões que ainda
   * NÃO têm bank_id.
   *
   * Pra cada questão inline em unit_blocks[i].content.groups[].questions[]
   * e content.ungrouped[]:
   *   1. Calcula bank_id determinístico (cacd-14-1-2014) ou gera ubique-xxx
   *   2. Se já existe entrada no banco com esse id → não duplica
   *   3. Senão, cria a entrada no banco com os campos da questão inline
   *   4. Substitui a questão inline pela referência { bank_id }
   *   5. Registra a aparição em appears_in
   *
   * Edge cases:
   * - Duas questões inline com mesmo origin em blocos diferentes → ambas
   *   apontam pro MESMO bank_id (deduplicação automática). A primeira a
   *   ser migrada "vence" e define o conteúdo no banco; as seguintes só
   *   viram refs.
   */
  (function migrateInlineQuestionsToBankOnce(){
    try{
      if(!window.UbiqueStore || !window.QuestionBank || !window.LearningBlocks) return;
      const LB = window.LearningBlocks;

      let createdInBank = 0;
      let migratedInline = 0;

      function migrateQuestion(q, ctx){
        if(!q || typeof q !== 'object') return q;
        // Já tem bank_id? Nada a fazer
        if(q.bank_id){
          // Garante que está registrada em appears_in
          QuestionBank.registerUsage(q.bank_id, ctx.unit_id, ctx.block_id, ctx.group_id, ctx.position);
          return q;
        }
        // Calcula bank_id
        let bankId = null;
        if(q.source_type === 'past_exam' && q.origin){
          bankId = LB.questionBankIdFromOrigin(q.origin);
        }
        if(!bankId){
          bankId = LB.generateUbiqueQuestionId();
        }
        // Cria entrada no banco se ainda não existir
        if(!UbiqueStore.questions.get(bankId)){
          QuestionBank.createOrGet({
            id: bankId,
            origin: q.origin || '',
            source_type: q.source_type || (q.origin ? 'past_exam' : 'ubique'),
            type: q.type || 'true_false',
            reference_text: q.reference_text || '',
            reference_image: q.reference_image || '',
            statement: q.statement || '',
            correct: q.correct,
            options: Array.isArray(q.options) ? q.options.map(function(o){
              return { label: o.label, text: o.text, correct: !!o.correct };
            }) : undefined,
            comment: q.comment || '',
            tags: Array.isArray(q.tags) ? q.tags.slice() : [],
            stats: q.stats || undefined
          });
          createdInBank++;
        }
        // Registra aparição
        QuestionBank.registerUsage(bankId, ctx.unit_id, ctx.block_id, ctx.group_id, ctx.position);
        // Substitui inline por ref
        migratedInline++;
        return { bank_id: bankId };
      }

      UbiqueStore.unit_blocks.list().forEach(function(b){
        if(!b || b.type !== 'objective_questions' || !b.content) return;
        let blockChanged = false;

        if(Array.isArray(b.content.groups)){
          b.content.groups.forEach(function(g){
            if(!Array.isArray(g.questions)) return;
            g.questions = g.questions.map(function(q, qIdx){
              const newQ = migrateQuestion(q, {
                unit_id: b.unit_id,
                block_id: b.id,
                group_id: g.id,
                position: qIdx
              });
              if(newQ !== q) blockChanged = true;
              return newQ;
            });
          });
        }

        if(Array.isArray(b.content.ungrouped)){
          b.content.ungrouped = b.content.ungrouped.map(function(q, qIdx){
            const newQ = migrateQuestion(q, {
              unit_id: b.unit_id,
              block_id: b.id,
              group_id: null,
              position: qIdx
            });
            if(newQ !== q) blockChanged = true;
            return newQ;
          });
        }

        if(blockChanged){
          UbiqueStore.unit_blocks.update(b.id, { content: b.content });
        }
      });

      if(createdInBank > 0 || migratedInline > 0){
        console.log('[migrate-qb] ' + createdInBank + ' questão(ões) adicionada(s) ao banco; ' + migratedInline + ' refs (inline → bank_id) — Fase G');
      }
    }catch(e){
      console.warn('[migrate-qb] error:', e);
    }
  })();

  /**
   * Y3 Fase N — Migra essays INLINE pro EssayBank (UbiqueStore.essays).
   * Idempotente: só toca em items sem bank_id.
   */
  (function migrateInlineEssaysToBankOnce(){
    try{
      if(!window.UbiqueStore || !window.EssayBank || !window.LearningBlocks) return;
      const LB = window.LearningBlocks;

      let createdInBank = 0;
      let migratedInline = 0;

      function migrateEssayItem(it, ctx){
        if(!it || typeof it !== 'object') return it;
        if(it.bank_id){
          EssayBank.registerUsage(it.bank_id, ctx.unit_id, ctx.block_id, ctx.position);
          return it;
        }
        // Calcula bank_id
        let bankId = null;
        const sourceType = it.source_type || (it.origin || it.reference ? 'past_exam' : 'ubique');
        const originStr = it.origin || it.reference || '';
        if(sourceType === 'past_exam' && originStr){
          bankId = LB.questionBankIdFromOrigin(originStr);
        }
        if(!bankId){
          bankId = LB.generateUbiqueQuestionId();
        }
        if(!UbiqueStore.essays.get(bankId)){
          EssayBank.createOrGet({
            id: bankId,
            origin: originStr,
            source_type: sourceType,
            statement: it.statement || it.command || '',
            maxLength: it.maxLength || 3000,
            tags: Array.isArray(it.tags) ? it.tags.slice() : [],
            topics: Array.isArray(it.topics) ? it.topics.slice() : [],
            references: Array.isArray(it.references) ? it.references.slice() : [],
            criteria: Array.isArray(it.criteria) ? it.criteria.slice() : [],
            officialAnswer: it.officialAnswer || it.modelAnswer || '',
            modelAnswers: Array.isArray(it.modelAnswers) ? it.modelAnswers.slice() : [],
            show_criteria: it.show_criteria !== false,
            show_official_answer: it.show_official_answer !== false,
            show_model_answers: it.show_model_answers !== false
          });
          createdInBank++;
        }
        EssayBank.registerUsage(bankId, ctx.unit_id, ctx.block_id, ctx.position);
        migratedInline++;
        return { bank_id: bankId };
      }

      UbiqueStore.unit_blocks.list().forEach(function(b){
        if(!b || b.type !== 'essay' || !b.content || !Array.isArray(b.content.items)) return;
        let changed = false;
        b.content.items = b.content.items.map(function(it, idx){
          const newIt = migrateEssayItem(it, { unit_id: b.unit_id, block_id: b.id, position: idx });
          if(newIt !== it) changed = true;
          return newIt;
        });
        if(changed){
          UbiqueStore.unit_blocks.update(b.id, { content: b.content });
        }
      });

      if(createdInBank > 0 || migratedInline > 0){
        console.log('[migrate-eb] ' + createdInBank + ' discursiva(s) adicionada(s) ao banco; ' + migratedInline + ' refs migradas (Fase N)');
      }
    }catch(e){
      console.warn('[migrate-eb] error:', e);
    }
  })();

  /**
   * Y3a — Semeia a biblioteca de verbetes a partir dos fragments embutidos
   * em blocos do tipo `text`. Roda só uma vez (quando verbetes está vazio).
   */
  (function seedVerbetesFromMockBlocks(){
    try{
      if(!window.UbiqueStore) return;

      const slug = function(s){
        return String(s||'').toLowerCase()
          .normalize('NFD').replace(/[̀-ͯ]/g,'')
          .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      };

      // IDEMPOTENTE: indexa verbetes existentes por id e por term normalizado.
      // Adiciona apenas os que ainda não existem — NUNCA sobrescreve
      // verbetes editados pelo usuário.
      const existing = UbiqueStore.verbetes.list() || [];
      const existingIds   = new Set(existing.map(function(v){ return v.id; }));
      const existingTerms = new Set(existing.map(function(v){ return slug(v.term); }));

      let count = 0;
      (UbiqueStore.unit_blocks.list() || []).forEach(function(b){
        if(b.type !== 'text') return;
        const paragraphs = (b.content && b.content.paragraphs) || [];
        paragraphs.forEach(function(p){
          const frags = p.fragments || [];
          frags.forEach(function(f){
            if(!f || !f.text) return;
            const id = f.id && String(f.id).indexOf('v_') === 0 ? f.id : ('v_' + slug(f.text));
            if(existingIds.has(id)) return;
            if(existingTerms.has(slug(f.text))) return;
            existingIds.add(id);
            existingTerms.add(slug(f.text));
            UbiqueStore.verbetes.add({
              id: id,
              term: f.text,
              aliases: [],
              definition: f.definition ? ('<p>' + f.definition + '</p>') : '',
              images: (f.images || []).map(function(img){
                return { url: img.url || '', name: img.name || '', description: img.description || '' };
              }),
              link: f.link || '',
              related_term_ids: (f.relatedTerms || []).map(function(r){
                return r && String(r).indexOf('v_') === 0 ? r : ('v_' + slug(r));
              }),
              topics: f.topics || [],
              tags: f.tags || []
            });
            count++;
          });
        });
      });
      if(count > 0) console.log('[seed verbetes] +' + count + ' novos verbetes cadastrados (não-destrutivo).');
    }catch(e){ console.warn('[seed verbetes] erro:', e); }
  })();

  function normName(s){
    return String(s || '').toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '');
  }

  // Lookup por slug E por nome normalizado (mais robusto)
  const ORIG_BY_SLUG = {};
  const ORIG_BY_NAME = {};
  ORIGINAL_COURSES.forEach(c => {
    if(c.slug) ORIG_BY_SLUG[c.slug] = c;
    if(c.title) ORIG_BY_NAME[normName(c.title)] = c;
  });

  /**
   * Constrói um objeto "course" a partir de um subject do store.
   * Se houver match com curso original, USA O ORIGINAL como base
   * e só sobrescreve os campos que o admin pode editar.
   */
  function buildCourse(subject){
    // Tenta achar o original por slug primeiro, depois por nome
    const slug = subject.slug || normName(subject.subject);
    const orig = ORIG_BY_SLUG[slug] || ORIG_BY_NAME[normName(subject.subject)] || null;

    if(orig){
      // CASO 1: matéria existente nos mocks — preserva TUDO do original
      // e só patcha os campos editáveis vindos do admin.
      const status = subject.status || orig.status || 'published';
      const scheduledAt = subject.scheduled_at || orig.scheduled_at || null;
      // totalHours: aceita 0 do admin (não cair no fallback do orig)
      const hours = subject.totalHours != null ? subject.totalHours : orig.totalHours;
      return Object.assign({}, orig, {
        title: subject.subject || orig.title,
        description: subject.description || orig.description,
        cover: subject.cover || orig.cover,
        sigla: subject.sigla || orig.sigla,
        totalHours: hours,
        status: status,
        scheduled_at: scheduledAt,
        // Compatibilidade com o sistema legacy de releaseAt do catálogo
        releaseAt: status === 'scheduled' ? scheduledAt : (orig.releaseAt || null),
        coordinator: subject.coordinator || orig.coordinator,
        coordinatorPhoto: subject.coordinatorPhoto || orig.coordinatorPhoto,
        // Apelidos e concursos vinculados (cadastrados no admin)
        aliases: Array.isArray(subject.aliases) ? subject.aliases : (orig.aliases || []),
        concurso_ids: Array.isArray(subject.concurso_ids) ? subject.concurso_ids : (orig.concurso_ids || []),
        _subjectId: subject.id,
      });
    }

    // CASO 2: matéria NOVA criada no admin — sem mock original
    const status = subject.status || 'coming-soon';
    return {
      id: 'curso-' + slug,
      slug: slug,
      title: subject.subject || 'Sem título',
      subtitle: subject.subtitle || '',
      description: subject.description || '',
      cover: subject.cover || 'https://images.unsplash.com/photo-1532012197267-da84d127e765?w=800&q=80',
      coordinator: subject.coordinator || '—',
      coordinatorPhoto: subject.coordinatorPhoto || '',
      authors: subject.authors || [],
      rating: subject.rating || 4.5,
      totalHours: subject.totalHours != null ? subject.totalHours : 0,
      quizCount: subject.quizCount || 0,
      essayCount: subject.essayCount || 0,
      videoCount: subject.videoCount || 0,
      tier: subject.tier || 'basic',
      status: status,
      scheduled_at: subject.scheduled_at || null,
      releaseAt: status === 'scheduled' ? subject.scheduled_at : null,
      topics: [],
      tags: ['tg_cacd'],
      modules: [],
      sigla: subject.sigla || '',
      aliases: Array.isArray(subject.aliases) ? subject.aliases : [],
      concurso_ids: Array.isArray(subject.concurso_ids) ? subject.concurso_ids : [],
      _subjectId: subject.id,
    };
  }

  /**
   * Reconstrói os módulos/capítulos/unidades de window.COURSE a partir do
   * UbiqueStore para o subject_id informado. Preserva grupos/blocos legados
   * da unidade original (matched por _origMockId) para que o estudante
   * continue vendo o conteúdo enquanto o admin não migrar tudo.
   */
  function rebuildCourseHierarchyFromStore(course, subjectId, originalCourse){
    if(!window.UbiqueStore || !subjectId) return course;
    const storeModules = UbiqueStore.modules.list()
      .filter(function(m){ return m.subject_id === subjectId; })
      .sort(function(a,b){ return (a.position||0) - (b.position||0); });
    if(!storeModules.length) return course;

    const origModules  = (originalCourse && originalCourse.modules) || [];
    const origChapters = {};
    const origUnits = {};
    origModules.forEach(function(m){
      origChapters[m.id] = m.chapters || [];
      (m.chapters || []).forEach(function(c){
        (c.units || []).forEach(function(u){
          origUnits[u.id] = u;
        });
      });
    });

    const allChapters = UbiqueStore.chapters.list();
    const allUnits    = UbiqueStore.units.list();

    course.modules = storeModules.map(function(sm){
      const mid = sm._origMockId || ('m' + sm.id);
      const origMod = origModules.find(function(om){ return om.id === mid; }) || null;
      const storeCh = allChapters
        .filter(function(c){ return c.module_id === sm.id; })
        .sort(function(a,b){ return (a.position||0) - (b.position||0); });

      return Object.assign({}, origMod || {}, {
        id: mid,
        number: sm.number || (origMod && origMod.number) || '',
        title:  sm.title  || (origMod && origMod.title)  || '',
        subtitle: sm.subtitle || (origMod && origMod.subtitle) || '',
        description: sm.description || (origMod && origMod.description) || '',
        cover:  sm.cover_url || (origMod && origMod.cover) || '',
        label:  (origMod && origMod.label) || 'Módulo',
        _storeId: sm.id,
        _subjectId: subjectId,
        chapters: storeCh.map(function(sc){
          const cid = sc._origMockId || ('c' + sc.id);
          const origCh = (origMod && (origMod.chapters||[]).find(function(oc){ return oc.id === cid; })) || null;
          const storeU = allUnits
            .filter(function(u){ return u.chapter_id === sc.id; })
            .sort(function(a,b){ return (a.position||0) - (b.position||0); });

          return Object.assign({}, origCh || {}, {
            id: cid,
            number: sc.number || (origCh && origCh.number) || '',
            title:  sc.title  || (origCh && origCh.title)  || '',
            description: sc.description || (origCh && origCh.description) || '',
            _storeId: sc.id,
            units: storeU.map(function(su){
              const uid = su._origMockId || ('u' + su.id);
              const origU = origUnits[uid] || null;
              return Object.assign({}, origU || {}, {
                id: uid,
                number: su.number || (origU && origU.number) || '',
                title:  su.title  || (origU && origU.title)  || '',
                subtitle: su.subtitle || (origU && origU.subtitle) || '',
                description: su.description || (origU && origU.description) || '',
                cover:  su.cover_url || (origU && origU.cover) || '',
                duration: su.duration_min || (origU && origU.duration) || null,
                label:  (origU && origU.label) || 'Unidade',
                _storeId: su.id,
                // Preserve legacy groups/blocks if present, else default to []
                groups: (origU && origU.groups) || []
              });
            })
          });
        })
      });
    });
    return course;
  }

  function rebuildCourses(){
    const subjects = UbiqueStore.subjects.list();

    // Se o store estiver vazio (caso raríssimo), mantém os mockados intactos
    if(!subjects.length){
      window.COURSES = ORIGINAL_COURSES.slice();
      return;
    }

    window.COURSES = subjects.map(buildCourse);

    // Hidrata módulos/capítulos/unidades de CADA curso a partir do store
    // (matched por _subjectId). Assim qualquer mudança do admin reflete no aluno.
    window.COURSES.forEach(function(course){
      if(course && course._subjectId){
        const origForCourse = ORIG_BY_SLUG[course.slug]
                           || ORIG_BY_NAME[normName(course.title || '')]
                           || null;
        rebuildCourseHierarchyFromStore(course, course._subjectId, origForCourse);
      }
    });

    // window.COURSE é o curso "ativo" (História do Brasil por padrão)
    // SEMPRE preserva o objeto original com seus módulos completos.
    const orig = ORIG_BY_SLUG['historia-brasil'];
    if(orig){
      // Acha o subject correspondente no store (se renomeado)
      const subj = subjects.find(s => (s.slug || normName(s.subject)) === 'historia-brasil')
                || subjects.find(s => normName(s.subject) === normName(orig.title));
      if(subj){
        window.COURSE = Object.assign({}, orig, {
          title: subj.subject || orig.title,
          description: subj.description || orig.description,
          cover: subj.cover || orig.cover,
          _subjectId: subj.id,
        });
        // Hidrata módulos/capítulos/unidades a partir do store
        rebuildCourseHierarchyFromStore(window.COURSE, subj.id, orig);
      } else {
        // Matéria foi apagada — mantém o original como fallback
        window.COURSE = Object.assign({}, orig);
      }
    }
  }

  // Expõe utilidades para handlers globais (ex: catálogo navegando entre cursos)
  window._UbqOrigBySlug = ORIG_BY_SLUG;
  window._UbqRebuildCourseHierarchy = rebuildCourseHierarchyFromStore;

  rebuildCourses();

  // Re-renderiza ao receber mudanças do store (mesma aba ou outra aba).
  // Reage a qualquer alteração em entidades de catálogo/hierarquia, para
  // que mudanças do admin (módulos novos, status, blocos editados) reflitam
  // imediatamente no aluno.
  UbiqueStore.subscribe(function(evt){
    if(!evt || !evt.type) return;
    const triggers = ['sync','reset','subjects','modules','chapters','units','unit_blocks','unit_sections'];
    const shouldRebuild = triggers.some(function(t){
      return evt.type === t || evt.type.indexOf(t) === 0;
    });
    if(shouldRebuild){
      rebuildCourses();
      try{
        if(window.App && typeof window.App.render === 'function'){
          window.App.render();
        }
      }catch(_){}
    }
  });
})();

<script id="app">
(function(){
'use strict';

/* ───────── Util ───────── */
const Util = {
  esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },
  attr(s){ return Util.esc(s); },
  slug(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''); },
  pad2(n){ return String(n).padStart(2,'0'); },
  fmtPct(n){ return Math.round(n*100)+'%'; },
  initials(name){ return (name||'').trim().split(/\s+/).slice(0,2).map(s=>s[0]).join('').toUpperCase() || '?'; },
  getTopic(id){ return window.TOPIC_REGISTRY[id] || null; },
  getTag(id){ return window.TAG_REGISTRY[id] || null; },
  topicDepth(t){ return t && t.number ? t.number.split('.').length : 1; },
  chipTopic(id){
    const t = Util.getTopic(id); if(!t) return '';
    const d = Util.topicDepth(t);
    return `<span class="tpc tpc-d${d}" data-topic-id="${Util.attr(t.id)}"><span class="tpc-num">${Util.esc(t.number)}</span><span class="tpc-name">${Util.esc(t.name)}</span></span>`;
  },
  chipTag(id){
    const t = Util.getTag(id); if(!t) return '';
    return `<span class="tg" data-tag-id="${Util.attr(t.id)}"><span class="tg-hash">#</span>${Util.esc(t.name)}</span>`;
  },
  chips(topics, tags){
    const t = (topics||[]).map(Util.chipTopic).join('');
    const g = (tags||[]).map(Util.chipTag).join('');
    return (t||g) ? `<div class="q-topics-tags">${t}${g}</div>` : '';
  },
  unitsOfModule(mod){
    if(mod.chapters && mod.chapters.length){
      return mod.chapters.flatMap(c => (c.units||[]).map(u => ({ unit:u, chapterId:c.id, chapter:c })));
    }
    return (mod.units||[]).map(u => ({ unit:u, chapterId:null, chapter:null }));
  },
  findModule(courseOrId){
    if(typeof courseOrId !== 'string') return courseOrId;
    return window.COURSE.modules.find(m => m.id === courseOrId) || null;
  },
  findUnit(moduleId, unitId){
    const m = Util.findModule(moduleId); if(!m) return null;
    for(const entry of Util.unitsOfModule(m)){
      if(entry.unit.id === unitId) return { module:m, chapter:entry.chapter, unit:entry.unit };
    }
    return null;
  },
  countBlocks(unit){
    return (unit.groups||[]).reduce((sum,g)=>sum+(g.blocks||[]).length,0);
  }
};
window.Util = Util;

/* ───────── Store ───────── */
const Auth = (function(){
  const SESSION_KEY = 'ubique.auth.session';
  const users = (window.AUTH_USERS || []).map(user => Object.assign({}, user));
  let current = null;

  function publicUser(user){
    if(!user) return null;
    const clone = Object.assign({}, user);
    delete clone.password;
    return clone;
  }
  function syncMockUser(){
    window.MOCK_USER = current ? publicUser(current) : null;
  }
  function persist(user, remember){
    try{
      localStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(SESSION_KEY);
      if(!user) return;
      (remember ? localStorage : sessionStorage).setItem(SESSION_KEY, JSON.stringify({ userId:user.id }));
    }catch(e){}
  }
  function load(){
    try{
      const raw = localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
      if(!raw){ current = null; syncMockUser(); return null; }
      const parsed = JSON.parse(raw);
      const match = users.find(user => user.id === parsed.userId);
      current = match ? publicUser(match) : null;
      syncMockUser();
      return current;
    }catch(e){
      current = null;
      syncMockUser();
      return null;
    }
  }
  function login(email, password, remember){
    const normalizedEmail = String(email||'').trim().toLowerCase();
    const match = users.find(user => user.email.toLowerCase() === normalizedEmail && user.password === String(password||''));
    if(!match) return { ok:false, message:'Credenciais inválidas. Use um dos acessos informados ao lado.' };
    current = publicUser(match);
    syncMockUser();
    persist(current, !!remember);
    // Se for admin, guarda token de sessão admin para o admin.html usar
    if(current.role === 'admin'){
      try{ localStorage.setItem('ubique.admin.token', JSON.stringify({ email:current.email, name:current.name||'', ts:Date.now() })); }catch(_){}
    }
    return { ok:true, user:current };
  }
  function logout(){
    current = null;
    syncMockUser();
    persist(null);
    try{ localStorage.removeItem('ubique.admin.token'); }catch(_){}
  }
  function getUser(){
    return current || load();
  }
  function isAdmin(){
    const user = getUser();
    return !!user && user.role === 'admin';
  }
  function canAccess(route){
    const user = getUser();
    if(!user) return route.view === 'login';
    if(route.section === 'admin' && user.role !== 'admin') return false;
    return true;
  }
  function landingRoute(user){
    const currentUser = user || getUser();
    if(!currentUser) return '#/login';
    return currentUser.landingRoute || '#/';
  }
  function allUsers(){
    return users.map(publicUser);
  }
  // ── acesso à plataforma (platform_access) ──────────────────
  const ACCESS_KEY = 'ubique.platform.access';

  function storeAccessData(data, remember){
    try{
      const storage = remember ? localStorage : sessionStorage;
      storage.setItem(ACCESS_KEY, JSON.stringify(data));
    }catch(e){}
  }
  function loadAccessData(){
    try{
      const raw = localStorage.getItem(ACCESS_KEY) || sessionStorage.getItem(ACCESS_KEY);
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  }
  function clearAccessData(){
    try{
      localStorage.removeItem(ACCESS_KEY);
      sessionStorage.removeItem(ACCESS_KEY);
    }catch(e){}
  }

  // Consulta acesso à plataforma. Prioriza UbiqueStore (modo mock).
  // Retorna { allowed, access_type, subject_ids, reason? }
  async function checkPlatformAccess(email){
    const normEmail = email.trim().toLowerCase();

    // 1ª fonte: UbiqueStore (Portaria)
    if(window.UbiqueStore){
      const list = window.UbiqueStore.platform_access.list();
      // Se a Portaria estiver vazia → libera tudo (modo "sem controle")
      if(list.length === 0){
        return { allowed: true, access_type: 'full', subject_ids: [] };
      }
      const found = list.find(x => (x.email||'').toLowerCase() === normEmail);
      if(!found) return { allowed: false, reason: 'not_found' };
      if(found.status === 'suspended') return { allowed: false, reason: 'suspended' };
      return {
        allowed: true,
        access_type: found.access_type || 'full',
        subject_ids: Array.isArray(found.subject_ids) ? found.subject_ids : [],
      };
    }

    // 2ª fonte: Supabase (se ativado)
    if(window.UBIQUE_USE_SUPABASE && window._sb){
      try{
        const { data, error } = await window._sb
          .from('platform_access')
          .select('status, access_type, subject_ids')
          .eq('email', normEmail)
          .maybeSingle();
        if(error) return { allowed: true, access_type: 'full', subject_ids: [] };
        if(!data)  return { allowed: false, reason: 'not_found' };
        if(data.status === 'suspended') return { allowed: false, reason: 'suspended' };
        return {
          allowed: true,
          access_type: data.access_type || 'full',
          subject_ids: Array.isArray(data.subject_ids) ? data.subject_ids : [],
        };
      }catch(e){
        return { allowed: true, access_type: 'full', subject_ids: [] };
      }
    }

    // Sem store nem Supabase → libera (fallback seguro)
    return { allowed: true, access_type: 'full', subject_ids: [] };
  }

  // Verifica se um módulo está liberado para o usuário.
  // Mapeamento: subject_ids contém posições 1-based dos módulos no COURSE.
  function canAccessModule(moduleId){
    const data = loadAccessData();
    if(!data || data.access_type === 'full') return true;
    const modules = (window.COURSE && window.COURSE.modules) || [];
    const idx = modules.findIndex(m => m.id === moduleId);
    if(idx === -1) return true;                          // módulo desconhecido → libera
    return (data.subject_ids || []).includes(idx + 1);  // posição 1-based
  }

  /**
   * Verifica se o curso ATIVO (window.COURSE) está bloqueado por agendamento.
   * Bloqueia se status='scheduled' ou 'coming-soon' (independente da data).
   * Retorna { locked: bool, releaseAt: string|null }.
   */
  function isCurrentCourseScheduled(){
    const c = window.COURSE;
    if(!c) return { locked: false, releaseAt: null };
    const releaseTime = c.releaseAt ? new Date(c.releaseAt).getTime() : 0;
    const locked =
      c.status === 'scheduled' ||
      c.status === 'coming-soon' ||
      (releaseTime > 0 && releaseTime > Date.now());
    return { locked, releaseAt: c.releaseAt };
  }

  function canAccess(route){
    const user = getUser();
    if(!user) return route.view === 'login';
    if(route.section === 'admin' && user.role !== 'admin') return false;
    // Edital é livre pra qualquer usuário logado.
    if(route.view === 'edital') return true;
    // Bloqueio de conteúdo por módulo (apenas alunos)
    if(user.role !== 'admin'){
      const contentViews = ['module','chapter','unit','portal','portalDetail','courseHome','course'];
      // Se o curso atual estiver agendado e ainda não passou a hora, bloqueia tudo
      if(contentViews.includes(route.view)){
        const sched = isCurrentCourseScheduled();
        if(sched.locked) return false;
      }
      if(['module','chapter','unit','portal','portalDetail'].includes(route.view) && route.moduleId){
        if(!canAccessModule(route.moduleId)) return false;
      }
    }
    return true;
  }

  const _origLogout = logout;
  function logout(){
    _origLogout();
    clearAccessData();
  }

  load();
  return {
    login, logout, getUser, isAdmin, canAccess, landingRoute, allUsers, load,
    checkPlatformAccess, storeAccessData, loadAccessData, canAccessModule,
    isCurrentCourseScheduled,
  };
})();
window.Auth = Auth;

const Commerce = (function(){
  const KEY = 'ubique.course.entitlements';
  let owned = {};
  function load(){
    try{
      owned = JSON.parse(localStorage.getItem(KEY) || '{}') || {};
    }catch(_){
      owned = {};
    }
    return owned;
  }
  function save(){
    try{ localStorage.setItem(KEY, JSON.stringify(owned)); }catch(_){}
  }
  function isOwned(courseId){
    if(!owned || !Object.keys(owned).length) load();
    const course = (window.COURSES || []).find(item => item.id === courseId);
    return !!(course && course.contractIncluded) || !!owned[courseId];
  }
  function purchase(course){
    if(!course || !course.id) return false;
    owned[course.id] = {
      courseId: course.id,
      title: course.title,
      purchasedAt: new Date().toISOString(),
      mode: 'one_click_mock'
    };
    save();
    return true;
  }
  load();
  return { isOwned, purchase, load };
})();

    return null;
  }
  function _persist(){
    clearTimeout(_writeTimer);
    _writeTimer = setTimeout(()=>{
      try{ localStorage.setItem(_key, JSON.stringify(_state)); }
      catch(e){ console.warn('[Store] persist failed', e); }
    }, 200);
  }
  function _emit(){ _subs.forEach(fn => { try{ fn(_state); }catch(e){ console.error(e); } }); }

  return {
    init(userId, course){
      _key = `ubique.coursePlatform.v3.${userId}.${course.id}`;
      const existing = _load();
      if(existing && existing.version === 3){
        _state = existing;
        // back-fill any missing fields so older records don't crash
        if(!Array.isArray(_state.readingList)) _state.readingList = [];
      } else {
        _state = window.defaultUserState(course);
        // seed with mock progress
        Object.assign(_state, window.MOCK_INITIAL_PROGRESS || {});
        _persist();
      }
      return _state;
    },
    get(){ return _state; },
    reset(course){
      _state = window.defaultUserState(course);
      _persist(); _emit();
    },
    subscribe(fn){ _subs.add(fn); return ()=>_subs.delete(fn); },
    markUnitView(unitId){
      const v = _state.unitViews[unitId] || { firstSeenAt:Date.now(), viewCount:0, completed:false };
      v.lastSeenAt = Date.now();
      v.viewCount = (v.viewCount||0)+1;
      if(!v.firstSeenAt) v.firstSeenAt = Date.now();
      _state.unitViews[unitId] = v;
      _persist(); _emit();
    },
    completeUnit(unitId){
      const v = _state.unitViews[unitId] || { firstSeenAt:Date.now(), viewCount:1 };
      v.completed = true;
      v.lastSeenAt = Date.now();
      _state.unitViews[unitId] = v;
      // Cascade: mark every block inside the unit as finished (bookmarks)
      for(const m of window.COURSE.modules){
        const found = Util.findUnit(m.id, unitId);
        if(found){
          _state.bookmarks[unitId] = _state.bookmarks[unitId] || {};
          (found.unit.groups||[]).forEach(g => (g.blocks||[]).forEach(b => {
            _state.bookmarks[unitId][b.id] = true;
          }));
          break;
        }
      }
      _persist(); _emit();
    },
    uncompleteUnit(unitId){
      const v = _state.unitViews[unitId];
      if(v){ v.completed = false; _state.unitViews[unitId] = v; }
      _persist(); _emit();
    },
    updateQuizAnswer(unitId, blockId, itemId, payload){
      // Y3 Fase I — Stats compartilhadas por bank_id.
      // Se itemId for um bank_id (questão no banco), grava em
      // _state.quizAnswersByBankId[itemId] — compartilhado entre TODAS as
      // unidades onde a questão aparece. Mantém _state.quizAnswers[unitId]
      // como cache local pra retrocompat com renderers que esperam o
      // formato antigo.
      const isBankId = typeof itemId === 'string' &&
        (itemId.startsWith('ubique-') || /^[a-z]+-\d/.test(itemId));
      if(isBankId){
        _state.quizAnswersByBankId = _state.quizAnswersByBankId || {};
        _state.quizAnswersByBankId[itemId] = Object.assign({ answeredAt: Date.now() }, payload);
        // Cache local também (pra olhar sem precisar de bank_id)
        _state.quizAnswers[unitId] = _state.quizAnswers[unitId] || {};
        _state.quizAnswers[unitId][blockId] = _state.quizAnswers[unitId][blockId] || {};
        _state.quizAnswers[unitId][blockId][itemId] = _state.quizAnswersByBankId[itemId];
      } else {
        _state.quizAnswers[unitId] = _state.quizAnswers[unitId] || {};
        _state.quizAnswers[unitId][blockId] = _state.quizAnswers[unitId][blockId] || {};
        _state.quizAnswers[unitId][blockId][itemId] = Object.assign({ answeredAt: Date.now() }, payload);
      }
      _persist(); _emit();
    },
    updateEssay(unitId, blockId, itemId, payload){
      _state.essays[unitId] = _state.essays[unitId] || {};
      _state.essays[unitId][blockId] = _state.essays[unitId][blockId] || {};
      _state.essays[unitId][blockId][itemId] = Object.assign({ submittedAt:Date.now() }, payload);
      _persist(); _emit();
    },
    updateFlashcard(unitId, blockId, cardId, status){
      _state.flashcards[unitId] = _state.flashcards[unitId] || {};
      _state.flashcards[unitId][blockId] = _state.flashcards[unitId][blockId] || {};
      const cur = _state.flashcards[unitId][blockId][cardId] || { reps:0 };
      cur.status = status;
      cur.reps = (cur.reps||0) + 1;
      cur.lastReviewedAt = Date.now();
      _state.flashcards[unitId][blockId][cardId] = cur;
      _persist(); _emit();
    },
    toggleBookmark(unitId, blockId){
      _state.bookmarks[unitId] = _state.bookmarks[unitId] || {};
      if(_state.bookmarks[unitId][blockId]) delete _state.bookmarks[unitId][blockId];
      else _state.bookmarks[unitId][blockId] = true;
      _persist(); _emit();
    },
    /* Reading list — ordered, insertion-order-preserving */
    isInReadingList(unitId, blockId){
      return (_state.readingList||[]).some(e => e.unitId === unitId && e.blockId === blockId);
    },
    addToReadingList(entry){
      if(!Array.isArray(_state.readingList)) _state.readingList = [];
      if(Store.isInReadingList(entry.unitId, entry.blockId)) return;
      _state.readingList.push(Object.assign({ addedAt:Date.now() }, entry));
      _persist(); _emit();
    },
    removeFromReadingList(unitId, blockId){
      if(!Array.isArray(_state.readingList)) return;
      _state.readingList = _state.readingList.filter(e => !(e.unitId === unitId && e.blockId === blockId));
      _persist(); _emit();
    },
    toggleReadingList(entry){
      if(Store.isInReadingList(entry.unitId, entry.blockId)){
        Store.removeFromReadingList(entry.unitId, entry.blockId);
      } else {
        Store.addToReadingList(entry);
      }
    },
    listReadingList(){
      return Array.isArray(_state.readingList) ? _state.readingList.slice() : [];
    },
    addNote(payload){
      const now = Date.now();
      const note = Object.assign({ id:'n'+now, createdAt:now, updatedAt:now }, payload);
      if(!Array.isArray(_state.notes)) _state.notes = [];
      _state.notes.push(note);
      _persist(); _emit();
      return note;
    },
    updateNote(id, patch){
      const idx = (_state.notes||[]).findIndex(n => n.id === id);
      if(idx < 0) return null;
      _state.notes[idx] = Object.assign({}, _state.notes[idx], patch, { updatedAt:Date.now() });
      _persist(); _emit();
      return _state.notes[idx];
    },
    deleteNote(id){
      if(!Array.isArray(_state.notes)) return;
      _state.notes = _state.notes.filter(n => n.id !== id);
      _persist(); _emit();
    },
    listNotes(filters){
      filters = filters || {};
      let list = Array.isArray(_state.notes) ? _state.notes.slice() : [];
      if(filters.moduleId) list = list.filter(n => n.moduleId === filters.moduleId);
      if(filters.chapterId) list = list.filter(n => n.chapterId === filters.chapterId);
      if(filters.unitId) list = list.filter(n => n.unitId === filters.unitId);
      if(filters.topic){
        const set = new Set([filters.topic]);
        Object.values(window.TOPIC_REGISTRY).forEach(t => {
          let cur = t;
          while(cur && cur.parentId){
            if(cur.parentId === filters.topic || set.has(cur.parentId)){ set.add(t.id); break; }
            cur = window.TOPIC_REGISTRY[cur.parentId];
          }
        });
        list = list.filter(n => (n.topics||[]).some(id => set.has(id)));
      }
      if(filters.tag) list = list.filter(n => (n.tags||[]).includes(filters.tag));
      if(filters.q){
        const q = filters.q.toLowerCase();
        list = list.filter(n => {
          const txt = [n.quote, n.body, n.blockTitle, n.unitTitle].filter(Boolean).join(' ').toLowerCase();
          return txt.indexOf(q) >= 0;
        });
      }
      list.sort((a,b) => (b.updatedAt||b.createdAt||0) - (a.updatedAt||a.createdAt||0));
      return list;
    },
    notesForBlock(unitId, blockId){
      return (_state.notes||[]).filter(n => n.unitId === unitId && n.blockId === blockId);
    },
    isBookmarked(unitId, blockId){
      return !!(_state.bookmarks[unitId] && _state.bookmarks[unitId][blockId]);
    },
    getQuizAnswer(unitId, blockId, itemId){
      // Y3 Fase I — Lookup primeiro no índice global por bank_id
      // (compartilhado entre unidades). Se não achar lá, fallback no índice
      // legado por (unitId, blockId, itemId).
      const isBankId = typeof itemId === 'string' &&
        (itemId.startsWith('ubique-') || /^[a-z]+-\d/.test(itemId));
      if(isBankId && _state.quizAnswersByBankId && _state.quizAnswersByBankId[itemId]){
        return _state.quizAnswersByBankId[itemId];
      }
      return (((_state.quizAnswers[unitId]||{})[blockId]||{})[itemId]) || null;
    },
    getEssayAnswer(unitId, blockId, itemId){
      return (((_state.essays[unitId]||{})[blockId]||{})[itemId]) || null;
    },
    getFlashcardState(unitId, blockId, cardId){
      return (((_state.flashcards[unitId]||{})[blockId]||{})[cardId]) || null;
    },
    submitSimulado(simId, score, total){
      _state.simulados = _state.simulados || {};
      _state.simulados[simId] = { submittedAt:Date.now(), score, total, pct:total?(score/total):0, userName:window.MOCK_USER.name };
      _persist(); _emit();
    },
    getSimuladoState(simId){
      return (_state.simulados||{})[simId] || null;
    },
    addHighlight(unitId, blockId, text, color, hint){
      if(!_state.highlights) _state.highlights = [];
      const entry = { id:'hl'+Date.now(), unitId, blockId, text, color, createdAt:Date.now() };
      if(hint) entry.hint = hint;
      _state.highlights.push(entry);
      _persist(); _emit();
    },
    getHighlights(unitId, blockId){
      if(!unitId) return (_state.highlights||[]).slice();
      return (_state.highlights||[]).filter(h => h.unitId === unitId && (!blockId || h.blockId === blockId));
    },
    removeHighlight(id){
      _state.highlights = (_state.highlights||[]).filter(h => h.id !== id);
      _persist(); _emit();
    },
    addComment(blockId, text, parentId){
      if(!_state.comments) _state.comments = {};
      if(!_state.comments[blockId]) _state.comments[blockId] = [];
      const comment = { id:'cmt'+Date.now(), author:window.MOCK_USER.nickname||window.MOCK_USER.name, authorId:window.MOCK_USER.id, text, parentId:parentId||null, createdAt:Date.now() };
      _state.comments[blockId].push(comment);
      _persist(); _emit();
      return comment;
    },
    getComments(blockId){
      return (_state.comments||{})[blockId] || [];
    },
    deleteComment(blockId, commentId){
      if(!_state.comments || !_state.comments[blockId]) return;
      _state.comments[blockId] = _state.comments[blockId].filter(c => c.id !== commentId);
      _persist(); _emit();
    },
    unitProgress(unit){
      const v = _state.unitViews[unit.id] || {};
      if(v.completed) return { state:'completed', pct:1 };
      // simple: count seen blocks via quiz answers + flashcards touched / total blocks
      const totalBlocks = Util.countBlocks(unit);
      if(!totalBlocks) return { state:v.viewCount?'seen':'new', pct: v.viewCount?.2:0 };
      let touched = 0;
      (unit.groups||[]).forEach(g => (g.blocks||[]).forEach(b => {
        if(b.type==='quiz' && _state.quizAnswers[unit.id] && _state.quizAnswers[unit.id][b.id]) touched++;
        else if(b.type==='flashcards' && _state.flashcards[unit.id] && _state.flashcards[unit.id][b.id]) touched++;
        else if(b.type==='essay' && _state.essays[unit.id] && _state.essays[unit.id][b.id]) touched++;
      }));
      const pct = touched/totalBlocks;
      return { state: pct>=1?'completed' : (v.viewCount?'seen':'new'), pct };
    },
    moduleProgress(mod){
      const entries = Util.unitsOfModule(mod);
      if(!entries.length) return 0;
      const sum = entries.reduce((acc,e)=>acc + Store.unitProgress(e.unit).pct, 0);
      return sum/entries.length;
    }
  };
})();
window.Store = Store;

/* ───────── Router ───────── */
const Router = (function(){
  function asRoute(section, view, params, query){
    return { section, view, params:params||{}, query:query||{} };
  }
  function parse(){
    const raw = (location.hash||'#/').replace(/^#/,'');
    const [pathPart, queryPart] = raw.split('?');
    const itemPart = queryPart && queryPart.indexOf('#item=')>=0 ? queryPart.split('#item=')[1] : null;
    const qp = (queryPart||'').split('#')[0];
    const query = {};
    if(qp){ qp.split('&').filter(Boolean).forEach(kv => { const [k,v]=kv.split('='); query[decodeURIComponent(k)]=decodeURIComponent(v||''); }); }
    if(itemPart) query.__item = decodeURIComponent(itemPart);
    const parts = pathPart.split('/').filter(Boolean);
    // Patterns:
    // /                             → courseHome
    // /m/<mId>                      → module
    // /m/<mId>/c/<cId>              → chapter
    // /m/<mId>/u/<uId>              → unit
    // /m/<mId>/c/<cId>/u/<uId>      → unit (chapter context)
    // /m/<mId>/portal               → portal
    // /m/<mId>/portal/<cardKey>     → portalDetail
    if(parts.length === 0) return asRoute('student', 'catalog', {}, query);
    if(parts[0] === 'login') return asRoute('public', 'login', {}, query);
    if(parts[0] === 'course') return asRoute('student', 'courseHome', {}, query);
    if(parts[0] === 'admin') return asRoute('admin', 'admin', {}, query);
    if(parts[0] === 'notes') return asRoute('student', 'notes', {}, query);
    if(parts[0] === 'reading') return asRoute('student', 'reading', {}, query);
    if(parts[0] === 'performance') return asRoute('student', 'performance', {}, query);
    if(parts[0] === 'certificate') return asRoute('student', 'certificate', {}, query);
    if(parts[0] === 'search') return asRoute('student', 'search', {}, query);
    if(parts[0] === 'edital') return asRoute('student', 'edital', {}, query);
    if(parts[0] === 'simulados'){
      if(parts[1] && parts[2] === 'ranking') return asRoute('student', 'simuladoRanking', { simuladoId:parts[1] }, query);
      if(parts[1] && parts[2] === 'performance') return asRoute('student', 'simuladoPerformance', { simuladoId:parts[1] }, query);
      if(parts[1]) return asRoute('student', 'simuladoDetail', { simuladoId:parts[1] }, query);
      return asRoute('student', 'simulados', {}, query);
    }
    if(parts[0] === 'portal'){
      if(parts[1]) return asRoute('student', 'coursePortalDetail', { cardKey:parts[1] }, query);
      return asRoute('student', 'coursePortal', {}, query);
    }
    if(parts[0] === 'm' && parts[1]){
      const moduleId = parts[1];
      if(parts.length === 2) return asRoute('student', 'module', {moduleId}, query);
      if(parts[2] === 'portal'){
        if(parts[3]) return asRoute('student', 'portalDetail', { moduleId, cardKey:parts[3] }, query);
        return asRoute('student', 'portal', { moduleId }, query);
      }
      if(parts[2] === 'c' && parts[3]){
        const chapterId = parts[3];
        if(parts[4] === 'u' && parts[5]) return asRoute('student', 'unit', { moduleId, chapterId, unitId:parts[5] }, query);
        return asRoute('student', 'chapter', { moduleId, chapterId }, query);
      }
      if(parts[2] === 'u' && parts[3]) return asRoute('student', 'unit', { moduleId, unitId:parts[3] }, query);
    }
    return asRoute('student', 'courseHome', {}, query);
  }
  function go(path){ location.hash = '#'+path; }
  function querystring(obj){
    const kvs = Object.entries(obj||{}).filter(([k,v])=>v!=null && v!=='').map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v));
    return kvs.length ? '?'+kvs.join('&') : '';
  }
  return { parse, go, querystring };
})();
window.Router = Router;

/* ───────── Lightbox helper ───────── */
function openLightbox(url, caption){
  const lb = document.getElementById('lightbox');
  document.getElementById('lbImg').src = url;
  document.getElementById('lbCaption').textContent = caption || '';
  lb.classList.add('open');
}
document.addEventListener('click', e => {
  const t = e.target.closest('[data-lightbox]');
  if(t){ e.preventDefault(); openLightbox(t.getAttribute('data-lightbox-src'), t.getAttribute('data-lightbox-cap')); }
});

// Fragment card — hover delegation
document.addEventListener('mouseover', function(e){
  var term = e.target.closest('.frag-term');
  if(term) FragmentCard.open(term.getAttribute('data-fragment-id'), term);
});
document.addEventListener('mouseout', function(e){
  var term = e.target.closest('.frag-term');
  if(term){
    var related = e.relatedTarget;
    if(related && related.closest && related.closest('#fragCard')) return;
    FragmentCard.close();
  }
});
document.addEventListener('click', function(e){
  if(!e.target.closest('#fragCard') && !e.target.closest('.frag-term')){
    var el = document.getElementById('fragCard');
    if(el) el.classList.remove('open');
  }
});
document.addEventListener('click', function(e){
  var link = e.target.closest('[data-goto-fragment]');
  if(!link) return;
  e.preventDefault();
  var targetId = link.getAttribute('data-goto-fragment');
  var targetEl = document.querySelector('.frag-term[data-fragment-id="' + targetId + '"]');
  if(targetEl){
    targetEl.scrollIntoView({ behavior:'smooth', block:'center' });
    targetEl.style.background = 'var(--accent-lo)';
    setTimeout(function(){ targetEl.style.background = ''; }, 1200);
    FragmentCard.open(targetId, targetEl);
  }
});

/* ───────── Structured paragraph renderer ─────────
   Converts block.paragraphs (JSON array) → HTML. Each paragraph may contain
   "fragments" — interactive inline terms that show a popup card on hover. */
function wrapFragment(html, searchText, fragmentId){
  const plain = html.replace(/<[^>]+>/g, '');
  const idx = plain.indexOf(searchText);
  if(idx === -1) return html;
  let plainIdx = 0, htmlStart = -1, htmlEnd = -1;
  for(let i = 0; i < html.length; i++){
    if(html[i] === '<'){ const c = html.indexOf('>', i); if(c === -1) break; i = c; continue; }
    if(plainIdx === idx && htmlStart === -1) htmlStart = i;
    plainIdx++;
    if(plainIdx === idx + searchText.length){ htmlEnd = i + 1; break; }
  }
  if(htmlStart === -1 || htmlEnd === -1) return html;
  return html.slice(0, htmlStart) +
    '<span class="frag-term" data-fragment-id="' + Util.attr(fragmentId) + '">' +
    html.slice(htmlStart, htmlEnd) + '</span>' +
    html.slice(htmlEnd);
}

function renderParagraphs(paragraphs, blockTopics, blockTags){
  if(!Array.isArray(paragraphs) || !paragraphs.length) return '';
  const fragMap = {};
  paragraphs.forEach(function(p){ (p.fragments||[]).forEach(function(f){ fragMap[f.id] = f; }); });
  FragmentCard.setFragments(fragMap);
  return paragraphs.map(function(p){
    let html = p.content || '';
    var frags = (p.fragments||[]).slice().sort(function(a,b){ return b.text.length - a.text.length; });
    frags.forEach(function(f){ html = wrapFragment(html, f.text, f.id); });
    var titleHtml = p.title
      ? '<h4 class="tb-para-title">' + Util.esc(p.title) + '</h4>'
      : '';
    var descHtml = (p.title && p.description)
      ? '<div class="tb-para-desc">' + Util.esc(p.description) + '</div>'
      : '';
    return '<div class="tb-paragraph' + (p.title ? ' has-title' : '') + '" data-paragraph-id="' + Util.attr(p.id) + '">' + titleHtml + descHtml + html + '</div>';
  }).join('');
}
