const GalleryDetail = (function(){
  let _imgs = [], _idx = 0, _el = null, _onKey = null;
  function ensureEl(){
    if(_el) return _el;
    _el = document.createElement('div');
    _el.className = 'gallery-detail';
    _el.innerHTML = `
      <button class="gd-close" aria-label="Fechar" title="Fechar (Esc)">×</button>
      <button class="gd-nav gd-prev" aria-label="Anterior" title="Anterior (←)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="gd-nav gd-next" aria-label="Próximo" title="Próximo (→)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
      <div class="gd-stage">
        <figure class="gd-figure"><img alt=""></figure>
        <div class="gd-meta">
          <div class="gd-counter"></div>
          <div class="gd-title"></div>
          <div class="gd-divider"></div>
          <div class="gd-description"></div>
          <div class="gd-reference"></div>
          <div class="gd-caption"></div>
        </div>
      </div>`;
    document.body.appendChild(_el);
    _el.querySelector('.gd-close').addEventListener('click', close);
    _el.querySelector('.gd-prev').addEventListener('click', () => show(_idx-1));
    _el.querySelector('.gd-next').addEventListener('click', () => show(_idx+1));
    _el.addEventListener('click', e => { if(e.target === _el) close(); });
    return _el;
  }
  function show(n){
    if(!_imgs.length) return;
    _idx = (n + _imgs.length) % _imgs.length;
    const im = _imgs[_idx];
    const img = _el.querySelector('.gd-figure img');
    img.src = im.url; img.alt = im.alt||im.title||im.caption||'';
    _el.querySelector('.gd-title').textContent = im.title || im.caption || '';
    _el.querySelector('.gd-description').textContent = im.description || '';
    _el.querySelector('.gd-reference').textContent = im.reference || '';
    const capEl = _el.querySelector('.gd-caption');
    capEl.textContent = (im.title && im.caption && im.title !== im.caption) ? im.caption : '';
    _el.querySelector('.gd-counter').textContent = `${_idx+1} / ${_imgs.length}`;
    _el.querySelector('.gd-description').style.display = im.description ? '' : 'none';
    _el.querySelector('.gd-reference').style.display = im.reference ? '' : 'none';
    capEl.style.display = capEl.textContent ? '' : 'none';
  }
  function open(imgs, idx){
    if(!imgs || !imgs.length) return;
    _imgs = imgs;
    ensureEl();
    _el.classList.add('open');
    document.body.classList.add('gallery-detail-open');
    show(idx||0);
    _onKey = e => {
      if(e.key === 'Escape') close();
      else if(e.key === 'ArrowLeft') show(_idx-1);
      else if(e.key === 'ArrowRight') show(_idx+1);
    };
    document.addEventListener('keydown', _onKey);
  }
  function close(){
    if(_el) _el.classList.remove('open');
    document.body.classList.remove('gallery-detail-open');
    if(_onKey){ document.removeEventListener('keydown', _onKey); _onKey = null; }
  }
  return { open, close };
})();

/* ───────── Fragment hover card ─────────
   Singleton popup that shows definition, images, related terms for interactive
   fragments within structured text paragraphs. */
/* Sanitização inline pro FragmentCard — delega ao sanitizer DOM-based
 * de LearningBlocks (Y3 Fase E) quando disponível. Fallback regex pra
 * SSR ou se LearningBlocks ainda não carregou. */
function _sanitizeInlineHTML(html){
  if(!html) return '';
  if(window.LearningBlocks && window.LearningBlocks.sanitizeInlineHTML){
    return window.LearningBlocks.sanitizeInlineHTML(html);
  }
  // Fallback regex (mesmo do antigo)
  let s = String(html);
  s = s.replace(/<\s*script[^>]*>[\s\S]*?<\s*\/\s*script\s*>/gi, '');
  s = s.replace(/<\s*style[^>]*>[\s\S]*?<\s*\/\s*style\s*>/gi, '');
  s = s.replace(/\son[a-z]+\s*=\s*"[^"]*"/gi, '');
  s = s.replace(/\son[a-z]+\s*=\s*'[^']*'/gi, '');
  s = s.replace(/(href|src)\s*=\s*"javascript:[^"]*"/gi, '$1="#"');
  s = s.replace(/(href|src)\s*=\s*'javascript:[^']*'/gi, "$1='#'");
  return s;
}

const FragmentCard = (function(){
  let _el = null, _currentId = null, _slideIdx = 0, _images = [];
  let _hideTimeout = null, _allFragments = {};

  function ensureEl(){
    if(_el) return _el;
    _el = document.createElement('div');
    _el.className = 'frag-card';
    _el.id = 'fragCard';
    _el.innerHTML =
      '<div class="frag-card-slider" hidden>' +
        '<div class="frag-card-slides"></div>' +
        '<button class="frag-card-nav frag-card-prev" aria-label="Anterior">\u2039</button>' +
        '<button class="frag-card-nav frag-card-next" aria-label="Próximo">\u203A</button>' +
        '<div class="frag-card-dots"></div>' +
      '</div>' +
      '<div class="frag-card-body">' +
        '<div class="frag-card-term"></div>' +
        '<div class="frag-card-definition"></div>' +
        '<div class="frag-card-related" hidden></div>' +
        '<a class="frag-card-link" target="_blank" rel="noopener" hidden></a>' +
      '</div>';
    document.body.appendChild(_el);
    _el.querySelector('.frag-card-prev').addEventListener('click', function(e){ e.stopPropagation(); showSlide(_slideIdx - 1); });
    _el.querySelector('.frag-card-next').addEventListener('click', function(e){ e.stopPropagation(); showSlide(_slideIdx + 1); });
    _el.addEventListener('mouseenter', function(){ clearTimeout(_hideTimeout); });
    _el.addEventListener('mouseleave', function(){ close(); });
    return _el;
  }

  function showSlide(n){
    if(!_images.length) return;
    _slideIdx = (n + _images.length) % _images.length;
    _el.querySelector('.frag-card-slides').style.transform = 'translateX(-' + (_slideIdx * 100) + '%)';
    _el.querySelectorAll('.frag-card-dot').forEach(function(d, i){ d.classList.toggle('active', i === _slideIdx); });
  }

  function open(fragmentId, anchorEl){
    if(_currentId === fragmentId && _el && _el.classList.contains('open')) return;
    clearTimeout(_hideTimeout);
    var frag = _allFragments[fragmentId];
    if(!frag) return;
    _currentId = fragmentId;
    var el = ensureEl();

    el.querySelector('.frag-card-term').textContent = frag.text;
    // definition aceita HTML inline (b, i, em, strong, br, a, code, sub, sup).
    // O conteúdo vem do admin (já confiável) — fazemos uma sanitização leve só
    // pra remover <script>/<style> e atributos perigosos (on*, javascript:).
    el.querySelector('.frag-card-definition').innerHTML = _sanitizeInlineHTML(frag.definition || '');

    // Images
    _images = frag.images || [];
    var sliderEl = el.querySelector('.frag-card-slider');
    if(_images.length){
      sliderEl.hidden = false;
      _slideIdx = 0;
      el.querySelector('.frag-card-slides').innerHTML = _images.map(function(im){
        return '<div class="frag-card-slide"><img src="' + Util.attr(im.url) + '" alt="' + Util.attr(im.name||'') + '" loading="lazy">' +
          (im.description ? '<div class="frag-card-slide-cap">' + Util.esc(im.description) + '</div>' : '') + '</div>';
      }).join('');
      el.querySelector('.frag-card-dots').innerHTML = _images.map(function(_, i){
        return '<span class="frag-card-dot' + (i === 0 ? ' active' : '') + '"></span>';
      }).join('');
      el.querySelector('.frag-card-slides').style.transform = 'translateX(0)';
      el.querySelector('.frag-card-prev').style.display = _images.length > 1 ? '' : 'none';
      el.querySelector('.frag-card-next').style.display = _images.length > 1 ? '' : 'none';
    } else {
      sliderEl.hidden = true;
    }

    // Related terms
    var relatedEl = el.querySelector('.frag-card-related');
    var related = (frag.relatedTerms||[]).map(function(rid){ return _allFragments[rid]; }).filter(Boolean);
    if(related.length){
      relatedEl.hidden = false;
      relatedEl.innerHTML = '<span class="frag-card-related-label">Veja também</span>' +
        related.map(function(r){ return '<span class="frag-card-related-link" data-goto-fragment="' + Util.attr(r.id) + '">' + Util.esc(r.text) + '</span>'; }).join('');
    } else {
      relatedEl.hidden = true;
    }

    // External link
    var linkEl = el.querySelector('.frag-card-link');
    if(frag.link){ linkEl.hidden = false; linkEl.href = frag.link; linkEl.textContent = 'Saiba mais'; }
    else { linkEl.hidden = true; }

    // Position
    var rect = anchorEl.getBoundingClientRect();
    var cardW = 340;
    var top = rect.bottom + window.scrollY + 8;
    var left = rect.left + window.scrollX + rect.width / 2 - cardW / 2;
    left = Math.max(8, Math.min(window.innerWidth - cardW - 8, left));
    if(rect.bottom + 320 > window.innerHeight){
      top = rect.top + window.scrollY - (el.offsetHeight || 300) - 8;
    }
    el.style.left = left + 'px';
    el.style.top = top + 'px';
    el.classList.add('open');

  mount(stageEl, block){

    if(!sat) return;
    const slides = Array.from(sat.querySelectorAll('.tg-satellite-slide'));
    const dots = Array.from(sat.querySelectorAll('.tg-satellite-dot'));
    const prev = sat.querySelector('.tg-satellite-prev');
    const next = sat.querySelector('.tg-satellite-next');
    const current = sat.querySelector('[data-current]');
    const caption = sat.querySelector('[data-caption]');
    const imgs = block._allImages || (block.images||[]);
    let idx = 0;
    function show(n){
      idx = (n + slides.length) % slides.length;
      slides.forEach((s,i) => s.classList.toggle('active', i===idx));
      dots.forEach((d,i) => d.classList.toggle('active', i===idx));
      if(current) current.textContent = (idx+1);
      if(caption) caption.textContent = imgs[idx]?.caption || '';
    }
    if(prev) prev.addEventListener('click', () => show(idx-1));
    if(next) next.addEventListener('click', () => show(idx+1));
    dots.forEach((d,i) => d.addEventListener('click', () => show(i)));

    // ── Scroll-sync da galeria flutuante ──────────────────────────────
    // ABORDAGEM REFEITA: em vez de IntersectionObserver (que só dispara
    // quando o termo entra/sai de uma zona estreita), usamos um listener
    // de scroll que a cada frame calcula qual fragment está MAIS PRÓXIMO
    // de uma linha de referência (~30% da altura do viewport). Garante
    // troca contínua e suave da imagem conforme o usuário rola — tanto
    // pra baixo quanto pra cima. Funciona mesmo com rolagem rápida.
    //
    // Constrói um mapa: cada slide vai ter um conjunto de "âncoras" no
    // texto (todos os .frag-term com aquele data-fragment-id). Pode haver
    // múltiplas ocorrências do mesmo termo — todas servem de gatilho.
    const fragTerms = Array.from(stageEl.querySelectorAll('.frag-term[data-fragment-id]'));
    const hasFragImg = imgs.some(im => im && im.fragmentId);
    if(fragTerms.length && hasFragImg){
      // Pré-calcula mapa fragmentId → slideIdx (usa a primeira ocorrência
      // do fragment na lista de imagens; se houver várias imagens do mesmo
      // fragment, só pulamos pra primeira — o user navega manualmente).
      const fidToSlide = {};
      imgs.forEach((im, i) => {
        if(im && im.fragmentId && !(im.fragmentId in fidToSlide)){
          fidToSlide[im.fragmentId] = i;
        }
      });

      // Só os termos que TÊM imagem associada servem de gatilho
      const triggerTerms = fragTerms.filter(t => fidToSlide.hasOwnProperty(t.getAttribute('data-fragment-id')));

      if(triggerTerms.length){
        let rafId = null;
        function updateActive(){
          rafId = null;
          // Linha de referência: 30% da altura visível (zona de "leitura natural")
          const refY = window.innerHeight * 0.30;
          let bestTerm = null;
          let bestDist = Infinity;
          for(let i = 0; i < triggerTerms.length; i++){
            const rect = triggerTerms[i].getBoundingClientRect();
            // Centro vertical do span
            const center = (rect.top + rect.bottom) / 2;
            const dist = Math.abs(center - refY);
            // Preferir termos acima ou na linha (leitura sequencial) — adicione
            // um pequeno bônus pra termos acima.
            const adjusted = center <= refY ? dist : dist + 8;
            if(adjusted < bestDist){
              bestDist = adjusted;
              bestTerm = triggerTerms[i];
            }
          }
          if(bestTerm){
            const fid = bestTerm.getAttribute('data-fragment-id');
            const slideIdx = fidToSlide[fid];
            if(slideIdx != null && slideIdx !== idx) show(slideIdx);
          }
        }
        function onScrollOrResize(){
          if(rafId == null) rafId = requestAnimationFrame(updateActive);
        }
        window.addEventListener('scroll', onScrollOrResize, { passive: true });
        window.addEventListener('resize', onScrollOrResize);
        // Disparo inicial
        updateActive();
      }
    }
  }
};

/* QUIZ */
function normalizeOptions(opts){
  const len = (opts||[]).length;
  if(len === 2){
    const a = String(opts[0]).toLowerCase(), b = String(opts[1]).toLowerCase();
    const tf = /^(certo|errado|true|false|c|e|v|f|verdadeiro|falso)$/i;
    if(tf.test(a) && tf.test(b)) return { tf:true, display:['C','E'], values:[opts[0],opts[1]] };
  }
  return { tf:false, display: opts.map((_,i)=>String.fromCharCode(65+i)), values: opts };
}
function quizItemKeyIndex(item, norm){
  if(!item.key) return -1;
  const k = String(item.key);
  // letter
  if(norm.display.includes(k.toUpperCase())) return norm.display.indexOf(k.toUpperCase());
  // exact value
  const idx = norm.values.findIndex(v => String(v).toLowerCase() === k.toLowerCase());
  return idx;
}

/* Helper: flatten quiz block into normalized groups + globally-numbered items.
   Quiz blocks MUST use block.groups:[{ enunciado, reference, items:[] }].
   Legacy flat block.items is no longer supported — admins must organize items
   under a group with an enunciado/reference.
*/
// Converte uma questão do schema Y3 (admin: { type, origin, reference_text,
// reference_image, statement, correct, options:[{label,text,correct}],
// comment, tags, stats }) para o formato esperado pelo renderer legacy
// ({ id, assertion, options:[strings], key, comments, reference,
// reference_text, reference_image, origin, tags, stats, bank_id }).
function _convertQuestionToItem(q){
  if(!q || typeof q !== 'object') return null;
  // Y3 Fase H — Se for ref pro banco, resolve via QuestionBank
  if(q.bank_id && window.QuestionBank){
    const banked = window.QuestionBank.getById(q.bank_id);
    if(banked){
      // Resolve recursivamente o registro do banco; preserva bank_id pro renderer
      const resolved = _convertQuestionToItem(banked);
      if(resolved){
        resolved.bank_id = q.bank_id;
        resolved.id = q.bank_id;  // usa bank_id como id estável pra stats
      }
      return resolved;
    }
  }
  // Se já tem assertion (formato antigo) só copia + adiciona campos novos
  if(q.assertion && !q.statement){
    if(!q.origin && q.reference) q.origin = q.reference;
    return q;
  }

  const it = {
    id:              q.id,
    assertion:       q.statement || q.assertion || '',
    comments:        q.comment   || q.comments  || '',
    origin:          q.origin    || q.reference || '',  // Y3: origin é a string [#G-N/YYYY]
    reference_text:  q.reference_text  || '',
    reference_image: q.reference_image || '',
    tags:            q.tags     || [],
    topics:          q.topics   || []
  };
  // reference legacy (string CACD 2018) — mantém pra back-compat
  it.reference = q.reference || '';
  if(q.stats && (typeof q.stats === 'object')) it.stats = q.stats;

  if(q.type === 'multiple_choice' && Array.isArray(q.options)){
    it.options = q.options.map(function(o){ return o.text || o.label || ''; });
    const correctOpt = q.options.find(function(o){ return o.correct; });
    if(correctOpt) it.key = correctOpt.text || correctOpt.label || '';
  } else {
    // true_false (default)
    it.options = ['Certo', 'Errado'];
    it.key = q.correct === true ? 'Certo' : 'Errado';
  }
  return it;
}

function normalizeQuizBlock(block){
  let raw = Array.isArray(block.groups) && block.groups.length ? block.groups : [];
  // Fallback: flat block.items[] becomes a single synthetic group with no enunciado/reference
  if(!raw.length && Array.isArray(block.items) && block.items.length){
    raw = [{ enunciado:'', reference:null, items:block.items }];
  }
  const groups = [];
  let gnum = 0;
  raw.forEach((g, gIdx) => {
    // NOVO schema (Y3): g.questions[] em vez de g.items[]; converte cada um
    let items = Array.isArray(g.items) ? g.items : [];
    if(!items.length && Array.isArray(g.questions) && g.questions.length){
      items = g.questions.map(_convertQuestionToItem).filter(Boolean);
    }
    if(!items.length) return;
    items.forEach(it => { it._globalNum = ++gnum; });
    // g.enunciado é o texto-base do grupo. No schema novo: prefer description,
    // depois title, depois enunciado legacy.
    const enunciado = g.enunciado || g.description || g.title || '';
    // g.reference (legacy) é objeto {text:{...}, media:{...}}; no schema Y3 usamos
    // g.reference_text (HTML) + g.reference_image (URL) — passamos os dois pra
    // renderQuizReference resolver.
    groups.push({
      idx: gIdx,
      enunciado:       enunciado,
      title:           g.title || '',
      description:     g.description || '',
      origin:          g.origin || '',
      reference:       g.reference || null,
      reference_text:  g.reference_text  || '',
      reference_image: g.reference_image || '',
      items:           items
    });
  });

  // Y3: ungrouped[] vira um "grupo sintético" no final, sem header de grupo
  // (renderQuizBlock pula a label "Grupo N" quando _synthetic === true)
  if(Array.isArray(block.ungrouped) && block.ungrouped.length){
    const items = block.ungrouped.map(_convertQuestionToItem).filter(Boolean);
    if(items.length){
      items.forEach(it => { it._globalNum = ++gnum; });
      groups.push({
        idx: groups.length,
        _synthetic: true,    // marca pro renderer omitir o header "Grupo N"
        enunciado: '',
        title: '',
        description: '',
        origin: '',
        reference: null,
        reference_text: '',
        reference_image: '',
        items: items
      });
    }
  }

  return groups;
}

function renderQuizReference(g){
  if(!g) return '';

  // Schema Y3 — reference_text (HTML direto) + reference_image (URL)
  const refText  = g.reference_text  || '';
  const refImage = g.reference_image || '';

  // Schema legado — { text:{label,title,body,source}, media:{type,url,caption} }
  const legacyTxt = (g.reference && g.reference.text) || null;
  const legacyMedia = (g.reference && g.reference.media) || null;

  if(!refText && !refImage && !legacyTxt && !legacyMedia) return '';

  const LB = window.LearningBlocks || {};
  const sanitize = LB.sanitizeRichHTML ? LB.sanitizeRichHTML : function(x){ return x; };

  let textHTML = '';
  if(refText){
    // HTML direto sanitizado
    textHTML = '<div class="q-ref-text q-ref-text-html">' + sanitize(refText) + '</div>';
  } else if(legacyTxt){
    textHTML = `<div class="q-ref-text">
      ${legacyTxt.label  ? `<div class="q-ref-label">${Util.esc(legacyTxt.label)}</div>`   : ''}
      ${legacyTxt.title  ? `<div class="q-ref-title">${Util.esc(legacyTxt.title)}</div>`   : ''}
      ${legacyTxt.body   ? `<div class="q-ref-body">${Util.esc(legacyTxt.body)}</div>`     : ''}
      ${legacyTxt.source ? `<div class="q-ref-source">${Util.esc(legacyTxt.source)}</div>` : ''}
    </div>`;
  }

  let mediaHTML = '';
  if(refImage){
    mediaHTML = `<button class="q-ref-media" data-lightbox data-lightbox-src="${Util.attr(refImage)}" data-lightbox-cap="" style="border:none;padding:0">
      <img src="${Util.attr(refImage)}" alt="" loading="lazy">
    </button>`;
  } else if(legacyMedia && legacyMedia.url && (legacyMedia.type || 'image') === 'image'){
    mediaHTML = `<button class="q-ref-media" data-lightbox data-lightbox-src="${Util.attr(legacyMedia.url)}" data-lightbox-cap="${Util.attr(legacyMedia.caption||'')}" style="border:none;padding:0">
      <img src="${Util.attr(legacyMedia.url)}" alt="${Util.attr(legacyMedia.caption||'')}" loading="lazy">
      ${legacyMedia.caption ? `<div class="q-ref-media-caption">${Util.esc(legacyMedia.caption)}</div>` : ''}
    </button>`;
  }

  return `<div class="q-ref">${textHTML}${mediaHTML}</div>`;
}
const DIFFICULTY_DEFS = {

  'easy':      { label:'Fácil',        cls:'d-easy' },
  'regular':   { label:'Regular',      cls:'d-regular' },
  'hard':      { label:'Difícil',      cls:'d-hard' },
  'very-hard': { label:'Muito difícil', cls:'d-very-hard' }
};
function difficultyBadge(level){
  if(!level) return '';
  const def = DIFFICULTY_DEFS[level];
  if(!def) return '';

}
function referenceBadge(ref){
  if(!ref) return '';

function quizItemStats(item, norm){
  // Prefer real data when present (future-proof): item.stats = { pct:{KEY:num,...}, doubt:num }
  if(item && item.stats && item.stats.pct) return { pct:item.stats.pct, doubt:item.stats.doubt||0, tf:!!norm.tf };
  // Deterministic mock keyed on item.id — biased toward the correct answer
  let seed = 0; const seedStr = String((item&&item.id)||'x');
  for(let i=0;i<seedStr.length;i++) seed = (seed * 31 + seedStr.charCodeAt(i)) >>> 0;
  const rand = (n) => ((seed = (seed * 1103515245 + 12345) >>> 0) % n);
  const correctIdx = norm.values.findIndex(v => String(v) === String(item && item.key));
  const base = 45 + rand(30); // 45-74 %
  const others = Math.max(1, norm.display.length - 1);
  const pct = {};
  let acc = 0;
  norm.display.forEach((k,i) => {
    if(i === correctIdx){ pct[k] = base; return; }
  });
  // Distribute remainder across the non-correct options
  const remaining = 100 - base;
  let filled = 0, idx = 0;
  for(let i=0;i<norm.display.length;i++){
    if(i === correctIdx) continue;
    idx++;
    const k = norm.display[i];
    if(idx === others){ pct[k] = Math.max(1, remaining - filled); }
    else {
      const share = Math.floor(remaining / others * (0.6 + rand(80)/100));
      const v = Math.max(1, Math.min(share, remaining - filled - (others - idx)));
      pct[k] = v; filled += v;
    }
  }
  if(correctIdx < 0){
    // No correct key available — split evenly, deterministic
    norm.display.forEach((k,i) => { pct[k] = Math.floor(100 / norm.display.length); });
    const drift = 100 - Object.values(pct).reduce((a,b)=>a+b,0);
    if(drift && norm.display.length) pct[norm.display[0]] += drift;
  }
  return { pct, doubt: 5 + rand(20), tf: !!norm.tf };
}
function renderQuizStats(stats){
  if(!stats || !stats.pct) return '';
  const entries = Object.entries(stats.pct);
  if(!entries.length) return '';
  const chips = entries.map(([k,v]) => {
    const cls = stats.tf
      ? (k === 'C' ? 'q-stat-true' : 'q-stat-false')
      : 'q-stat-mc';
    return `<span class="q-stat-chip ${cls}">${Util.esc(k)} · ${Math.round(v)}%</span>`;
  }).join('');
  const doubtChip = (stats.doubt != null && stats.doubt > 0)
    ? `<span class="q-stat-chip q-stat-doubt">? · ${Math.round(stats.doubt)}%</span>`
    : '';
  return `<span class="q-stat-strip" title="Distribuição de respostas da comunidade">${chips}${doubtChip}</span>`;
}

  const customTags = Array.isArray(it.tags) && it.tags.length
    ? it.tags.map(t => `<span class="q-badge q-badge-tag">${Util.esc(t)}</span>`).join('')
    : '';
  const stats = norm ? renderQuizStats(quizItemStats(it, norm)) : '';
  if(!ref && !customTags && !stats) return '';
  return `<div class="q-badges">${ref}${customTags}${stats}</div>`;
}

// Y3: renderiza reference_text/reference_image individual da questão
// (aparece ANTES do enunciado, dentro do card da questão)
function renderQuizItemReference(it){
  const LB = window.LearningBlocks || {};
  const sanitize = LB.sanitizeRichHTML ? LB.sanitizeRichHTML : function(x){ return x; };
  const txt = it.reference_text  || '';
  const img = it.reference_image || '';
  if(!txt && !img) return '';
  const textHTML = txt ? '<div class="q-item-ref-text">' + sanitize(txt) + '</div>' : '';
  const mediaHTML = img
    ? `<button class="q-item-ref-img" data-lightbox data-lightbox-src="${Util.attr(img)}" data-lightbox-cap="" style="border:none;padding:0;background:transparent;cursor:zoom-in">
        <img src="${Util.attr(img)}" alt="" loading="lazy" style="max-width:100%;border-radius:var(--radius)">
      </button>`
    : '';
  return '<div class="q-item-ref">' + textHTML + mediaHTML + '</div>';
}

function renderQuizItem(it, ctx, blockId){
  const num = Util.pad2(it._globalNum);
  const norm = normalizeOptions(it.options);
  const prior = ctx && ctx.store ? ctx.store.getQuizAnswer(ctx.unitId, blockId, it.id) : null;
  const keyIdx = quizItemKeyIndex(it, norm);
  const selIdx = prior ? norm.values.findIndex(v2 => String(v2) === String(prior.selected)) : -1;
  const LB = window.LearningBlocks || {};
  const sanitize = LB.sanitizeRichHTML ? LB.sanitizeRichHTML : function(x){ return x; };

  const opts = norm.values.map((v,j) => {
    const mark = norm.display[j];
    let cls = '';
    if(prior){
      if(j === keyIdx) cls = ' correct';
      if(j === selIdx && selIdx !== keyIdx) cls = ' wrong';
      if(j === selIdx && selIdx === keyIdx) cls = ' correct selected';
    }
    // Y3: text das opções também aceita HTML (sanitizado)
    const label = norm.tf ? '' : `<span class="q-option-text">${sanitize(String(v))}</span>`;
    return `<button class="q-option${cls}" data-value="${Util.attr(v)}" data-idx="${j}">
      <span class="q-option-mark">${Util.esc(mark)}</span>${label}
    </button>`;
  }).join('');
  const resultIcon = prior ? (prior.correct
    ? '<span class="q-result q-result-correct" title="Correto">✓</span>'
    : '<span class="q-result q-result-wrong" title="Incorreto">✗</span>') : '';
  const optionsHTML = `<div class="q-options${norm.tf?' is-tf':''}">${opts}</div>`;

  // Reference individual da questão (acima do enunciado)
  const refHTML = renderQuizItemReference(it);

  // Enunciado em HTML sanitizado (não escapa)
  const assertionHTML = sanitize(String(it.assertion || ''));

  // OBS: o gabarito comentado (it.comments) NÃO aparece dentro do card —
  // aparece só no SATÉLITE lateral (.qz-satellite) via updateSatellite,
  // pra não espremer a questão à esquerda quando o satélite expande.

  if(norm.tf){
    return `<article class="q-item is-tf" data-item-id="${Util.attr(it.id)}" id="item-${Util.attr(it.id)}">
      <div class="q-num">${num}</div>
      <div class="q-body">
        ${itemBadges(it, norm)}
        ${refHTML}
        <div class="q-assertion">${assertionHTML} ${resultIcon}</div>
      </div>
      ${optionsHTML}
      <button class="q-doubt${prior&&prior.doubt?' active':''}" data-action="doubt" data-item-id="${Util.attr(it.id)}" title="Marcar que teve dúvida neste item"><svg viewBox="0 0 24 24"><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
    </article>`;
  }
  return `<article class="q-item" data-item-id="${Util.attr(it.id)}" id="item-${Util.attr(it.id)}">
    <div class="q-num">${num}</div>
    <div class="q-body">
      ${itemBadges(it, norm)}
      ${refHTML}
      <div class="q-assertion">${assertionHTML} ${resultIcon}</div>
      ${optionsHTML}
    </div>
    <button class="q-doubt${prior&&prior.doubt?' active':''}" data-action="doubt" data-item-id="${Util.attr(it.id)}" title="Marcar que teve dúvida neste item"><svg viewBox="0 0 24 24"><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
  </article>`;
}

Blocks.quiz = {

      return `<section class="block-wrap quiz-block">

        <div class="empty"><div class="empty-title">Nenhum grupo de questões configurado</div>

      </section>`;
    }

                       && !groups[0].reference_text && !groups[0].reference_image && !groups[0].title;
    const LB = window.LearningBlocks || {};
    const groupsHTML = groups.map(g => {
      const itemsHTML = g.items.map(it => renderQuizItem(it, ctx, block.id)).join('');

      // Tag automática derivada do origin do grupo (Y3) — ex.: "CACD 2023"
      const parsedGOrigin = LB.parseQuestionOrigin ? LB.parseQuestionOrigin(g.origin) : null;

        : '';

      // No grupo sintético (avulsas), não mostra "Grupo N"; só mostra
      // as questões na sequência sem header
      let header = '';
      if(!singleFlat && !g._synthetic){
        const groupLabel = g.title || g.enunciado || ('Grupo ' + (g.idx + 1));
        header = `<div class="q-group-header">
          <div class="q-group-label">${Util.esc(groupLabel)}</div>

      }
      return `<div class="q-group${singleFlat?' q-group-flat':''}${g._synthetic?' q-group-synth':''}" data-group-idx="${g.idx}">
        ${header}
        ${renderQuizReference(g)}
        <div class="q-group-items">${itemsHTML}</div>
      </div>`;
    }).join('');
    const satellite = !isSimulado ? `<aside class="qz-satellite">
      <div class="qz-satellite-pin">
        <div class="qz-sat-header">
          <span class="qz-sat-label">Progresso</span>
          <span class="qz-sat-counter" data-qz-counter>0 / ${totalItems} corretas</span>
        </div>
        <div class="qz-sat-bar"><span class="qz-sat-bar-fill" data-qz-bar style="width:0"></span></div>
        <div class="qz-sat-remaining" data-qz-remaining>Faltam ${totalItems}</div>
        <div class="qz-sat-divider"></div>
        <div class="qz-sat-detail" data-qz-detail>
          <div class="qz-sat-empty">Selecione uma resposta para ver os detalhes do item.</div>
        </div>
      </div>
    </aside>` : '';
    return `<section class="block-wrap quiz-block${!isSimulado?' qz-has-satellite':''}">
      ${blockHeader(block,'Questões objetivas', Icons.quiz)}
      <div class="qb-intro">${totalItems} ite${totalItems>1?'ns':'m'}${groups.length>1?` em ${groups.length} grupos`:''} · responda clicando nas opções.</div>
      <div class="qz-layout">
        <div class="qz-main"><div class="q-list">${groupsHTML}</div></div>
        ${satellite}
      </div>
    </section>`;
  },
  mount(stageEl, block, ctx){
    const groups = normalizeQuizBlock(block);
    const allItems = groups.flatMap(g => g.items);
    stageEl.querySelectorAll(`[data-item-id]`).forEach(itemEl => {
      const itemId = itemEl.getAttribute('data-item-id');
      const item = allItems.find(x => x.id === itemId);
      if(!item) return;
      const norm = normalizeOptions(item.options);
      itemEl.querySelectorAll('.q-option').forEach(btn => {
        btn.addEventListener('click', () => {
          const value = btn.getAttribute('data-value');
          const idx = parseInt(btn.getAttribute('data-idx'),10);
          const keyIdx = quizItemKeyIndex(item, norm);
          const prior = ctx.store.getQuizAnswer(ctx.unitId, block.id, item.id);
          const assertion = itemEl.querySelector('.q-assertion');

          // If clicking the same option again → clear answer (toggle off)
          if(prior && prior.selected === value){
            ctx.store.updateQuizAnswer(ctx.unitId, block.id, item.id, { selected:null, correct:null, doubt:!!prior.doubt });
            itemEl.querySelectorAll('.q-option').forEach(b => b.classList.remove('selected','correct','wrong'));
            const existingResult = assertion.querySelector('.q-result');
            if(existingResult) existingResult.remove();
            return;
          }

          const correct = idx === keyIdx;
          const existingDoubt = !!(prior||{}).doubt;
          ctx.store.updateQuizAnswer(ctx.unitId, block.id, item.id, { selected:value, correct, doubt:existingDoubt });
          itemEl.querySelectorAll('.q-option').forEach((b,j) => {
            b.classList.remove('selected','correct','wrong');
            if(j === keyIdx) b.classList.add('correct');
            if(j === idx && idx !== keyIdx) b.classList.add('wrong');
            if(j === idx && idx === keyIdx) b.classList.add('correct','selected');
          });
          // Show result icon inline beside assertion
          const existingResult = assertion.querySelector('.q-result');
          if(existingResult) existingResult.remove();
          const icon = document.createElement('span');
          icon.className = correct ? 'q-result q-result-correct' : 'q-result q-result-wrong';
          icon.title = correct ? 'Correto' : 'Incorreto';
          icon.textContent = correct ? '✓' : '✗';
          assertion.appendChild(icon);
        });
      });
      // Doubt toggle
      const doubtBtn = itemEl.querySelector('.q-doubt');
      if(doubtBtn){
        doubtBtn.addEventListener('click', e => {
          e.stopPropagation();
          const isActive = doubtBtn.classList.toggle('active');
          const prior = ctx.store.getQuizAnswer(ctx.unitId, block.id, item.id);
          if(prior){
            ctx.store.updateQuizAnswer(ctx.unitId, block.id, item.id, Object.assign({}, prior, { doubt:isActive }));
          } else {
            // Save doubt even before answering
            ctx.store.updateQuizAnswer(ctx.unitId, block.id, item.id, { doubt:isActive });
          }
        });
      }
    });
    // Quiz satellite — update progress counter + detail on answer
    const sat = stageEl.querySelector('.qz-satellite');
    if(sat && !(ctx && ctx.simuladoMode)){
      const counterEl = sat.querySelector('[data-qz-counter]');
      const barEl = sat.querySelector('[data-qz-bar]');
      const remainEl = sat.querySelector('[data-qz-remaining]');
      const detailEl = sat.querySelector('[data-qz-detail]');
      function updateSatellite(activeItem, isCorrect){
        // Count progress
        let answered = 0, correctCount = 0;
        allItems.forEach(it => {
          const p = ctx.store.getQuizAnswer(ctx.unitId, block.id, it.id);
          if(p && p.selected != null){ answered++; if(p.correct) correctCount++; }
        });
        const remaining = allItems.length - answered;
        if(counterEl) counterEl.textContent = correctCount + ' / ' + allItems.length + ' corretas';
        if(barEl) barEl.style.width = (allItems.length ? Math.round(correctCount/allItems.length*100) : 0) + '%';
        if(remainEl) remainEl.textContent = remaining > 0 ? 'Faltam ' + remaining : 'Todas respondidas';
        // Show active item detail
        if(activeItem && detailEl){
          const diffLabel = {easy:'Fácil',medium:'Médio',hard:'Difícil','very-easy':'Muito fácil','very-hard':'Muito difícil'};
          const topicChips = (activeItem.topics||[]).map(id => { const t = Util.getTopic(id); return t ? `<span class="tpc tpc-d${Util.topicDepth(t)}"><span class="tpc-num">${Util.esc(t.number)}</span><span class="tpc-name">${Util.esc(t.name)}</span></span>` : ''; }).join('');
          const tagChips = (activeItem.tags||[]).map(id => { const t = Util.getTag(id); return t ? `<span class="tg"><span class="tg-hash">#</span>${Util.esc(t.name)}</span>` : ''; }).join('');
          const _LB = window.LearningBlocks || {};
          const _san = _LB.sanitizeRichHTML || function(x){ return x; };
          detailEl.innerHTML = `<div class="qz-sat-item">
            ${activeItem.difficulty ? `<div class="qz-sat-diff">${Util.esc(diffLabel[activeItem.difficulty]||activeItem.difficulty)}</div>` : ''}
            ${activeItem.reference ? `<div class="qz-sat-ref">${Util.esc(activeItem.reference)}</div>` : ''}
            ${activeItem.comments ? `<div class="qz-sat-comments">${_san(String(activeItem.comments))}</div>` : ''}
            ${activeItem.recommendation ? `<div class="qz-sat-reco">${Util.esc(activeItem.recommendation)}</div>` : ''}
            ${(topicChips||tagChips) ? `<div class="q-topics-tags" style="margin-top:.6rem">${topicChips}${tagChips}</div>` : ''}
          </div>`;
        }
      }
      // Wire: after each option click, update satellite
      stageEl.querySelectorAll('.q-option').forEach(btn => {
        btn.addEventListener('click', () => {
          const itemEl = btn.closest('.q-item');
          const itemId = itemEl?.getAttribute('data-item-id');
          const item = allItems.find(x => x.id === itemId);
          const prior = item ? ctx.store.getQuizAnswer(ctx.unitId, block.id, item.id) : null;
          updateSatellite(item, prior && prior.correct);
        });
      });
      // Initial state
      updateSatellite(null, false);
    }
  }
};

/* ESSAY */
function generateMockEssayFeedback(item, text){
  // deterministic pseudo-random based on item.id + text length
  function hash(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return Math.abs(h); }
  const seed = hash((item.id||'')+'|'+(text||'').length);
  const criteriaScores = {};
  const criteriaComments = {};
  let total = 0;
  (item.criteria||[]).forEach((c,i) => {
    const max = c.maxScore || 3;
    // score between 60% and 90% of max
    const ratio = 0.6 + ((seed>>(i*3))&7)/20;
    const score = Math.max(0, Math.round(max * Math.min(1, ratio) * 10)/10);
    criteriaScores[c.label] = score;
    total += score;
    if(score >= max*0.8) criteriaComments[c.label] = 'Critério bem atendido. Sua resposta demonstrou domínio claro do conteúdo esperado.';
    else if(score >= max*0.6) criteriaComments[c.label] = 'Cobertura parcial. Aprofunde a argumentação com mais exemplos ou conexões conceituais.';
    else criteriaComments[c.label] = 'Revise este critério. A resposta ficou pouco desenvolvida em relação ao esperado.';
  });
  const maxTotal = (item.criteria||[]).reduce((s,c)=>s+(c.maxScore||0),0);
  return {
    text,
    score: Math.round(total*10)/10,
    maxScore: maxTotal,
    criteriaScores,
    criteriaComments
  };
}
function renderCriterionEvaluation(crit, fb){
  if(!fb || !fb.criteriaScores) return '';
  const score = fb.criteriaScores[crit.label];
  if(score == null) return '';
  const comment = (fb.criteriaComments && fb.criteriaComments[crit.label]) || '';
  return `<div class="essay-criterion-eval">
    <div class="ecev-label">Sua avaliação</div>
    <div class="ecev-score">${Util.esc(score)} / ${Util.esc(crit.maxScore||'-')} pts</div>
    ${comment ? `<div class="ecev-comment">${Util.esc(comment)}</div>` : ''}
  </div>`;
}
function injectEssayEvaluation(itemEl, item, payload){
  // Reveal the aside if hidden
  const aside = itemEl.querySelector('.essay-aside');
  if(aside) aside.style.display = '';
  const toggleBtn = itemEl.querySelector('.essay-toggle-aside');
  if(toggleBtn) toggleBtn.textContent = 'Ocultar critérios';
  // Ensure the criteria panel is the one showing (not models)
  const eatBtns = itemEl.querySelectorAll('.eat-btn');
  if(eatBtns.length){
    const critPanel = itemEl.querySelector('.ecrit-slider:not(.emodel-slider)');
    const modelPanel = itemEl.querySelector('.emodel-slider');
    eatBtns.forEach(b => b.classList.toggle('active', b.getAttribute('data-show') === 'criteria'));
    if(critPanel) critPanel.style.display = '';
    if(modelPanel) modelPanel.style.display = 'none';
  }
  // Update total score in the slider header
  const scoreSpan = itemEl.querySelector('.ecrit-slider:not(.emodel-slider) .ecrit-score');
  if(scoreSpan){
    scoreSpan.textContent = `${payload.score} / ${payload.maxScore||''} pts`;
    scoreSpan.removeAttribute('hidden');
  }
  // Inject "Sua avaliação" into each criterion slide
  const slides = itemEl.querySelectorAll('.ecrit-slider:not(.emodel-slider) .ecrit-slide');
  slides.forEach((slide, ci) => {
    const c = (item.criteria||[])[ci];
    if(!c) return;
    const existing = slide.querySelector('.essay-criterion-eval');
    if(existing) existing.remove();
    const html = renderCriterionEvaluation(c, payload);
    if(!html) return;
    const modelDetails = slide.querySelector('.essay-criterion-model');
    if(modelDetails) modelDetails.insertAdjacentHTML('beforebegin', html);
    else slide.insertAdjacentHTML('beforeend', html);
  });
}

// do Blocks.quiz (mesma UI bonita já estabelecida). A diferença está apenas

// Y3 Fase M — Resolve uma item-ref { bank_id } pegando do EssayBank.
// Devolve sempre um objeto com TODOS os campos (legacy ou banked).
function _resolveEssayItem(item){
  if(!item) return null;
  if(item.bank_id && window.EssayBank){
    const banked = window.EssayBank.getById(item.bank_id);
    if(banked){
      // Preserva bank_id no objeto resolvido (renderer usa como id estável)
      return Object.assign({}, banked, { _bank_id: item.bank_id, id: item.bank_id });
    }
  }
  return item;
}

          <div class="essay-criterion-head">
            <span class="essay-criterion-label">${Util.esc(c.label)}</span>
            <span class="essay-criterion-max">${Util.esc(c.maxScore||'-')} pts</span>
          </div>
          <div class="essay-criterion-desc">${sanitize(String(c.description||''))}</div>
          ${renderCriterionEvaluation(c, prior)}
          ${c.modelAnswer ? `<details class="essay-criterion-model"><summary>Resposta esperada</summary><div class="essay-criterion-model-body">${sanitize(String(c.modelAnswer))}</div></details>` : ''}
        </div>`).join('');
        const critDots = it.criteria.map((_, ci) => `<button class="ecrit-dot${ci===0?' active':''}" data-crit-idx="${ci}"></button>`).join('');
        const critCount = it.criteria.length;
        crits = `<div class="ecrit-slider" data-total="${critCount}">
          <div class="ecrit-header">
            <span class="ecrit-label">Critérios de avaliação</span>
            <span class="ecrit-score"${prior ? '' : ' hidden'}>${prior ? `${Util.esc(prior.score)} / ${Util.esc(prior.maxScore||'')} pts` : ''}</span>
            <span class="ecrit-counter"><span data-ecrit-current>1</span> / ${critCount}</span>
          </div>
          <div class="ecrit-stage">${critSlides}</div>
          ${critCount > 1 ? `<div class="ecrit-nav">
            <button class="ecrit-btn ecrit-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
            <div class="ecrit-dots">${critDots}</div>
            <button class="ecrit-btn ecrit-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
          </div>` : ''}
        </div>`;
      }

      // Painel: Padrão de Resposta da Banca (Y3 — aba nova)
      const officialText = it.officialAnswer || it.modelAnswer || '';
      const officialSection = showOfficial ? `<div class="ecrit-slider eofficial-slider" style="display:none">
        <div class="ecrit-header">
          <span class="ecrit-label">Padrão de Resposta da Banca</span>
        </div>
        <div class="ecrit-stage">
          <div class="ecrit-slide active eofficial-body">${sanitize(String(officialText))}</div>
        </div>
      </div>` : '';

      // Slider: Respostas-modelo (HTML sanitizado — preservado do legado)
      let modelSection = '';
      if(showModels){
        const modelSlides = it.modelAnswers.map((ma, mi) => `<div class="ecrit-slide${mi===0?' active':''}" data-model-idx="${mi}">
          <div class="essay-criterion-head">
            <span class="essay-criterion-label">${Util.esc(ma.title||'Modelo '+(mi+1))}</span>
            ${ma.score ? `<span class="essay-criterion-max">${Util.esc(ma.score)}</span>` : ''}
          </div>
          ${ma.author ? `<div class="emodel-author">${Util.esc(ma.author)}</div>` : ''}
          <div class="emodel-body">${sanitize(String(ma.body||''))}</div>
        </div>`).join('');
        const modelDots = it.modelAnswers.map((_, mi) => `<button class="ecrit-dot${mi===0?' active':''}" data-model-idx="${mi}"></button>`).join('');
        modelSection = `<div class="ecrit-slider emodel-slider" data-total="${it.modelAnswers.length}" style="display:none">
          <div class="ecrit-header">
            <span class="ecrit-label">Respostas modelo</span>
            <span class="ecrit-counter"><span data-emodel-current>1</span> / ${it.modelAnswers.length}</span>
          </div>
          <div class="ecrit-stage">${modelSlides}</div>
          ${it.modelAnswers.length > 1 ? `<div class="ecrit-nav">
            <button class="ecrit-btn emodel-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
            <div class="ecrit-dots">${modelDots}</div>
            <button class="ecrit-btn emodel-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
          </div>` : ''}
        </div>`;
      }

      // Toggle bar (só as abas habilitadas; só aparece se >1)
      const tabKeys = [];
      if(showCrit) tabKeys.push({ key:'criteria', label:'Critérios' });
      if(showOfficial) tabKeys.push({ key:'official', label:'Padrão' });
      if(showModels) tabKeys.push({ key:'models', label:'Modelos' });
      const toggleHtml = tabKeys.length > 1
        ? `<div class="essay-aside-toggle">${tabKeys.map((t, ti) => `<button class="eat-btn${ti===0?' active':''}" data-show="${t.key}">${Util.esc(t.label)}</button>`).join('')}</div>`
        : '';

      // ── Textos de referência (cards no rodapé — como no layout original) ──
      // Cada card: label, title (link interno), body sanitizado, imagem
      // CLICÁVEL (lightbox) à direita do texto.
      const refs = (it.references||[]).map((r, ri) => `<div class="essay-ref" id="essay-ref-${Util.attr(itemId)}-${ri}">
        ${r.image ? `<button class="essay-ref-img" type="button" data-lightbox data-lightbox-src="${Util.attr(r.image)}" data-lightbox-cap="${Util.attr(r.title||r.label||'')}"><img src="${Util.attr(r.image)}" alt="${Util.attr(r.title||'')}" loading="lazy"></button>` : ''}
        <div class="essay-ref-content">
          <div class="essay-ref-label">${Util.esc(r.label||'Fonte')}</div>
          ${r.title ? `<a class="essay-ref-title essay-ref-link" href="#essay-ref-${Util.attr(itemId)}-${ri}" onclick="this.closest('.essay-ref').scrollIntoView({behavior:'smooth',block:'center'});return false;">${Util.esc(r.title)}</a>` : ''}
          <div class="essay-ref-body">${sanitize(String(r.body||''))}</div>
        </div>
      </div>`).join('');

      // ── Extensão (sem contador "0 /") ──
      const linesLimit = it.maxLines || it.maxLength || null;
      const linesHint = linesLimit
        ? `<span class="essay-counter">Extensão do texto: até ${Util.esc(linesLimit)} linhas</span>`
        : '';

      return `<article class="essay-item" data-item-id="${Util.attr(itemId)}" id="item-${Util.attr(itemId)}">
        <header class="essay-header">
          <span class="essay-num">${Util.pad2(i+1)}</span>
          <div class="essay-hbody">
            ${badgesHTML}
            <div class="essay-command">${promptHTML}</div>
            <div class="essay-meta"></div>
          </div>
        </header>
        <div class="essay-layout">
          <div>
            <div class="essay-panel">
              <div class="essay-panel-label">Sua resposta</div>
              <textarea class="essay-textarea" placeholder="Escreva sua resposta aqui…">${Util.esc(prior?prior.text:'')}</textarea>
              <div class="essay-textarea-foot">
                ${linesHint}
                <button class="btn-primary essay-submit">Enviar para Avaliação</button>
                ${hasAside ? `<button class="btn-ghost essay-toggle-aside" type="button">${prior ? 'Ocultar critérios' : 'Mostrar critérios'}</button>` : ''}
              </div>
            </div>
          </div>
          ${hasAside ? `<aside class="essay-aside"${prior ? '' : ' style="display:none"'}>
            ${toggleHtml}
            ${crits}
            ${officialSection}
            ${modelSection}
          </aside>` : ''}
        </div>
        ${refs ? `<div class="essay-refs">${refs}</div>` : ''}
        ${Util.chips(it.topics, it.tags)}
      </article>`;
    }).join('');
    return `<section class="block-wrap essay-block">
      ${blockHeader(block,'Questões discursivas', Icons.essay, ctx)}
      ${items}
    </section>`;
  },
  mount(stageEl, block, ctx){
    stageEl.querySelectorAll('.essay-item').forEach(itemEl => {
      const itemId = itemEl.getAttribute('data-item-id');
      // Resolve item — pode ser ref { bank_id } ou inline legacy
      const rawItem = (block.items||[]).find(x => {
        const resolved = _resolveEssayItem(x);
        return resolved && (resolved._bank_id || resolved.id) === itemId;
      });
      const item = _resolveEssayItem(rawItem) || {};
      if(!item) return;

      const ta = itemEl.querySelector('.essay-textarea');
      const submitBtn = itemEl.querySelector('.essay-submit');
      if(submitBtn && ta){
        submitBtn.addEventListener('click', () => {
          const text = ta.value.trim();
          if(!text){ ta.focus(); return; }
          const payload = generateMockEssayFeedback(item, text);
          ctx.store.updateEssay(ctx.unitId, block.id, itemId, payload);
          injectEssayEvaluation(itemEl, item, payload);
          if(typeof window.ueToast === 'function'){
            window.ueToast('Resposta enviada para correção por IA (simulado): ' + payload.score + ' pts', 'success');
          }
        });
      }

      // Slider de CRITÉRIOS (preservado do legado)
      const slider = itemEl.querySelector('.ecrit-slider:not(.eofficial-slider):not(.emodel-slider)');
      if(slider){
        const slides = Array.from(slider.querySelectorAll('.ecrit-slide'));
        const dots = Array.from(slider.querySelectorAll('.ecrit-dot'));
        const counter = slider.querySelector('[data-ecrit-current]');
        let idx = 0;
        function showCrit(n){
          idx = (n + slides.length) % slides.length;
          slides.forEach((s,i) => s.classList.toggle('active', i===idx));
          dots.forEach((d,i) => d.classList.toggle('active', i===idx));
          if(counter) counter.textContent = idx+1;
        }
        const prev = slider.querySelector('.ecrit-prev');
        const next = slider.querySelector('.ecrit-next');
        if(prev) prev.addEventListener('click', () => showCrit(idx-1));
        if(next) next.addEventListener('click', () => showCrit(idx+1));
        dots.forEach((d,i) => d.addEventListener('click', () => showCrit(i)));
      }

      // Slider de MODELOS
      const modelSlider = itemEl.querySelector('.emodel-slider');
      if(modelSlider){
        const mSlides = Array.from(modelSlider.querySelectorAll('.ecrit-slide'));
        const mDots = Array.from(modelSlider.querySelectorAll('.ecrit-dot'));
        const mCounter = modelSlider.querySelector('[data-emodel-current]');
        let mIdx = 0;
        function showModel(n){
          mIdx = (n + mSlides.length) % mSlides.length;
          mSlides.forEach((s,i) => s.classList.toggle('active', i===mIdx));
          mDots.forEach((d,i) => d.classList.toggle('active', i===mIdx));
          if(mCounter) mCounter.textContent = mIdx+1;
        }
        const mPrev = modelSlider.querySelector('.emodel-prev');
        const mNext = modelSlider.querySelector('.emodel-next');
        if(mPrev) mPrev.addEventListener('click', () => showModel(mIdx-1));
        if(mNext) mNext.addEventListener('click', () => showModel(mIdx+1));
        mDots.forEach((d,i) => d.addEventListener('click', () => showModel(i)));
      }

      // Toggle entre as 3 abas: Critérios / Padrão / Modelos
      const toggleBtns = itemEl.querySelectorAll('.eat-btn');
      if(toggleBtns.length){
        const critPanel = itemEl.querySelector('.ecrit-slider:not(.eofficial-slider):not(.emodel-slider)');
        const officialPanel = itemEl.querySelector('.eofficial-slider');
        const modelPanel = itemEl.querySelector('.emodel-slider');
        toggleBtns.forEach(btn => {
          btn.addEventListener('click', () => {
            const show = btn.getAttribute('data-show');
            toggleBtns.forEach(b => b.classList.toggle('active', b === btn));
            if(critPanel) critPanel.style.display = show === 'criteria' ? '' : 'none';
            if(officialPanel) officialPanel.style.display = show === 'official' ? '' : 'none';
            if(modelPanel) modelPanel.style.display = show === 'models' ? '' : 'none';
          });
        });
      }

      // Toggle aside (Mostrar/Ocultar critérios)
      const asideToggle = itemEl.querySelector('.essay-toggle-aside');
      const aside = itemEl.querySelector('.essay-aside');
      if(asideToggle && aside){
        asideToggle.addEventListener('click', () => {
          const open = aside.style.display !== 'none';
          aside.style.display = open ? 'none' : '';
          asideToggle.textContent = open ? 'Mostrar critérios' : 'Ocultar critérios';
        });
      }
    });
  }
};

/* ───── Carousel learning blocks (bio, quote, table, timeline, glossary) ─────
   Shared helper: one slide visible at a time, prev/next cycle through items.
   Each slide uses the same DOM/classes as the matching portal compilation
   page so the visual language is identical. */
function renderCarouselBlock(block, ctx, opts){
  const items = block.items || [];
  if(!items.length){
    return `<section class="block-wrap ${opts.blockClass}">
      ${blockHeader(block, opts.typeLabel, opts.icon, ctx)}
      <div class="empty"><div class="empty-title">Sem itens</div>
      <div class="empty-sub">Adicione itens a este bloco para exibir o carrossel.</div></div>
    </section>`;
  }
  const slides = items.map((it,i) => `<div class="carousel-slide${i===0?' active':''}" data-slide-idx="${i}" id="item-${Util.attr(it.id||'')}">
    ${opts.renderSlide(it, block, i)}
  </div>`).join('');
  const dots = items.map((_,i) => `<button class="carousel-dot${i===0?' active':''}" data-slide-idx="${i}" title="Ir para ${i+1}"></button>`).join('');
  return `<section class="block-wrap ${opts.blockClass}">
    ${blockHeader(block, opts.typeLabel, opts.icon, ctx)}
    <div class="carousel-frame" data-total="${items.length}">
      <button class="carousel-nav carousel-prev" title="Anterior (←)" aria-label="Anterior">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="carousel-nav carousel-next" title="Próximo (→)" aria-label="Próximo">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="carousel-stage">${slides}</div>
      <div class="carousel-footer">
        <div class="carousel-counter"><strong data-current>1</strong> / ${items.length}</div>
        <div class="carousel-dots">${dots}</div>
      </div>
    </div>
    ${Util.chips(block.topics, block.tags)}
  </section>`;
}
function mountCarouselBlock(stageEl, block){
  const frame = stageEl.querySelector('.carousel-frame');
  if(!frame) return;
  const slides = Array.from(frame.querySelectorAll('.carousel-slide'));
  const dots = Array.from(frame.querySelectorAll('.carousel-dot'));
  const prev = frame.querySelector('.carousel-prev');
  const next = frame.querySelector('.carousel-next');
  const counter = frame.querySelector('[data-current]');
  let idx = 0;
  function show(n){
    idx = (n + slides.length) % slides.length;
    slides.forEach((s,i) => s.classList.toggle('active', i===idx));
    dots.forEach((d,i) => d.classList.toggle('active', i===idx));
    if(counter) counter.textContent = (idx+1);
  }
  prev.addEventListener('click', () => show(idx-1));
  next.addEventListener('click', () => show(idx+1));
  dots.forEach((d,i) => d.addEventListener('click', () => show(i)));
  // Keyboard support when the block is focused/hovered
  frame.tabIndex = 0;
  frame.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft'){ e.preventDefault(); show(idx-1); }
    if(e.key === 'ArrowRight'){ e.preventDefault(); show(idx+1); }
  });
}

      items.forEach(it => {
        it.addEventListener('mouseenter', () => {
          items.forEach(el => el.classList.toggle('active', el === it));
          showImage(it.dataset.thumb, it.dataset.title);
        });
        it.addEventListener('click', () => {
          items.forEach(el => el.classList.toggle('active', el === it));
          showImage(it.dataset.thumb, it.dataset.title);

/* COMMENTS — forum/discussion block */
Blocks.comments = {
  render(block, ctx){
    const userComments = ctx.store ? ctx.store.getComments(block.id) : [];
    const mockComments = block.comments || [];
    const allComments = [...mockComments, ...userComments];
    const topLevel = allComments.filter(c => !c.parentId);
    const initials = window.MOCK_USER ? Util.initials(window.MOCK_USER.name) : '?';
    const fmtDate = ts => { try { return new Date(ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; } };

    function renderComment(c){
      const replies = allComments.filter(r => r.parentId === c.id);
      const isOwn = c.authorId === (window.MOCK_USER&&window.MOCK_USER.id);
      return `<div class="cmt-item" data-comment-id="${Util.attr(c.id)}">
        <div class="cmt-avatar">${Util.esc(Util.initials(c.author||''))}</div>
        <div class="cmt-item-body">
          <div class="cmt-item-head">
            <span class="cmt-author">${Util.esc(c.author||'Anônimo')}</span>
            <span class="cmt-date">${fmtDate(c.createdAt)}</span>
          </div>
          <div class="cmt-text">${Util.esc(c.text||'')}</div>
          <div class="cmt-actions">
            <button class="cmt-action-btn" data-action="reply" data-comment-id="${Util.attr(c.id)}">Responder</button>
            ${isOwn ? `<button class="cmt-action-btn" data-action="delete-comment" data-comment-id="${Util.attr(c.id)}">Excluir</button>` : ''}
          </div>
          ${replies.length ? `<div class="cmt-replies">${replies.map(renderComment).join('')}</div>` : ''}
        </div>
      </div>`;
    }

    const commentsHtml = topLevel.length
      ? topLevel.map(renderComment).join('')
      : '<div class="cmt-empty">Nenhum comentário ainda. Seja o primeiro a participar da discussão.</div>';

    return `<section class="block-wrap comments-block" data-block-id="${Util.attr(block.id)}">
      ${blockHeader(block, block.title||'Discussão', Icons.comments, ctx)}
      ${block.prompt ? `<div class="cmt-prompt" style="font-family:var(--sans);font-weight:300;font-size:.85rem;color:var(--text-dim);line-height:1.7;margin-bottom:1.4rem">${Util.esc(block.prompt)}</div>` : ''}
      <div class="cmt-compose">
        <div class="cmt-avatar">${Util.esc(initials)}</div>
        <div class="cmt-input-wrap">
          <textarea class="cmt-textarea" id="cmtInput-${Util.attr(block.id)}" placeholder="Escreva seu comentário..."></textarea>
          <button class="cmt-submit" data-action="post-comment">Publicar</button>
        </div>
      </div>
      <div class="cmt-count">${allComments.length} comentário${allComments.length===1?'':'s'}</div>
      <div class="cmt-thread" id="cmtThread-${Util.attr(block.id)}">${commentsHtml}</div>
    </section>`;
  },
  mount(stageEl, block, ctx){
    const wrap = stageEl.querySelector('.comments-block[data-block-id="'+CSS.escape(block.id)+'"]');
    if(!wrap) return;

    // Post top-level comment
    wrap.querySelector('[data-action="post-comment"]').addEventListener('click', () => {
      const textarea = wrap.querySelector('.cmt-textarea');
      const text = textarea.value.trim();
      if(!text) return;
      Store.addComment(block.id, text, null);
      const scrollTarget = block.id;
      App.render();
      setTimeout(() => { const el = document.querySelector('[data-block-id="'+CSS.escape(scrollTarget)+'"]'); if(el) el.scrollIntoView({block:'start'}); }, 50);
    });

    // Reply & delete delegation
    wrap.addEventListener('click', e => {
      const replyBtn = e.target.closest('[data-action="reply"]');
      const deleteBtn = e.target.closest('[data-action="delete-comment"]');

      if(replyBtn){
        const parentId = replyBtn.getAttribute('data-comment-id');
        // Check if reply compose already open
        const existing = wrap.querySelector('.cmt-reply-compose[data-for="'+CSS.escape(parentId)+'"]');
        if(existing){ existing.remove(); return; }
        // Remove any other open reply forms
        wrap.querySelectorAll('.cmt-reply-compose').forEach(f => f.remove());
        // Insert reply form
        const item = replyBtn.closest('.cmt-item');
        const form = document.createElement('div');
        form.className = 'cmt-reply-compose';
        form.setAttribute('data-for', parentId);
        form.innerHTML = '<div class="cmt-avatar" style="width:28px;height:28px;font-size:.5rem">'+Util.esc(Util.initials(window.MOCK_USER.name))+'</div>'
          +'<div class="cmt-input-wrap"><textarea class="cmt-textarea" placeholder="Escreva sua resposta..."></textarea>'
          +'<button class="cmt-submit" data-action="submit-reply" data-parent-id="'+Util.attr(parentId)+'">Responder</button></div>';
        item.after(form);
        form.querySelector('.cmt-textarea').focus();
      }

      if(deleteBtn){
        const cid = deleteBtn.getAttribute('data-comment-id');
        if(confirm('Excluir este comentário?')){
          Store.deleteComment(block.id, cid);
          App.render();
        }
      }

      const submitReply = e.target.closest('[data-action="submit-reply"]');
      if(submitReply){
        const parentId = submitReply.getAttribute('data-parent-id');
        const form = submitReply.closest('.cmt-reply-compose');
        const text = form.querySelector('.cmt-textarea').value.trim();
        if(!text) return;
        Store.addComment(block.id, text, parentId);
        const scrollTarget2 = block.id;
        App.render();
        setTimeout(() => { const el = document.querySelector('[data-block-id="'+CSS.escape(scrollTarget2)+'"]'); if(el) el.scrollIntoView({block:'start'}); }, 50);
      }
    });
  }
};

/* ───────── Portal ───────── */
const Portal = {
  cards: {
    questions:  { label:'Questões objetivas', hint:'Provas compiladas de todas as unidades do módulo.', icon:Icons.quiz, source:'blocks',    blockType:'quiz' },
    essays:     { label:'Questões discursivas', hint:'Todas as discursivas do módulo em um só lugar.', icon:Icons.essay, source:'blocks',    blockType:'essay' },
    flashcards: { label:'Flashcards', hint:'Conceitos-chave de cada unidade.', icon:Icons.flashcards, source:'blocks',    blockType:'flashcards' },
    bios:       { label:'Biografias', hint:'Personagens centrais do módulo.', icon:Icons.bio, source:'unitArray', key:'bios', blockType:'bio' },
    glossary:   { label:'Glossário', hint:'Termos e definições agrupados por unidade.', icon:Icons.glossary, source:'unitArray', key:'glossary', blockType:'glossary' },
    quotes:     { label:'Citações', hint:'Trechos de fontes primárias e secundárias.', icon:Icons.quote, source:'unitArray', key:'quotes', blockType:'quote' },
    timelines:  { label:'Linhas do tempo', hint:'Cronologias temáticas de cada unidade.', icon:Icons.timeline, source:'unitArray', key:'timelines', blockType:'timeline' },
    figures:    { label:'Tópico em figuras', hint:'Iconografia histórica com legendas.', icon:Icons.figure, source:'unitArray', key:'figures' },
    tables:     { label:'Tabelas de referência', hint:'Quadros de apoio rápido.', icon:Icons.table, source:'unitArray', key:'tables', blockType:'table' },
    sources:    { label:'Fontes e referências', hint:'Bibliografia e fontes primárias.', icon:Icons.source, source:'unitArray', key:'references' }
  },

  aggregate(moduleId, cardKey, filters){
    filters = filters || {};
    const mod = Util.findModule(moduleId); if(!mod) return [];
    const card = Portal.cards[cardKey]; if(!card) return [];
    let entries = Util.unitsOfModule(mod);
    if(filters.chapter) entries = entries.filter(e => e.chapterId === filters.chapter);
    if(filters.unit)    entries = entries.filter(e => e.unit.id === filters.unit);

    let items = [];
    if(card.source === 'blocks'){
      entries.forEach(e => {
        (e.unit.groups||[]).forEach(g => (g.blocks||[]).forEach(b => {
          if(b.type !== card.blockType) return;
          if(card.blockType === 'flashcards'){
            (b.concepts||[]).forEach(c => items.push(Object.assign({}, c, { __unitId:e.unit.id, __unit:e.unit, __chapterId:e.chapterId, __blockId:b.id, __blockTitle:b.title })));
          } else if(card.blockType === 'quiz'){
            // Quiz blocks now always use groups[].items structure
            (b.groups||[]).forEach(qg => {
              (qg.items||[]).forEach(it => items.push(Object.assign({}, it, {
                __unitId:e.unit.id, __unit:e.unit, __chapterId:e.chapterId,
                __blockId:b.id, __blockTitle:b.title,
                __enunciado: qg.enunciado || '',
                __reference: qg.reference || null
              })));
            });
          } else {
            (b.items||[]).forEach(it => items.push(Object.assign({}, it, { __unitId:e.unit.id, __unit:e.unit, __chapterId:e.chapterId, __blockId:b.id, __blockTitle:b.title })));
          }
        }));
      });
    } else {
      // unit-level arrays (e.g. unit.bios[])
      entries.forEach(e => {
        (e.unit[card.key]||[]).forEach(it => items.push(Object.assign({}, it, { __unitId:e.unit.id, __unit:e.unit, __chapterId:e.chapterId })));
      });
      // Also pull in matching carousel learning blocks (e.g. type:'bio').
      // Deep-walks compound blocks too, so nested parts contribute.
      if(card.blockType){
        const seen = new Set(items.map(it => it.id).filter(Boolean));
        const walk = (blocks, unit, chapterId) => {
          (blocks||[]).forEach(b => {
            if(b.type === card.blockType){
              (b.items||[]).forEach(it => {
                if(it.id && seen.has(it.id)) return;
                if(it.id) seen.add(it.id);
                items.push(Object.assign({}, it, {
                  __unitId:unit.id, __unit:unit, __chapterId:chapterId,
                  __blockId:b.id, __blockTitle:b.title
                }));
              });
            }
            if(b.type === 'compound' && Array.isArray(b.parts)){
              walk(b.parts, unit, chapterId);
            }
          });
        };
        entries.forEach(e => {
          (e.unit.groups||[]).forEach(g => walk(g.blocks, e.unit, e.chapterId));
        });
      }
    }

    if(filters.topic){
      // expand topic with descendants
      const set = new Set([filters.topic]);
      Object.values(window.TOPIC_REGISTRY).forEach(t => {
        let cur = t;
        while(cur && cur.parentId){
          if(cur.parentId === filters.topic || set.has(cur.parentId)){ set.add(t.id); break; }
          cur = window.TOPIC_REGISTRY[cur.parentId];
        }
      });
      items = items.filter(it => (it.topics||[]).some(tid => set.has(tid)));
    }
    if(filters.tag){
      items = items.filter(it => (it.tags||[]).includes(filters.tag));
    }
    if(filters.difficulty && cardKey === 'questions'){
      items = items.filter(it => it.difficulty === filters.difficulty);
    }
    if(filters.q){
      const q = filters.q.toLowerCase();
      items = items.filter(it => {
        const txt = [it.assertion, it.term, it.name, it.title, it.text, it.body, it.summary, it.description, it.command, it.citation, it.definition, it.caption]
          .filter(Boolean).join(' ').toLowerCase();
        return txt.indexOf(q) >= 0;
      });
    }
    return items;
  },

  counts(moduleId){
    const out = {};
    Object.keys(Portal.cards).forEach(k => { out[k] = Portal.aggregate(moduleId, k, {}).length; });
    return out;
  },
  // Course-wide aggregation (all modules)
  aggregateAll(cardKey, filters){
    filters = filters || {};
    let allItems = [];
    window.COURSE.modules.forEach(mod => {
      const modItems = Portal.aggregate(mod.id, cardKey, Object.assign({}, filters, { module: undefined }));
      modItems.forEach(it => { it.__moduleId = mod.id; it.__moduleLabel = mod.label; });
      if(filters.module && mod.id !== filters.module) return;
      allItems = allItems.concat(modItems);
    });
    return allItems;
  },
  countsAll(){
    const out = {};
    Object.keys(Portal.cards).forEach(k => { out[k] = Portal.aggregateAll(k, {}).length; });
    return out;
  }
};
window.Portal = Portal;

Renderers.login.mount = function(stageEl){
  const form = stageEl.querySelector('#loginForm');
  if(!form) return;
  const emailInput = stageEl.querySelector('#loginEmail');
  const passwordInput = stageEl.querySelector('#loginPassword');
  const errorEl = stageEl.querySelector('#loginError');
  const rememberInput = stageEl.querySelector('#loginRemember');
  const rememberVisual = stageEl.querySelector('#loginRememberVisual');
  const togglePassword = stageEl.querySelector('#loginTogglePassword');
  const submitBtn = stageEl.querySelector('#loginSubmit');
  const demoStudentBtn = stageEl.querySelector('#loginDemoStudent');
  const demoAdminBtn   = stageEl.querySelector('#loginDemoAdmin');
  let showPassword = false;

  function syncRemember(){
    rememberVisual.classList.toggle('active', !!rememberInput.checked);
  }

  emailInput.value = 'aluno@ubique.local';
  passwordInput.value = '123456';
  rememberInput.checked = true;
  syncRemember();

  rememberVisual.addEventListener('click', () => {
    rememberInput.checked = !rememberInput.checked;
    syncRemember();
  });

  togglePassword.addEventListener('click', () => {
    showPassword = !showPassword;
    passwordInput.type = showPassword ? 'text' : 'password';
    togglePassword.innerHTML = showPassword ? Icons.eyeOff : Icons.eye;
  });

  // ── Demo Aluno: login direto na área do aluno ──
  demoStudentBtn?.addEventListener('click', async () => {
    demoStudentBtn.disabled = true;
    const r = Auth.login('aluno@ubique.local', '123456', true);
    if(!r.ok){
      errorEl.style.display = 'block';
      errorEl.textContent = r.message || 'Falha ao entrar como aluno demo.';
      demoStudentBtn.disabled = false;
      return;
    }
    const access = await Auth.checkPlatformAccess(r.user.email);
    if(access && access.allowed) Auth.storeAccessData(access, true);
    location.hash = r.user.landingRoute || '#/';
    App.boot(true);
  });

  // ── Demo Admin: login + handoff de sessão para admin.html ──
  demoAdminBtn?.addEventListener('click', () => {
    demoAdminBtn.disabled = true;
    const r = Auth.login('admin@ubique.local', 'admin123', true);
    if(!r.ok){
      errorEl.style.display = 'block';
      errorEl.textContent = r.message || 'Falha ao entrar como admin demo.';
      demoAdminBtn.disabled = false;
      return;
    }
    // Handoff para admin.html entrar sem segundo login
    try{
      sessionStorage.setItem('ubique.panel.handoff', JSON.stringify({
        email: r.user.email, name: r.user.name || '', role: 'admin', ts: Date.now()
      }));
    }catch(_){}
    location.href = 'admin.html';
  });

  form.addEventListener('submit', async e => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Verificando...';
    const result = Auth.login(emailInput.value, passwordInput.value, rememberInput.checked);
    if(!result.ok){
      errorEl.style.display = 'block';
      errorEl.textContent = result.message;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Enter NexusGate';
      return;
    }
    if(result.user.role !== 'admin'){
      const access = await Auth.checkPlatformAccess(result.user.email);
      if(!access.allowed){
        Auth.logout();
        errorEl.style.display = 'block';
        errorEl.textContent = access.reason === 'suspended'
          ? 'Conta suspensa. Contate o administrador.'
          : 'Acesso não autorizado. Solicite liberação ao administrador.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Enter NexusGate';
        return;
      }
      Auth.storeAccessData(access, !!rememberInput.checked);
    }
    errorEl.style.display = 'none';
    setTimeout(() => {
      location.hash = result.user.landingRoute || '#/';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Enter NexusGate';
      App.boot(true);
    }, 400);
  });
};

/* ═══════════ EDITAL — visualização hierárquica do edital + progresso ═══════════ */
Renderers.edital = function(){
  const editais = (window.UbiqueStore && window.UbiqueStore.editais.list()) || [];
  if(!editais.length){
    return '<div class="sec"><div class="sec-head"><div class="sec-head-l">' +
      '<span class="sec-num">Edital</span><h2 class="sec-title">Nenhum edital disponível</h2>' +
      '</div></div></div>';
  }
  const e = editais[0]; // mostra o primeiro por padrão; pode evoluir pra dropdown
  const topics = ((window.UbiqueStore && window.UbiqueStore.edital_topics.list()) || []).filter(t => t.edital_id === e.id);
  const progress = (window.UbiqueStore && window.UbiqueStore.edital_progress.list()) || [];
  const userId = window.MOCK_USER ? window.MOCK_USER.id : 'guest';
  const myProgress = new Set(progress.filter(p => p.user_id === userId).map(p => p.topic_id));

  function renderNode(t, level){
    const children = topics.filter(c => c.parent_id === t.id).sort((a,b) => (a.position||0) - (b.position||0));
    const links = ((window.UbiqueStore && window.UbiqueStore.edital_topic_units.list()) || []).filter(l => l.topic_id === t.id);
    const isViewed = myProgress.has(t.id);
    const indent = (level - 1) * 1.4;

    let header = '<div style="display:flex;align-items:flex-start;gap:.7rem;padding:.85rem 1.1rem;cursor:pointer" data-toggle="' + t.id + '">' +
      '<input type="checkbox" data-progress="' + t.id + '" ' + (isViewed ? 'checked' : '') +
        ' style="margin-top:.25rem;flex-shrink:0;accent-color:var(--accent)">' +
      '<div style="flex:1">' +
        '<div style="display:flex;align-items:baseline;gap:.6rem;flex-wrap:wrap">' +
          '<span class="s-subtitle" style="font-size:.6rem">' + Util.esc(t.code || '') + '</span>' +
          '<span style="font-family:var(--serif);font-weight:400;font-size:' + (1.15 - (level-1)*0.1) + 'rem;color:var(--text);line-height:1.3">' +
            Util.esc(t.title) + '</span>' +
        '</div>' +
        (t.description ? '<p style="font-family:var(--sans);font-weight:200;font-size:.82rem;color:var(--text-dim);line-height:1.6;margin-top:.3rem">' + Util.esc(t.description) + '</p>' : '') +
      '</div>' +
      (links.length > 0 ? '<button class="btn-ghost" data-show-aulas="' + t.id + '" style="font-size:.7rem;padding:.3rem .6rem;border:1px solid var(--accent-border-soft, rgba(200,169,126,.22));border-radius:3px;background:transparent;color:var(--accent);cursor:pointer;flex-shrink:0">' + links.length + ' ' + (links.length === 1 ? 'aula' : 'aulas') + ' →</button>' : '') +
      (children.length > 0 ? '<span style="color:var(--accent);font-size:.7rem;align-self:center" data-chevron="' + t.id + '">▸</span>' : '') +
    '</div>';

    let childrenHtml = '';
    if(children.length > 0){
      childrenHtml = '<div data-children="' + t.id + '" style="display:none">' +
        children.map(c => renderNode(c, level + 1)).join('') +
      '</div>';
    }

    return '<div style="border-left:2px solid ' + (level === 1 ? 'var(--accent)' : 'var(--accent-border-soft, rgba(200,169,126,.18))') + ';margin-left:' + indent + 'rem;margin-bottom:.4rem;background:var(--bg-card);border-radius:0 4px 4px 0;border-top:1px solid var(--accent-border-soft, rgba(200,169,126,.12));border-right:1px solid var(--accent-border-soft, rgba(200,169,126,.12));border-bottom:1px solid var(--accent-border-soft, rgba(200,169,126,.12))">' +
      header + childrenHtml +
    '</div>';
  }

  const roots = topics.filter(t => t.parent_id == null).sort((a,b) => (a.position||0) - (b.position||0));
  const treeHtml = roots.map(t => renderNode(t, 1)).join('');

  return '<section class="sec"><header class="sec-head" data-a="1">' +
    '<div class="sec-head-l">' +
      '<span class="sec-num">Edital · ' + Util.esc(String(e.year || '')) + '</span>' +
      '<h2 class="sec-title">' + Util.esc(e.name) + '</h2>' +
    '</div>' +
    '<p class="sec-note">' + Util.esc(e.description || '') + '</p>' +
  '</header>' +
  '<div data-a="2" style="margin-top:2rem">' + treeHtml + '</div>' +
  '</section>';
};

Renderers.edital.mount = function(stage){
  // Toggle accordion
  stage.querySelectorAll('[data-toggle]').forEach(h => {
    h.addEventListener('click', e => {
      if(e.target.matches('[data-progress], [data-show-aulas]')) return; // ignora cliques nos filhos
      const tid = h.getAttribute('data-toggle');
      const children = stage.querySelector('[data-children="' + tid + '"]');
      const chevron = stage.querySelector('[data-chevron="' + tid + '"]');
      if(!children) return;
      const open = children.style.display !== 'none';
      children.style.display = open ? 'none' : '';
      if(chevron) chevron.textContent = open ? '▸' : '▾';
    });
  });
  // Progresso (checkboxes)
  stage.querySelectorAll('[data-progress]').forEach(cb => {
    cb.addEventListener('change', e => {
      const tid = parseInt(cb.getAttribute('data-progress'));
      const userId = window.MOCK_USER ? window.MOCK_USER.id : 'guest';
      const existing = (window.UbiqueStore && window.UbiqueStore.edital_progress.list().find(p => p.user_id === userId && p.topic_id === tid));
      if(cb.checked && !existing){
        window.UbiqueStore.edital_progress.add({ user_id: userId, topic_id: tid, viewed_at: new Date().toISOString() });
      } else if(!cb.checked && existing){
        window.UbiqueStore.edital_progress.remove(existing.id);
      }
    });
  });
  // Atalho pras aulas
  stage.querySelectorAll('[data-show-aulas]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const tid = parseInt(btn.getAttribute('data-show-aulas'));
      const links = ((window.UbiqueStore && window.UbiqueStore.edital_topic_units.list()) || []).filter(l => l.topic_id === tid);
      if(!links.length){ App._showAccessToast('Nenhuma aula vinculada ainda.'); return; }
      const unitId = links[0].unit_id;
      const unit = ((window.UbiqueStore && window.UbiqueStore.units.list()) || []).find(u => u.id === unitId);
      if(!unit){ App._showAccessToast('Aula não encontrada.'); return; }
      const ch = ((window.UbiqueStore && window.UbiqueStore.chapters.list()) || []).find(c => c.id === unit.chapter_id);
      const mod = ch ? ((window.UbiqueStore && window.UbiqueStore.modules.list()) || []).find(m => m.id === ch.module_id) : null;
      if(mod && ch && unit){
        const mid = mod._origMockId || ('m' + mod.id);
        const cid = ch._origMockId || ('c' + ch.id);
        const uid = unit._origMockId || ('u' + unit.id);
        location.hash = '#/m/' + mid + '/c/' + cid + '/u/' + uid;
      } else {
        App._showAccessToast('Mapeamento de aulas pendente.');
      }
    });
  });
};
