Renderers.simulados = function(route){
  const sims = window.SIMULADOS || [];
  const diffLabel = { easy:'Fácil', medium:'Médio', hard:'Difícil', 'very-hard':'Muito difícil' };
  const diffClass = { easy:'sim-diff-easy', medium:'sim-diff-medium', hard:'sim-diff-hard', 'very-hard':'sim-diff-very-hard' };

  // Filters from URL
  const filters = {
    subject: (route.query && route.query.subject) || '',
    difficulty: (route.query && route.query.difficulty) || '',
    category: (route.query && route.query.category) || '',
    topic: (route.query && route.query.topic) || ''
  };

  // Apply filters
  let filtered = sims.slice();
  if(filters.subject) filtered = filtered.filter(s => s.subject === filters.subject);
  if(filters.difficulty) filtered = filtered.filter(s => s.difficulty === filters.difficulty);
  if(filters.category) filtered = filtered.filter(s => s.category === filters.category);
  if(filters.topic) filtered = filtered.filter(s => (s.topics||[]).includes(filters.topic));

  // Build filter options
  const subjects = [...new Set(sims.map(s => s.subject).filter(Boolean))];
  const difficulties = ['easy','medium','hard','very-hard'];
  const topicIds = [...new Set(sims.flatMap(s => s.topics||[]))];

  const subjectOpts = `<div class="fb-group"><span class="fb-label">Disciplina</span>
    <select class="fb-select" data-filter="subject">
      <option value="">Todas</option>
      ${subjects.map(s => `<option value="${Util.attr(s)}" ${filters.subject===s?'selected':''}>${Util.esc(s)}</option>`).join('')}
    </select></div>`;
  const diffOpts = `<div class="fb-group"><span class="fb-label">Dificuldade</span>
    <select class="fb-select" data-filter="difficulty">
      <option value="">Todas</option>
      ${difficulties.map(d => `<option value="${Util.attr(d)}" ${filters.difficulty===d?'selected':''}>${Util.esc(diffLabel[d]||d)}</option>`).join('')}
    </select></div>`;
  const catOpts = `<div class="fb-group"><span class="fb-label">Acesso</span>
    <select class="fb-select" data-filter="category">
      <option value="">Todos</option>
      <option value="free" ${filters.category==='free'?'selected':''}>Gratuitos</option>
      <option value="paid" ${filters.category==='paid'?'selected':''}>Premium</option>
    </select></div>`;
  const topicOpts = `<div class="fb-group"><span class="fb-label">Tópico</span>
    <select class="fb-select" data-filter="topic">
      <option value="">Todos</option>
      ${topicIds.map(id => { const t = Util.getTopic(id); return t ? `<option value="${Util.attr(id)}" ${filters.topic===id?'selected':''}>${Util.esc(t.number+' '+t.name)}</option>` : ''; }).join('')}
    </select></div>`;

  const cards = filtered.map((s,i) => {
    const locked = !!s.locked;
    const isFree = s.category === 'free';
    const href = locked ? '' : `#/simulados/${s.id}`;
    const concursoChips = (s.concursos||[]).map(c => `<span class="sim-card-tag">${Util.esc(c)}</span>`).join('');
    const topicChips = (s.topics||[]).slice(0,3).map(id => { const t = Util.getTopic(id); return t ? `<span class="sim-card-tag">${Util.esc(t.number+' '+t.name)}</span>` : ''; }).join('');

    return `<${locked?'div':'a'} class="sim-card${locked?' sim-card-locked':''}${isFree?' sim-card-free':''}" ${locked?'':'href="'+Util.attr(href)+'"'} data-a="${i+2}">
      <div class="sim-card-cover" style="background-image:url('${Util.attr(s.cover||'')}')">
        <div class="sim-card-badge">
          <span class="sim-card-diff ${diffClass[s.difficulty]||'sim-diff-medium'}">${Util.esc(diffLabel[s.difficulty]||s.difficulty)}</span>
          ${isFree ? '<span class="sim-card-diff sim-diff-free">Gratuito</span>' : ''}
        </div>
        ${locked ? `<div class="sim-card-lock-badge"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>` : ''}
        <div class="sim-card-title-bar">
          <div class="sim-card-name">${Util.esc(s.name)}</div>
          ${s.subject ? `<div class="sim-card-subject">${Util.esc(s.subject)}</div>` : ''}
        </div>
      </div>
      <div class="sim-card-body">
        <p class="sim-card-desc">${Util.esc(s.description)}</p>
        <div class="sim-card-tags">${concursoChips}${topicChips}</div>
        <div class="sim-card-meta">
          <span class="sim-card-stat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg> <strong>${s.questionCount||0}</strong> objetivas</span>
          ${s.essayCount ? `<span class="sim-card-stat"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg> <strong>${s.essayCount}</strong> discursivas</span>` : ''}
          <span class="sim-card-stat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${Util.esc(s.duration||'')}</span>
        </div>
      </div>
      <div class="sim-card-footer">
        ${isFree ? '<span class="sim-card-price sim-card-price-free">Acesso livre</span>' : locked ? `<span class="sim-card-price">${Util.esc(s.price||'')}</span>` : `<span class="sim-card-price">${Util.esc(s.price||'')}</span>`}
        <span class="sim-card-cta">${locked?'Adquirir':isFree?'Começar agora':'Iniciar'}</span>
      </div>
    </${locked?'div':'a'}>`;
  }).join('');

  return `<div class="sim-hero">
    <span class="s-label" data-a="1">Simulados</span>
    <h1 class="s-title hero" data-a="2">Prove o que você sabe</h1>

  <div class="filter-bar" data-a="5">
    ${subjectOpts}${diffOpts}${catOpts}${topicOpts}
    <button class="fb-clear" id="simClearFilters">Limpar</button>
    <span class="fb-count">${filtered.length} simulado${filtered.length===1?'':'s'}</span>
  </div>
  <div class="sim-grid" data-a="6">${cards.length ? cards : '<div class="empty"><div class="empty-title">Nenhum simulado encontrado</div><div class="empty-sub">Ajuste os filtros para ver mais opções.</div></div>'}</div>`;
};

    ${blocksHtml}
    ${!submitted ? `<div class="sim-submit-bar">
      <div class="sim-submit-info">Responda todas as questões antes de enviar. Após o envio, o gabarito comentado será revelado.</div>
      <button class="sim-submit-btn" id="simSubmitBtn">${Icons.check} Finalizar e enviar simulado</button>
    </div>` : `<div class="sim-submit-bar sim-submitted-bar">
      <div class="sim-submit-info">Simulado enviado. Gabarito e comentários revelados.</div>
    </div>`}
  </div>`;

Renderers.simuladoDetail.mount = function(stageEl, route){
  const sims = window.SIMULADOS || [];
  const sim = sims.find(s => s.id === route.params.simuladoId);
  if(!sim || sim.locked || !sim.blocks) return;
  const simState = Store.getSimuladoState(sim.id);
  const submitted = !!(simState && simState.submittedAt);
  const ctx = { unitId:'__sim_'+sim.id, store:Store, suppressActions:true, simuladoMode:!submitted };

  sim.blocks.forEach(b => {
    const renderer = Blocks[b.type];
    if(renderer && renderer.mount){
      const section = stageEl.querySelector('#block-' + CSS.escape(b.id));
      if(section) renderer.mount(section, b, ctx);
    }
  });

  // In simulado mode: suppress instant feedback on option clicks
  if(!submitted){
    const simStage = stageEl.querySelector('#simStage');
    // Hide all feedback elements and prevent correct/wrong class reveals
    simStage.querySelectorAll('.q-feedback').forEach(fb => { fb.classList.remove('show'); fb.style.display = 'none'; });
    simStage.querySelectorAll('.q-option.correct,.q-option.wrong').forEach(o => { o.classList.remove('correct','wrong','selected'); });
    simStage.querySelectorAll('.q-score').forEach(sc => { sc.textContent = ''; });

    // Override option click to record silently (mark as selected but don't reveal answer)
    simStage.querySelectorAll('.q-option').forEach(btn => {
      btn.addEventListener('click', function(e){
        e.stopPropagation(); e.stopImmediatePropagation();
        const item = btn.closest('.q-item');
        // Visually mark selected
        item.querySelectorAll('.q-option').forEach(b => b.classList.remove('sim-selected'));
        btn.classList.add('sim-selected');
        // Record answer silently
        const itemId = item.getAttribute('data-item-id');
        const blockEl = btn.closest('.block-section');
        const blockId = blockEl ? blockEl.id.replace('block-','') : '';
        const value = btn.getAttribute('data-value');
        // Store selection without revealing
        const key = sim.id + '::' + blockId + '::' + itemId;
        window._simSelections = window._simSelections || {};
        window._simSelections[key] = { blockId, itemId, selected:value, idx:parseInt(btn.getAttribute('data-idx'),10) };
      }, true); // capture phase to override existing handlers
    });

    // Submit button
    const submitBtn = stageEl.querySelector('#simSubmitBtn');
    if(submitBtn){
      submitBtn.addEventListener('click', () => {
        if(!confirm('Tem certeza? Após o envio, o gabarito será revelado e não será possível alterar suas respostas.')) return;
        // Calculate score
        const selections = window._simSelections || {};
        let correct = 0, total = 0;
        sim.blocks.forEach(b => {
          if(b.type !== 'quiz') return;
          const groups = b.groups || [{items:b.items||[]}];
          groups.forEach(g => (g.items||[]).forEach(it => {
            total++;
            const key = sim.id+'::'+b.id+'::'+it.id;
            const sel = selections[key];
            if(sel){
              const norm = normalizeOptions(it.options);
              const keyIdx = quizItemKeyIndex(it, norm);
              if(sel.idx === keyIdx) correct++;
              // Save to Store
              Store.updateQuizAnswer('__sim_'+sim.id, b.id, it.id, { selected:sel.selected, correct:sel.idx===keyIdx });
            }
          }));
        });
        // Save submission + reveal by re-rendering the page
        Store.submitSimulado(sim.id, correct, total);
        // Force re-render by toggling hash
        const h = location.hash;
        location.hash = '#/__reload';
        setTimeout(() => { location.hash = h; }, 10);
      });
    }
  }
};

/* ═══════════ SIMULADO PERFORMANCE ═══════════ */
Renderers.simuladoPerformance = function(route){
  const sims = window.SIMULADOS || [];
  const sim = sims.find(s => s.id === route.params.simuladoId);
  if(!sim) return `<div class="empty"><div class="empty-title">Simulado não encontrado</div></div>`;

  const state = Store.get();
  const unitId = '__sim_'+sim.id;
  const fmtPct = v => v == null ? '—' : Math.round(v*100)+'%';

  // Aggregate by topic across this simulado's quiz blocks
  const topicAgg = {};
  (sim.blocks||[]).forEach(b => {
    if(b.type !== 'quiz') return;
    const groups = b.groups || [{items:b.items||[]}];
    groups.forEach(g => (g.items||[]).forEach(it => {
      const topics = Array.from(new Set([...(it.topics||[]),...(b.topics||[])]));
      const prior = (((state.quizAnswers||{})[unitId]||{})[b.id]||{})[it.id];
      const answered = !!prior && prior.selected != null;
      const correct = answered && prior.correct;
      const doubt = prior && !!prior.doubt;
      topics.forEach(tid => {
        if(!topicAgg[tid]) topicAgg[tid] = { correct:0, correctDoubt:0, wrong:0, wrongDoubt:0, pending:0, total:0, answered:0 };
        const a = topicAgg[tid];
        a.total++;
        if(!answered) a.pending++;
        else if(correct && doubt){ a.answered++; a.correct++; a.correctDoubt++; }
        else if(correct){ a.answered++; a.correct++; }
        else if(doubt){ a.answered++; a.wrong++; a.wrongDoubt++; }
        else { a.answered++; a.wrong++; }
      });
    }));
  });

  const rows = Object.keys(topicAgg).map(tid => {
    const t = window.TOPIC_REGISTRY[tid];
    if(!t) return '';
    const a = topicAgg[tid];
    const pct = a.answered ? (a.correct / a.answered) : null;
    return `<tr class="perf-row">
      <td class="perf-label"><span class="perf-label-inner"><span class="perf-num">${Util.esc(t.number||'')}</span><span class="perf-name">${Util.esc(t.name)}</span></span></td>
      <td class="perf-num-cell perf-c-correct">${a.correct}</td>
      <td class="perf-num-cell perf-c-cdoubt">${a.correctDoubt}</td>
      <td class="perf-num-cell perf-c-wrong">${a.wrong}</td>
      <td class="perf-num-cell perf-c-wdoubt">${a.wrongDoubt}</td>
      <td class="perf-num-cell perf-dim">${a.pending}</td>
      <td class="perf-num-cell perf-dim">${a.total}</td>
      <td class="perf-num-cell">${fmtPct(pct)}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" class="perf-empty">Nenhum dado disponível. Responda as questões do simulado primeiro.</td></tr>';

  // Summary
  const totals = Object.values(topicAgg).reduce((s,a) => ({
    correct:s.correct+a.correct, correctDoubt:s.correctDoubt+a.correctDoubt,
    wrong:s.wrong+a.wrong, wrongDoubt:s.wrongDoubt+a.wrongDoubt,
    pending:s.pending+a.pending, total:s.total+a.total, answered:s.answered+a.answered
  }), {correct:0,correctDoubt:0,wrong:0,wrongDoubt:0,pending:0,total:0,answered:0});
  const totalPct = totals.answered ? (totals.correct/totals.answered) : null;

  return `<div class="hero">
    <span class="s-label" data-a="1">Desempenho do simulado</span>
    <h1 class="s-title hero" data-a="2">${Util.esc(sim.name)}</h1>
    <div class="s-divider" data-a="3"></div>
    <div class="cta-row" data-a="4">
      <a class="btn-ghost" href="#/simulados/${sim.id}">${Icons.chevron} Voltar ao simulado</a>
      <a class="btn-ghost" href="#/simulados/${sim.id}/ranking">Ranking</a>
    </div>
  </div>
  <section class="perf-summary" data-a="5">
    <div class="perf-summary-card">
      <div class="perf-summary-label">Acertos</div>
      <div class="perf-summary-value" style="color:var(--green)">${totals.correct}<span>/${totals.total||'—'}</span></div>
      <div class="perf-summary-sub">${fmtPct(totalPct)} de acerto</div>
    </div>
    <div class="perf-summary-card">
      <div class="perf-summary-label">Com dúvida</div>
      <div class="perf-summary-value" style="color:#e8a857">${totals.correctDoubt + totals.wrongDoubt}</div>
      <div class="perf-summary-sub">${totals.correctDoubt} acertos · ${totals.wrongDoubt} erros</div>
    </div>
    <div class="perf-summary-card">
      <div class="perf-summary-label">Pendentes</div>
      <div class="perf-summary-value">${totals.pending}</div>
      <div class="perf-summary-sub">de ${totals.total} questões</div>
    </div>
  </section>
  <section class="perf-section" data-a="6">
    <div class="perf-section-label">Desempenho por tópico</div>
    <div class="perf-table-wrap"><table class="perf-table">
      <thead><tr>
        <th>Tópico</th>
        <th title="Acertos">✓</th><th title="Acertos com dúvida">✓?</th>
        <th title="Erros">✗</th><th title="Erros com dúvida">✗?</th>
        <th title="Pendentes">—</th><th title="Total">Total</th><th>%</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </section>`;
};

function formatReleaseCountdown(dateString){
  if(!dateString) return '';
  const target = new Date(dateString).getTime();
  const now = Date.now();
  const diff = target - now;
  if(!(diff > 0)) return 'Liberado agora';
  const day = Math.floor(diff / 86400000);
  const hour = Math.floor((diff % 86400000) / 3600000);
  const minute = Math.floor((diff % 3600000) / 60000);
  const sec = Math.floor((diff % 60000) / 1000);
  const pad = n => String(n).padStart(2,'0');
  if(day > 0) return `${day}d ${pad(hour)}h ${pad(minute)}m`;
  if(hour > 0) return `${pad(hour)}h ${pad(minute)}m ${pad(sec)}s`;
  if(minute > 0) return `${pad(minute)}m ${pad(sec)}s`;
  return `${pad(sec)}s`;
}

function recommendedUnitsFor(unit, moduleRef){
  const sameModule = (Util.unitsOfModule(moduleRef) || []).map(entry => entry.unit).filter(candidate => candidate.id !== unit.id);
  const related = sameModule.filter(candidate => {
    const tags = new Set([...(candidate.tags || []), ...(candidate.topics || [])]);
    return [...(unit.tags || []), ...(unit.topics || [])].some(id => tags.has(id));
  });
  return (related.length ? related : sameModule).slice(0, 3);
}

Renderers.catalog.mount = function(stageEl){
  // ── CRÍTICO: ao clicar num card que abre o curso, faz `window.COURSE`
  // apontar pra ESSE curso (não pra o singleton fixo História do Brasil).
  // Sem isso, todos os cards abriam o mesmo curso.
  stageEl.querySelectorAll('.catalog-card[data-course-id]').forEach(card => {
    // Pega só os cards abrem-clicáveis (são <a>), ignora os locked (<div>)
    if(card.tagName !== 'A') return;
    card.addEventListener('click', () => {
      const id = card.getAttribute('data-course-id');
      const target = (window.COURSES || []).find(c => c.id === id);
      if(target){
        window.COURSE = target;
        // Garante que a hierarquia desse curso esteja hidratada do store
        try{
          const rebuild = window._UbqRebuildCourseHierarchy;
          const origMap = window._UbqOrigBySlug || {};
          if(typeof rebuild === 'function' && target._subjectId){
            const orig = origMap[target.slug] || target;
            rebuild(window.COURSE, target._subjectId, orig);
          }
        }catch(_){}
      }
      // Deixa a navegação normal (#/course) acontecer
    });
  });

  stageEl.querySelectorAll('[data-course-bio]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const course = (window.COURSES || []).find(item => item.id === btn.getAttribute('data-course-bio'));
      if(course) FSModal.open([course], 0, renderCourseBioModal);
    });
  });
  stageEl.querySelectorAll('[data-course-buy]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      const course = (window.COURSES || []).find(item => item.id === btn.getAttribute('data-course-buy'));
      if(!course) return;
      if(!confirm(`Comprar "${course.title}" em 1 clique?\n\nNesta demo, nenhum cartão é salvo. Em produção, o gateway mantém os dados de pagamento criptografados.`)) return;
      Commerce.purchase(course);
      App._showAccessToast(`"${course.title}" foi adicionado à sua área. Compra em 1 clique concluída.`);
      App.render();
    });
  });
  stageEl.querySelectorAll('.catalog-card-locked[data-release-at]').forEach(card => {
    card.addEventListener('click', () => {
      const releaseAt = card.getAttribute('data-release-at');
      const countdown = formatReleaseCountdown(releaseAt);
      App._showAccessToast(countdown ? `Lançamento agendado: ${countdown}.` : 'Lançamento agendado pelo admin.');
    });
  });

  // ─── Ticker ao vivo dos countdowns (estilo PS Plus) ────────
  if(window._catalogCountdownTimer){ clearInterval(window._catalogCountdownTimer); }
  function tickCatalogCountdowns(){
    document.querySelectorAll('.catalog-card-countdown[data-countdown-target]').forEach(el => {
      const target = el.dataset.countdownTarget;
      if(!target) return;
      const targetMs = new Date(target).getTime();
      const diff = targetMs - Date.now();
      if(diff <= 0){
        el.textContent = '🎉 Liberado!';
        // Auto-publica no UbiqueStore
        const card = el.closest('[data-subject-id]');
        const sid = card?.dataset.subjectId;
        if(sid && window.UbiqueStore){
          const subj = UbiqueStore.subjects.list().find(s => String(s.id) === String(sid));
          if(subj && subj.status === 'scheduled'){
            UbiqueStore.subjects.update(subj.id, { status: 'published', scheduled_at: null });
          }
        }
        return;
      }
      el.textContent = formatReleaseCountdown(target);
    });
  }
  // Atualiza a cada segundo enquanto a página de catálogo estiver visível
  window._catalogCountdownTimer = setInterval(tickCatalogCountdowns, 1000);
  tickCatalogCountdowns(); // tick imediato
};

      <div class="module-progress" style="width:${Math.round(pct*100)}%"></div>
      <div class="module-number">${Util.esc(m.number||Util.pad2(i+1))}</div>
      <div class="module-content">
        <div class="module-label">${Util.esc(m.label||'Módulo')}</div>
        <h3 class="module-title">${Util.esc(m.title)}</h3>
        <p class="module-desc">${Util.esc(m.description||'')}</p>
        <div class="module-meta">
          <span>${totalUnits} unidades</span>
          ${m.chapters ? `<span>${m.chapters.length} capítulos</span>` : ''}
          <span>${Util.fmtPct(pct)}</span>
        </div>
      </div>
    </a>`;
  }).join('');

  // "Continue learning" rail from unitViews
  const recent = [];
  const state = Store.get();
  Object.entries(state.unitViews||{})
    .filter(([id,v]) => !v.completed)
    .sort((a,b)=>(b[1].lastSeenAt||0)-(a[1].lastSeenAt||0))
    .slice(0,4)
    .forEach(([id,v]) => {
      for(const m of c.modules){
        for(const entry of Util.unitsOfModule(m)){
          if(entry.unit.id === id){
            const prog = Store.unitProgress(entry.unit);
            const href = entry.chapter ? `#/m/${m.id}/c/${entry.chapter.id}/u/${entry.unit.id}` : `#/m/${m.id}/u/${entry.unit.id}`;
            recent.push({ m, entry, prog, href });
          }
        }
      }
    });
  const railHtml = recent.length ? `<section class="rail">
    <div class="rail-label">Continuar estudando</div>
    <div class="rail-items">${recent.map(r => `<a class="rail-card" href="${r.href}">
      <div class="rail-card-body">
        <div class="rail-card-crumb">${Util.esc(r.m.label)} ${r.entry.chapter?' · Cap. '+r.entry.chapter.number:''}</div>
        <div class="rail-card-title">${Util.esc(r.entry.unit.title)}</div>
        <div class="rail-card-bar"><span style="width:${Math.round(r.prog.pct*100)}%"></span></div>
      </div>
      ${r.entry.unit.cover ? `<div class="rail-card-thumb" style="background-image:url('${Util.attr(r.entry.unit.cover)}')"></div>` : ''}
    </a>`).join('')}</div>
  </section>` : '';

  return `<div class="hero">
    <span class="s-label" data-a="1">Curso</span>
    <h1 class="s-title hero" data-a="2">${Util.esc(c.title)}</h1>
    <p class="s-subtitle" data-a="3">${Util.esc(c.subtitle||'')}</p>
    <div class="s-divider" data-a="4"></div>
    <p class="s-body" data-a="5">${Util.esc(c.description||'')}</p>
  </div>
  ${railHtml}
  <section>
    <div class="rail-label" data-a="6">Módulos</div>
    <div class="module-grid">${modules}</div>
  </section>`;
};

/* MODULE VIEW */
Renderers.module = function(route){
  const m = Util.findModule(route.params.moduleId);
  if(!m) return `<div class="empty"><div class="empty-title">Módulo não encontrado</div></div>`;
  const hasChapters = !!(m.chapters && m.chapters.length);
  const pct = Store.moduleProgress(m);

  let body;
  if(hasChapters){
    body = `<div class="chapter-strip">${m.chapters.map(c => {
      const units = (c.units||[]).map(u => unitCard(u, m, c)).join('');
      return `<section class="chapter" data-a="3">
        <header class="chapter-head">
          <span class="chapter-num">Capítulo ${Util.esc(c.number)}</span>
          <h3 class="chapter-title">${Util.esc(c.title)}</h3>
          ${c.description ? `<p class="chapter-desc">${Util.esc(c.description)}</p>` : ''}
        </header>
        <div class="unit-grid">${units}</div>
      </section>`;
    }).join('')}</div>`;
  } else {
    const units = (m.units||[]).map(u => unitCard(u, m, null)).join('');
    body = `<div class="unit-grid" data-a="3">${units}</div>`;
  }

  return `<div class="hero">
    <span class="s-label" data-a="1">${Util.esc(m.label||'Módulo')}</span>
    <h1 class="s-title hero" data-a="2">${Util.esc(m.title)}</h1>
    <p class="s-subtitle" data-a="3">${Util.esc(m.subtitle||'')}</p>
    <div class="s-divider" data-a="4"></div>
    <p class="s-body" data-a="5">${Util.esc(m.description||'')}</p>
    <div class="cta-row" data-a="6">
      <a class="btn-primary" href="#/portal">${Icons.portal} Portal do curso</a>
      <a class="btn-ghost" href="#/course">${Icons.chevron} Voltar</a>
    </div>
    <div class="module-meta" style="margin-top:1rem">Progresso do módulo: ${Util.fmtPct(pct)}</div>
  </div>
  ${body}`;
};

function unitCard(unit, m, chapter){
  const prog = Store.unitProgress(unit);
  const href = chapter ? `#/m/${m.id}/c/${chapter.id}/u/${unit.id}` : `#/m/${m.id}/u/${unit.id}`;
  const bg = unit.cover ? `style="background-image:url('${Util.attr(unit.cover)}')"` : '';
  return `<a class="unit-card" href="${href}">
    <div class="unit-card-bg" ${bg}></div>
    <div class="unit-card-overlay"></div>
    <div class="unit-card-progress" style="width:${Math.round(prog.pct*100)}%"></div>
    <span class="unit-card-status ${prog.state}"></span>
    <span class="unit-card-num">${Util.esc(unit.number)}</span>
    <div class="unit-card-content">
      <div class="unit-card-label">${Util.esc(unit.label||'Unidade')}</div>
      <h4 class="unit-card-title">${Util.esc(unit.title)}</h4>
      <p class="unit-card-desc">${Util.esc(unit.description||'')}</p>
      <div class="unit-card-meta">
        <span>${Util.countBlocks(unit)} blocos</span>
        ${unit.duration ? `<span>${unit.duration} min</span>` : ''}
        <span>${Util.fmtPct(prog.pct)}</span>
      </div>
    </div>
  </a>`;
}

/* CHAPTER VIEW */
Renderers.chapter = function(route){
  const m = Util.findModule(route.params.moduleId);
  if(!m) return `<div class="empty"><div class="empty-title">Módulo não encontrado</div></div>`;
  const c = (m.chapters||[]).find(c => c.id === route.params.chapterId);
  if(!c) return `<div class="empty"><div class="empty-title">Capítulo não encontrado</div></div>`;
  const units = (c.units||[]).map(u => unitCard(u, m, c)).join('');
  return `<div class="hero">
    <span class="s-label" data-a="1">Capítulo ${Util.esc(c.number)}</span>
    <h1 class="s-title hero" data-a="2">${Util.esc(c.title)}</h1>
    <div class="s-divider" data-a="3"></div>
    <p class="s-body" data-a="4">${Util.esc(c.description||'')}</p>
  </div>
  <div class="unit-grid">${units}</div>`;
};

/* ─────────────────────────────────────────────────────────────────────────
 * Y3 — Banco de Questões (Fase G) — API de alto nível sobre
 * UbiqueStore.questions. Garante DEDUPLICAÇÃO por bank_id derivado
 * do origin (ou ubique-<rand> pra questões Ubique sem ID de prova).
 *
 * Schema de cada entrada do banco:
 *   {
 *     id: string,         // bank_id canônico (chave única do CRUD)
 *     origin: string,     // ex.: '[#14-1/2014]' (vazio se ubique sem id)
 *     source_type: 'past_exam' | 'ubique',
 *     type: 'true_false' | 'multiple_choice',
 *     reference_text: string,  // HTML
 *     reference_image: string, // URL
 *     statement: string,       // HTML
 *     correct?: boolean,       // se true_false
 *     options?: [{label,text,correct}],  // se multiple_choice
 *     comment: string,         // HTML (gabarito comentado)
 *     tags: string[],          // tags personalizadas (extra: tag auto deriva do origin)
 *     appears_in: [{unit_id, block_id, group_id?, position}],  // lookup reverso
 *     created_at, updated_at
 *   }
 * ───────────────────────────────────────────────────────────────────────── */

// makeCRUD do UbiqueStore.questions usa idType='number'. Quero string custom.
// Pra resolver, vou passar id explícito ao chamar add(). O makeCRUD aceita.

const QuestionBank = {
  // Procura por id canônico
  getById(bankId){
    if(!bankId || !window.UbiqueStore) return null;
    return UbiqueStore.questions.get(bankId);
  },
  // Procura por origin (busca linear — banco mock costuma ser pequeno)
  findByOrigin(origin){
    if(!origin || !window.UbiqueStore) return null;
    const LB = window.LearningBlocks;
    const bankId = LB && LB.questionBankIdFromOrigin ? LB.questionBankIdFromOrigin(origin) : null;
    if(bankId) return UbiqueStore.questions.get(bankId);
    // Fallback: varre lista
    return UbiqueStore.questions.list().find(function(q){
      return q && q.origin === origin;
    }) || null;
  },
  // Cria nova entrada vazia (ou retorna existente se já tem com mesmo origin)
  // Retorna o id canônico (string).
  createOrGet(initialData){
    if(!window.UbiqueStore) return null;
    const data = initialData || {};
    const LB = window.LearningBlocks;

    let bankId = null;
    if(data.source_type === 'past_exam' && data.origin){
      bankId = LB && LB.questionBankIdFromOrigin ? LB.questionBankIdFromOrigin(data.origin) : null;
    }
    if(!bankId){
      // Ubique ou sem origin → id aleatório
      bankId = (LB && LB.generateUbiqueQuestionId) ? LB.generateUbiqueQuestionId() : ('ubique-' + Date.now());
    }

    const existing = UbiqueStore.questions.get(bankId);
    if(existing) return bankId;

    const now = new Date().toISOString();
    const entry = Object.assign({
      id: bankId,
      origin: data.origin || '',
      source_type: data.source_type || (data.origin ? 'past_exam' : 'ubique'),
      type: data.type || 'true_false',
      reference_text: data.reference_text || '',
      reference_image: data.reference_image || '',
      statement: data.statement || '',
      comment: data.comment || '',
      tags: Array.isArray(data.tags) ? data.tags.slice() : [],
      appears_in: [],
      stats: { correct_pct: 0, wrong_pct: 0, guess_pct: 0, total_answers: 0 },
      created_at: now,
      updated_at: now
    }, data);
    entry.id = bankId;  // garante que o id final é o canônico
    if(entry.type === 'true_false'){
      entry.correct = (typeof entry.correct === 'boolean') ? entry.correct : true;
      delete entry.options;
    } else {
      if(!Array.isArray(entry.options) || !entry.options.length){
        entry.options = [
          { label:'A', text:'', correct:false },
          { label:'B', text:'', correct:false },
          { label:'C', text:'', correct:false },
          { label:'D', text:'', correct:false }
        ];
      }
      delete entry.correct;
    }
    UbiqueStore.questions.add(entry);
    return bankId;
  },
  // Atualiza um campo (ou patch parcial) no banco
  update(bankId, patch){
    if(!bankId || !window.UbiqueStore) return null;
    const cur = UbiqueStore.questions.get(bankId);
    if(!cur) return null;
    const patched = Object.assign({}, cur, patch || {}, {
      id: bankId, // não permite trocar id via patch
      updated_at: new Date().toISOString()
    });
    // Se origin mudou E source_type continua past_exam, recalcula bank_id
    const LB = window.LearningBlocks;
    if(patch && 'origin' in patch && patched.source_type === 'past_exam'){
      const newBankId = LB && LB.questionBankIdFromOrigin ? LB.questionBankIdFromOrigin(patched.origin) : null;
      if(newBankId && newBankId !== bankId){
        // Migra: remove o antigo, cria com novo id. Atualiza appears_in nos blocos.
        const existingTarget = UbiqueStore.questions.get(newBankId);
        if(existingTarget){
          // Conflito: já existe entrada com esse novo bank_id. Não migra — apenas
          // mantém os campos no antigo (origin patch). Caller deve preferir merge.
          UbiqueStore.questions.update(bankId, { origin: patched.origin, updated_at: patched.updated_at });
          return bankId;
        }
        const cloned = Object.assign({}, patched, { id: newBankId });
        UbiqueStore.questions.remove(bankId);
        UbiqueStore.questions.add(cloned);
        // Atualiza refs em todos os unit_blocks
        QuestionBank._migrateBankIdInBlocks(bankId, newBankId);
        return newBankId;
      }
    }
    UbiqueStore.questions.update(bankId, patched);
    return bankId;
  },
  // Remove entrada do banco (apaga TODA aparição? — sim, é destrutivo)
  remove(bankId){
    if(!bankId || !window.UbiqueStore) return false;
    return UbiqueStore.questions.remove(bankId);
  },
  // Lista tudo
  list(){
    if(!window.UbiqueStore) return [];
    return UbiqueStore.questions.list();
  },
  // Registra que essa questão aparece em (unit_id, block_id, group_id, position).
  // Idempotente: não duplica entradas em appears_in.
  registerUsage(bankId, unitId, blockId, groupId, position){
    if(!bankId || !window.UbiqueStore) return;
    const cur = UbiqueStore.questions.get(bankId);
    if(!cur) return;
    const usage = { unit_id: unitId, block_id: blockId, group_id: groupId || null, position: position || 0 };
    const arr = Array.isArray(cur.appears_in) ? cur.appears_in.slice() : [];
    const exists = arr.some(function(u){
      return u.unit_id === usage.unit_id && u.block_id === usage.block_id && (u.group_id || null) === usage.group_id;
    });
    if(!exists){
      arr.push(usage);
      UbiqueStore.questions.update(bankId, { appears_in: arr });
    }
  },
  // Remove a aparição da questão num bloco específico
  unregisterUsage(bankId, blockId, groupId){
    if(!bankId || !window.UbiqueStore) return;
    const cur = UbiqueStore.questions.get(bankId);
    if(!cur) return;
    const arr = (cur.appears_in || []).filter(function(u){
      return !(u.block_id === blockId && (u.group_id || null) === (groupId || null));
    });
    UbiqueStore.questions.update(bankId, { appears_in: arr });
  },
  // Conta em quantas unidades distintas a questão aparece
  countUnits(bankId){
    if(!bankId || !window.UbiqueStore) return 0;
    const cur = UbiqueStore.questions.get(bankId);
    if(!cur || !Array.isArray(cur.appears_in)) return 0;
    const units = new Set();
    cur.appears_in.forEach(function(u){ if(u && u.unit_id != null) units.add(u.unit_id); });
    return units.size;
  },
  // Helper interno: troca bank_id antigo por novo em todos os unit_blocks
  _migrateBankIdInBlocks(oldId, newId){
    if(!window.UbiqueStore) return;
    UbiqueStore.unit_blocks.list().forEach(function(b){
      if(!b || !b.content) return;
      let changed = false;
      const updateArr = function(arr){
        if(!Array.isArray(arr)) return;
        arr.forEach(function(q){
          if(q && q.bank_id === oldId){ q.bank_id = newId; changed = true; }
        });
      };
      if(Array.isArray(b.content.groups)){
        b.content.groups.forEach(function(g){ updateArr(g.questions); });
      }
      updateArr(b.content.ungrouped);
      if(changed){
        UbiqueStore.unit_blocks.update(b.id, { content: b.content });
      }
    });
  }
};
window.QuestionBank = QuestionBank;

/* ─────────────────────────────────────────────────────────────────────────
 * Y3 Fase K — Banco de Questões DISCURSIVAS (UbiqueStore.essays)
 *
 * Paralelo ao QuestionBank, mas pro tipo essay. Schema:

 *     id: 'cacd-3-2024',

 *
 * IDs SEPARADOS de questões objetivas — mesmo origin `[#3/2024]` pode existir

 * ───────────────────────────────────────────────────────────────────────── */

const EssayBank = {

      topics: Array.isArray(data.topics) ? data.topics.slice() : [],
      references: Array.isArray(data.references) ? data.references.slice() : [],
      criteria: Array.isArray(data.criteria) ? data.criteria.slice() : [],
      officialAnswer: data.officialAnswer || data.modelAnswer || '',
      modelAnswers: Array.isArray(data.modelAnswers) ? data.modelAnswers.slice() : [],
      show_criteria: data.show_criteria !== false,           // default true
      show_official_answer: data.show_official_answer !== false,
      show_model_answers: data.show_model_answers !== false,
      appears_in: [],
      stats: { submitted: 0, avg_score: 0 },

    }, data);

      if(newBankId && newBankId !== bankId){
        const existingTarget = UbiqueStore.essays.get(newBankId);
        if(existingTarget){
          UbiqueStore.essays.update(bankId, { origin: patched.origin, updated_at: patched.updated_at });
          return bankId;
        }
        const cloned = Object.assign({}, patched, { id: newBankId });
        UbiqueStore.essays.remove(bankId);
        UbiqueStore.essays.add(cloned);
        EssayBank._migrateBankIdInBlocks(bankId, newBankId);
        return newBankId;
      }
    }
    UbiqueStore.essays.update(bankId, patched);
    return bankId;
  },
  remove(bankId){
    if(!bankId || !window.UbiqueStore) return false;
    return UbiqueStore.essays.remove(bankId);
  },
  list(){
    if(!window.UbiqueStore) return [];

    const cur = UbiqueStore.essays.get(bankId);

  _migrateBankIdInBlocks(oldId, newId){

    UbiqueStore.unit_blocks.list().forEach(function(b){
      if(!b || b.type !== 'essay' || !b.content || !Array.isArray(b.content.items)) return;
      let changed = false;
      b.content.items.forEach(function(it){
        if(it && it.bank_id === oldId){ it.bank_id = newId; changed = true; }
      });
      if(changed) UbiqueStore.unit_blocks.update(b.id, { content: b.content });
    });
  }
};

/* Locate the corresponding UbiqueStore unit for a legacy mock unit (or vice versa).
 * Aceita três formas de id:
 *   1. _origMockId (match exato com id mockado original — ex.: 'a-chegada')
 *   2. String(u.id) — id puro
 *   3. 'u' + u.id    — pattern do rebuildCourseHierarchyFromStore, usado pra
 *                      unidades criadas pelo admin (não vieram do mock).
 */
function _findStoreUnitForMock(mockUnitId){
  if(!window.UbiqueStore) return null;
  const target = String(mockUnitId);
  const all = UbiqueStore.units.list();
  return all.find(function(u){
    return u._origMockId === mockUnitId
        || String(u.id) === target
        || ('u' + String(u.id)) === target;
  }) || null;
}

/* ─────────────────────────────────────────────────────────────────────────
 * Y2 — Hidrata um unit_block do store de volta para o formato legacy mock
 * (id, type, title, ...content) e enriquece fragments a partir da biblioteca
 * UbiqueStore.verbetes.
 *
 * MERGE INTELIGENTE de fragment + verbete:
 *   - fragment local (f) tem prioridade APENAS quando o campo está preenchido
 *   - schema do verbete usa { term, definition, images, link, related_term_ids,
 *     topics, tags } enquanto o renderer aluno espera { text, definition,
 *     images, link, relatedTerms, topics, tags } — fazemos o mapeamento aqui
 *   - definition do verbete vem com <p>...</p> (HTML do textarea rich do admin)
 *     — limpamos pra texto puro porque o renderer usa .textContent
 *   - lookup do verbete: por f.id direto OU por 'v_' + slug(f.text) (compat
 *     com fragments antigos que ainda usam id arbitrário como 'f-cabral')
 * ───────────────────────────────────────────────────────────────────────── */
function _slugifyTerm(s){
  return String(s || '').toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function _stripParaTags(html){
  return String(html || '')
    .replace(/<\/p>\s*<p[^>]*>/gi, '\n\n')
    .replace(/<\/?p[^>]*>/gi, '')
    .replace(/<br\s*\/?>/gi, '\n')
    .trim();
}

function _mergeFragmentWithVerbete(f, v){
  if(!v) return f;
  const merged = Object.assign({}, f);
  // text ← f.text || v.term
  if(!merged.text || !String(merged.text).trim()){
    merged.text = v.term || v.text || '';
  }
  // definition ← f.definition || v.definition (sem <p>…</p>)
  if(!merged.definition || !String(merged.definition).trim()){
    merged.definition = _stripParaTags(v.definition || '');
  } else {
    merged.definition = _stripParaTags(merged.definition);
  }
  // images: usa do verbete se fragment não tem (preserva campos esperados)
  if(!Array.isArray(merged.images) || merged.images.length === 0){
    merged.images = Array.isArray(v.images)
      ? v.images.map(function(im){ return { url: im.url || '', name: im.name || im.title || '', description: im.description || im.caption || '' }; })
      : [];
  }
  // relatedTerms ← f.relatedTerms || v.related_term_ids
  if(!Array.isArray(merged.relatedTerms) || merged.relatedTerms.length === 0){
    merged.relatedTerms = Array.isArray(v.related_term_ids) ? v.related_term_ids.slice() : [];
  }
  // link
  if(!merged.link){
    merged.link = v.link || null;
  }
  // topics, tags
  if(!Array.isArray(merged.topics) || merged.topics.length === 0){
    merged.topics = Array.isArray(v.topics) ? v.topics.slice() : (merged.topics || null);
  }
  if(!Array.isArray(merged.tags) || merged.tags.length === 0){
    merged.tags = Array.isArray(v.tags) ? v.tags.slice() : (merged.tags || null);
  }
  return merged;
}

function _hydrateStoreBlock(sb, verbeteIndex){
  const content = sb.content || {};
  let paragraphs = content.paragraphs;
  if(paragraphs && verbeteIndex){
    paragraphs = paragraphs.map(function(p){
      if(!p || !p.fragments) return p;
      return Object.assign({}, p, {
        fragments: p.fragments.map(function(f){
          if(!f) return f;
          // Lookup do verbete por id direto OU por slug(text)
          let v = null;
          if(f.id && verbeteIndex.byId[f.id])         v = verbeteIndex.byId[f.id];
          if(!v && f.text && verbeteIndex.bySlug[_slugifyTerm(f.text)]){
            v = verbeteIndex.bySlug[_slugifyTerm(f.text)];
          }
          return _mergeFragmentWithVerbete(f, v);
        })
      });
    });
  }
  return Object.assign(
    {
      id:          sb._origMockId || sb.id,
      type:        sb.type,
      title:       sb.title || '',
      description: sb.description || '',
      topics:      sb.topics || [],
      tags:        sb.tags || []
    },
    content,
    paragraphs ? { paragraphs } : {}
  );
}

/* Reconstrói o array `groups` no formato legacy (groups[].blocks[]) a partir
 * das unit_sections + unit_blocks do store. Retorna null se o store não tem
 * dados para a unidade — chamadores caem no mock legacy. */
function _groupsFromStore(storeUnitId){
  if(!window.UbiqueStore) return null;
  const sections = (UbiqueStore.unit_sections.list() || [])
    .filter(function(s){ return s.unit_id === storeUnitId; })
    .sort(function(a,b){ return (a.position||0) - (b.position||0); });
  const allBlocks = (UbiqueStore.unit_blocks.list() || [])
    .filter(function(b){ return b.unit_id === storeUnitId; });
  if(!sections.length && !allBlocks.length) return null;

  // Pré-indexa verbetes uma vez (por id E por slug do term) para enriquecer
  // os fragments dos parágrafos sem precisar varrer a lista a cada fragment.
  const verbList = (UbiqueStore.verbetes && UbiqueStore.verbetes.list) ? UbiqueStore.verbetes.list() : [];
  const verbeteIndex = { byId: {}, bySlug: {} };
  verbList.forEach(function(v){
    if(!v) return;
    if(v.id) verbeteIndex.byId[v.id] = v;
    if(v.term) verbeteIndex.bySlug[_slugifyTerm(v.term)] = v;
  });

  // Blocos sem section_id ainda aparecem (em uma "seção" sintética).
  const orphanBlocks = allBlocks.filter(function(b){
    return !b.section_id || !sections.some(function(s){ return s.id === b.section_id; });
  });
  const groups = sections.map(function(sec){
    const blocks = allBlocks
      .filter(function(b){ return b.section_id === sec.id; })
      .sort(function(a,b){ return (a.position||0) - (b.position||0); })
      .map(function(b){ return _hydrateStoreBlock(b, verbeteIndex); });
    return {
      id: sec._origMockId || ('g-' + sec.id),
      title: sec.title || 'Seção',
      blocks: blocks
    };
  });
  if(orphanBlocks.length){
    groups.push({
      id: 'g-unassigned',
      title: 'Sem seção',
      blocks: orphanBlocks
        .sort(function(a,b){ return (a.position||0) - (b.position||0); })
        .map(function(b){ return _hydrateStoreBlock(b, verbeteIndex); })
    });
  }
  return groups;
}

/* Devolve uma cópia rasa da unidade mock com `groups` substituído pelos dados
 * do store, quando disponíveis. Se o store ainda não tem dados pra unidade
 * (caso de mocks novos antes do seed), retorna a unidade original.
 *
 * Esse é o ponto único de override do Y2: a partir daqui o renderer legacy
 * roda inalterado, com toda a riqueza (sidebar, gallery flutuante, fragmentos
 * com tooltip, breadcrumbs, blockquotes, listas, hover-figures, etc.). */
function _unitWithStoreOverride(unit){
  if(!unit) return unit;
  if(!window.UbiqueStore) return unit;
  const storeUnit = _findStoreUnitForMock(unit.id);
  if(!storeUnit) return unit;
  const groups = _groupsFromStore(storeUnit.id);
  if(!groups || !groups.length) return unit;
  return Object.assign({}, unit, { groups: groups });
}

/* Slide-carousel global click handler — bound once. */
if(typeof window !== 'undefined' && !window._slideCarouselBound){
  window._slideCarouselBound = true;
  document.addEventListener('click', function(e){
    const carousel = e.target.closest('[data-carousel]');
    if(!carousel) return;
    const isPrev = e.target.closest('[data-prev]');
    const isNext = e.target.closest('[data-next]');
    if(!isPrev && !isNext) return;
    let idx = parseInt(carousel.dataset.idx, 10) || 0;
    const total = parseInt(carousel.dataset.total, 10) || 0;
    if(!total) return;
    idx = isPrev ? (idx - 1 + total) % total : (idx + 1) % total;
    carousel.dataset.idx = idx;
    carousel.querySelectorAll('[data-slide]').forEach(function(s){
      s.style.display = (parseInt(s.dataset.slide, 10) === idx) ? 'block' : 'none';
    });
    const pos = carousel.querySelector('[data-pos]');
    if(pos) pos.textContent = idx + 1;
  });
}

  // renderização rica abaixo continua intacta. Fallback para o mock se o store

  const unit = _unitWithStoreOverride(found.unit);

  // Determine active group (section)
  const groups = unit.groups||[];

      const noteCount = store.notesForBlock(unit.id, b.id).length;

        <span class="sb-mark">${isBmk ? Icons.check : ''}</span>
      </button>${subHeadings}`;
    }).join('');
    const gHref = `#/m/${m.id}${chapter?`/c/${chapter.id}`:''}/u/${unit.id}?g=${encodeURIComponent(g.id)}`;
    return `<div class="side-group${isActive?' side-group-active':''}" data-group-id="${Util.attr(g.id)}">

      <div class="side-group-blocks">${blocks}</div>

  }).join('');

  // Render only blocks from the active group
  const groupBlocks = activeGroup ? (activeGroup.blocks||[]) : [];
  const ctx = { unitId:unit.id, store:Store };
  const allBlocksHtml = groupBlocks.map(b => {
    const renderer = Blocks[b.type];
    if(!renderer) return '';

  }).join('<hr class="block-divider">');
  // Section/unit navigation at bottom
  const gIdx = activeGroupIdx >= 0 ? activeGroupIdx : 0;
  let endNav = '';
  if(gIdx < groups.length - 1){
    const nextG = groups[gIdx + 1];
    const href = `#/m/${m.id}${chapter?`/c/${chapter.id}`:''}/u/${unit.id}?g=${encodeURIComponent(nextG.id)}`;
    endNav = `<div class="block-next-nav"><a class="block-next-btn" href="${Util.attr(href)}">Próxima seção ${Icons.arrowRight}</a></div>`;
  } else {
    const entries = Util.unitsOfModule(m);
    const here = entries.findIndex(e => e.unit.id === unit.id);
    if(here >= 0 && here < entries.length - 1){
      const nextEntry = entries[here+1]; const nu = nextEntry.unit;
      const firstNB = (nu.groups||[]).flatMap(g => g.blocks||[])[0];
      const bq = firstNB ? `?b=${encodeURIComponent(firstNB.id)}` : '';
      const href = `#/m/${m.id}${nextEntry.chapterId?`/c/${nextEntry.chapterId}`:''}/u/${nu.id}${bq}`;
      endNav = `<div class="block-next-nav"><a class="block-next-btn" href="${Util.attr(href)}">Próxima unidade ${Icons.arrowRight}</a></div>`;
    } else {
      endNav = `<div class="block-next-nav"><a class="block-next-btn" href="#/m/${m.id}">Voltar ao módulo ${Icons.arrowRight}</a></div>`;
    }
  }
  const initialBlockId = (route.query && route.query.b) || '';
  const prog = Store.unitProgress(unit);
  const recommendations = recommendedUnitsFor(unit, m);
  const recommendationsHtml = recommendations.length ? `<section class="rail study-recommendations">

      return `<a class="rail-card" href="${href}">

          <div class="catalog-release-note">${Util.esc(nextUnit.subtitle || nextUnit.description || 'Continuidade sugerida pelo mesmo eixo temático.')}</div>
        </div>
        ${nextUnit.cover ? `<div class="rail-card-thumb" style="background-image:url('${Util.attr(nextUnit.cover)}')"></div>` : ''}
      </a>`;
    }).join('')}</div>
  </section>` : '';

  return `<div class="hero unit-hero">
    <span class="s-label" data-a="1">${Util.esc(unit.label||'Unidade')} ${Util.esc(unit.number)}</span>
    <h1 class="s-title" data-a="2">${Util.esc(unit.title)}</h1>
    <p class="s-subtitle" data-a="3">${Util.esc(unit.subtitle||'')}</p>
    <div class="s-divider" data-a="4"></div>
    <p class="s-body" data-a="5">${Util.esc(unit.description||'')}</p>
    <div class="unit-actions" data-a="6">

      <button class="icon-btn" id="addNoteBtn">${Icons.note} Adicionar nota</button>

  <div class="unit-layout" id="unitLayout">
    <aside class="unit-sidebar" data-a="7">
      <div class="side-toolbar">
        <span class="side-toolbar-label">Conteúdos</span>

Renderers.unit.mount = function(stageEl, route){
  const found = Util.findUnit(route.params.moduleId, route.params.unitId);
  if(!found) return;
  const { module:m, chapter } = found;
  // Y2 — mesmo override do render(); garante que o mount lê o mesmo conjunto
  // de groups/blocks que foi renderizado.
  const unit = _unitWithStoreOverride(found.unit);
  Store.markUnitView(unit.id);

  const blockStage = stageEl.querySelector('#blockStage');
  const groups = unit.groups||[];
  const activeGroupId = (route.query && route.query.g) || (groups[0] && groups[0].id);
  const activeGroup = groups.find(g => g.id === activeGroupId) || groups[0];
  const groupBlocks = activeGroup ? (activeGroup.blocks||[]) : [];
  const ctx = { unitId:unit.id, store:Store };

  // Mount only blocks from the active group
  groupBlocks.forEach(b => {
    const renderer = Blocks[b.type];
    if(renderer && renderer.mount){
      const section = blockStage.querySelector('#block-' + CSS.escape(b.id));
      if(section) renderer.mount(section, b, ctx);
    }
  });

  // Inline note indicators — show a small icon beside text that was quoted in a note
  groupBlocks.forEach(b => {
    const notes = Store.notesForBlock(unit.id, b.id).filter(n => n.quote);
    if(!notes.length) return;
    const section = blockStage.querySelector('#block-' + CSS.escape(b.id));
    if(!section) return;
    const body = section.querySelector('.tb-body');
    if(!body) return;
    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
    notes.forEach(note => {
      const q = note.quote;
      if(!q || q.length < 3) return;
      const searchStr = q.slice(0, 60); // match start of the quote
      walker.currentNode = body;
      let node;
      while(node = walker.nextNode()){
        const idx = node.textContent.indexOf(searchStr.slice(0, 30));
        if(idx >= 0){
          // Insert a note marker after this text node's parent element
          const marker = document.createElement('span');
          marker.className = 'inline-note-marker';
          marker.title = note.body || 'Nota';
          marker.setAttribute('data-note-id', note.id);
          marker.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
          const parent = node.parentElement;
          if(parent && !parent.querySelector('.inline-note-marker')){
            parent.style.position = 'relative';
            parent.appendChild(marker);
          }
          break;
        }
      }
    });
  });
  // Click inline note marker → open note list modal
  blockStage.addEventListener('click', e => {
    const marker = e.target.closest('.inline-note-marker');
    if(!marker) return;
    const noteId = marker.getAttribute('data-note-id');
    const note = (Store.get().notes||[]).find(n => n.id === noteId);
    if(note) NoteListModal.open([note], unit.id, note.blockId);
  });

  // Deep-link: scroll to requested block
  if(route.query && route.query.b){
    const target = blockStage.querySelector('#block-' + CSS.escape(route.query.b));
    if(target) setTimeout(() => target.scrollIntoView({ behavior:'smooth', block:'start' }), 120);
  }
  // Item highlight
  if(route.query.__item){
    const el = blockStage.querySelector('#item-'+CSS.escape(route.query.__item));
    if(el){ setTimeout(() => { el.scrollIntoView({behavior:'smooth', block:'center'}); el.style.outline = '2px solid var(--accent)'; setTimeout(()=>{ el.style.outline=''; }, 2000); }, 200); }
  }

  // Sidebar clicks → scroll if in current section, or navigate to that section
  stageEl.querySelectorAll('.side-block').forEach(sb => {
    sb.addEventListener('click', () => {
      const bid = sb.getAttribute('data-block-id');
      const target = blockStage.querySelector('#block-' + CSS.escape(bid));
      if(target){
        target.scrollIntoView({ behavior:'smooth', block:'start' });
      } else {
        // Block is in a different section — find which group it belongs to and navigate
        const allGroups = unit.groups||[];
        for(const g of allGroups){
          if((g.blocks||[]).some(b => b.id === bid)){
            const href = `#/m/${m.id}${chapter?`/c/${chapter.id}`:''}/u/${unit.id}?g=${encodeURIComponent(g.id)}&b=${encodeURIComponent(bid)}`;
            Router.go(href.replace('#',''));
            break;
          }
        }
      }
    });
  });
  // Sub-heading anchor clicks → scroll to paragraph within block
  stageEl.querySelectorAll('.side-subhead').forEach(sh => {
    sh.addEventListener('click', () => {
      const pid = sh.getAttribute('data-paragraph-id');
      const target = blockStage.querySelector('[data-paragraph-id="' + CSS.escape(pid) + '"]');
      if(target) target.scrollIntoView({ behavior:'smooth', block:'start' });
    });
  });

  // Scroll spy — update sidebar active state as user scrolls
  const sideBlocks = stageEl.querySelectorAll('.side-block');
  const sections = blockStage.querySelectorAll('.block-section');
  const scrollObs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        const id = entry.target.id.replace('block-','');
        sideBlocks.forEach(sb => sb.classList.toggle('active', sb.getAttribute('data-block-id') === id));
      }
    });
  }, { rootMargin:'-20% 0px -60% 0px', threshold:0 });
  sections.forEach(s => scrollObs.observe(s));

  // Action delegation — bookmark ("mark as finished") + reading list
  blockStage.addEventListener('click', e => {
    const bmBtn = e.target.closest('[data-action="bookmark"]');
    const rlBtn = e.target.closest('[data-action="readinglist"]');
    if(bmBtn){
      const bid = bmBtn.getAttribute('data-block-id');
      Store.toggleBookmark(unit.id, bid);
      const now = Store.isBookmarked(unit.id, bid);
      bmBtn.classList.toggle('on', now);
      bmBtn.innerHTML = Icons.check + `<span>${now?'Concluído':'Marcar'}</span>`;
      bmBtn.title = now?'Desmarcar':'Marcar como concluído';
      const sideBtn = stageEl.querySelector(`.side-block[data-block-id="${CSS.escape(bid)}"]`);
      if(sideBtn){
        sideBtn.classList.toggle('bookmarked', now);
        const mark = sideBtn.querySelector('.sb-mark');
        if(mark) mark.innerHTML = now ? Icons.check : '';
      }
      return;
    }
    if(rlBtn){
      const bid = rlBtn.getAttribute('data-block-id');
      const b = allBlocks.find(x => x.id === bid);
      Store.toggleReadingList({
        moduleId: m.id,
        chapterId: chapter ? chapter.id : null,
        unitId: unit.id,
        blockId: bid,
        unitTitle: unit.title,
        unitNumber: unit.number,
        blockTitle: b ? b.title : '',
        blockType: b ? b.type : '',
        moduleLabel: m.label,
        moduleTitle: m.title
      });
      const now = Store.isInReadingList(unit.id, bid);
      rlBtn.classList.toggle('on', now);
      rlBtn.innerHTML = Icons.readingList + `<span>${now?'Na lista':'Ler depois'}</span>`;
      rlBtn.title = now?'Remover da lista de leitura':'Adicionar à lista de leitura';
      return;
    }
  });

  // Unit actions — cascade "Mark unit as finished" to every block inside
  stageEl.querySelector('#markCompleteBtn').addEventListener('click', () => {
    const btn = stageEl.querySelector('#markCompleteBtn');
    const already = btn.classList.contains('on');
    if(already){
      // toggle off
      Store.uncompleteUnit(unit.id);
      btn.classList.remove('on');
      btn.innerHTML = Icons.check + ' Marcar unidade como concluída';
    } else {
      Store.completeUnit(unit.id); // cascades bookmarks internally
      btn.classList.add('on');
      btn.innerHTML = Icons.check + ' Unidade concluída';
    }
    // Reflect on sidebar rows
    stageEl.querySelectorAll('.side-block').forEach(sb => {
      const bid = sb.getAttribute('data-block-id');
      const isBmk = Store.isBookmarked(unit.id, bid);
      sb.classList.toggle('bookmarked', isBmk);
      const mark = sb.querySelector('.sb-mark');
      if(mark) mark.innerHTML = isBmk ? Icons.check : '';
    });
    // Re-render current block so its header action states refresh
    if(currentBlock) showBlock(currentBlock.id);
  });
  stageEl.querySelector('#addNoteBtn').addEventListener('click', () => {
    const selection = NoteModal.captureSelection();
    // Find the first block in active group as context (or null)
    const firstBlock = groupBlocks[0] || null;
    NoteModal.open({
      moduleId: m.id,
      chapterId: chapter ? chapter.id : null,
      unit,
      block: firstBlock,
      selection: selection || ''
    });
  });

  // Focus mode — sidebar collapses to a thin strip; clicking it expands back.
  const focusBtn = stageEl.querySelector('#focusModeBtn');
  const sidebar = stageEl.querySelector('.unit-sidebar');
  const layout = stageEl.querySelector('#unitLayout');
  function setFocus(on){
    layout.classList.toggle('focus-mode', on);
    if(focusBtn) focusBtn.title = on ? 'Expandir barra lateral' : 'Recolher barra lateral';
    try{ localStorage.setItem('ubique.focusMode', on ? '1' : '0'); }catch(e){}
  }
  try{ if(localStorage.getItem('ubique.focusMode') === '1') setFocus(true); }catch(e){}
  if(focusBtn) focusBtn.addEventListener('click', () => setFocus(!layout.classList.contains('focus-mode')));
  // Clicking the collapsed sidebar strip expands it back
  if(sidebar) sidebar.addEventListener('click', (e) => {
    if(layout.classList.contains('focus-mode') && !e.target.closest('.side-block, .side-focus-btn, a, button')){
      setFocus(false);
    }
  });
};

Renderers.portalDetail = function(route){
  const m = Util.findModule(route.params.moduleId);

  const filters = {

    unit: route.query.unit || '',

    q: route.query.q || ''
  };
  const hasChapters = !!(m.chapters && m.chapters.length);
  const items = Portal.aggregate(m.id, cardKey, filters);

  // Build filter bar
  const chapterOpts = hasChapters ? `<div class="fb-group"><span class="fb-label">Capítulo</span>
    <select class="fb-select" data-filter="chapter">
      <option value="">Todos</option>

    </select></div>` : '';

  const unitEntries = Util.unitsOfModule(m).filter(e => !filters.chapter || e.chapterId === filters.chapter);

    <select class="fb-select" data-filter="unit">
      <option value="">Todas</option>
      ${unitEntries.map(e => `<option value="${Util.attr(e.unit.id)}" ${filters.unit===e.unit.id?'selected':''}>${Util.esc(e.unit.number+' · '+e.unit.title)}</option>`).join('')}
    </select></div>`;

  // Collect topics and tags actually used in this module
  const topicsUsed = new Set();
  const tagsUsed = new Set();
  const allEntries = Util.unitsOfModule(m);
  function collect(item){
    (item.topics||[]).forEach(t => topicsUsed.add(t));
    (item.tags||[]).forEach(t => tagsUsed.add(t));
  }
  allEntries.forEach(e => {
    (e.unit.groups||[]).forEach(g => (g.blocks||[]).forEach(b => {

  const topicOpts = `<div class="fb-group"><span class="fb-label">Tópico</span>

  const tagOpts = `<div class="fb-group"><span class="fb-label">Tag</span>
    <select class="fb-select" data-filter="tag">
      <option value="">Todas</option>
      ${Array.from(tagsUsed).map(id => {
        const t = Util.getTag(id); if(!t) return '';
        return `<option value="${Util.attr(id)}" ${filters.tag===id?'selected':''}>${Util.esc(t.name)}</option>`;
      }).join('')}
    </select></div>`;
  const searchInput = `<div class="fb-group"><span class="fb-label">Buscar</span>
    <input class="fb-input" type="text" placeholder="Termos, personagens, conceitos…" value="${Util.attr(filters.q)}" data-filter="q"></div>`;

  // Flashcards-specific controls: status filter + shuffle button
  const statusParam = route.query.status || '';
  const fcControls = cardKey === 'flashcards' ? `<div class="fb-group"><span class="fb-label">Status</span>
    <select class="fb-select" data-filter="status">
      <option value="">Todos</option>
      <option value="new" ${statusParam==='new'?'selected':''}>Novo</option>
      <option value="learning" ${statusParam==='learning'?'selected':''}>Revisar</option>
      <option value="mastered" ${statusParam==='mastered'?'selected':''}>Dominei</option>
    </select></div>
    <button class="fb-action-btn" id="fbShuffle" title="Embaralhar">
      <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      Embaralhar
    </button>` : '';

  // Questions-specific control: difficulty filter
  const difficultyControls = cardKey === 'questions' ? `<div class="fb-group"><span class="fb-label">Dificuldade</span>
    <select class="fb-select" data-filter="difficulty">
      <option value="">Todas</option>
      ${Object.keys(DIFFICULTY_DEFS).map(k => `<option value="${k}" ${filters.difficulty===k?'selected':''}>${DIFFICULTY_DEFS[k].label}</option>`).join('')}
    </select></div>` : '';

  // Render items per card type
  const itemsHtml = items.length ? renderPortalItems(cardKey, items, m) : `<div class="empty"><div class="empty-title">Nenhum resultado</div><div class="empty-body">Ajuste os filtros para ver mais itens desta compilação.</div></div>`;

  return `<div class="hero">
    <span class="s-label" data-a="1">${Util.esc(m.label)}</span>
    <h1 class="s-title" data-a="2">${Util.esc(card.label)}</h1>

  <div class="filter-bar">

/* NOTES PAGE */
Renderers.notes = function(route){
  const filters = {
    moduleId: route.query.module || '',
    chapterId: route.query.chapter || '',
    unitId: route.query.unit || '',
    topic: route.query.topic || '',
    tag: route.query.tag || '',
    q: route.query.q || ''
  };
  const sortBy = route.query.sort || 'date-desc';
  // Precompute module/unit order maps for deterministic module/unit sorting
  const modOrder = {}; const unitOrder = {};
  (window.COURSE.modules||[]).forEach((m, mi) => {
    modOrder[m.id] = mi;
    Util.unitsOfModule(m).forEach((entry, ui) => { unitOrder[entry.unit.id] = ui; });
  });
  function applySort(list, mode){
    const arr = list.slice();
    const byDateDesc = (a,b) => (b.updatedAt||b.createdAt||0) - (a.updatedAt||a.createdAt||0);
    const strCmp = (a,b) => a.localeCompare(b, 'pt-BR', { numeric:true, sensitivity:'base' });
    if(mode === 'date-asc'){
      arr.sort((a,b) => (a.updatedAt||a.createdAt||0) - (b.updatedAt||b.createdAt||0));
    } else if(mode === 'topic'){
      arr.sort((a,b) => {
        const ta = (a.topics||[])[0]; const tb = (b.topics||[])[0];
        if(!ta && !tb) return byDateDesc(a,b);
        if(!ta) return 1; if(!tb) return -1;
        const oa = Util.getTopic(ta); const ob = Util.getTopic(tb);
        const na = oa ? (oa.number||'') : ''; const nb = ob ? (ob.number||'') : '';
        const c = strCmp(na, nb);
        return c !== 0 ? c : byDateDesc(a,b);
      });
    } else if(mode === 'tag'){
      arr.sort((a,b) => {
        const ta = (a.tags||[])[0]; const tb = (b.tags||[])[0];
        if(!ta && !tb) return byDateDesc(a,b);
        if(!ta) return 1; if(!tb) return -1;
        const oa = Util.getTag(ta); const ob = Util.getTag(tb);
        const na = oa ? (oa.name||'') : ''; const nb = ob ? (ob.name||'') : '';
        const c = strCmp(na, nb);
        return c !== 0 ? c : byDateDesc(a,b);
      });
    } else if(mode === 'module' || mode === 'unit'){
      arr.sort((a,b) => {
        const ma = modOrder[a.moduleId] ?? 9999;
        const mb = modOrder[b.moduleId] ?? 9999;
        if(ma !== mb) return ma - mb;
        const ua = unitOrder[a.unitId] ?? 9999;
        const ub = unitOrder[b.unitId] ?? 9999;
        if(ua !== ub) return ua - ub;
        return (a.createdAt||0) - (b.createdAt||0);
      });
    } else {
      arr.sort(byDateDesc);
    }
    return arr;
  }
  const notes = applySort(Store.listNotes(filters), sortBy);
  const total = (Store.get().notes||[]).length;

  // Build filter selects from current notes universe
  const allNotes = Store.get().notes || [];
  const moduleIds = [...new Set(allNotes.map(n => n.moduleId).filter(Boolean))];
  const unitIds = [...new Set(allNotes.filter(n => !filters.moduleId || n.moduleId===filters.moduleId).map(n => n.unitId).filter(Boolean))];
  const topicIds = [...new Set(allNotes.flatMap(n => n.topics||[]))];
  const tagIds = [...new Set(allNotes.flatMap(n => n.tags||[]))];

  const moduleOpts = `<div class="fb-group"><span class="fb-label">Módulo</span>
    <select class="fb-select" data-filter="module">
      <option value="">Todos</option>
      ${moduleIds.map(id => {
        const m = Util.findModule(id); if(!m) return '';
        return `<option value="${Util.attr(id)}" ${filters.moduleId===id?'selected':''}>${Util.esc(m.label+' · '+m.title)}</option>`;
      }).join('')}
    </select></div>`;

  const unitOpts = `<div class="fb-group"><span class="fb-label">Unidade</span>
    <select class="fb-select" data-filter="unit">
      <option value="">Todas</option>
      ${unitIds.map(id => {
        let title = id;
        for(const m of window.COURSE.modules){
          for(const entry of Util.unitsOfModule(m)){
            if(entry.unit.id===id){ title = 'Unid. '+entry.unit.number+' · '+entry.unit.title; break; }
          }
        }
        return `<option value="${Util.attr(id)}" ${filters.unitId===id?'selected':''}>${Util.esc(title)}</option>`;
      }).join('')}
    </select></div>`;

  const topicOpts = `<div class="fb-group"><span class="fb-label">Tópico</span>
    <select class="fb-select" data-filter="topic">
      <option value="">Todos</option>
      ${topicIds.map(id => {
        const t = Util.getTopic(id); if(!t) return '';
        return `<option value="${Util.attr(id)}" ${filters.topic===id?'selected':''}>${Util.esc(t.number+' · '+t.name)}</option>`;
      }).join('')}
    </select></div>`;

  const tagOpts = `<div class="fb-group"><span class="fb-label">Tag</span>
    <select class="fb-select" data-filter="tag">
      <option value="">Todas</option>
      ${tagIds.map(id => {
        const t = Util.getTag(id); if(!t) return '';
        return `<option value="${Util.attr(id)}" ${filters.tag===id?'selected':''}>${Util.esc(t.name)}</option>`;
      }).join('')}
    </select></div>`;

  const fmtDate = ts => {
    try { const d = new Date(ts); return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric' }); } catch(e){ return ''; }
  };

  const notesHtml = notes.length ? `<div class="notes-grid">${notes.map(n => {
    const chapterPart = n.chapterId ? `/c/${n.chapterId}` : '';
    const href = n.unitId ? `#/m/${n.moduleId}${chapterPart}/u/${n.unitId}?b=${n.blockId||''}` : '#/';
    const mod = Util.findModule(n.moduleId);
    const modLabel = mod ? (mod.label+' · '+mod.title) : '';
    const bits = [modLabel, n.unitTitle, n.blockTitle].filter(Boolean).join(' › ');
    return `<article class="note-card" data-note-id="${Util.attr(n.id)}">
      <div class="note-card-source">${Util.esc(bits)}</div>
      ${n.quote ? `<div class="note-card-quote">${Util.esc(n.quote)}</div>` : ''}
      ${n.body ? `<div class="note-card-body">${Util.esc(n.body)}</div>` : ''}
      ${Util.chips(n.topics, n.tags)}
      <div class="note-card-foot">
        <span class="note-card-date">${fmtDate(n.updatedAt||n.createdAt)}</span>
        <div style="display:flex;gap:.8rem;align-items:center">
          <button class="note-card-link" data-action="delete">Excluir</button>
          <a class="note-card-link" href="${href}">Abrir →</a>
        </div>
      </div>
    </article>`;
  }).join('')}</div>` : `<div class="empty"><div class="empty-title">Nenhuma nota encontrada</div><div class="empty-body">Abra um bloco e clique em "Adicionar nota" para começar. Você pode selecionar um trecho da leitura antes de clicar para que ele apareça como citação na nota.</div></div>`;

  // Build user flashcards with filters
  let userFlashcards = (Store.get().notes || []).filter(n => n.type === 'flashcard');
  const fcFilterModule = (route.query && route.query.fcModule) || '';
  const fcFilterUnit = (route.query && route.query.fcUnit) || '';
  const fcFilterStatus = (route.query && route.query.fcStatus) || '';
  if(fcFilterModule) userFlashcards = userFlashcards.filter(fc => fc.moduleId === fcFilterModule);
  if(fcFilterUnit) userFlashcards = userFlashcards.filter(fc => fc.unitId === fcFilterUnit);
  if(fcFilterStatus) userFlashcards = userFlashcards.filter(fc => (fc.fcStatus||'new') === fcFilterStatus);

  const fcModuleIds = [...new Set((Store.get().notes||[]).filter(n=>n.type==='flashcard').map(n=>n.moduleId).filter(Boolean))];
  const fcUnitIds = [...new Set((Store.get().notes||[]).filter(n=>n.type==='flashcard').map(n=>n.unitId).filter(Boolean))];
  const fcModuleOpts = `<div class="fb-group"><span class="fb-label">Módulo</span><select class="fb-select" data-fc-filter="fcModule"><option value="">Todos</option>${fcModuleIds.map(mid=>{const m=Util.findModule(mid);return m?`<option value="${Util.attr(mid)}" ${fcFilterModule===mid?'selected':''}>${Util.esc(m.label+' · '+m.title)}</option>`:''}).join('')}</select></div>`;
  const fcUnitOpts = `<div class="fb-group"><span class="fb-label">Unidade</span><select class="fb-select" data-fc-filter="fcUnit"><option value="">Todas</option>${fcUnitIds.map(uid=>{const fc0=(Store.get().notes||[]).find(n=>n.unitId===uid);return `<option value="${Util.attr(uid)}" ${fcFilterUnit===uid?'selected':''}>${Util.esc(fc0?.unitTitle||uid)}</option>`}).join('')}</select></div>`;

  // Topic/tag filters for flashcards

      (fc.quote||'').toLowerCase().includes(qLower)

  const fcTopicOpts = `<div class="fb-group"><span class="fb-label">Tópico</span><select class="fb-select" data-fc-filter="fcTopic"><option value="">Todos</option>${fcTopicIds.map(id=>{const t=Util.getTopic(id);return t?`<option value="${Util.attr(id)}" ${fcFilterTopic===id?'selected':''}>${Util.esc(t.number+' '+t.name)}</option>`:''}).join('')}</select></div>`;
