<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" data-fs="medium">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ubique Course Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ═══════════════════════════════════════════════════════════════════
     1 · TOKENS — design system variables (copied from style guide §1)
     ═══════════════════════════════════════════════════════════════════ -->
<style id="tokens">
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
html[data-fs="small"]{font-size:14px}
html[data-fs="large"]{font-size:18px}
/* Serif / sans-serif reading toggle — applies to reading blocks */
html[data-font="serif"] .tb-body{font-family:var(--serif);font-weight:400}
html[data-font="sans"] .tb-body{font-family:var(--sans);font-weight:300}

:root{
  --bg:#0b0c0f;
  --bg-card:#13151a;
  --bg-elevated:#1a1d24;

  --text:#f0ece4;
  --text-dim:rgba(240,236,228,.58);
  --text-mute:rgba(240,236,228,.32);
  --text-faint:rgba(240,236,228,.16);

  --accent:#c8a97e;
  --accent-lo:rgba(200,169,126,.12);
  --accent-glow:rgba(200,169,126,.06);
  --accent-strong:rgba(200,169,126,.32);

  --border:rgba(200,169,126,.12);
  --border-strong:rgba(200,169,126,.22);

  --green:#5dd49f;
  --red:#e87878;
  --red-dark:#c0392b;

  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Outfit',sans-serif;
  --mono:'JetBrains Mono',monospace;

  --ease:cubic-bezier(.22,1,.36,1);

  --nav-h:56px;
  --side-w:280px;

  --fs-hero:clamp(2rem,3.6vw,4rem);
  --fs-title:clamp(1.6rem,2.6vw,2.8rem);
  --fs-h3:clamp(1.15rem,1.6vw,1.5rem);
  --fs-body:clamp(.92rem,1.05vw,1.05rem);
  --fs-small:clamp(.72rem,.85vw,.88rem);
  --fs-micro:clamp(.6rem,.72vw,.72rem);
}
html[data-theme="light"]{
  --bg:#f4f1ec;
  --bg-card:#ffffff;
  --bg-elevated:#fbfaf7;
  --text:#1a1a1a;
  --text-dim:rgba(26,26,26,.75);
  --text-mute:rgba(26,26,26,.32);
  --text-faint:rgba(26,26,26,.14);
  --accent:#9a7548;
  --accent-lo:rgba(154,117,72,.1);
  --accent-glow:rgba(154,117,72,.06);
  --accent-strong:rgba(154,117,72,.3);
  --border:rgba(154,117,72,.14);
  --border-strong:rgba(154,117,72,.25);
}
html,body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
body{min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
img{display:block;max-width:100%}
</style>

<style id="admin-route">
.admin-shell{
  display:grid;
  grid-template-columns:minmax(220px,260px) minmax(0,1fr);
  gap:1.6rem;
  align-items:start;
}
.admin-sidebar{
  position:sticky;top:calc(var(--nav-h) + 1rem);
  padding:1.1rem;
  border:1px solid var(--border);
  border-radius:10px;
  background:
    linear-gradient(180deg, rgba(200,169,126,.12), transparent 35%),
    var(--bg-card);
  box-shadow:0 18px 48px rgba(0,0,0,.18);
}
.admin-sidebar-head{margin-bottom:1rem}
.admin-sidebar-kicker{
  font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent);
}
.admin-sidebar-title{
  margin-top:.45rem;font-family:var(--serif);font-size:1.7rem;
  line-height:1.05;color:var(--text);
}
.admin-sidebar-copy{
  margin-top:.65rem;font-size:.9rem;line-height:1.7;color:var(--text-dim);
}
.admin-side-nav{display:flex;flex-direction:column;gap:.45rem;margin-top:1.1rem}
.admin-side-link{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  gap:.8rem;padding:.75rem .9rem;border-radius:8px;
  border:1px solid transparent;background:transparent;
  color:var(--text-dim);text-align:left;transition:all .22s ease;
}
.admin-side-link:hover{
  color:var(--text);border-color:var(--border-strong);background:var(--accent-glow);
}
.admin-side-link.active{
  color:var(--accent);border-color:var(--accent-strong);background:var(--accent-lo);
}
.admin-side-link strong{
  display:block;font-family:var(--sans);font-weight:400;font-size:.78rem;
  letter-spacing:.12em;text-transform:uppercase;
}
.admin-side-link span{
  display:block;margin-top:.15rem;font-size:.78rem;line-height:1.45;
  color:inherit;opacity:.8;
}
.admin-side-index{
  flex:0 0 auto;font-family:var(--mono);font-size:.62rem;opacity:.6;
}
.admin-quickstats{
  margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border);
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.7rem;
}
.admin-quickstat{
  padding:.8rem;border:1px solid var(--border);border-radius:8px;
  background:rgba(255,255,255,.02);
}
.admin-quickstat-label{
  font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-mute);
}
.admin-quickstat-value{
  margin-top:.3rem;font-family:var(--serif);font-size:1.5rem;color:var(--text);
}
.admin-main{min-width:0}
.admin-section{
  margin-bottom:1.35rem;padding:1.35rem;
  border:1px solid var(--border);border-radius:12px;
  background:var(--bg-card);scroll-margin-top:calc(var(--nav-h) + 1rem);
}
.admin-section-hero{
  padding:1.7rem;
  background:
    radial-gradient(circle at top right, rgba(200,169,126,.16), transparent 28%),
    linear-gradient(135deg, rgba(200,169,126,.08), transparent 40%),
    var(--bg-card);
}
.admin-hero-grid{
  margin-top:1.3rem;display:grid;grid-template-columns:1.5fr .9fr;gap:1rem;
}
.admin-panel{
  padding:1rem;border:1px solid var(--border);border-radius:10px;
  background:rgba(255,255,255,.015);
}
.admin-panel-label{
  font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);
}
.admin-panel-value{
  margin-top:.4rem;font-family:var(--serif);font-size:2.2rem;line-height:1;color:var(--text);
}
.admin-panel-copy{margin-top:.55rem;font-size:.88rem;line-height:1.7;color:var(--text-dim)}
.admin-metric-grid{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;margin-top:1rem;
}
.admin-metric-card,.admin-list-card{
  padding:1rem;border:1px solid var(--border);border-radius:10px;background:var(--bg-elevated);
}
.admin-metric-kicker,.admin-list-title{
  font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);
}
.admin-metric-value{
  margin-top:.45rem;font-family:var(--serif);font-size:1.65rem;color:var(--text);
}
.admin-metric-copy{margin-top:.4rem;font-size:.84rem;line-height:1.65;color:var(--text-dim)}
.admin-list{display:grid;gap:.85rem;margin-top:1rem}
.admin-list-row{
  display:grid;grid-template-columns:minmax(0,1fr) auto;gap:1rem;align-items:center;
  padding-bottom:.85rem;border-bottom:1px solid var(--border);
}
.admin-list-row:last-child{padding-bottom:0;border-bottom:none}
.admin-list-row h4{
  font-family:var(--serif);font-weight:400;font-size:1.2rem;color:var(--text);
}
.admin-list-row p{margin-top:.25rem;font-size:.84rem;line-height:1.65;color:var(--text-dim)}
.admin-pill{
  display:inline-flex;align-items:center;padding:.28rem .62rem;border-radius:999px;
  border:1px solid var(--border-strong);color:var(--accent);background:var(--accent-lo);
  font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
}
.admin-progress{
  margin-top:.6rem;height:6px;border-radius:999px;background:var(--accent-glow);overflow:hidden;
}
.admin-progress > span{
  display:block;height:100%;border-radius:999px;background:linear-gradient(90deg, var(--accent), rgba(200,169,126,.48));
}
.admin-split{
  display:grid;grid-template-columns:1.05fr .95fr;gap:1rem;
}
.admin-action-list{display:grid;gap:.75rem;margin-top:1rem}
.admin-action-item{
  padding:.95rem 1rem;border:1px solid var(--border);border-radius:10px;
  background:linear-gradient(180deg, rgba(200,169,126,.05), transparent), var(--bg-elevated);
}
.admin-action-item strong{
  display:block;font-size:.82rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text);
}
.admin-action-item span{
  display:block;margin-top:.35rem;font-size:.84rem;line-height:1.65;color:var(--text-dim);
}
.admin-filter-row{
  display:flex;flex-wrap:wrap;gap:.55rem;margin-top:1rem;
}
.admin-filter-btn{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:88px;padding:.65rem .9rem;border-radius:999px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-size:.72rem;letter-spacing:.14em;
  text-transform:uppercase;transition:all .22s ease;
}
.admin-filter-btn:hover{
  color:var(--text);border-color:var(--border-strong);background:var(--accent-glow);
}
.admin-filter-btn.active{
  color:var(--accent);border-color:var(--accent-strong);background:var(--accent-lo);
}
.admin-chart-grid{
  display:grid;grid-template-columns:minmax(0,1.3fr) minmax(320px,.9fr);
  gap:1rem;align-items:stretch;
}
.admin-chart-card{
  padding:1rem;border:1px solid var(--border);border-radius:10px;background:var(--bg-elevated);
}
.admin-chart-head{
  display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;
}
.admin-chart-title{
  font-family:var(--serif);font-size:1.35rem;font-weight:400;color:var(--text);
}
.admin-chart-copy{
  margin-top:.3rem;font-size:.84rem;line-height:1.6;color:var(--text-dim);
}
.admin-chart-meta{
  font-family:var(--mono);font-size:.65rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-mute);
}
.admin-chart-body{
  position:relative;height:320px;margin-top:1rem;
}
.admin-chart-body canvas{
  width:100% !important;height:100% !important;
}
.admin-stat-grid{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;
}
.admin-stat-card{
  padding:1rem;border:1px solid var(--border);border-radius:10px;
  background:linear-gradient(180deg, rgba(200,169,126,.06), transparent 65%), var(--bg-elevated);
}
.admin-stat-label{
  font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);
}
.admin-stat-value{
  margin-top:.45rem;font-family:var(--serif);font-size:2rem;line-height:1;color:var(--text);
}
.admin-stat-copy{
  margin-top:.45rem;font-size:.84rem;line-height:1.65;color:var(--text-dim);
}
.admin-user-list{
  display:grid;gap:.8rem;margin-top:1rem;
}
.admin-user-row{
  display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:.85rem;align-items:center;
  width:100%;padding:.9rem;border:1px solid var(--border);border-radius:10px;
  background:rgba(255,255,255,.015);text-align:left;transition:all .22s ease;
}
.admin-user-row:hover{
  border-color:var(--border-strong);background:var(--accent-glow);transform:translateY(-1px);
}
.admin-avatar{
  width:46px;height:46px;border-radius:999px;overflow:hidden;flex:0 0 auto;
  border:1px solid var(--border-strong);background:var(--bg-card);
}
.admin-avatar img{width:100%;height:100%;object-fit:cover}
.admin-user-name{
  font-family:var(--serif);font-size:1.2rem;line-height:1;color:var(--text);
}
.admin-user-meta{
  margin-top:.25rem;font-size:.8rem;line-height:1.55;color:var(--text-dim);
}
.admin-user-pulse{
  font-family:var(--mono);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);
}
.admin-access-summary{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.75rem;margin-top:1rem;
}
.admin-access-chip{
  padding:.85rem;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.015);
}
.admin-access-chip strong{
  display:block;font-family:var(--serif);font-size:1.35rem;font-weight:400;color:var(--text);
}
.admin-access-chip span{
  display:block;margin-top:.2rem;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute);
}
.admin-empty-chart{
  display:flex;align-items:center;justify-content:center;height:100%;
  text-align:center;padding:1rem;border:1px dashed var(--border);border-radius:10px;
  font-size:.88rem;line-height:1.7;color:var(--text-dim);
}
.admin-modal{
  position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;
  padding:1.5rem;background:rgba(5,6,8,.72);backdrop-filter:blur(10px);
}
.admin-modal.open{display:flex}
.admin-modal-dialog{
  width:min(960px,100%);max-height:calc(100vh - 3rem);overflow:auto;
  border:1px solid var(--border-strong);border-radius:16px;background:var(--bg-card);
  box-shadow:0 30px 80px rgba(0,0,0,.38);
}
.admin-modal-head{
  position:sticky;top:0;z-index:2;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;
  padding:1.1rem 1.15rem;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(200,169,126,.07), transparent), var(--bg-card);
}
.admin-modal-title{
  font-family:var(--serif);font-size:1.6rem;font-weight:400;color:var(--text);
}
.admin-modal-copy{
  margin-top:.3rem;font-size:.84rem;line-height:1.6;color:var(--text-dim);
}
.admin-modal-close{
  display:inline-flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:999px;border:1px solid var(--border);
}
.admin-modal-body{padding:1.15rem}
.admin-modal-user-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:1rem;
}
.admin-profile-head{
  display:grid;grid-template-columns:auto minmax(0,1fr);gap:1rem;align-items:center;
  padding:1rem;border:1px solid var(--border);border-radius:12px;background:var(--bg-elevated);
}
.admin-profile-avatar{
  width:72px;height:72px;border-radius:999px;overflow:hidden;border:1px solid var(--border-strong);
}
.admin-profile-avatar img{width:100%;height:100%;object-fit:cover}
.admin-profile-name{
  font-family:var(--serif);font-size:1.6rem;font-weight:400;color:var(--text);
}
.admin-profile-email{
  margin-top:.25rem;font-size:.88rem;line-height:1.6;color:var(--text-dim);
}
.admin-profile-role{
  display:inline-flex;align-items:center;margin-top:.6rem;padding:.26rem .58rem;border-radius:999px;
  border:1px solid var(--border);font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
}
.admin-profile-stats{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.75rem;margin-top:1rem;
}
.admin-profile-stat{
  padding:.9rem;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.015);
}
.admin-profile-stat strong{
  display:block;font-family:var(--serif);font-size:1.5rem;font-weight:400;color:var(--text);
}
.admin-profile-stat span{
  display:block;margin-top:.2rem;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute);
}
.admin-modal-controls{
  display:flex;flex-wrap:wrap;gap:.55rem;margin-top:1rem;
}
.admin-mini-chart{
  position:relative;height:260px;margin-top:1rem;
}
.admin-mini-chart canvas{
  width:100% !important;height:100% !important;
}
@media (max-width: 980px){
  .admin-shell,.admin-hero-grid,.admin-split,.admin-metric-grid,.admin-chart-grid,.admin-stat-grid,.admin-profile-stats,.admin-access-summary,.admin-modal-user-grid{grid-template-columns:1fr}
  .admin-sidebar{position:static}
  .admin-quickstats{grid-template-columns:repeat(4,minmax(0,1fr))}
}
@media (max-width: 720px){
  .admin-section,.admin-section-hero,.admin-sidebar{padding:1rem}
  .admin-quickstats{grid-template-columns:repeat(2,minmax(0,1fr))}
  .admin-list-row{grid-template-columns:1fr}
  .admin-user-row,.admin-profile-head{grid-template-columns:1fr}
  .admin-modal{padding:.75rem}
  .admin-modal-head,.admin-modal-body{padding:1rem}
}
</style>

<!-- ═══════════════════════════════════════════════════════════════════
     2 · PRIMITIVES — .s-label / .s-title / .s-subtitle / .s-body
     ═══════════════════════════════════════════════════════════════════ -->
<style id="primitives">
.s-label{
  font-family:var(--sans);font-weight:300;
  font-size:var(--fs-micro);letter-spacing:.3em;
  text-transform:uppercase;color:var(--accent);
  display:inline-flex;align-items:center;width:fit-content;
}
.s-label:not(:empty){
  padding:.4rem 1rem;
  border:1px solid var(--border-strong);
  border-radius:2px;margin-bottom:.6rem;
}
.s-title{
  font-family:var(--serif);font-weight:300;
  font-size:var(--fs-title);line-height:1.15;color:var(--text);
}
.s-title.hero{font-size:var(--fs-hero)}
.s-subtitle{
  font-family:var(--sans);font-weight:300;
  font-size:var(--fs-small);letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent);
}
.s-body{
  font-family:var(--sans);font-weight:300;
  font-size:var(--fs-body);line-height:1.8;color:var(--text-dim);
  max-width:680px;
}
.s-body strong{color:var(--text);font-weight:400}
.s-divider{width:44px;height:1px;background:var(--accent);opacity:.4;margin:1rem 0}

[data-a]{animation:su .75s var(--ease) both}
[data-a="1"]{animation-delay:.08s}[data-a="2"]{animation-delay:.16s}
[data-a="3"]{animation-delay:.24s}[data-a="4"]{animation-delay:.32s}
[data-a="5"]{animation-delay:.40s}[data-a="6"]{animation-delay:.48s}
[data-a="7"]{animation-delay:.56s}[data-a="8"]{animation-delay:.64s}
[data-a="9"]{animation-delay:.72s}[data-a="10"]{animation-delay:.80s}
[data-a="11"]{animation-delay:.88s}
@keyframes su{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* Topic/tag chips — delicate badge style */
.q-topics-tags{margin-top:.7rem;display:flex;flex-wrap:wrap;gap:.4rem .5rem;align-items:center}
.tpc{
  display:inline-flex;align-items:center;gap:.35rem;
  font-family:var(--sans);color:var(--accent);
  padding:.25rem .65rem;border-radius:14px;
  border:1px solid rgba(200,169,126,.25);
  background:rgba(200,169,126,.06);
  transition:all .25s ease;line-height:1.3;
}
.tpc:hover{border-color:rgba(200,169,126,.45);background:rgba(200,169,126,.12)}
.tpc-num{
  font-family:var(--mono);font-size:.52rem;opacity:.55;letter-spacing:.03em;
  background:rgba(200,169,126,.15);padding:.1rem .35rem;border-radius:8px;
  line-height:1;
}
.tpc-name{font-weight:400;font-size:.64rem;letter-spacing:.04em}
.tpc-d1 .tpc-name{font-size:.68rem;font-weight:500}
.tpc-d2 .tpc-name{font-size:.64rem;font-weight:400;opacity:.92}
.tpc-d3 .tpc-name{font-size:.58rem;font-weight:300;opacity:.8}
.tg{
  display:inline-flex;align-items:center;
  font-family:var(--sans);font-weight:300;font-size:.54rem;
  color:var(--text-mute);
  padding:.2rem .55rem;border-radius:10px;
  border:1px dashed rgba(200,169,126,.18);
  background:transparent;
  letter-spacing:.04em;
  transition:all .25s ease;line-height:1.3;
}
.tg:hover{border-color:rgba(200,169,126,.35);color:var(--text-dim)}
.tg-hash{opacity:.4;margin-right:.15rem;font-size:.5rem}
html[data-theme="light"] .tpc{color:#7a5a30;border-color:rgba(122,90,48,.2);background:rgba(122,90,48,.05)}
html[data-theme="light"] .tg{color:#8a8a8a;border-color:rgba(0,0,0,.12)}
</style>

<!-- ═══════════════════════════════════════════════════════════════════
     3 · PLATFORM SHELL — top bar, breadcrumb, stage, downloads
     ═══════════════════════════════════════════════════════════════════ -->
<style id="platform-shell">
/* Top bar */
.topbar{
  position:sticky;top:0;z-index:100;
  height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.6rem;
  background:rgba(11,12,15,.88);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
html[data-theme="light"] .topbar{background:rgba(244,241,236,.92)}
.tb-brand{
  display:flex;align-items:center;gap:.7rem;cursor:pointer;
  font-family:var(--serif);font-weight:400;font-size:1rem;color:var(--text);
  letter-spacing:.01em;
  background:none;border:none;padding:0;
}
.tb-brand-logo{
  width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.tb-brand-logo svg{width:100%;height:100%;display:block}
.tb-brand-logo svg path{fill:var(--accent)}
.tb-brand span.tb-suffix{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  padding-left:.6rem;border-left:1px solid var(--border-strong);margin-left:.2rem;
}
.tb-controls{display:flex;align-items:center;gap:.6rem}
.tb-user{
  display:flex;align-items:center;gap:.55rem;
  padding:.3rem .8rem;border-radius:20px;
  border:1px solid var(--border);background:var(--accent-glow);
}
.tb-user-avatar{
  width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:500;font-size:.72rem;
}
.tb-user-name{
  font-family:var(--sans);font-weight:300;font-size:.65rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);
}
.tb-user-role{
  font-family:var(--mono);font-size:.52rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--accent);
}
.tb-user-stack{display:flex;flex-direction:column;gap:.05rem}
.tb-logout{
  margin-left:.45rem;padding:.32rem .7rem;border-radius:999px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dim);font-family:var(--sans);font-size:.58rem;
  letter-spacing:.14em;text-transform:uppercase;transition:all .25s ease;
}
.tb-logout:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lo)}
.fs-ctrl{
  display:flex;align-items:center;gap:2px;
  background:var(--accent-glow);border:1px solid var(--border);
  border-radius:16px;padding:2px;
}
.fs-btn{
  padding:4px 9px;border-radius:12px;background:transparent;
  color:var(--text-mute);font-family:var(--sans);font-weight:300;
  letter-spacing:.08em;text-transform:uppercase;transition:all .3s ease;line-height:1;
}
.fs-btn.active{background:var(--accent-lo);color:var(--accent)}
.fs-btn:hover{color:var(--accent)}
.fs-btn[data-size="small"]{font-size:.5rem}
.fs-btn[data-size="medium"]{font-size:.6rem}
.fs-btn[data-size="large"]{font-size:.7rem}
/* Font family toggle (serif / sans) */
/* Display preferences popover */
.display-prefs{position:relative}
.display-prefs-btn{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dim);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s ease;
}
.display-prefs-btn:hover{border-color:var(--accent);color:var(--accent)}
.display-prefs-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.display-prefs-popover{
  display:none;position:absolute;top:calc(100% + .5rem);right:0;
  width:220px;padding:.8rem;
  background:var(--bg-card);border:1px solid var(--border-strong);border-radius:8px;
  box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:200;
}
.display-prefs-popover.open{display:block}
.dp-section{margin-bottom:.7rem;padding-bottom:.7rem;border-bottom:1px solid var(--border)}
.dp-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.dp-label{
  font-family:var(--sans);font-weight:400;font-size:.48rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--text-mute);
  margin-bottom:.4rem;
}
.ff-ctrl{
  display:flex;align-items:center;gap:2px;
  background:var(--accent-glow);border:1px solid var(--border);
  border-radius:16px;padding:2px;
}
.ff-btn{
  padding:4px 9px;border-radius:12px;background:transparent;
  color:var(--text-mute);font-weight:400;font-size:.58rem;
  letter-spacing:.06em;transition:all .3s ease;line-height:1;cursor:pointer;
  border:none;
}
.ff-btn.active{background:var(--accent-lo);color:var(--accent)}
.ff-btn:hover{color:var(--accent)}
.ff-btn[data-font="serif"]{font-family:var(--serif);font-style:italic}
.ff-btn[data-font="sans"]{font-family:var(--sans)}
.theme-btn{
  display:flex;align-items:center;gap:.5rem;width:100%;
  padding:.4rem .6rem;border-radius:12px;
  border:1px solid var(--border);background:transparent;
  color:var(--text-dim);cursor:pointer;transition:all .3s ease;
}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.theme-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.theme-label{font-family:var(--sans);font-size:.58rem;letter-spacing:.08em}
.theme-btn .icon-moon{display:block}.theme-btn .icon-sun{display:none}
html[data-theme="light"] .theme-btn .icon-moon{display:none}
html[data-theme="light"] .theme-btn .icon-sun{display:block}

/* Breadcrumb */
.breadcrumb{
  padding:1.3rem 4.5vw .6rem;
  display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;
  font-family:var(--sans);font-weight:300;
  font-size:var(--fs-micro);letter-spacing:.16em;text-transform:uppercase;
  color:var(--text-mute);
}
.breadcrumb a{color:var(--text-dim);transition:color .3s ease}
.breadcrumb a:hover{color:var(--accent)}
.breadcrumb .bc-sep{color:var(--text-faint)}
.breadcrumb .bc-current{color:var(--accent)}

/* Stage */
.stage{
  min-height:calc(100vh - var(--nav-h));
  padding:1vh 4.5vw 6vh;
}
.hero{margin-bottom:3rem}
.login-shell{
  position:relative;min-height:calc(100vh - var(--nav-h) - 6rem);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  border:1px solid var(--border);border-radius:18px;
  background:#07070a;
  box-shadow:0 25px 80px rgba(0,0,0,.35);
}
.login-video{
  position:absolute;inset:0;overflow:hidden;
}
.login-video::after{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 18% 18%, rgba(168,85,247,.28), transparent 30%),
    radial-gradient(circle at 82% 22%, rgba(59,130,246,.2), transparent 28%),
    linear-gradient(135deg, rgba(0,0,0,.3), rgba(0,0,0,.78));
  z-index:2;
}
.login-video video{
  width:100%;height:100%;object-fit:cover;display:block;
  filter:saturate(1.05) contrast(1.02);
}
.login-content{
  position:relative;z-index:3;width:min(1120px,100%);
  display:grid;grid-template-columns:minmax(0,1.15fr) minmax(340px,430px);
  gap:2.4rem;padding:clamp(1.5rem,4vw,3rem);
}
.login-hero{
  padding:1rem 0 1rem;color:#fff;display:flex;flex-direction:column;justify-content:center;
}
.login-kicker{
  width:fit-content;padding:.45rem 1rem;border-radius:999px;
  border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);
  font-family:var(--mono);font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:#d8b4fe;
}
.login-hero-title{
  margin-top:1.2rem;font-family:var(--serif);font-weight:400;
  font-size:clamp(3rem,7vw,5.3rem);line-height:.96;color:#fff;
}
.login-hero-copy{
  margin-top:1.25rem;max-width:620px;font-family:var(--sans);font-size:1rem;
  line-height:1.8;color:rgba(255,255,255,.78);
}
.login-hero-chips{
  display:flex;gap:.65rem;flex-wrap:wrap;margin-top:1.5rem;
}
.login-hero-chip{
  display:inline-flex;align-items:center;gap:.45rem;padding:.5rem .85rem;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);
  font-size:.72rem;letter-spacing:.08em;color:rgba(255,255,255,.88);
}
.login-form-card{
  position:relative;padding:2rem;border-radius:22px;overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(8,8,12,.58);backdrop-filter:blur(18px);
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.login-form-card::before{
  content:"";position:absolute;inset:-1px;
  background:linear-gradient(135deg, rgba(168,85,247,.22), transparent 35%, rgba(59,130,246,.16));
  opacity:.8;pointer-events:none;
}
.login-form-inner{position:relative;z-index:2}
.login-brand{
  text-align:center;margin-bottom:1.8rem;
}
.login-brand-title{
  position:relative;display:inline-block;font-family:var(--sans);font-weight:500;
  font-size:2rem;letter-spacing:.01em;color:#fff;
}
.login-brand-title::before{
  content:"";position:absolute;inset:-10px -18px;
  background:linear-gradient(90deg, rgba(168,85,247,.18), rgba(236,72,153,.15), rgba(59,130,246,.15));
  filter:blur(18px);z-index:-1;border-radius:999px;
}
.login-brand-copy{
  margin-top:.6rem;font-size:.92rem;line-height:1.7;color:rgba(255,255,255,.74);
}
.login-brand-sub{
  margin-top:.55rem;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);
}
.login-form{
  display:grid;gap:1rem;margin-top:1.5rem;
}
.login-input-wrap{
  position:relative;
}
.login-input-icon{
  position:absolute;left:.95rem;top:50%;transform:translateY(-50%);
  color:rgba(255,255,255,.58);display:inline-flex;align-items:center;justify-content:center;
}
.login-input{
  width:100%;padding:1rem 3rem 1rem 2.95rem;border-radius:14px;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);
  color:#fff;font-family:var(--sans);font-size:.95rem;outline:none;
  transition:border-color .2s ease, background .2s ease, box-shadow .2s ease;
}
.login-input::placeholder{color:rgba(255,255,255,.52)}
.login-input:focus{
  border-color:rgba(168,85,247,.55);background:rgba(255,255,255,.08);
  box-shadow:0 0 0 3px rgba(168,85,247,.12);
}
.login-password-toggle{
  position:absolute;right:.9rem;top:50%;transform:translateY(-50%);
  width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.58);transition:color .2s ease, background .2s ease;
}
.login-password-toggle:hover{color:#fff;background:rgba(255,255,255,.08)}
.login-meta-row{
  display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-top:.2rem;
}
.login-remember{
  display:flex;align-items:center;gap:.7rem;color:rgba(255,255,255,.8);font-size:.84rem;
}
.login-switch{
  position:relative;width:42px;height:22px;border-radius:999px;
  background:rgba(255,255,255,.18);transition:background .2s ease;
}
.login-switch::after{
  content:"";position:absolute;left:2px;top:2px;width:18px;height:18px;border-radius:50%;
  background:#fff;transition:transform .2s ease;
}
.login-switch.active{background:#9333ea}
.login-switch.active::after{transform:translateX(20px)}
.login-link{
  color:rgba(255,255,255,.78);font-size:.84rem;transition:color .2s ease;
}
.login-link:hover{color:#fff}
.login-submit{
  margin-top:.15rem;width:100%;padding:.95rem 1.1rem;border-radius:14px;
  background:#7c3aed;color:#fff;font-family:var(--sans);font-weight:500;
  box-shadow:0 16px 35px rgba(124,58,237,.28);transition:all .22s ease;
}
.login-submit:hover{transform:translateY(-1px);background:#6d28d9;box-shadow:0 18px 42px rgba(124,58,237,.36)}
.login-submit[disabled]{opacity:.7;cursor:not-allowed;transform:none}
.login-divider{
  position:relative;display:flex;align-items:center;justify-content:center;margin:1.45rem 0 1.2rem;
}
.login-divider::before{
  content:"";position:absolute;left:0;right:0;top:50%;border-top:1px solid rgba(255,255,255,.1);
}
.login-divider span{
  position:relative;padding:0 .85rem;background:rgba(8,8,12,.58);
  font-size:.72rem;color:rgba(255,255,255,.55);letter-spacing:.08em;
}
.login-socials{
  display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.7rem;
}
.login-social{
  display:flex;align-items:center;justify-content:center;padding:.85rem;border-radius:12px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.82);transition:all .2s ease;
}
.login-social:hover{background:rgba(255,255,255,.1);color:#fff}
.login-demo-row{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.7rem;
}
.login-demo-btn{
  display:flex;align-items:center;gap:.7rem;
  padding:.85rem 1rem;border-radius:12px;
  border:1px solid rgba(200,169,126,.3);
  background:rgba(200,169,126,.05);
  color:#f0ece4;text-align:left;cursor:pointer;
  transition:all .2s ease;font-family:inherit;
}
.login-demo-btn:hover{
  background:rgba(200,169,126,.12);
  border-color:rgba(200,169,126,.5);
  transform:translateY(-1px);
}
.login-demo-icon{
  font-size:1.3rem;color:#c8a97e;line-height:1;flex-shrink:0;
  font-family:'Cormorant Garamond',serif;
}
.login-demo-info{display:flex;flex-direction:column;gap:.15rem;min-width:0}
.login-demo-label{
  font-size:.85rem;font-weight:500;color:#f0ece4;letter-spacing:.02em;
}
.login-demo-hint{
  font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(200,169,126,.7);
}
.login-help,.login-error{
  margin-top:1rem;font-size:.78rem;line-height:1.7;color:rgba(255,255,255,.68);
}
.login-error{
  padding:.85rem .95rem;border:1px solid rgba(248,113,113,.3);
  border-radius:12px;background:rgba(127,29,29,.26);color:#fecaca;
}
.login-profile-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:.8rem;margin-top:1.15rem;
}
.login-user-card{
  padding:.95rem 1rem;border:1px solid rgba(255,255,255,.1);border-radius:14px;
  background:rgba(255,255,255,.05);
}
.login-user-role{
  font-family:var(--mono);font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:#d8b4fe;
}
.login-user-name{
  margin-top:.45rem;font-family:var(--serif);font-size:1.15rem;color:#fff;
}
.login-user-meta{
  margin-top:.35rem;font-size:.76rem;line-height:1.65;color:rgba(255,255,255,.7);
}
.login-footer{
  margin-top:1.35rem;text-align:center;font-size:.82rem;color:rgba(255,255,255,.56);
}
@media (max-width: 980px){
  .login-content{grid-template-columns:1fr}
  .login-hero{padding-top:0}
}
@media (max-width: 720px){
  .login-shell{border-radius:0;border-left:none;border-right:none}
  .login-content{padding:1.25rem}
  .login-form-card{padding:1.25rem}
  .login-profile-grid{grid-template-columns:1fr}
  .login-meta-row{flex-direction:column;align-items:flex-start}
}

/* Downloads panel */
.downloads{
  margin-top:4rem;padding-top:2rem;
  border-top:1px solid var(--border);
}
.downloads-label{
  font-family:var(--sans);font-weight:300;font-size:var(--fs-micro);
  letter-spacing:.24em;text-transform:uppercase;color:var(--accent);
  margin-bottom:1rem;
}
.downloads-title{
  font-family:var(--serif);font-weight:300;font-size:1.4rem;color:var(--text);
  margin-bottom:1.2rem;
}
.downloads-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.8rem;
}
.dl-item{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:1rem 1.1rem;
  background:var(--bg-card);border:1px solid var(--border);border-radius:3px;
  transition:all .3s ease;
}
.dl-item:hover{border-color:var(--accent);transform:translateY(-1px)}
.dl-icon{
  width:34px;height:34px;border-radius:3px;flex-shrink:0;
  background:var(--accent-lo);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
}
.dl-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.dl-body{flex:1;min-width:0}
.dl-label{
  font-family:var(--serif);font-weight:400;font-size:.95rem;
  color:var(--text);line-height:1.25;margin-bottom:.2rem;
}
.dl-desc{
  font-family:var(--sans);font-weight:300;font-size:.72rem;
  color:var(--text-dim);line-height:1.5;
}
.dl-meta{
  font-family:var(--mono);font-size:.6rem;
  color:var(--text-mute);letter-spacing:.06em;
  margin-top:.35rem;
}

/* Course home */
.module-grid{
  display:grid;gap:1.4rem;margin-top:1.8rem;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
}
.module-card{
  position:relative;aspect-ratio:4/5;
  border:1px solid var(--border);
  background:var(--bg-card);border-radius:4px;
  overflow:hidden;cursor:pointer;text-align:left;display:block;
  transition:transform .6s var(--ease),border-color .4s ease;
}
.module-card:hover{transform:translateY(-4px);border-color:var(--accent)}
.module-card-locked{cursor:not-allowed;filter:saturate(.3)}
.module-card-locked:hover{transform:none !important;border-color:var(--border) !important}
.module-lock-badge{
  position:absolute;top:.75rem;right:.75rem;z-index:4;
  background:rgba(11,12,15,.82);
  border:1px solid rgba(232,120,120,.35);
  color:#e87878;
  font-family:var(--sans);font-size:.68rem;font-weight:400;letter-spacing:.06em;
  padding:.25rem .55rem;border-radius:3px;
  backdrop-filter:blur(4px);
}
.module-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  opacity:.55;transition:opacity .6s var(--ease);
}
.module-card:hover .module-bg{opacity:.78}
.module-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(11,12,15,.96) 10%,rgba(11,12,15,.45) 55%,transparent);
}
html[data-theme="light"] .module-overlay{
  background:linear-gradient(to top,rgba(244,241,236,.96) 10%,rgba(244,241,236,.5) 55%,transparent);
}
.module-number{
  position:absolute;top:1.1rem;right:1.3rem;z-index:2;
  font-family:var(--serif);font-weight:300;
  font-size:2.4rem;color:var(--accent);opacity:.7;
}
.module-content{
  position:absolute;left:1.4rem;right:1.4rem;bottom:1.3rem;z-index:2;
}
.module-label{
  font-family:var(--sans);font-weight:300;font-size:.62rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.35rem;
}
.module-title{
  font-family:var(--serif);font-weight:400;font-size:1.5rem;
  line-height:1.2;color:var(--text);margin-bottom:.45rem;
}
.module-desc{
  font-family:var(--sans);font-weight:300;font-size:.78rem;
  line-height:1.6;color:var(--text-dim);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.module-meta{
  display:flex;align-items:center;gap:.7rem;margin-top:.8rem;
  font-family:var(--sans);font-weight:300;font-size:.58rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-mute);
}
.module-meta span{display:inline-flex;align-items:center;gap:.25rem}
.module-progress{
  position:absolute;top:0;left:0;height:2px;background:var(--accent);
  z-index:3;transition:width .6s var(--ease);
}

/* Continue-learning rail */
.rail{margin-top:2.5rem}
.rail-label{
  font-family:var(--sans);font-weight:300;font-size:var(--fs-micro);
  letter-spacing:.24em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.9rem;
}
.rail-items{
  display:grid;gap:1rem;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
}
.rail-card{
  display:flex;align-items:stretch;gap:1rem;
  padding:.9rem 1rem .9rem 1.1rem;background:var(--bg-card);
  border:1px solid var(--border);border-radius:3px;
  cursor:pointer;transition:all .3s ease;text-decoration:none;
}
.rail-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.rail-card-body{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.rail-card-crumb{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);
  margin-bottom:.4rem;
}
.rail-card-title{
  font-family:var(--serif);font-weight:400;font-size:1.05rem;
  color:var(--text);line-height:1.3;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.rail-card-bar{
  margin-top:.7rem;height:2px;background:var(--border);overflow:hidden;border-radius:1px;
}
.rail-card-bar>span{display:block;height:100%;background:var(--accent)}
.rail-card-thumb{
  flex:0 0 88px;width:88px;align-self:stretch;
  background-size:cover;background-position:center;
  border-radius:2px;position:relative;overflow:hidden;
  background-color:var(--bg-elevated);
}
.rail-card-thumb::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.35) 100%);
}
@media(max-width:640px){
  .rail-card-thumb{flex:0 0 68px;width:68px}
}

/* Chapter strip */
.chapter-strip{margin-top:2rem;display:flex;flex-direction:column;gap:1.8rem}
.chapter{border-top:1px solid var(--border);padding-top:1.4rem}
.chapter:first-child{border-top:none;padding-top:0}
.chapter-head{
  display:flex;align-items:baseline;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;
}
.chapter-num{
  font-family:var(--mono);font-weight:400;font-size:.7rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
}
.chapter-title{
  font-family:var(--serif);font-weight:400;font-size:1.3rem;color:var(--text);
}
.chapter-desc{
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  color:var(--text-dim);line-height:1.6;flex:1 0 100%;max-width:720px;
}

/* Unit grid (card styles live in #compile-fidelity) */
.unit-grid{
  display:grid;gap:1.2rem;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
}

/* CTA buttons */
.btn-primary,.btn-ghost{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.7rem 1.3rem;border-radius:3px;
  font-family:var(--sans);font-weight:300;font-size:.7rem;
  letter-spacing:.18em;text-transform:uppercase;
  transition:all .3s ease;cursor:pointer;
}
.btn-primary{
  background:var(--accent);color:var(--bg);
  border:1px solid var(--accent);
}
.btn-primary:hover{background:transparent;color:var(--accent)}
.btn-ghost{
  background:transparent;color:var(--accent);
  border:1px solid var(--border-strong);
}
.btn-ghost:hover{border-color:var(--accent);background:var(--accent-lo)}
.btn-primary svg,.btn-ghost svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}

.cta-row{display:flex;gap:.8rem;margin-top:1.6rem;flex-wrap:wrap}

/* Unit view */
.unit-layout{
  display:grid;grid-template-columns:var(--side-w) 1fr;gap:2.2rem;
  margin-top:1.5rem;align-items:flex-start;
  transition:grid-template-columns .3s ease;
}
.unit-sidebar{
  position:sticky;top:calc(var(--nav-h) + 1rem);
  max-height:calc(100vh - var(--nav-h) - 3rem);overflow-y:auto;
  padding-right:.5rem;
}
.unit-sidebar::-webkit-scrollbar{width:4px}
.unit-sidebar::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}
.side-group{margin-bottom:1.4rem}
.side-group-title{
  display:block;text-decoration:none;
  font-family:var(--sans);font-weight:400;font-size:.62rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--text-mute);
  padding:.4rem 0;margin-bottom:.4rem;border-bottom:1px solid var(--border);
  transition:color .2s ease;cursor:pointer;
}
.side-group-title:hover{color:var(--accent)}
.side-group-active .side-group-title{color:var(--accent);border-bottom-color:var(--accent)}
.side-group:not(.side-group-active) .side-group-blocks .side-block{opacity:.5}
.side-group:not(.side-group-active) .side-group-blocks .side-block:hover{opacity:1}
/* Sub-headings inside sidebar (paragraph anchors) */
.side-subheads{
  padding-left:2.2rem;margin-bottom:.3rem;
  display:flex;flex-direction:column;
}
.side-subhead{
  display:block;width:100%;text-align:left;
  padding:.3rem .5rem;border:none;background:transparent;cursor:pointer;
  font-family:var(--serif);font-weight:400;font-size:.68rem;font-style:italic;
  color:var(--text-mute);transition:color .2s ease;
  border-left:1px solid var(--border);
}
.side-subhead:hover{color:var(--accent);border-left-color:var(--accent)}
/* Note badge in sidebar */
/* Inline note markers — small icon beside quoted text */
.inline-note-marker{
  position:absolute;right:-2rem;top:0;
  width:16px;height:16px;cursor:pointer;
  color:var(--accent);opacity:.4;transition:opacity .2s ease;
  display:inline-flex;align-items:center;justify-content:center;
}
.inline-note-marker:hover{opacity:1}
.inline-note-marker svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
/* Note list modal */
.note-list-modal{display:none;position:fixed;inset:0;z-index:1100}
.note-list-modal.open{display:flex;align-items:center;justify-content:center}
.nlm-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.nlm-panel{
  position:relative;z-index:1;width:480px;max-width:92vw;max-height:80vh;
  background:var(--bg-card);border:1px solid var(--border);border-radius:6px;
  display:flex;flex-direction:column;overflow:hidden;
}
.nlm-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:.8rem 1.2rem;border-bottom:1px solid var(--border);
}
.nlm-title{font-family:var(--sans);font-weight:400;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}
.nlm-close{background:none;border:none;color:var(--text-dim);font-size:1.2rem;cursor:pointer}
.nlm-body{overflow-y:auto;padding:1rem 1.2rem;display:flex;flex-direction:column;gap:1rem}
.nlm-note{padding:1rem;border:1px solid var(--border);border-radius:4px;background:var(--bg-elevated)}
.nlm-note-quote{
  font-family:var(--serif);font-style:italic;font-size:.82rem;color:var(--text);
  padding:.5rem .8rem;border-left:2px solid var(--accent);margin-bottom:.6rem;
  background:rgba(200,169,126,.04);border-radius:0 3px 3px 0;
}
.nlm-note-body{
  width:100%;resize:vertical;background:var(--bg);border:1px solid var(--border);
  border-radius:3px;padding:.5rem .7rem;color:var(--text);
  font-family:var(--sans);font-size:.78rem;line-height:1.6;
}
.nlm-note-foot{display:flex;align-items:center;justify-content:space-between;margin-top:.5rem}
.nlm-note-date{font-family:var(--mono);font-size:.55rem;color:var(--text-mute)}
.nlm-note-actions{display:flex;gap:.4rem}
.nlm-delete,.nlm-save{
  padding:.3rem .7rem;border-radius:3px;font-size:.58rem;letter-spacing:.08em;
  text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-dim);
}
.nlm-save{border-color:var(--accent);color:var(--accent);background:var(--accent-lo)}
.nlm-save:hover{background:var(--accent);color:var(--bg)}
.side-block{
  display:flex;align-items:center;gap:.6rem;
  padding:.55rem .6rem;border-radius:3px;
  font-family:var(--sans);font-weight:300;font-size:.78rem;
  color:var(--text-dim);cursor:pointer;margin-bottom:.15rem;
  transition:all .25s ease;text-align:left;width:100%;
}
.side-block:hover{background:var(--accent-glow);color:var(--accent)}
.side-block.active{background:var(--accent-lo);color:var(--accent);border-left:2px solid var(--accent);padding-left:calc(.6rem - 2px)}
.side-block .sb-icon{
  width:20px;height:20px;flex-shrink:0;color:var(--accent);opacity:.8;
  display:flex;align-items:center;justify-content:center;
}
.side-block .sb-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.side-block .sb-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.side-block .sb-mark{
  width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}
.side-block .sb-mark svg{width:12px;height:12px;stroke:var(--border-strong);fill:none;stroke-width:2}
.side-block.seen .sb-mark svg{stroke:var(--accent)}
.side-block.bookmarked .sb-mark svg{stroke:var(--green)}

/* Sidebar downloads collapsible section */
.side-downloads{
  margin-top:1.6rem;padding-top:1rem;border-top:1px solid var(--border);
}
.side-downloads-summary{
  list-style:none;cursor:pointer;
  display:flex;align-items:center;gap:.55rem;padding:.4rem 0;
  font-family:var(--sans);font-weight:400;font-size:.62rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
}
.side-downloads-summary::-webkit-details-marker{display:none}
.side-downloads-summary::before{
  content:'';width:6px;height:6px;border-right:1.5px solid var(--accent);
  border-bottom:1.5px solid var(--accent);transform:rotate(-45deg);
  transition:transform .25s var(--ease);
}
.side-downloads[open] .side-downloads-summary::before{transform:rotate(45deg)}
.side-downloads-icon{
  display:inline-flex;width:14px;height:14px;color:var(--accent);margin-left:auto;
}
.side-downloads-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.side-downloads-count{
  font-family:var(--mono);font-size:.58rem;color:var(--text-mute);
  padding:.1rem .35rem;border:1px solid var(--border);border-radius:2px;
  letter-spacing:normal;
}
.side-downloads-list{margin-top:.6rem;display:flex;flex-direction:column;gap:.4rem}
.side-dl-item{
  display:flex;align-items:center;gap:.55rem;
  padding:.55rem .6rem;border:1px solid var(--border);border-radius:3px;
  background:var(--bg-card);text-decoration:none;transition:all .2s ease;
}
.side-dl-item:hover{border-color:var(--accent);background:var(--accent-glow)}
.side-dl-icon{
  width:22px;height:22px;flex-shrink:0;color:var(--accent);
  display:flex;align-items:center;justify-content:center;
}
.side-dl-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.side-dl-body{display:flex;flex-direction:column;gap:.15rem;min-width:0;flex:1}
.side-dl-label{
  font-family:var(--sans);font-weight:300;font-size:.74rem;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.side-dl-meta{
  font-family:var(--mono);font-size:.55rem;color:var(--text-mute);letter-spacing:.06em;
}
.side-downloads-empty{
  font-family:var(--sans);font-size:.68rem;color:var(--text-mute);font-style:italic;
  padding:.5rem 0;
}

.unit-main{min-width:0}
.unit-hero{margin-bottom:2rem}
.unit-actions{
  display:flex;gap:.5rem;margin-top:1.2rem;
}
.icon-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.45rem .85rem;border:1px solid var(--border);border-radius:3px;
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);
  transition:all .3s ease;
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn.on{background:var(--accent-lo);color:var(--accent);border-color:var(--accent)}
.icon-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8}

/* Sidebar toolbar — holds the label + the focus-mode toggle */
.side-toolbar{
  display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  padding:.15rem 0 .9rem;margin-bottom:.9rem;border-bottom:1px solid var(--border);
}
.side-toolbar-label{
  font-family:var(--sans);font-weight:400;font-size:.56rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--text-mute);
}
.side-focus-btn{
  position:relative;width:28px;height:28px;border-radius:4px;
  border:1px solid var(--border);background:transparent;color:var(--text-mute);
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .25s ease;flex-shrink:0;
}
.side-focus-btn:hover{border-color:var(--accent);color:var(--accent)}
.side-focus-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}

/* Focus mode — sidebar collapses to a thin clickable bar at the extreme left */
.unit-layout.focus-mode{grid-template-columns:6px 1fr;gap:0}
.unit-layout.focus-mode .unit-sidebar{
  width:6px;min-width:6px;overflow:hidden;cursor:pointer;
  padding:0;position:relative;background:transparent;
  max-height:none;
}
.unit-layout.focus-mode .unit-sidebar > *{opacity:0;pointer-events:none;transition:opacity .15s ease}
.unit-layout.focus-mode .unit-sidebar::after{
  content:'';position:absolute;top:0;left:1px;bottom:0;width:3px;
  background:rgba(200,169,126,.2);border-radius:2px;
  transition:background .2s ease;
}
.unit-layout.focus-mode .unit-sidebar:hover::after{background:rgba(200,169,126,.55)}
.unit-layout.focus-mode .unit-main{max-width:none;padding-left:1.5rem}

/* Paragraph anchor titles — normal mode: inline h4 */
.tb-para-title{
  font-family:var(--serif);font-weight:400;color:var(--accent);
  font-size:1.05rem;margin:1.4rem 0 .6rem;line-height:1.3;
}
/* Focus mode: titles + descriptions pulled into the freed left column as milestone anchors */
.tb-para-desc{display:none}
.unit-layout.focus-mode{--milestones-w:220px;--milestones-gap:1.5rem}
.unit-layout.focus-mode .text-block,
.unit-layout.focus-mode .textgallery-block{padding-left:calc(var(--milestones-w) + var(--milestones-gap))}
.unit-layout.focus-mode .tb-paragraph.has-title{position:relative}
.unit-layout.focus-mode .tb-para-title{
  position:absolute;
  left:calc(-1 * (var(--milestones-w) + var(--milestones-gap)));
  top:0;width:var(--milestones-w);
  margin:0;text-align:right;padding-right:.8rem;
  border-right:2px solid var(--accent);
  font-family:var(--serif);font-size:.95rem;font-weight:400;
  letter-spacing:0;text-transform:none;
  color:var(--accent);line-height:1.3;
}
.unit-layout.focus-mode .tb-para-desc{
  display:block;position:absolute;
  left:calc(-1 * (var(--milestones-w) + var(--milestones-gap)));
  top:2.2rem;width:var(--milestones-w);
  text-align:right;padding-right:.8rem;
  border-right:2px solid var(--border);
  font-family:var(--serif);font-style:italic;font-size:.72rem;
  color:var(--text-mute);line-height:1.5;
}
@media(max-width:1100px){
  .unit-layout.focus-mode .text-block,
  .unit-layout.focus-mode .textgallery-block{padding-left:1.5rem}
  .unit-layout.focus-mode .tb-para-title,
  .unit-layout.focus-mode .tb-para-desc{
    position:static;width:auto;text-align:left;border-right:none;padding-right:0;
  }
  .unit-layout.focus-mode .tb-para-title{
    font-size:1.05rem;letter-spacing:0;text-transform:none;
    font-family:var(--serif);margin:1.4rem 0 .6rem;
  }
  .unit-layout.focus-mode .tb-para-desc{margin-bottom:.8rem}
}
@media(max-width:900px){
  .unit-layout.focus-mode{grid-template-columns:1fr}
  .unit-layout.focus-mode .unit-sidebar{display:none}
  .unit-layout.focus-mode .unit-main{padding-left:0}
}

/* Next block nav — shown at the end of each block inside the unit view */
.block-next-nav{
  margin-top:2.4rem;padding-top:1.6rem;
  border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;
}
.block-next-btn{
  display:inline-flex;align-items:center;gap:.6rem;
  padding:.85rem 1.4rem;border:1px solid var(--accent);border-radius:3px;
  background:var(--accent-lo);color:var(--accent);cursor:pointer;
  font-family:var(--sans);font-weight:400;font-size:.66rem;
  letter-spacing:.18em;text-transform:uppercase;
  transition:all .3s ease;text-decoration:none;white-space:nowrap;
}
.block-next-btn:hover{background:var(--accent);color:var(--bg)}
.block-next-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}

.block-stage{margin-top:1.2rem}
.block-section{margin-bottom:2.4rem;scroll-margin-top:calc(var(--nav-h) + 1rem)}
.block-divider{border:none;border-top:1px solid var(--border);margin:0}
.block-wrap{
  padding:1.6rem 1.8rem 1.8rem;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;margin-bottom:1.4rem;
}
.block-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  gap:1rem;margin-bottom:1.2rem;
  padding-bottom:.9rem;border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.block-header-lead{min-width:0;flex:1 1 260px}
.block-actions{display:flex;gap:.45rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.block-action-btn{padding:.35rem .65rem;font-size:.55rem;letter-spacing:.14em;gap:.35rem}
.block-action-btn span{display:inline-block}
.block-action-btn svg{width:11px;height:11px}
@media (max-width:640px){
  .block-actions{width:100%;justify-content:flex-start}
}
.block-type{
  font-family:var(--sans);font-weight:300;font-size:.55rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  padding:.25rem .6rem;border:1px solid var(--border-strong);border-radius:2px;
  display:inline-flex;align-items:center;gap:.35rem;margin-bottom:.3rem;
}
.block-type svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.block-type-icon{display:inline-flex;align-items:center;color:inherit}
.block-title{
  font-family:var(--serif);font-weight:400;font-size:1.35rem;
  color:var(--text);line-height:1.3;
}
/* Audio listen button */
.tb-audio-bar{margin-bottom:.8rem}
.tb-audio-btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.35rem .8rem;border:1px solid var(--border);border-radius:16px;
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.08em;transition:all .2s ease;
}
.tb-audio-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-audio-btn.playing{border-color:var(--accent);color:var(--accent);background:var(--accent-lo)}
.tb-audio-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.block-desc{
  font-family:var(--sans);font-weight:300;font-size:.78rem;
  color:var(--text-dim);line-height:1.6;margin-top:.3rem;max-width:640px;
}

/* Compound block — sequential multi-type container.
   Sub-parts flow fluidly as sections of the same block:
   no nested container, no second background level, no rails/markers. */
.compound-intro{
  font-family:var(--sans);font-weight:300;font-size:.85rem;
  color:var(--text-dim);line-height:1.7;margin:-.4rem 0 1.4rem;max-width:720px;
}
.compound-parts{display:flex;flex-direction:column}
.compound-part{position:relative;padding:1.6rem 0}
.compound-part:first-child{padding-top:.4rem}
.compound-part:last-child{padding-bottom:0}
.compound-part + .compound-part{
  border-top:1px solid var(--border);
}
/* Strip the inner block's card chrome — it should feel like a continuation
   of the host compound block, not a nested tile. */
.compound-part-body > .block-wrap{
  background:transparent;border:none;padding:0;margin:0;
}
/* Quiet down the nested block header so it reads as a subsection heading */
.compound-part-body > .block-wrap > .block-header{
  margin-bottom:.9rem;padding-bottom:.7rem;
  border-bottom:1px solid var(--border);
}
.compound-part-body > .block-wrap > .block-header .block-title{
  font-size:1.1rem;
}
.compound-part-body > .block-wrap > .block-header .block-type{
  font-size:.52rem;
}

/* Carousel blocks — bio / quote / table / timeline / glossary
   One slide visible at a time, prev/next buttons cycle through items.
   Slide content reuses the exact classnames from the portal compilation
   renderers so the styling matches 1:1. */
.carousel-frame{
  position:relative;
  padding:0 3.4rem;
  margin-top:.6rem;
}
.carousel-stage{position:relative;min-height:280px}
.carousel-slide{display:none;animation:carouselFade .35s ease both}
.carousel-slide.active{display:block}
@keyframes carouselFade{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}
.carousel-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-card);border:1px solid var(--border);
  color:var(--text);cursor:pointer;transition:all .25s ease;
  z-index:2;
}
.carousel-nav svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2}
.carousel-nav:hover{border-color:var(--accent);background:var(--accent-lo);color:var(--accent)}
.carousel-nav:disabled{opacity:.3;cursor:not-allowed}
.carousel-nav:disabled:hover{border-color:var(--border);background:var(--bg-card);color:var(--text)}
.carousel-prev{left:0}
.carousel-next{right:0}
.carousel-footer{
  display:flex;align-items:center;justify-content:center;gap:1.2rem;
  margin-top:1.2rem;padding-top:1rem;
  border-top:1px solid var(--border);

.text-block .tb-body h4{font-size:1.05rem;color:var(--accent)}
.text-block .tb-body blockquote{
  margin:1.4rem 0;padding:.6rem 1.2rem;
  border-left:2px solid var(--accent);
  font-family:var(--serif);font-size:1.1rem;color:var(--text);
  font-style:italic;
}
.text-block .tb-body a{color:var(--accent);border-bottom:1px dotted var(--accent-strong)}
.text-block .tb-body iframe{width:100%;aspect-ratio:16/9;border:none;margin:1rem 0;border-radius:3px}
.text-block .tb-images{
  display:grid;gap:.8rem;margin-top:1.4rem;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
}
.text-block .tb-img{
  cursor:zoom-in;border-radius:3px;overflow:hidden;border:1px solid var(--border);
}
.text-block .tb-img img{width:100%;height:100%;object-fit:cover;aspect-ratio:4/3}

/* — TEXT + GALLERY (combined, with satellite panel) — */
.textgallery-block .tb-body{
  font-family:var(--sans);font-weight:300;font-size:var(--fs-body);
  line-height:1.85;color:var(--text-dim);max-width:760px;
}
.textgallery-block .tb-body p{margin-bottom:1rem}
.textgallery-block .tb-body strong{color:var(--text);font-weight:400}
.textgallery-block .tb-body em{color:var(--accent);font-style:italic}
.textgallery-block .tb-body h3,
.textgallery-block .tb-body h4{
  font-family:var(--serif);font-weight:400;color:var(--text);
  margin:1.4rem 0 .6rem;line-height:1.3;
}
.textgallery-block .tb-body h3{font-size:1.25rem}
.textgallery-block .tb-body h4{font-size:1.05rem;color:var(--accent)}
.textgallery-block .tb-body blockquote{
  margin:1.4rem 0;padding:.6rem 1.2rem;
  border-left:2px solid var(--accent);
  font-family:var(--serif);font-size:1.1rem;color:var(--text);font-style:italic;
}
.textgallery-block .tb-body a{color:var(--accent);border-bottom:1px dotted var(--accent-strong)}
.textgallery-block .tg-layout{
  display:grid;gap:2rem;align-items:flex-start;
  grid-template-columns:minmax(0,1fr);
}
.textgallery-block.has-gallery .tg-layout{
  grid-template-columns:minmax(0,1fr) 340px;
}
.tg-main{min-width:0}
/* Sticky right-side slider that shows one image at a time with prev/next buttons */
.tg-satellite{position:sticky;top:calc(var(--nav-h) + 1rem);align-self:flex-start;min-width:0}
.tg-satellite-pin{
  padding:1rem 1rem 1.1rem;border:1px solid var(--border);border-radius:4px;
  background:var(--bg-card);
}
.tg-satellite-label{
  display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  font-family:var(--sans);font-weight:400;font-size:.55rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  padding-bottom:.55rem;margin-bottom:.85rem;border-bottom:1px solid var(--border);
}
.tg-satellite-counter{
  font-family:var(--sans);font-variant-numeric:tabular-nums;
  color:var(--text-mute);font-size:.58rem;letter-spacing:.12em;
}
.tg-satellite-stage{
  position:relative;aspect-ratio:4/3;background:var(--bg-elevated);
  border:1px solid var(--border);border-radius:3px;overflow:hidden;
}
.tg-satellite-slide{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .35s ease;pointer-events:none;
}
.tg-satellite-slide.active{opacity:1;pointer-events:auto}
.tg-satellite-slide img{
  display:block;width:100%;height:100%;object-fit:cover;cursor:zoom-in;
}
.tg-satellite-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border);background:rgba(18,14,10,.78);
  color:var(--text);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);transition:all .2s ease;z-index:3;
}
.tg-satellite-nav:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.tg-satellite-nav svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.tg-satellite-prev{left:.55rem}
.tg-satellite-next{right:.55rem}
.tg-satellite-cap{
  display:block;padding:.6rem .1rem .1rem;
  font-family:var(--sans);font-weight:300;font-size:.68rem;
  color:var(--text-dim);line-height:1.5;text-align:left;
  min-height:2.3rem;
}
.tg-satellite-dots{
  display:flex;gap:.35rem;justify-content:center;margin-top:.55rem;
}
.tg-satellite-dot{
  width:5px;height:5px;border-radius:50%;background:var(--border-strong);
  border:none;padding:0;cursor:pointer;transition:all .2s ease;
}
.tg-satellite-dot.active{background:var(--accent);transform:scale(1.4)}
@media(max-width:880px){
  .textgallery-block.has-gallery .tg-layout{grid-template-columns:minmax(0,1fr)}
  .tg-satellite{position:relative;top:0;max-width:420px}
}

/* — FRAGMENT HIGHLIGHTS & POPUP CARD — */
.frag-term{
  border-bottom:1.5px dotted rgba(200,169,126,.45);cursor:help;
  transition:border-color .15s ease,color .15s ease;
}
.frag-term:hover{color:var(--accent);border-bottom-color:var(--accent)}
.frag-card{
  position:absolute;z-index:900;width:340px;max-width:calc(100vw - 2rem);
  background:var(--bg-elevated);border:1px solid var(--border-strong);
  border-radius:6px;box-shadow:0 8px 32px rgba(0,0,0,.4);
  opacity:0;pointer-events:none;transform:translateY(6px);
  transition:opacity .18s ease,transform .18s ease;overflow:hidden;
}
.frag-card.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.frag-card-slider{position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;background:var(--bg-card)}
.frag-card-slider[hidden]{display:none}
.frag-card-slides{display:flex;width:100%;height:100%;transition:transform .3s var(--ease)}
.frag-card-slide{min-width:100%;height:100%;position:relative}
.frag-card-slide img{width:100%;height:100%;object-fit:cover;display:block}
.frag-card-slide-cap{
  position:absolute;bottom:0;left:0;right:0;padding:.35rem .6rem;
  font-size:.55rem;color:#fff;background:linear-gradient(transparent,rgba(0,0,0,.65));
  letter-spacing:.03em;
}
.frag-card-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.5);
  color:#fff;font-size:.9rem;display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;transition:background .2s ease;z-index:2;
}
.frag-card-nav:hover{background:rgba(200,169,126,.7)}
.frag-card-prev{left:.35rem}
.frag-card-next{right:.35rem}
.frag-card-dots{
  position:absolute;bottom:.4rem;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;
}
.frag-card-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.35)}
.frag-card-dot.active{background:var(--accent)}
.frag-card-body{padding:.8rem 1rem 1rem}
.frag-card-term{
  font-family:var(--sans);font-weight:500;font-size:.82rem;
  color:var(--accent);margin-bottom:.3rem;
}
.frag-card-definition{
  font-family:var(--sans);font-weight:300;font-size:.74rem;
  color:var(--text-dim);line-height:1.65;
}
.frag-card-related{margin-top:.55rem;display:flex;flex-wrap:wrap;gap:.3rem .5rem}
.frag-card-related[hidden]{display:none}
.frag-card-related-label{
  font-size:.5rem;color:var(--text-mute);text-transform:uppercase;
  letter-spacing:.12em;width:100%;margin-bottom:.1rem;
}
.frag-card-related-link{
  font-size:.58rem;color:var(--accent);cursor:pointer;
  border-bottom:1px dotted rgba(200,169,126,.4);transition:border-color .2s ease;
}
.frag-card-related-link:hover{border-bottom-color:var(--accent)}
.frag-card-link{
  display:inline-flex;align-items:center;gap:.25rem;margin-top:.55rem;
  font-size:.58rem;color:var(--accent);text-decoration:none;
  border-bottom:1px solid rgba(200,169,126,.3);
}
.frag-card-link[hidden]{display:none}
.frag-card-link::after{content:'↗';font-size:.6rem}

/* — COMMENTS BLOCK — forum/discussion */
.comments-block .cmt-compose{
  display:flex;gap:.8rem;align-items:flex-start;margin-bottom:1.8rem;
}
.comments-block .cmt-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:var(--accent-lo);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--sans);font-weight:500;font-size:.62rem;
  letter-spacing:.04em;
}
.comments-block .cmt-input-wrap{flex:1;display:flex;flex-direction:column;gap:.5rem}
.comments-block .cmt-textarea{
  width:100%;resize:vertical;min-height:60px;padding:.6rem .8rem;
  background:var(--bg);border:1px solid var(--border);border-radius:4px;
  color:var(--text);font-family:var(--sans);font-size:.82rem;line-height:1.6;
  transition:border-color .2s ease;
}
.comments-block .cmt-textarea:focus{border-color:var(--accent);outline:none}
.comments-block .cmt-submit{
  align-self:flex-end;padding:.4rem 1rem;border:1px solid var(--accent);
  border-radius:3px;background:var(--accent-lo);color:var(--accent);
  font-family:var(--sans);font-weight:400;font-size:.58rem;
  letter-spacing:.12em;text-transform:uppercase;cursor:pointer;
  transition:all .2s ease;
}
.comments-block .cmt-submit:hover{background:var(--accent);color:var(--bg)}
.comments-block .cmt-thread{margin-top:.4rem}
.comments-block .cmt-item{
  display:flex;gap:.7rem;align-items:flex-start;
  padding:.8rem 0;border-bottom:1px solid var(--border);
}
.comments-block .cmt-item:last-child{border-bottom:none}
.comments-block .cmt-item-body{flex:1;min-width:0}
.comments-block .cmt-item-head{
  display:flex;align-items:baseline;gap:.5rem;margin-bottom:.25rem;
}
.comments-block .cmt-author{
  font-family:var(--sans);font-weight:500;font-size:.78rem;color:var(--text);
}
.comments-block .cmt-date{
  font-family:var(--mono);font-size:.52rem;color:var(--text-mute);
}
.comments-block .cmt-text{
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  color:var(--text-dim);line-height:1.65;
}
.comments-block .cmt-actions{
  display:flex;gap:.6rem;margin-top:.35rem;
}
.comments-block .cmt-action-btn{
  background:none;border:1px solid var(--border);border-radius:3px;cursor:pointer;
  padding:.25rem .55rem;
  font-family:var(--sans);font-size:.52rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-dim);transition:all .2s ease;
}
.comments-block .cmt-action-btn:hover{color:var(--accent);border-color:var(--accent)}
.comments-block .cmt-replies{
  margin-left:2.8rem;border-left:2px solid var(--border);padding-left:.8rem;
}
.comments-block .cmt-replies .cmt-item{padding:.5rem 0}
.comments-block .cmt-reply-compose{
  display:flex;gap:.5rem;align-items:flex-start;margin-top:.5rem;margin-left:2.8rem;
  padding-left:.8rem;border-left:2px solid var(--accent);
}
.comments-block .cmt-reply-compose .cmt-textarea{min-height:40px;font-size:.78rem}
.comments-block .cmt-empty{
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  color:var(--text-mute);font-style:italic;padding:1rem 0;
}
.comments-block .cmt-count{
  font-family:var(--sans);font-size:.62rem;color:var(--text-mute);
  letter-spacing:.1em;margin-bottom:1rem;
}

/* — GALLERY BLOCK — editorial mosaic */
.gallery-block .gb-caption{
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  color:var(--text-dim);line-height:1.65;margin-bottom:1.1rem;max-width:680px;
}
.mosaic-grid{
  display:grid;gap:.55rem;
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:140px;
  grid-auto-flow:dense;
}
.mosaic-item{
  position:relative;border-radius:3px;overflow:hidden;
  border:1px solid var(--border);cursor:zoom-in;
  background:var(--bg-elevated);padding:0;
  transition:transform .3s var(--ease), border-color .25s ease;
}
.mosaic-item:hover{border-color:var(--accent);transform:translateY(-2px)}
.mosaic-item img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .7s var(--ease);
}
.mosaic-item:hover img{transform:scale(1.06)}
.mosaic-item.span-1x1{grid-column:span 1;grid-row:span 1}
.mosaic-item.span-2x1{grid-column:span 2;grid-row:span 1}
.mosaic-item.span-1x2{grid-column:span 1;grid-row:span 2}
.mosaic-item.span-2x2{grid-column:span 2;grid-row:span 2}
.mosaic-overlay{
  position:absolute;left:0;right:0;bottom:0;
  padding:.85rem .95rem;text-align:left;
  background:linear-gradient(to top,rgba(11,12,15,.92) 0%,rgba(11,12,15,.55) 55%,transparent 100%);
  display:flex;flex-direction:column;gap:.2rem;
  opacity:0;transform:translateY(6px);transition:all .3s ease;
}
.mosaic-item:hover .mosaic-overlay{opacity:1;transform:translateY(0)}
.mosaic-title{
  font-family:var(--serif);font-weight:400;font-size:.88rem;color:#fff;line-height:1.3;
}
.mosaic-ref{
  font-family:var(--sans);font-weight:300;font-size:.56rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--accent);
}
@media(max-width:900px){
  .mosaic-grid{grid-template-columns:repeat(3,1fr)}
  .mosaic-item.span-2x2{grid-row:span 1}
}
@media(max-width:640px){
  .mosaic-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:120px}
  .mosaic-item{grid-column:span 1 !important;grid-row:span 1 !important}
  .mosaic-overlay{opacity:1;transform:none}
}

/* — Gallery fullscreen detail modal — */
body.gallery-detail-open{overflow:hidden}
.gallery-detail{
  position:fixed;inset:0;z-index:1200;display:none;
  background:rgba(8,9,12,.96);backdrop-filter:blur(14px);
}
.gallery-detail.open{display:block}
.gallery-detail .gd-close{
  position:fixed;top:1.2rem;right:1.4rem;z-index:3;
  width:44px;height:44px;border-radius:50%;
  border:1px solid var(--border-strong);background:rgba(11,12,15,.7);
  color:var(--accent);font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s ease;
}
.gallery-detail .gd-close:hover{border-color:var(--accent);background:var(--accent-lo)}
.gallery-detail .gd-nav{
  position:fixed;top:50%;transform:translateY(-50%);
  width:48px;height:48px;border-radius:50%;z-index:3;
  border:1px solid var(--border-strong);background:rgba(11,12,15,.65);
  color:var(--accent);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s ease;
}
.gallery-detail .gd-nav:hover{border-color:var(--accent);background:var(--accent-lo)}
.gallery-detail .gd-nav svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}
.gallery-detail .gd-prev{left:1.4rem}
.gallery-detail .gd-next{right:1.4rem}
.gallery-detail .gd-stage{
  position:absolute;inset:0;
  display:grid;grid-template-columns:1.55fr .9fr;gap:0;
  padding:5vh 5vw 5vh 5vw;
}
.gallery-detail .gd-figure{
  margin:0;padding:0;display:flex;align-items:center;justify-content:center;
  min-width:0;padding-right:2rem;
}
.gallery-detail .gd-figure img{
  max-width:100%;max-height:90vh;object-fit:contain;
  border:1px solid var(--border);border-radius:3px;background:var(--bg-elevated);
  box-shadow:0 10px 40px rgba(0,0,0,.45);
}
.gallery-detail .gd-meta{
  align-self:center;padding:0 1.6rem 0 2rem;
  border-left:1px solid var(--border);min-width:0;
}
.gallery-detail .gd-counter{
  font-family:var(--mono);font-size:.62rem;letter-spacing:.16em;
  color:var(--text-mute);margin-bottom:1.1rem;
}
.gallery-detail .gd-title{
  font-family:var(--serif);font-weight:400;font-size:1.75rem;line-height:1.2;
  color:var(--text);margin-bottom:.8rem;
}
.gallery-detail .gd-divider{
  width:48px;height:1px;background:var(--accent);margin-bottom:1rem;
}
.gallery-detail .gd-description{
  font-family:var(--sans);font-weight:300;font-size:.88rem;line-height:1.75;
  color:var(--text-dim);margin-bottom:1.2rem;
}
.gallery-detail .gd-reference{
  font-family:var(--sans);font-weight:400;font-size:.58rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--accent);
  padding:.6rem .8rem;border:1px solid var(--accent);border-radius:3px;
  display:inline-block;margin-bottom:.9rem;background:var(--accent-glow);
}
.gallery-detail .gd-caption{
  font-family:var(--serif);font-style:italic;font-size:.88rem;color:var(--text-mute);
  line-height:1.6;padding-top:.8rem;border-top:1px dashed var(--border);
}
@media(max-width:900px){
  .gallery-detail .gd-stage{grid-template-columns:1fr;padding:7vh 4vw 4vh 4vw;overflow-y:auto}
  .gallery-detail .gd-figure{padding-right:0;padding-bottom:1.4rem}
  .gallery-detail .gd-figure img{max-height:55vh}
  .gallery-detail .gd-meta{border-left:none;border-top:1px solid var(--border);padding:1.4rem 0 0}
  .gallery-detail .gd-nav{top:auto;bottom:1.5rem;transform:none}
  .gallery-detail .gd-prev{left:1rem}
  .gallery-detail .gd-next{right:1rem}
}

/* — LIGHTBOX — */
.lightbox{
  position:fixed;inset:0;z-index:1000;
  background:rgba(11,12,15,.96);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;
  padding:3vh 3vw;

.lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:3px}
.lightbox .lb-caption{

  font-family:var(--sans);font-weight:300;font-size:.85rem;

}
.lightbox .lb-close{
  position:absolute;top:1.5rem;right:1.5rem;
  width:40px;height:40px;border-radius:50%;

  color:var(--accent);font-size:1.2rem;
}

/* — VIDEO BLOCK — editorial side-by-side layout */
.video-block .vb-layout{
  display:grid;grid-template-columns:1.1fr 1fr;gap:2rem;align-items:flex-start;
  margin-top:.6rem;
}
.video-block .vb-frame{
  position:relative;width:100%;aspect-ratio:16/9;
  background:var(--bg-elevated);
  border:1px solid var(--border);border-radius:4px;overflow:hidden;
