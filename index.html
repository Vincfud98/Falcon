      <div class="ufc-inner">
        <div class="ufc-face ufc-front">
          <div class="ufc-top-actions">
            <button class="ufc-icon-btn" data-ufc-edit="${Util.attr(fc.id)}" title="Editar"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg></button>
            <button class="ufc-icon-btn" data-ufc-delete="${Util.attr(fc.id)}" title="Excluir"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
          </div>
          <div class="ufc-term">${Util.esc(fc.body||'')}</div>
        </div>
        <div class="ufc-face ufc-back-face">
          <div class="ufc-def">${Util.esc(fc.quote||'')}</div>
          <div class="ufc-actions">
            <button class="ufc-btn ufc-btn-learn ${status==='learning'?'active':''}" data-ufc-status="learning">Revisar</button>
            <button class="ufc-btn ufc-btn-master ${status==='mastered'?'active':''}" data-ufc-status="mastered">Dominei</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>` : `<div class="empty"><div class="empty-title">Nenhum flashcard criado</div><div class="empty-body">Selecione um trecho de texto e escolha "Flashcard" no modal de notas para criar seus próprios cartões de revisão.</div></div>`;
  const fcFilterBar = `<div class="filter-bar">${fcModuleOpts}${fcUnitOpts}${fcStatusOpts}${fcTopicOpts}${fcTagOpts}<button class="fb-clear" id="fcClear">Limpar</button><span class="fb-count">${userFlashcards.length} flashcard${userFlashcards.length===1?'':'s'}</span></div>`;

  // Build highlights compilation with filters + links
  const allHighlights = Store.getHighlights();
  // Enrich with module/unit context
  const hlEnriched = allHighlights.map(h => {
    const enriched = Object.assign({}, h);
    for(const mod of window.COURSE.modules){
      for(const e of Util.unitsOfModule(mod)){
        if(e.unit.id === h.unitId){
          enriched._moduleId = mod.id;
          enriched._moduleLabel = mod.label + ' · ' + mod.title;
          enriched._unitLabel = `Unid. ${e.unit.number} · ${e.unit.title}`;
          enriched._chapterId = e.chapterId;
          // Build href to the block
          const chPart = e.chapterId ? `/c/${e.chapterId}` : '';
          // Find which group contains this block
          let groupId = '';
          for(const g of (e.unit.groups||[])){
            if((g.blocks||[]).some(b => b.id === h.blockId)){ groupId = g.id; break; }
          }
          enriched._href = `#/m/${mod.id}${chPart}/u/${e.unit.id}${groupId?'?g='+encodeURIComponent(groupId)+'&b='+encodeURIComponent(h.blockId):''}`;
          break;
        }
      }
    }
    return enriched;
  });
  // Apply highlight filters from query
  const hlFilterModule = (route.query && route.query.hlModule) || '';
  const hlFilterUnit = (route.query && route.query.hlUnit) || '';
  let hlFiltered = hlEnriched;
  if(hlFilterModule) hlFiltered = hlFiltered.filter(h => h._moduleId === hlFilterModule);
  if(hlFilterUnit) hlFiltered = hlFiltered.filter(h => h.unitId === hlFilterUnit);
  if(filters.q){
    const qLower = filters.q.toLowerCase();
    hlFiltered = hlFiltered.filter(h =>
      (h.text||'').toLowerCase().includes(qLower) ||
      (h.hint||'').toLowerCase().includes(qLower)
    );
  }

  // Build filter options for highlights
  const hlModuleIds = [...new Set(hlEnriched.map(h => h._moduleId).filter(Boolean))];
  const hlUnitIds = [...new Set(hlEnriched.map(h => h.unitId).filter(Boolean))];
  const hlModuleOpts = `<div class="fb-group"><span class="fb-label">Módulo</span>
    <select class="fb-select" data-hl-filter="hlModule">
      <option value="">Todos</option>
      ${hlModuleIds.map(mid => { const m = Util.findModule(mid); return m ? `<option value="${Util.attr(mid)}" ${hlFilterModule===mid?'selected':''}>${Util.esc(m.label+' · '+m.title)}</option>` : ''; }).join('')}
    </select></div>`;
  const hlUnitOpts = `<div class="fb-group"><span class="fb-label">Unidade</span>
    <select class="fb-select" data-hl-filter="hlUnit">
      <option value="">Todas</option>
      ${hlUnitIds.map(uid => { const found = hlEnriched.find(h => h.unitId === uid); return found ? `<option value="${Util.attr(uid)}" ${hlFilterUnit===uid?'selected':''}>${Util.esc(found._unitLabel||uid)}</option>` : ''; }).join('')}
    </select></div>`;

  const colorLabels = {red:'Vermelho',pink:'Rosa',orange:'Laranja',blue:'Azul',green:'Verde',yellow:'Amarelo',underline:'Sublinhado',veil:'Oculto'};
  // Group filtered highlights by unit
  const hlByUnit = {};
  hlFiltered.forEach(h => {
    const key = h.unitId || '__unknown';
    if(!hlByUnit[key]) hlByUnit[key] = { label: h._unitLabel || key, items:[] };
    hlByUnit[key].items.push(h);
  });
  const hlSections = Object.values(hlByUnit).map(group => {
    const items = group.items.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
    const itemsHtml = items.map(h => {
      const isVeil = h.color === 'veil';
      const isUnderline = h.color === 'underline';
      return `<div class="hl-comp-item" data-hl-id="${Util.attr(h.id)}">
        <span class="hl-comp-swatch" data-hl-color="${Util.attr(h.color)}" ${isVeil?'title="Texto oculto"':''} ${isUnderline?'style="border-bottom:2px solid var(--accent);background:transparent"':''}></span>
        <div class="hl-comp-text${isVeil?' hl-comp-veil':''}">${Util.esc(h.text)}</div>
        ${h.hint ? `<span class="hl-comp-hint">${Util.esc(h.hint)}</span>` : ''}
        <span class="hl-comp-type">${Util.esc(colorLabels[h.color]||h.color)}</span>
        ${h._href ? `<a class="hl-comp-link" href="${Util.attr(h._href)}" title="Ir para o bloco">→</a>` : ''}
        <button class="hl-comp-remove" data-hl-remove="${Util.attr(h.id)}" title="Remover destaque"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
      </div>`;
    }).join('');
    return `<div class="hl-comp-unit">
      <div class="hl-comp-unit-title">${Util.esc(group.label)}</div>
      ${itemsHtml}
    </div>`;
  }).join('');
  const hlContent = hlFiltered.length
    ? `<div class="hl-comp-grid">${hlSections}</div>`
    : `<div class="empty"><div class="empty-title">Nenhum destaque encontrado</div><div class="empty-body">Selecione trechos de texto nas leituras e use a barra de cores para destacar, sublinhar ou ocultar fragmentos.</div></div>`;

  return `<div class="hero">
    <span class="s-label" data-a="1">Notas e destaques</span>
    <h1 class="s-title hero" data-a="2">Minhas anotações</h1>
    <p class="s-subtitle" data-a="3">${total - userFlashcards.length} nota${(total-userFlashcards.length)===1?'':'s'} · ${userFlashcards.length} flashcard${userFlashcards.length===1?'':'s'} · ${allHighlights.length} destaque${allHighlights.length===1?'':'s'}</p>
    <div class="s-divider" data-a="4"></div>
    <p class="s-body" data-a="5">Suas anotações e trechos destacados do curso em um só lugar.</p>
  </div>
  <div class="notes-search-bar" data-a="6">
    <svg class="notes-search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="notes-search-input" type="search" placeholder="Buscar em notas, flashcards e destaques…" value="${Util.attr(filters.q)}" data-filter="q" aria-label="Buscar em notas, flashcards e destaques">
  </div>
  <div class="notes-tab-bar" data-a="7">
    <button class="ntb-btn active" data-view="notes">Notas</button>
    <span class="ntb-sep"></span>
    <button class="ntb-btn" data-view="flashcards">Flashcards</button>
    <span class="ntb-sep"></span>
    <button class="ntb-btn" data-view="highlights">Destaques</button>
  </div>
  <div class="notes-view-content" data-view="notes">
  <div class="filter-bar">
    ${moduleOpts}${unitOpts}${topicOpts}${tagOpts}
    <div class="fb-group"><span class="fb-label">Ordenar</span>
      <select class="fb-select" id="notesSortBy">
        <option value="date-desc" ${sortBy==='date-desc'?'selected':''}>Mais recentes</option>
        <option value="date-asc" ${sortBy==='date-asc'?'selected':''}>Mais antigas</option>
        <option value="topic" ${sortBy==='topic'?'selected':''}>Tópico (A–Z)</option>
        <option value="tag" ${sortBy==='tag'?'selected':''}>Tag (A–Z)</option>
        <option value="module" ${sortBy==='module'?'selected':''}>Módulo / unidade</option>
      </select>
    </div>
    <div class="fb-group"><span class="fb-label">Agrupar</span>
      <select class="fb-select" id="notesGroupBy">
        <option value="module">Por módulo / unidade</option>
        <option value="topic">Por tópico</option>
        <option value="tag">Por tag</option>
        <option value="date">Por data</option>
      </select>
    </div>
    <button class="fb-clear" id="fbClear">Limpar</button>
    <button class="fb-action-btn" id="notesCompileBtn" ${notes.length?'':'disabled'} title="Compilar as notas filtradas em um documento de estudo">${Icons.download} Compilar para estudo</button>
    <span class="fb-count">${notes.length} resultados</span>
  </div>
  ${notesHtml}
  </div>
  <div class="notes-view-content" data-view="flashcards" style="display:none">
    ${fcFilterBar}
    ${fcCards}
  </div>
  <div class="notes-view-content" data-view="highlights" style="display:none">
    <div class="filter-bar">
      ${hlModuleOpts}${hlUnitOpts}
      <button class="fb-clear" id="hlClear">Limpar</button>
      <button class="fb-action-btn" id="hlCompileBtn" ${hlFiltered.length?'':'disabled'} title="Compilar destaques para estudo">${Icons.download} Compilar destaques</button>
      <span class="fb-count">${hlFiltered.length} destaque${hlFiltered.length===1?'':'s'}</span>

};
Renderers.notes.mount = function(stageEl, route){
  // Toggle between notes/flashcards/highlights views
  stageEl.querySelectorAll('.ntb-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.getAttribute('data-view');
      stageEl.querySelectorAll('.ntb-btn').forEach(b => b.classList.toggle('active', b === btn));
      stageEl.querySelectorAll('.notes-view-content').forEach(s => {
        s.style.display = s.getAttribute('data-view') === view ? '' : 'none';
      });
    });
  });
  // User flashcard interactions
  stageEl.querySelectorAll('.ufc-card').forEach(card => {
    card.addEventListener('click', e => {
      if(e.target.closest('.ufc-btn')) return;
      card.classList.toggle('flipped');
    });
  });
  stageEl.querySelectorAll('[data-ufc-status]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const card = btn.closest('.ufc-card');
      const noteId = card.getAttribute('data-fc-note-id');
      const status = btn.getAttribute('data-ufc-status');
      Store.updateNote(noteId, { fcStatus: status });
      card.className = 'ufc-card flipped ' + status;
      card.querySelectorAll('.ufc-btn-learn,.ufc-btn-master').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  stageEl.querySelectorAll('[data-ufc-edit]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const noteId = btn.getAttribute('data-ufc-edit');
      const note = (Store.get().notes||[]).find(n => n.id === noteId);
      if(!note) return;
      const newFront = prompt('Frente do cartão (pergunta):', note.body||'');
      if(newFront === null) return;
      const newBack = prompt('Verso do cartão (resposta):', note.quote||'');
      if(newBack === null) return;
      Store.updateNote(noteId, { body:newFront, quote:newBack });
      const card = btn.closest('.ufc-card');
      card.querySelector('.ufc-term').textContent = newFront;
      card.querySelector('.ufc-def').textContent = newBack;
    });
  });
  stageEl.querySelectorAll('[data-ufc-delete]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if(!confirm('Excluir este flashcard?')) return;
      const noteId = btn.getAttribute('data-ufc-delete');
      Store.deleteNote(noteId);
      btn.closest('.ufc-card')?.remove();
    });
  });
  // Flashcard filters
  stageEl.querySelectorAll('[data-fc-filter]').forEach(el => {
    const key = el.getAttribute('data-fc-filter');
    el.addEventListener('change', () => {
      const q = Object.assign({}, route.query);
      q[key] = el.value; if(!q[key]) delete q[key];
      Router.go(`/notes${Router.querystring(q)}`);
    });
  });
  const fcClear = stageEl.querySelector('#fcClear');
  if(fcClear) fcClear.addEventListener('click', () => {
    const q = Object.assign({}, route.query);
    delete q.fcModule; delete q.fcUnit; delete q.fcStatus;
    Router.go(`/notes${Router.querystring(q)}`);
  });
  // Auto-switch to flashcards tab if fc filters active
  if(route.query && (route.query.fcModule || route.query.fcUnit || route.query.fcStatus)){
    stageEl.querySelectorAll('.ntb-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-view') === 'flashcards'));
    stageEl.querySelectorAll('.notes-view-content').forEach(s => { s.style.display = s.getAttribute('data-view') === 'flashcards' ? '' : 'none'; });
  }
  // Remove highlight
  stageEl.querySelectorAll('[data-hl-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const hlId = btn.getAttribute('data-hl-remove');
      Store.removeHighlight(hlId);
      btn.closest('.hl-comp-item')?.remove();
    });
  });
  // Highlight filters
  stageEl.querySelectorAll('[data-hl-filter]').forEach(el => {
    const key = el.getAttribute('data-hl-filter');
    el.addEventListener('change', () => {
      const q = Object.assign({}, route.query);
      q[key] = el.value; if(!q[key]) delete q[key];
      Router.go(`/notes${Router.querystring(q)}`);
    });
  });
  const hlClear = stageEl.querySelector('#hlClear');
  if(hlClear) hlClear.addEventListener('click', () => {
    const q = Object.assign({}, route.query);
    delete q.hlModule; delete q.hlUnit;
    Router.go(`/notes${Router.querystring(q)}`);
  });
  // Compile highlights
  const hlCompile = stageEl.querySelector('#hlCompileBtn');
  if(hlCompile) hlCompile.addEventListener('click', () => {
    const highlights = Store.getHighlights();
    if(!highlights.length){ alert('Nenhum destaque para compilar.'); return; }
    const colorLabels = {red:'Vermelho',pink:'Rosa',orange:'Laranja',blue:'Azul',green:'Verde',yellow:'Amarelo',underline:'Sublinhado',veil:'Oculto'};
    const course = window.COURSE;
    const now = new Date();
    const dateStr = now.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    let body = highlights.map(h => `<div style="margin-bottom:1rem;padding:.8rem;border-left:4px solid ${h.color==='veil'?'#333':h.color==='underline'?'#c8a97e':h.color};background:#f8f5ef"><p style="font-size:14px;line-height:1.6;color:#1a1712">${h.text.replace(/</g,'&lt;')}</p><small style="color:#8a7e68">${colorLabels[h.color]||h.color}</small></div>`).join('');
    const html = `<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Destaques — ${course.title}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Georgia,serif;max-width:760px;margin:0 auto;padding:2rem;color:#1a1712}h1{font-size:28px;margin-bottom:.5rem}p.sub{color:#8a7e68;margin-bottom:2rem;font-size:13px}</style></head><body><h1>Meus destaques</h1><p class="sub">${course.title} · Compilado em ${dateStr} · ${highlights.length} destaque${highlights.length===1?'':'s'}</p>${body}</body></html>`;
    const blob = new Blob([html],{type:'text/html;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `destaques-${new Date().toISOString().slice(0,10)}.html`;
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  });
  // Restore highlights tab if query has hl filters
  if(route.query && (route.query.hlModule || route.query.hlUnit)){
    stageEl.querySelectorAll('.ntb-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-view') === 'highlights'));
    stageEl.querySelectorAll('.notes-view-content').forEach(s => { s.style.display = s.getAttribute('data-view') === 'highlights' ? '' : 'none'; });
  }
  function applyFilter(key, val){
    const q = Object.assign({}, route.query); delete q.__item;
    q[key] = val;
    Object.keys(q).forEach(k => { if(!q[k]) delete q[k]; });
    Router.go(`/notes${Router.querystring(q)}`);
  }
  stageEl.querySelectorAll('[data-filter]').forEach(el => {
    const key = el.getAttribute('data-filter');
    if(el.tagName === 'SELECT'){
      el.addEventListener('change', () => applyFilter(key, el.value));
    } else {
      let t; el.addEventListener('input', () => {
        clearTimeout(t); t = setTimeout(() => applyFilter(key, el.value), 300);
      });
    }
  });
  stageEl.querySelector('#fbClear').addEventListener('click', () => Router.go('/notes'));
  // Sort dropdown
  const sortSel = stageEl.querySelector('#notesSortBy');
  if(sortSel){
    sortSel.addEventListener('change', () => {
      const q = Object.assign({}, route.query); delete q.__item;
      q.sort = sortSel.value;
      if(q.sort === 'date-desc') delete q.sort;
      Router.go(`/notes${Router.querystring(q)}`);
    });
  }
  // Delete
  stageEl.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('.note-card');
      const id = card?.getAttribute('data-note-id');
      if(id && confirm('Excluir esta nota?')){
        Store.deleteNote(id);
        App.render();
      }
    });
  });
  // Compile filtered notes into a downloadable study document
  const compileBtn = stageEl.querySelector('#notesCompileBtn');
  const groupSel = stageEl.querySelector('#notesGroupBy');
  if(compileBtn){
    compileBtn.addEventListener('click', () => {
      const filters = {
        moduleId: route.query.module || '',
        chapterId: route.query.chapter || '',
        unitId: route.query.unit || '',
        topic: route.query.topic || '',
        tag: route.query.tag || '',
        q: route.query.q || ''
      };
      // Reorder notes to match the card order currently rendered on the page
      // (which already respects the active sort).
      const orderIds = Array.from(stageEl.querySelectorAll('.note-card'))
        .map(el => el.getAttribute('data-note-id'));
      const byId = Object.fromEntries(Store.listNotes(filters).map(n => [n.id, n]));
      const notes = orderIds.map(id => byId[id]).filter(Boolean);
      if(!notes.length){ alert('Nenhuma nota para compilar. Ajuste os filtros.'); return; }
      const groupBy = (groupSel && groupSel.value) || 'module';
      NotesCompiler.download(notes, filters, groupBy);
    });
  }
};

/* ───────── Notes compiler ─────────
   Builds a standalone, editorial-looking HTML document from a list of filtered
   notes and triggers a browser download. The compiled document is meant for
   offline reading / printing so the student can review their annotations as a
   coherent study dossier. */
const NotesCompiler = (function(){
  function fmtDate(ts){
    try{ return new Date(ts).toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' }); }catch(e){ return ''; }
  }
  function fmtDateKey(ts){
    try{
      const d = new Date(ts);
      return d.toLocaleDateString('pt-BR', { month:'long', year:'numeric' });
    }catch(e){ return 'Sem data'; }
  }
  function esc(s){
    return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function groupNotes(notes, mode){
    const groups = new Map();
    const push = (key, label, order, n) => {
      if(!groups.has(key)) groups.set(key, { label, order, notes:[] });
      groups.get(key).notes.push(n);
    };
    notes.forEach(n => {
      if(mode === 'topic'){
        const ids = (n.topics||[]);
        if(!ids.length){ push('__none__', 'Sem tópico', 9999, n); return; }
        ids.forEach(id => {
          const t = Util.getTopic(id);
          const lbl = t ? `${t.number} · ${t.name}` : id;
          const ord = t ? parseFloat(String(t.number).replace(/[^\d.]/g,'')) || 0 : 0;
          push(id, lbl, ord, n);
        });
      } else if(mode === 'tag'){
        const ids = (n.tags||[]);
        if(!ids.length){ push('__none__', 'Sem tag', 9999, n); return; }
        ids.forEach(id => {
          const t = Util.getTag(id);
          push(id, t ? t.name : id, 0, n);
        });
      } else if(mode === 'date'){
        const key = fmtDateKey(n.updatedAt || n.createdAt);
        const ord = new Date(n.updatedAt || n.createdAt || 0).getTime();
        push(key, key, -ord, n);
      } else { // module
        const m = Util.findModule(n.moduleId);
        const modLabel = m ? `${m.label} · ${m.title}` : 'Outros';
        const key = `${n.moduleId||'none'}::${n.unitId||'none'}`;
        const unitBit = n.unitTitle ? ` — Unidade ${esc(n.unitNumber||'')} · ${esc(n.unitTitle)}` : '';
        push(key, `${esc(modLabel)}${unitBit}`, 0, n);
      }
    });
    // order groups
    const arr = Array.from(groups.values());
    arr.sort((a,b) => (a.order||0) - (b.order||0) || a.label.localeCompare(b.label));
    // sort notes inside each group by date asc
    arr.forEach(g => g.notes.sort((a,b) => new Date(a.updatedAt||a.createdAt||0) - new Date(b.updatedAt||b.createdAt||0)));
    return arr;
  }

  function filtersSummary(filters){
    const bits = [];
    if(filters.moduleId){
      const m = Util.findModule(filters.moduleId);
      if(m) bits.push(`Módulo: ${m.label} · ${m.title}`);
    }
    if(filters.unitId){
      for(const m of window.COURSE.modules){
        for(const e of Util.unitsOfModule(m)){
          if(e.unit.id === filters.unitId){ bits.push(`Unidade: ${e.unit.number} · ${e.unit.title}`); break; }
        }
      }
    }
    if(filters.topic){ const t = Util.getTopic(filters.topic); if(t) bits.push(`Tópico: ${t.number} · ${t.name}`); }
    if(filters.tag){ const t = Util.getTag(filters.tag); if(t) bits.push(`Tag: ${t.name}`); }

  function buildHTML(notes, filters, groupBy){

        const tagsHtml = (n.tags||[]).map(id => { const t = Util.getTag(id); return t ? `<span class="chip chip-tag">${esc(t.name)}</span>` : ''; }).join('');
        const chips = (topicsHtml||tagsHtml) ? `<div class="chips">${topicsHtml}${tagsHtml}</div>` : '';

          <div class="note-main">
            ${n.quote ? `<blockquote class="note-quote">${esc(n.quote)}</blockquote>` : ''}
            ${n.body ? `<div class="note-body">${esc(n.body).replace(/\n/g,'<br>')}</div>` : ''}

      return `<section class="group">

    return `<!doctype html>

</div>
</body>
</html>`;
  }

  function download(notes, filters, groupBy){
    const html = buildHTML(notes, filters, groupBy);
    const blob = new Blob([html], { type:'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const datePart = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `dossie-notas-${datePart}.html`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
  }

  return { download, buildHTML };
})();

Renderers.search = function(route){
  const q = (route.query && route.query.q ? String(route.query.q) : '').trim();
  const suggestions = ['volta do mar', 'capitanias hereditárias', 'ciclo do ouro', 'D. João III', 'Tupinambá'];
  const header = `<div class="hero">
    <span class="s-label" data-a="1">Buscar no curso</span>
    <h1 class="s-title hero" data-a="2">${q ? 'Resultados para "'+Util.esc(q)+'"' : 'O que você quer encontrar?'}</h1>
    <div class="s-divider" data-a="3"></div>
    <input class="search-input-xl" id="searchInput" type="search" placeholder="Procure por termos, personagens, conceitos, suas notas…" value="${Util.attr(q)}" data-a="4">
  </div>`;

  if(!q){
    const chips = suggestions.map(s => `<a class="search-suggestion" href="#/search?q=${encodeURIComponent(s)}">${Util.esc(s)}</a>`).join('');
    return `<div class="search-page">${header}
      <div class="search-group" data-a="5">
        <div class="search-group-head">Sugestões</div>
        <div class="search-suggestions">${chips}</div>
      </div>
    </div>`;
  }

  const needle = q.toLowerCase();
  const stripHtml = (s) => String(s||'').replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();
  const excerpt = (text, term) => {
    if(!text) return '';
    const lower = text.toLowerCase();
    const i = lower.indexOf(term.toLowerCase());
    if(i < 0) return Util.esc(text.slice(0, 160)) + (text.length > 160 ? '…' : '');
    const start = Math.max(0, i - 60);
    const end = Math.min(text.length, i + term.length + 80);
    const pre = start > 0 ? '…' : '';
    const post = end < text.length ? '…' : '';
    const before = Util.esc(text.slice(start, i));
    const hit = Util.esc(text.slice(i, i + term.length));
    const after = Util.esc(text.slice(i + term.length, end));
    return pre + before + '<mark>' + hit + '</mark>' + after + post;
  };
  const match = (s) => s && String(s).toLowerCase().includes(needle);
  const MAX_PER_GROUP = 50;

  const paraHits = [];
  const blockHits = [];
  for(const m of (window.COURSE.modules||[])){
    for(const entry of Util.unitsOfModule(m)){
      const unit = entry.unit, chapter = entry.chapter;
      for(const g of (unit.groups||[])){
        for(const b of (g.blocks||[])){
          const chapterPart = chapter ? `/c/${chapter.id}` : '';
          const hrefBase = `#/m/${m.id}${chapterPart}/u/${unit.id}`;
          const crumb = `${m.label||''} · ${m.title}${chapter?` › Cap. ${chapter.number}`:''} › Unid. ${unit.number} · ${unit.title}`;
          if((b.type === 'text' || b.type === 'textgallery') && Array.isArray(b.paragraphs)){
            for(const p of b.paragraphs){
              const plain = stripHtml(p.content);
              if(match(p.title) || match(p.description) || match(plain)){
                if(paraHits.length < MAX_PER_GROUP){
                  const src = match(plain) ? plain : (match(p.description) ? p.description : p.title || '');
                  paraHits.push({
                    href: `${hrefBase}?g=${g.id}&b=${b.id}#p-${p.id}`,
                    crumb, title: p.title || '(parágrafo)',
                    excerpt: excerpt(src, needle)
                  });
                }
              }
            }
          } else {
            // Learning blocks: index title + description + type-specific bits
            const pieces = [b.title, b.description, b.subtitle];
            if(b.items){ for(const it of b.items){ pieces.push(it.assertion, it.question, it.statement, it.prompt, it.front, it.back); } }
            if(b.cards){ for(const c of b.cards){ pieces.push(c.front, c.back, c.term, c.definition); } }
            if(b.bios){ for(const bio of b.bios){ pieces.push(bio.name, bio.summary, bio.period); } }
            if(b.quotes){ for(const qu of b.quotes){ pieces.push(qu.text, qu.author, qu.context); } }
            if(b.events){ for(const ev of b.events){ pieces.push(ev.title, ev.year, ev.text); } }
            if(b.tables){ for(const t of b.tables){ pieces.push(t.title, t.caption); } }
            if(b.terms){ for(const t of b.terms){ pieces.push(t.term, t.definition); } }
            const hay = pieces.filter(Boolean).join(' \u2022 ');
            if(hay && hay.toLowerCase().includes(needle)){
              if(blockHits.length < MAX_PER_GROUP){
                const typeLabel = ({text:'Leitura',textgallery:'Leitura + galeria',gallery:'Galeria',video:'Vídeo',quiz:'Questões',essay:'Discursivas',flashcards:'Flashcards',sources:'Fontes',keypoints:'Pontos-chave',bio:'Biografia',quote:'Citação',table:'Tabela',timeline:'Linha do tempo',glossary:'Glossário',compound:'Composto',comments:'Discussão'})[b.type] || b.type;
                blockHits.push({
                  href: `${hrefBase}?g=${g.id}&b=${b.id}`,
                  crumb: `${crumb} · ${typeLabel}`,
                  title: b.title || typeLabel,
                  excerpt: excerpt(hay, needle)
                });
              }
            }
          }
        }
      }
    }
  }

  const noteHits = Store.listNotes({ q }).slice(0, MAX_PER_GROUP).map(n => {
    const found = (n.moduleId && n.unitId) ? Util.findUnit(n.moduleId, n.unitId) : null;
    const crumb = found
      ? `${found.module.label||''} · ${found.module.title}${found.chapter?` › Cap. ${found.chapter.number}`:''} › Unid. ${found.unit.number} · ${found.unit.title}`
      : 'Minhas notas';
    const href = found
      ? `#/m/${found.module.id}${found.chapter?`/c/${found.chapter.id}`:''}/u/${found.unit.id}${n.blockId?`?b=${n.blockId}`:''}`
      : '#/notes';
    return { href, crumb, title: n.title || '(nota)', excerpt: excerpt(n.body || '', needle) };
  });

  const renderGroup = (label, hits) => hits.length ? `<div class="search-group">
    <div class="search-group-head">${Util.esc(label)} <span class="search-group-count">${hits.length}${hits.length === MAX_PER_GROUP ? '+' : ''}</span></div>
    ${hits.map(h => `<a class="search-hit" href="${h.href}">
      <div class="search-hit-crumb">${Util.esc(h.crumb)}</div>
      <div class="search-hit-title">${Util.esc(h.title)}</div>
      <div class="search-hit-excerpt">${h.excerpt}</div>
    </a>`).join('')}
  </div>` : '';

  const total = paraHits.length + blockHits.length + noteHits.length;
  const body = total === 0
    ? `<div class="search-empty">Nada encontrado. Tente outro termo ou verifique a grafia.</div>`
    : `${renderGroup('Parágrafos', paraHits)}${renderGroup('Blocos de aprendizado', blockHits)}${renderGroup('Minhas notas', noteHits)}`;

  return `<div class="search-page">${header}
    <p class="search-summary">${total} resultado${total===1?'':'s'} · "${Util.esc(q)}"</p>
    ${body}
  </div>`;
};
Renderers.search.mount = function(stageEl, route){
  const input = stageEl.querySelector('#searchInput');
  if(!input) return;
  // autofocus + caret at end
  setTimeout(() => { try { input.focus(); input.setSelectionRange(input.value.length, input.value.length); } catch(e){} }, 0);
  let t = null;
  input.addEventListener('input', () => {
    clearTimeout(t);
    const v = input.value.trim();
    t = setTimeout(() => {
      const hash = v ? '#/search?q=' + encodeURIComponent(v) : '#/search';
      if(location.hash !== hash) location.hash = hash;
    }, 200);
  });
  input.addEventListener('keydown', (e) => {
    if(e.key === 'Enter'){
      e.preventDefault();
      const first = stageEl.querySelector('.search-hit');
      if(first) first.click();
    }
  });
};

function renderPerfBreakdown(rows, parentKind){
  // parentKind === 'unit' → breakdown rows are topics → header "Tópicos", no kind prefix

  const kindLabel = (level) => {
    if(level === 'module') return 'Módulo';
    if(level === 'chapter') return 'Capítulo';
    if(level === 'unit') return 'Unidade';
    return ''; // topic / other → no prefix

    <colgroup>

      const compl = r.completion.denom ? r.completion.num/r.completion.denom : null;
      const pctTxt = pct==null?'—':Math.round(pct*100)+'%';
      const essayTxt = r.essay.maxTotal?`${r.essay.scoreTotal} / ${r.essay.maxTotal}`:'—';
      const complTxt = compl==null?'—':Math.round(compl*100)+'%';
      const fc = r.flashcards || { mastered:0, learning:0, unseen:0, total:0 };
      const fcTxt = fc.total
        ? `<span class="perf-fc-mastered" title="Dominados">${fc.mastered}</span><span class="perf-fc-sep">·</span><span class="perf-fc-learning" title="Em revisão">${fc.learning||0}</span><span class="perf-fc-sep">·</span><span class="perf-fc-unseen" title="Não vistos">${fc.unseen||0}</span>`
        : '<span class="perf-dim">—</span>';
      const kl = kindLabel(r.level);
      return `<tr class="perf-bd-row perf-bd-${r.level}">
        <td class="perf-bd-ctx">
          <span class="perf-bd-indent perf-bd-indent-${r.level}"></span>
          ${kl ? `<span class="perf-bd-kind">${kl}</span>` : ''}
          <span class="perf-bd-name">${Util.esc(r.label)}</span>
        </td>
        <td class="perf-c-correct">${r.quiz.correct||0}</td>

        <td class="perf-dim">${r.quiz.pending||0}</td>
        <td class="perf-dim">${r.quiz.total}</td>
        <td>${pctTxt}</td>

function buildPerformanceReport(){
  // Walk course → aggregate stats per topic id and per tag id, also per module/chapter/unit.
  // For each quiz item count against its topics/tags. For essays, add its scored score/max.
  // For completion we use a weighted combo: blocks completed (bookmarks), flashcards mastered, units completed.
  const course = window.COURSE;
  const state = Store.get();

  // Base accumulators
  function emptyAgg(){
    return {
      quiz:{ answered:0, total:0, correct:0, correctDoubt:0, wrong:0, wrongDoubt:0, pending:0 },
      essay:{ scoreTotal:0, maxTotal:0, submitted:0 },
      completion:{ num:0, denom:0 },
      flashcards:{ mastered:0, learning:0, unseen:0, total:0 }
    };
  }

  // Topic/tag aggregators keyed by id
  const topicAgg = {};
  const tagAgg = {};
  // Per-unit aggregators for breakdown
  const perUnit = {}; // unitId → { agg, moduleId, chapterId, unitNumber, unitTitle }
  const summary = Object.assign(emptyAgg(), { blocks:{ total:0, done:0 }, units:{ total:0, done:0 } });

  function bump(map, ids, mutator){
    (ids||[]).forEach(id => {
      if(!map[id]) map[id] = emptyAgg();
      mutator(map[id]);
    });
  }

  course.modules.forEach(m => {
    (Util.unitsOfModule(m)||[]).forEach(entry => {
      const unit = entry.unit;
      const chapter = entry.chapter;
      const perU = perUnit[unit.id] = { agg:emptyAgg(), moduleId:m.id, chapterId:chapter?chapter.id:null, unitId:unit.id, unitNumber:unit.number, unitTitle:unit.title, moduleLabel:m.label, moduleTitle:m.title, chapterNumber:chapter?chapter.number:null, chapterTitle:chapter?chapter.title:null };
      summary.units.total++;
      const unitCompleted = !!((state.unitViews||{})[unit.id] || {}).completed;
      if(unitCompleted) summary.units.done++;

      (unit.groups||[]).forEach(g => (g.blocks||[]).forEach(b => {
        summary.blocks.total++;
        const done = !!((state.bookmarks||{})[unit.id]||{})[b.id];
        if(done) summary.blocks.done++;

        // Completion counts toward every topic/tag the block carries
        const blockTopics = b.topics || [];
        const blockTags = b.tags || [];
        // also unit topics flow down for aggregation fairness
        const inheritTopics = Array.from(new Set([...(unit.topics||[]), ...blockTopics]));
        const inheritTags = Array.from(new Set([...(unit.tags||[]), ...blockTags]));

        inheritTopics.forEach(id => { topicAgg[id] = topicAgg[id] || emptyAgg(); topicAgg[id].completion.denom++; if(done) topicAgg[id].completion.num++; });
        inheritTags.forEach(id => { tagAgg[id] = tagAgg[id] || emptyAgg(); tagAgg[id].completion.denom++; if(done) tagAgg[id].completion.num++; });
        perU.agg.completion.denom++; if(done) perU.agg.completion.num++;
        summary.completion.denom++; if(done) summary.completion.num++;

        if(b.type === 'quiz'){
          (b.groups||[]).forEach(qg => {
            (qg.items||[]).forEach(it => {
              const itTopics = Array.from(new Set([...(it.topics||[]), ...inheritTopics]));
              const itTags = Array.from(new Set([...(it.tags||[]), ...inheritTags]));
              const prior = (((state.quizAnswers||{})[unit.id]||{})[b.id]||{})[it.id];
              const answered = !!prior && prior.selected != null;
              const correct = answered && prior.correct;
              const doubt = prior && !!prior.doubt;
              const qBump = a => {
                a.quiz.total++;
                if(!answered){ a.quiz.pending++; }
                else if(correct && doubt){ a.quiz.answered++; a.quiz.correct++; a.quiz.correctDoubt++; }
                else if(correct){ a.quiz.answered++; a.quiz.correct++; }
                else if(doubt){ a.quiz.answered++; a.quiz.wrong++; a.quiz.wrongDoubt++; }
                else { a.quiz.answered++; a.quiz.wrong++; }
              };
              bump(topicAgg, itTopics, qBump);
              bump(tagAgg, itTags, qBump);
              qBump(perU.agg); qBump(summary);
            });
          });
        } else if(b.type === 'essay'){
          (b.items||[]).forEach(it => {
            const maxTotal = (it.criteria||[]).reduce((s,c)=>s+(c.maxScore||0),0);
            const itTopics = Array.from(new Set([...(it.topics||[]), ...inheritTopics]));
            const itTags = Array.from(new Set([...(it.tags||[]), ...inheritTags]));
            const prior = (((state.essays||{})[unit.id]||{})[b.id]||{})[it.id];
            const submitted = !!prior;
            const score = submitted ? (prior.score||0) : 0;
            bump(topicAgg, itTopics, a => { a.essay.maxTotal += maxTotal; if(submitted){ a.essay.scoreTotal += score; a.essay.submitted++; } });
            bump(tagAgg, itTags, a => { a.essay.maxTotal += maxTotal; if(submitted){ a.essay.scoreTotal += score; a.essay.submitted++; } });
            perU.agg.essay.maxTotal += maxTotal;
            if(submitted){ perU.agg.essay.scoreTotal += score; perU.agg.essay.submitted++; }
            summary.essay.maxTotal += maxTotal;
            if(submitted){ summary.essay.scoreTotal += score; summary.essay.submitted++; }
          });
        } else if(b.type === 'flashcards'){
          (b.concepts||[]).forEach(c => {
            const cTopics = Array.from(new Set([...(c.topics||[]), ...inheritTopics]));
            const cTags = Array.from(new Set([...(c.tags||[]), ...inheritTags]));
            const st = (((state.flashcards||{})[unit.id]||{})[b.id]||{})[c.id];
            const mastered = st && st.status === 'mastered';
            const learning = st && !mastered;
            const fcBump = a => { a.flashcards.total++; if(mastered){ a.flashcards.mastered++; } else if(learning){ a.flashcards.learning++; } else { a.flashcards.unseen++; } a.completion.denom++; if(mastered) a.completion.num++; };
            bump(topicAgg, cTopics, fcBump);
            bump(tagAgg, cTags, fcBump);
            fcBump(perU.agg); fcBump(summary);
            summary.completion.denom++; if(mastered) summary.completion.num++;
          });
        }
      }));
    });
  });

  // Build topic rows with breakdown by module/chapter/unit (roll up perUnit)
  const topics = Object.keys(topicAgg).map(id => {
    const t = window.TOPIC_REGISTRY[id];
    if(!t) return null;
    const agg = topicAgg[id];
    const breakdown = buildContextBreakdown(t, 'topic', perUnit);
    return Object.assign({ id, number:t.number, name:t.name, breakdown }, agg);
  }).filter(Boolean);
  topics.sort((a,b) => String(a.number||'').localeCompare(String(b.number||''), undefined, { numeric:true }));

  const tags = Object.keys(tagAgg).map(id => {
    const t = window.TAG_REGISTRY[id];
    if(!t) return null;
    const agg = tagAgg[id];
    const breakdown = buildContextBreakdown(t, 'tag', perUnit);
    return Object.assign({ id, name:t.name, breakdown }, agg);
  }).filter(Boolean);
  tags.sort((a,b) => a.name.localeCompare(b.name));

  // Build unit rows with topic breakdown for "by unit" view
  const unitRows = Object.values(perUnit).map(pu => {
    // Per-unit topic breakdown
    const unitTopicAgg = {};
    const u = Util.findUnit(pu.moduleId, pu.unitId);
    if(u){
      const uBlocks = (u.unit.groups||[]).flatMap(g=>g.blocks||[]);
      uBlocks.forEach(b => {
        const bTopics = b.topics||[];
        if(b.type==='quiz'){
          ((b.groups||[{items:b.items||[]}])).forEach(g=>(g.items||[]).forEach(it=>{
            const itT = Array.from(new Set([...(it.topics||[]),...bTopics]));
            itT.forEach(tid=>{ unitTopicAgg[tid]=unitTopicAgg[tid]||{quiz:{answered:0,total:0,correct:0},essay:{scoreTotal:0,maxTotal:0,submitted:0},completion:{num:0,denom:0},flashcards:{mastered:0,learning:0,unseen:0,total:0}}; unitTopicAgg[tid].quiz.total++; const p=(((state.quizAnswers||{})[pu.unitId]||{})[b.id]||{})[it.id]; if(p){unitTopicAgg[tid].quiz.answered++;if(p.correct)unitTopicAgg[tid].quiz.correct++;} });
          }));
        } else if(b.type==='flashcards'){
          (b.concepts||[]).forEach(c=>{
            const cT=Array.from(new Set([...(c.topics||[]),...bTopics]));
            cT.forEach(tid=>{ unitTopicAgg[tid]=unitTopicAgg[tid]||{quiz:{answered:0,total:0,correct:0},essay:{scoreTotal:0,maxTotal:0,submitted:0},completion:{num:0,denom:0},flashcards:{mastered:0,learning:0,unseen:0,total:0}}; unitTopicAgg[tid].flashcards.total++; const s=(((state.flashcards||{})[pu.unitId]||{})[b.id]||{})[c.id]; if(s&&s.status==='mastered')unitTopicAgg[tid].flashcards.mastered++; else if(s)unitTopicAgg[tid].flashcards.learning++; else unitTopicAgg[tid].flashcards.unseen++; });
          });
        }
      });
    }
    const breakdown = Object.keys(unitTopicAgg).map(tid=>{
      const t=window.TOPIC_REGISTRY[tid]; if(!t)return null;
      return Object.assign({level:'topic',label:(t.number||'')+' '+t.name,id:tid},unitTopicAgg[tid]);
    }).filter(Boolean).sort((a,b)=>String(a.label).localeCompare(String(b.label),undefined,{numeric:true}));

    return Object.assign({
      id:pu.unitId,
      name:`Unid. ${pu.unitNumber} · ${pu.unitTitle}`,
      context:`${pu.moduleLabel}`,
      breakdown
    }, pu.agg);
  }).filter(u => u.flashcards.total||u.quiz.total||u.essay.maxTotal||u.completion.denom);

  return { topics, tags, summary, unitRows };
}

/* Given a topic/tag and perUnit map, return an ordered breakdown per module → chapter → unit that contain this filter. */
function buildContextBreakdown(filterDef, kind, perUnit){
  const state = Store.get();
  const filterId = filterDef.id;
  // Expand topic with descendants
  const filterSet = new Set([filterId]);
  if(kind === 'topic'){
    Object.values(window.TOPIC_REGISTRY).forEach(t => {
      let cur = t;
      while(cur && cur.parentId){
        if(cur.parentId === filterId || filterSet.has(cur.parentId)){ filterSet.add(t.id); break; }
        cur = window.TOPIC_REGISTRY[cur.parentId];
      }
    });
  }

  // For every unit, compute per-unit agg scoped to this filter
  const rows = [];
  const moduleBuckets = {}; // moduleId → { label, agg, chapters:{chapterId:{label, agg, units:[]}} or units:[] }

  window.COURSE.modules.forEach(m => {
    Util.unitsOfModule(m).forEach(entry => {
      const unit = entry.unit;
      const chapter = entry.chapter;
      // Build scoped agg for this unit × filter
      const agg = { quiz:{ answered:0, total:0, correct:0 }, essay:{ scoreTotal:0, maxTotal:0 }, completion:{ num:0, denom:0 }, flashcards:{ mastered:0, total:0 } };
      let touched = false;
      (unit.groups||[]).forEach(g => (g.blocks||[]).forEach(b => {
        const blockTopics = Array.from(new Set([...(unit.topics||[]), ...(b.topics||[])]));
        const blockTags = Array.from(new Set([...(unit.tags||[]), ...(b.tags||[])]));
        const carrierBlock = kind==='topic' ? blockTopics.some(id => filterSet.has(id)) : blockTags.includes(filterId);
        if(carrierBlock){
          agg.completion.denom++;
          if(((state.bookmarks||{})[unit.id]||{})[b.id]) agg.completion.num++;
          touched = true;
        }
        if(b.type === 'quiz'){
          (b.groups||[]).forEach(qg => (qg.items||[]).forEach(it => {
            const itTopics = Array.from(new Set([...(it.topics||[]), ...blockTopics]));
            const itTags = Array.from(new Set([...(it.tags||[]), ...blockTags]));
            const match = kind==='topic' ? itTopics.some(id => filterSet.has(id)) : itTags.includes(filterId);
            if(!match) return;
            touched = true;
            agg.quiz.total++;
            const prior = (((state.quizAnswers||{})[unit.id]||{})[b.id]||{})[it.id];
            if(prior){ agg.quiz.answered++; if(prior.correct) agg.quiz.correct++; }
          }));
        } else if(b.type === 'essay'){
          (b.items||[]).forEach(it => {
            const itTopics = Array.from(new Set([...(it.topics||[]), ...blockTopics]));
            const itTags = Array.from(new Set([...(it.tags||[]), ...blockTags]));
            const match = kind==='topic' ? itTopics.some(id => filterSet.has(id)) : itTags.includes(filterId);
            if(!match) return;
            touched = true;
            agg.essay.maxTotal += (it.criteria||[]).reduce((s,c)=>s+(c.maxScore||0),0);
            const prior = (((state.essays||{})[unit.id]||{})[b.id]||{})[it.id];
            if(prior){ agg.essay.scoreTotal += (prior.score||0); }
          });
        } else if(b.type === 'flashcards'){
          (b.concepts||[]).forEach(c => {
            const cTopics = Array.from(new Set([...(c.topics||[]), ...blockTopics]));
            const cTags = Array.from(new Set([...(c.tags||[]), ...blockTags]));
            const match = kind==='topic' ? cTopics.some(id => filterSet.has(id)) : cTags.includes(filterId);
            if(!match) return;
            touched = true;
            agg.completion.denom++;
            agg.flashcards.total++;
            const st = (((state.flashcards||{})[unit.id]||{})[b.id]||{})[c.id];
            if(st && st.status==='mastered'){ agg.completion.num++; agg.flashcards.mastered++; }
            else if(st){ agg.flashcards.learning++; }
            else { agg.flashcards.unseen++; }
          });
        }
      }));
      if(!touched) return;
      // Accumulate up to module/chapter
      const modBucket = moduleBuckets[m.id] || (moduleBuckets[m.id] = {
        label:`${m.label} · ${m.title}`, agg:{ quiz:{answered:0,total:0,correct:0}, essay:{scoreTotal:0,maxTotal:0}, completion:{num:0,denom:0}, flashcards:{mastered:0,total:0} },
        chapterIds:{}
      });
      mergeAgg(modBucket.agg, agg);
      const chKey = chapter ? chapter.id : '__nochapter';
      const chBucket = modBucket.chapterIds[chKey] || (modBucket.chapterIds[chKey] = {
        label: chapter ? `Cap. ${chapter.number} · ${chapter.title}` : null,
        agg:{ quiz:{answered:0,total:0,correct:0}, essay:{scoreTotal:0,maxTotal:0}, completion:{num:0,denom:0}, flashcards:{mastered:0,total:0} },
        units:[]
      });
      mergeAgg(chBucket.agg, agg);
      chBucket.units.push({ label:`Unid. ${unit.number} · ${unit.title}`, agg });
    });
  });

  Object.values(moduleBuckets).forEach(mod => {
    rows.push({ level:'module', label:mod.label, quiz:mod.agg.quiz, essay:mod.agg.essay, completion:mod.agg.completion, flashcards:mod.agg.flashcards });
    Object.values(mod.chapterIds).forEach(ch => {
      if(ch.label){
        rows.push({ level:'chapter', label:ch.label, quiz:ch.agg.quiz, essay:ch.agg.essay, completion:ch.agg.completion, flashcards:ch.agg.flashcards });
      }
      ch.units.forEach(u => {
        rows.push({ level:'unit', label:u.label, quiz:u.agg.quiz, essay:u.agg.essay, completion:u.agg.completion, flashcards:u.agg.flashcards });
      });
    });
  });
  return rows;
}
function mergeAgg(target, src){
  target.quiz.answered += src.quiz.answered;
  target.quiz.total += src.quiz.total;
  target.quiz.correct += src.quiz.correct;
  target.essay.scoreTotal += src.essay.scoreTotal;
  target.essay.maxTotal += src.essay.maxTotal;
  target.completion.num += src.completion.num;
  target.completion.denom += src.completion.denom;
  if(src.flashcards){
    target.flashcards = target.flashcards || { mastered:0, total:0 };
    target.flashcards.mastered += src.flashcards.mastered;
    target.flashcards.total += src.flashcards.total;
  }
}

Renderers.portalDetail.mount = function(stageEl, route){
  function applyFilter(key, val){
    const q = Object.assign({}, route.query); delete q.__item;
    q[key] = val;
    // drop empties
    Object.keys(q).forEach(k => { if(!q[k]) delete q[k]; });
    Router.go(`/m/${route.params.moduleId}/portal/${route.params.cardKey}${Router.querystring(q)}`);
  }
  stageEl.querySelectorAll('[data-filter]').forEach(el => {
    const key = el.getAttribute('data-filter');
    if(el.tagName === 'SELECT'){
      el.addEventListener('change', () => applyFilter(key, el.value));
    } else {
      let t; el.addEventListener('input', () => {
        clearTimeout(t); t = setTimeout(() => applyFilter(key, el.value), 300);
      });
    }
  });
  stageEl.querySelector('#fbClear').addEventListener('click', () => {
    Router.go(`/m/${route.params.moduleId}/portal/${route.params.cardKey}`);
  });

  // Mount interactivity per card type
  const cardKey = route.params.cardKey;
  const filters = {
    chapter: route.query.chapter||'', unit: route.query.unit||'',
    topic: route.query.topic||'', tag: route.query.tag||'',
    difficulty: route.query.difficulty||'', q: route.query.q||''
  };
  const items = Portal.aggregate(route.params.moduleId, cardKey, filters);

  if(cardKey === 'questions') bindQuizItems(stageEl, items);
  if(cardKey === 'essays') bindEssayItems(stageEl, items);
  if(cardKey === 'flashcards') bindFlashcardItems(stageEl, items);

  if(cardKey === 'bios'){
    stageEl.querySelectorAll('.bio-tile').forEach(tile => {
      tile.addEventListener('click', () => {
        const idx = parseInt(tile.getAttribute('data-bio-idx'),10);
        FSModal.open(items, idx, (it) => renderBioModalBody(it, route.params.moduleId));
      });
    });
  }
  if(cardKey === 'quotes'){
    stageEl.querySelectorAll('.quote-tile').forEach(tile => {
      tile.addEventListener('click', () => {
        const idx = parseInt(tile.getAttribute('data-quote-idx'),10);
        FSModal.open(items, idx, (it) => renderQuoteModalBody(it, route.params.moduleId));
      });
    });
  }
  if(cardKey === 'glossary'){
    const sideItems = stageEl.querySelectorAll('.gloss-side-item');
    const panels = stageEl.querySelectorAll('[data-gloss-panel]');
    sideItems.forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = btn.getAttribute('data-gloss-idx');
        sideItems.forEach(b => b.classList.toggle('active', b===btn));
        panels.forEach(p => p.style.display = p.getAttribute('data-gloss-panel')===idx?'block':'none');
      });
    });
  }
  if(cardKey === 'timelines'){
    stageEl.querySelectorAll('.tl-fid-item').forEach(it => {
      it.addEventListener('click', () => it.classList.toggle('active'));
    });
  }
  if(cardKey === 'flashcards'){
    const statusFilter = route.query.status || '';
    function applyStatusFilter(){
      let visible = 0;
      stageEl.querySelectorAll('.fc-card').forEach(card => {
        const st = card.classList.contains('mastered') ? 'mastered'
                 : card.classList.contains('learning') ? 'learning' : 'new';
        const hide = statusFilter && statusFilter !== st;
        card.classList.toggle('hidden-by-filter', hide);
        if(!hide) visible++;
      });
      const counter = stageEl.querySelector('#fbCount');
      if(counter) counter.textContent = visible + ' resultados';
    }
    // bindFlashcardItems has already applied state classes by the time we get here
    applyStatusFilter();

    const shuffleBtn = stageEl.querySelector('#fbShuffle');
    let shuffled = false;
    if(shuffleBtn){
      shuffleBtn.addEventListener('click', () => {
        const grid = stageEl.querySelector('#fcGrid');
        if(!grid) return;
        const cards = Array.from(grid.querySelectorAll('.fc-card'));
        if(!shuffled){
          for(let i = cards.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i+1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
          }
          shuffleBtn.classList.add('active');
        } else {
          cards.sort((a,b) => parseInt(a.getAttribute('data-default-order'),10) - parseInt(b.getAttribute('data-default-order'),10));
          shuffleBtn.classList.remove('active');
        }
        shuffled = !shuffled;
        cards.forEach(c => grid.appendChild(c));
      });
    }
  }

  // scroll-to-item from deep link
  if(route.query.__item){
    const el = stageEl.querySelector('#item-'+CSS.escape(route.query.__item));
    if(el){ el.scrollIntoView({behavior:'smooth', block:'center'}); el.style.outline='2px solid var(--accent)'; setTimeout(()=>el.style.outline='',2000); }
  }
};

Renderers.admin.mount = function(stageEl){
  const links = Array.from(stageEl.querySelectorAll('.admin-side-link'));
  const sections = Array.from(stageEl.querySelectorAll('[data-admin-section]'));
  if(!links.length || !sections.length) return;

  const setActive = id => {
    links.forEach(link => link.classList.toggle('active', link.getAttribute('data-target') === id));
  };

  links.forEach(link => {
    link.addEventListener('click', () => {
      const id = link.getAttribute('data-target');
      const section = stageEl.querySelector('#' + CSS.escape(id));
      if(section) section.scrollIntoView({ behavior:'smooth', block:'start' });
      setActive(id);
    });
  });

  if('IntersectionObserver' in window){
    const observer = new IntersectionObserver(entries => {
      const visible = entries
        .filter(entry => entry.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if(visible) setActive(visible.target.id);
    }, { rootMargin:'-20% 0px -55% 0px', threshold:[0.15, 0.35, 0.6] });
    sections.forEach(section => observer.observe(section));
  }
};

const AdminAnalytics = (function(){
  const FILTERS = [
    { key:'week', label:'Semana' },
    { key:'month', label:'Mes atual' },
    { key:'half', label:'6 meses' },
    { key:'year', label:'Ano' }
  ];
  function startOfDay(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function addDays(d, n){ const next = new Date(d); next.setDate(next.getDate() + n); return next; }
  function pad(v){ return String(v).padStart(2, '0'); }
  function keyOfDate(d){ return [d.getFullYear(), pad(d.getMonth() + 1), pad(d.getDate())].join('-'); }
  function monthKey(d){ return [d.getFullYear(), pad(d.getMonth() + 1)].join('-'); }
  function shortDate(d){ return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short' }); }
  function monthLabel(d){ return d.toLocaleDateString('pt-BR', { month:'short', year:'2-digit' }); }
  function average(values){ return values.length ? Math.round(values.reduce((sum, value) => sum + value, 0) / values.length) : 0; }
  function clamp(num, min, max){ return Math.max(min, Math.min(max, num)); }
  function getSubjects(){
    const course = window.COURSE || { modules:[] };
    return (course.modules || []).map((mod, idx) => ({
      id:mod.id || `subject-${idx + 1}`,
      label:mod.label || `M${idx + 1}`,
      title:mod.title || `Materia ${idx + 1}`,
      units:Util.unitsOfModule(mod)
    }));
  }
  function getLessonCatalog(){
    const course = window.COURSE || { modules:[] };
    const lessons = [];
    (course.modules || []).forEach((mod, modIdx) => {
      Util.unitsOfModule(mod).forEach((entry, unitIdx) => {
        lessons.push({
          subjectKey:`subject:${mod.id || modIdx}`,
          subjectLabel:mod.title || `Materia ${modIdx + 1}`,
          moduleKey:`module:${mod.id || modIdx}`,
          moduleLabel:(mod.label ? `${mod.label} · ` : '') + (mod.title || `Modulo ${modIdx + 1}`),
          chapterKey:`chapter:${entry.chapterId || `${mod.id || modIdx}-root`}`,
          chapterLabel:entry.chapter ? ((entry.chapter.number ? `${entry.chapter.number} · ` : '') + entry.chapter.title) : 'Capitulo unico',
          lessonKey:`lesson:${entry.unit.id || `${mod.id || modIdx}-${unitIdx}`}`,
          lessonLabel:(entry.unit.number ? `${entry.unit.number} · ` : '') + (entry.unit.title || `Aula ${unitIdx + 1}`)
        });
      });
    });
    return lessons;
  }
  function buildUsers(subjects, lessons){
    const totalLessons = subjects.reduce((sum, subject) => sum + subject.units.length, 0);
    const roster = [
      ['u-ana', 'Ana Martins', 'ana.martins@ubique.local', 'student', 'https://i.pravatar.cc/160?img=32'],
      ['u-bruno', 'Bruno Costa', 'bruno.costa@ubique.local', 'student', 'https://i.pravatar.cc/160?img=12'],
      ['u-clara', 'Clara Mendes', 'clara.mendes@ubique.local', 'student', 'https://i.pravatar.cc/160?img=47'],
      ['u-diego', 'Diego Rocha', 'diego.rocha@ubique.local', 'student', 'https://i.pravatar.cc/160?img=15'],
      ['u-elis', 'Elis Farias', 'elis.farias@ubique.local', 'student', 'https://i.pravatar.cc/160?img=5'],
      ['u-felipe', 'Felipe Nunes', 'felipe.nunes@ubique.local', 'student', 'https://i.pravatar.cc/160?img=68'],
      ['u-gabi', 'Gabriela Silva', 'gabriela.silva@ubique.local', 'student', 'https://i.pravatar.cc/160?img=44'],
      ['u-luisa', 'Luisa Porto', 'luisa.porto@ubique.local', 'admin', 'https://i.pravatar.cc/160?img=49']
    ];
    return roster.map((item, userIdx) => {
      const subjectPerformance = subjects.map((subject, subjectIdx) => {
        const lessonBase = Math.max(2, subject.units.length || 3);
        const completed = clamp(Math.round(lessonBase * (0.38 + (((userIdx + 2) * (subjectIdx + 3)) % 4) * 0.16)), 1, lessonBase);
        const accuracy = clamp(62 + (((userIdx + 1) * 11 + subjectIdx * 7) % 31), 52, 96);
        return { subjectId:subject.id, label:subject.label, title:subject.title, completed, total:lessonBase, accuracy };
      });
      const lessonsCompleted = subjectPerformance.reduce((sum, subject) => sum + subject.completed, 0);
      const averageAccuracy = average(subjectPerformance.map(subject => subject.accuracy));
      const streakDays = 4 + ((userIdx * 5) % 18);
      const correctAnswers = lessonsCompleted * (9 + (userIdx % 4));
      const incorrectAnswers = Math.max(8, Math.round(correctAnswers * ((100 - averageAccuracy) / Math.max(averageAccuracy, 1))));
      const lessonPerformance = lessons.map((lesson, lessonIdx) => ({
        subjectKey:lesson.subjectKey,
        subjectLabel:lesson.subjectLabel,
        moduleKey:lesson.moduleKey,
        moduleLabel:lesson.moduleLabel,
        chapterKey:lesson.chapterKey,
        chapterLabel:lesson.chapterLabel,
        lessonKey:lesson.lessonKey,
        lessonLabel:lesson.lessonLabel,
        accuracy:clamp(54 + (((userIdx + 1) * 7 + lessonIdx * 5) % 39), 45, 98),
        completed:((userIdx + lessonIdx) % 3) !== 0
      }));
      return {
        id:item[0],
        name:item[1],
        email:item[2],
        role:item[3],
        avatar:item[4],
        lessonsCompleted,
        totalLessons,
        averageAccuracy,
        streakDays,
        correctAnswers,
        incorrectAnswers,
        subjectPerformance,
        lessonPerformance,
        lastSeen:`${1 + ((userIdx * 3) % 7)}h atras`
      };
    });
  }
  function buildHistory(users){
    const today = startOfDay(new Date());
    const start = addDays(today, -364);
    const history = [];
    for(let dayIndex = 0; dayIndex < 365; dayIndex += 1){
      const date = addDays(start, dayIndex);
      const userCount = clamp(2 + ((dayIndex * 3) % users.length), 2, users.length);
      const userIds = [];
      for(let i = 0; i < userCount; i += 1){
        const user = users[(dayIndex + i * 2) % users.length];
        if(userIds.indexOf(user.id) === -1) userIds.push(user.id);
      }
      const resolved = userIds.reduce((sum, id, idx) => {
        const userSeed = users.findIndex(user => user.id === id) + 1;
        return sum + 16 + ((dayIndex + idx * 5 + userSeed * 3) % 27);
      }, 0);
      const engagementByUser = {};
      userIds.forEach((id, idx) => {
        engagementByUser[id] = {
          questions:((dayIndex + idx) % 2) === 0,
          reading:((dayIndex + idx * 2 + 1) % 3) === 0
        };
        if(!engagementByUser[id].questions && !engagementByUser[id].reading){
          engagementByUser[id].reading = true;
        }
      });
      history.push({ key:keyOfDate(date), date, resolved, accessCount:userIds.length, userIds, engagementByUser });
    }
    return history;
  }
  function computeStreakDays(userId, history){
    const days = history
      .filter(entry => {
        const mark = entry.engagementByUser && entry.engagementByUser[userId];
        return !!(mark && (mark.questions || mark.reading));
      })
      .map(entry => entry.key)
      .sort();
    let best = 0;
    let current = 0;
    for(let i = 0; i < days.length; i += 1){
      if(i === 0){
        current = 1;
      } else {
        const prev = new Date(days[i - 1]);
        const now = new Date(days[i]);
        current = (now - prev) === 86400000 ? current + 1 : 1;
      }
      best = Math.max(best, current);
    }
    return best;
  }
  function build(){
    const subjects = getSubjects();
    const lessons = getLessonCatalog();
    const users = buildUsers(subjects, lessons);
    const history = buildHistory(users);
    users.forEach(user => {
      user.streakDays = computeStreakDays(user.id, history);
    });
    return {
      subjects,
      lessons,
      users,
      history,
      filters:FILTERS,
      userMap:users.reduce((acc, user) => { acc[user.id] = user; return acc; }, {}),
      totals:{
        subjects:subjects.length,
        lessons:subjects.reduce((sum, subject) => sum + subject.units.length, 0),
        users:users.length
      }
    };
  }
  function questionSeries(data, filter){
    const history = data.history;
    const today = startOfDay(new Date());
    if(filter === 'week'){
      return history.slice(-7).map(entry => ({ key:entry.key, label:shortDate(entry.date), value:entry.resolved }));
    }
    if(filter === 'month'){
      return history.filter(entry => entry.date.getMonth() === today.getMonth() && entry.date.getFullYear() === today.getFullYear()).map(entry => ({ key:entry.key, label:shortDate(entry.date), value:entry.resolved }));
    }
    const bucketCount = filter === 'half' ? 6 : 12;
    const buckets = {};
    history.forEach(entry => {
      const diff = (today.getFullYear() - entry.date.getFullYear()) * 12 + (today.getMonth() - entry.date.getMonth());
      if(diff >= 0 && diff < bucketCount){
        const key = monthKey(entry.date);
        if(!buckets[key]) buckets[key] = { key:keyOfDate(new Date(entry.date.getFullYear(), entry.date.getMonth(), 1)), label:monthLabel(entry.date), value:0, order:new Date(entry.date.getFullYear(), entry.date.getMonth(), 1).getTime() };
        buckets[key].value += entry.resolved;
      }
    });
    return Object.values(buckets).sort((a, b) => a.order - b.order).map(({ key, label, value }) => ({ key, label, value }));
  }
  function accessSeries(data){
    return data.history.slice(-14).map(entry => ({
      key:entry.key,
      label:shortDate(entry.date),
      value:entry.accessCount,
      users:entry.userIds.map(id => data.userMap[id]).filter(Boolean)
    }));
  }
  function usersForDay(data, key){
    const entry = data.history.find(item => item.key === key);
    if(!entry) return [];
    return entry.userIds.map(id => data.userMap[id]).filter(Boolean);
  }
  function performanceSeries(user, view){
    const source = user.lessonPerformance || [];
    const byKey = {};
    source.forEach(item => {
      const key = ({
        subject:item.subjectKey,
        module:item.moduleKey,
        chapter:item.chapterKey,
        lesson:item.lessonKey
      })[view] || item.lessonKey;
      const label = ({
        subject:item.subjectLabel,
        module:item.moduleLabel,
        chapter:item.chapterLabel,
        lesson:item.lessonLabel
      })[view] || item.lessonLabel;
      if(!byKey[key]) byKey[key] = { label, values:[], completed:0 };
      byKey[key].values.push(item.accuracy);
      if(item.completed) byKey[key].completed += 1;
    });
    return Object.values(byKey).map(entry => ({
      label:entry.label,
      accuracy:Math.round(entry.values.reduce((sum, value) => sum + value, 0) / entry.values.length),
      completed:entry.completed
    }));
  }
  return { build, questionSeries, accessSeries, usersForDay, performanceSeries };
})();
window.AdminAnalytics = AdminAnalytics;
