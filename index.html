.video-block .vb-frame iframe{width:100%;height:100%;border:none}
.video-block .vb-frame video{width:100%;height:100%;border:none;background:#000;border-radius:4px}
.video-block .vb-duration-badge{
  position:absolute;bottom:.6rem;right:.6rem;
  padding:.25rem .55rem;border-radius:3px;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  font-family:var(--mono);font-size:.6rem;color:#fff;
  letter-spacing:.06em;z-index:2;
}
.video-block .vb-info{display:flex;flex-direction:column;gap:.4rem}
.video-block .vb-info .block-type{align-self:flex-start;margin-bottom:.5rem}
.video-block .vb-title{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(1.1rem,1.8vw,1.5rem);line-height:1.25;
  color:var(--text);margin-bottom:.6rem;
}
.video-block .vb-desc{
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  color:var(--text-dim);line-height:1.7;
}
.video-block .vb-meta-row{
  display:flex;gap:2rem;margin-top:1.2rem;
}
.video-block .vb-meta-item{display:flex;flex-direction:column;gap:.15rem}
.video-block .vb-meta-label{
  font-family:var(--sans);font-weight:400;font-size:.48rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--text-mute);
}
.video-block .vb-meta-value{
  font-family:var(--serif);font-weight:400;font-style:italic;
  font-size:.88rem;color:var(--text);
}
.video-block .vb-action{
  display:inline-flex;align-items:center;gap:.5rem;
  margin-top:1.2rem;padding:.55rem 1.1rem;
  border:1px solid var(--border);border-radius:3px;
  font-family:var(--sans);font-weight:300;font-size:.6rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);
  background:transparent;cursor:pointer;transition:all .25s ease;
}
.video-block .vb-action:hover{border-color:var(--accent);color:var(--accent)}
.video-block .vb-action svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.vb-transcription-btn{
  display:inline-flex;align-items:center;gap:.35rem;
  font-family:var(--serif);font-weight:400;font-style:italic;font-size:.88rem;
  color:var(--accent);text-decoration:none;
  transition:color .2s ease;
}
.vb-transcription-btn:hover{color:var(--accent-strong,var(--accent));text-decoration:underline}
.vb-transcription-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
/* Video block: show header only for action buttons; no title/description duplication */
.video-block .block-header--actions-only{
  border-bottom:none;margin-bottom:.4rem;padding-bottom:0;
  justify-content:flex-end;
}
@media(max-width:800px){
  .video-block .vb-layout{grid-template-columns:1fr;gap:1.2rem}
}

/* — QUIZ BLOCK — */
/* Quiz satellite layout */
.qz-layout{display:grid;gap:2rem;align-items:flex-start;grid-template-columns:minmax(0,1fr)}
.qz-has-satellite .qz-layout{grid-template-columns:minmax(0,1fr) 300px}
.qz-main{min-width:0}
.qz-satellite{
  position:sticky;top:calc(var(--nav-h) + 1rem);align-self:flex-start;min-width:0;
}
.qz-satellite-pin{
  padding:1rem;border:1px solid var(--border);border-radius:6px;
  background:var(--bg-elevated);
}
.qz-sat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
/* Hide inline chips in quiz items when satellite is present */
.qz-has-satellite .q-item .q-topics-tags{display:none}
.qz-sat-label{font-family:var(--sans);font-weight:400;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent)}
.qz-sat-counter{font-family:var(--mono);font-size:.58rem;color:var(--text-dim)}
.qz-sat-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:.4rem}
.qz-sat-bar-fill{display:block;height:100%;background:var(--green);border-radius:2px;transition:width .3s ease}
.qz-sat-remaining{font-family:var(--sans);font-size:.55rem;color:var(--text-mute);margin-bottom:.8rem}
.qz-sat-divider{height:1px;background:var(--border);margin-bottom:.8rem}
.qz-sat-empty{font-family:var(--sans);font-size:.72rem;color:var(--text-mute);font-style:italic;line-height:1.5}
.qz-sat-item{}
.qz-sat-assertion{font-family:var(--serif);font-size:.82rem;color:var(--text);line-height:1.45;margin-bottom:.5rem}
.qz-sat-diff{
  display:inline-block;padding:.2rem .5rem;border-radius:10px;
  font-family:var(--sans);font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;
  border:1px solid var(--border);color:var(--text-dim);margin-bottom:.4rem;
}
.qz-sat-ref{font-family:var(--mono);font-size:.52rem;color:var(--accent);margin-bottom:.5rem}
.qz-sat-comments{
  font-family:var(--sans);font-weight:300;font-size:.74rem;
  color:var(--text-dim);line-height:1.6;
  padding:.6rem .8rem;border-left:2px solid var(--accent);
  background:rgba(200,169,126,.04);border-radius:0 4px 4px 0;
  margin-bottom:.5rem;
}
.qz-sat-reco{
  font-family:var(--sans);font-weight:300;font-size:.68rem;font-style:italic;
  color:var(--text-mute);line-height:1.5;margin-top:.3rem;
}
@media(max-width:900px){
  .qz-has-satellite .qz-layout{grid-template-columns:minmax(0,1fr)}
  .qz-satellite{position:relative;top:0}
}

.quiz-block .qb-intro{
  font-family:var(--sans);font-weight:300;font-size:.85rem;
  color:var(--text-dim);line-height:1.7;margin-bottom:1.2rem;max-width:680px;
}

.q-item{
  background:var(--bg-elevated);
  border:1px solid var(--border);border-radius:4px;
  padding:1.4rem 1.6rem;margin-bottom:1rem;
  display:grid;grid-template-columns:auto 1fr auto;gap:1.2rem;align-items:flex-start;
}
.q-item.is-tf{grid-template-columns:auto 1fr auto auto}
.q-num{
  font-family:var(--serif);font-weight:300;font-size:1.8rem;
  color:var(--accent);opacity:.65;line-height:1;
}
.q-body{min-width:0;display:flex;flex-direction:column;gap:.7rem}
.q-badges{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.1rem}
.q-badge{
  display:inline-flex;align-items:center;gap:.3rem;
  font-family:var(--sans);font-weight:400;font-size:.54rem;
  letter-spacing:.16em;text-transform:uppercase;
  padding:.3rem .55rem;border-radius:2px;
  border:1px solid var(--border);color:var(--text-dim);background:transparent;
}
.q-badge-ref{
  color:var(--accent);border-color:var(--accent);
  background:var(--accent-lo);letter-spacing:.08em;
}
.q-badge-tag{
  color:var(--text-dim);border-color:var(--border-strong);
  background:color-mix(in srgb, var(--bg-card) 70%, transparent);
  letter-spacing:.06em;
}
.q-badge-ubique{
  color:var(--text-mute);border-color:var(--border-strong);
  background:var(--bg-elevated);letter-spacing:.08em;
  font-style:italic;
}
.q-group-origin-badge{
  /* align-self impede que o flex-column pai (.q-group-header) estique a
     badge horizontalmente (default align-items: stretch). */
  align-self:flex-start;
  display:inline-flex;align-items:center;width:auto;
  font-family:var(--sans);font-weight:500;font-size:.6rem;
  letter-spacing:.08em;text-transform:uppercase;
  padding:.25rem .6rem;border-radius:2px;
  color:var(--accent);border:1px solid var(--accent);
  background:var(--accent-lo);
}
/* Reference individual da questão (Y3) */
.q-item-ref{
  display:flex;flex-direction:column;gap:.5rem;
  padding:.7rem .9rem;border-left:2px solid var(--accent);
  background:color-mix(in srgb, var(--bg-elevated) 50%, transparent);
  border-radius:0 var(--radius) var(--radius) 0;
  margin-bottom:.6rem;
}
.q-item-ref-text{
  font-family:var(--serif);font-size:.86rem;line-height:1.7;
  color:var(--text-dim);
}
.q-item-ref-text p:first-child{margin-top:0}
.q-item-ref-text p:last-child{margin-bottom:0}
.q-item-ref-img{display:block}
.q-item-ref-img img{max-width:100%;border-radius:var(--radius);display:block}

/* Reference do grupo (Y3 HTML rich) — adapta o legacy q-ref-text */
.q-ref-text-html{
  font-family:var(--serif);font-size:.92rem;line-height:1.75;
  color:var(--text);
}
.q-ref-text-html p:first-child{margin-top:0}
.q-ref-text-html p:last-child{margin-bottom:0}

/* Gabarito comentado (Y3) — só aparece após responder */
.q-item-comment{
  margin-top:1rem;padding:.8rem 1rem;
  background:var(--bg-elevated);border-left:3px solid var(--accent);
  border-radius:0 var(--radius) var(--radius) 0;
}
.q-item-comment-label{
  display:block;font-family:var(--mono);font-size:.6rem;
  letter-spacing:.12em;color:var(--accent);text-transform:uppercase;
  margin-bottom:.4rem;
}
.q-item-comment-body{
  font-family:var(--serif);font-size:.9rem;line-height:1.7;
  color:var(--text-dim);
}
.q-item-comment-body p:first-child{margin-top:0}
.q-item-comment-body p:last-child{margin-bottom:0}

.q-badge-diff{border-color:var(--border-strong)}
.q-badge-diff.d-very-easy{color:#7cb98b;border-color:rgba(124,185,139,.55);background:rgba(124,185,139,.08)}
.q-badge-diff.d-easy{color:#a5c98b;border-color:rgba(165,201,139,.5);background:rgba(165,201,139,.08)}
.q-badge-diff.d-regular{color:#c8a97e;border-color:rgba(200,169,126,.55);background:var(--accent-lo)}
.q-badge-diff.d-hard{color:#d19b72;border-color:rgba(209,155,114,.55);background:rgba(209,155,114,.1)}
.q-badge-diff.d-very-hard{color:#d47973;border-color:rgba(212,121,115,.55);background:rgba(212,121,115,.1)}
.q-stat-strip{
  display:inline-flex;gap:.3rem;align-items:center;flex-wrap:wrap;
  font-family:var(--sans);font-weight:300;font-size:.54rem;
  letter-spacing:.08em;text-transform:uppercase;
}
.q-stat-chip{
  padding:.24rem .5rem;border-radius:2px;
  border:1px solid var(--border);color:var(--text-dim);
  background:color-mix(in srgb, var(--bg-card) 70%, transparent);
  white-space:nowrap;
}
.q-stat-chip.q-stat-true{color:#a5c98b;border-color:rgba(165,201,139,.35)}
.q-stat-chip.q-stat-false{color:#d19b72;border-color:rgba(209,155,114,.35)}
.q-stat-chip.q-stat-mc{color:var(--text-dim)}
.q-stat-chip.q-stat-doubt{color:var(--text-mute);border-style:dashed}
.q-assertion{
  font-family:var(--sans);font-weight:300;font-size:var(--fs-body);
  line-height:1.7;color:var(--text);
}
.q-meta{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.4rem}
.q-options{display:flex;gap:.45rem;flex-wrap:wrap}
.q-options.is-tf{gap:.4rem;align-self:flex-start;flex-shrink:0}
.q-option{
  display:inline-flex;align-items:center;gap:.55rem;
  padding:.5rem .85rem .5rem .55rem;border-radius:18px;
  background:transparent;border:1px solid rgba(200,169,126,.25);
  color:var(--text-dim);
  font-family:var(--sans);font-weight:300;font-size:.78rem;
  transition:all .25s ease;text-align:left;max-width:100%;cursor:pointer;
}
.q-options.is-tf .q-option{
  padding:0;width:34px;height:34px;border-radius:50%;
  justify-content:center;gap:0;
}
.q-option:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lo)}
.q-option.selected{background:var(--accent-lo);border-color:var(--accent);color:var(--accent)}
.q-option.correct{border-color:#6ba670;color:#8bc391;background:rgba(107,166,112,.16)}
.q-option.wrong{border-color:#d47973;color:#e89690;background:rgba(212,121,115,.16)}
.q-option-mark{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:50%;
  background:rgba(200,169,126,.12);color:var(--accent);
  font-weight:500;font-size:.72rem;flex-shrink:0;
}
.q-options.is-tf .q-option-mark{
  width:auto;height:auto;background:transparent;font-size:.85rem;
}
.q-option.correct .q-option-mark{background:rgba(107,166,112,.3);color:#8bc391}
.q-option.wrong .q-option-mark{background:rgba(212,121,115,.3);color:#e89690}
.q-feedback{
  margin-top:.9rem;padding:.9rem 1rem;border-radius:3px;
  background:var(--accent-glow);border:1px solid var(--border);
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  color:var(--text-dim);line-height:1.7;display:none;
}
.q-feedback.show{display:block}
.q-feedback-label{
  font-family:var(--sans);font-weight:400;font-size:.58rem;
  letter-spacing:.16em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.4rem;display:block;
}
.q-feedback.correct{border-color:rgba(93,212,159,.35);background:rgba(93,212,159,.05)}
.q-feedback.correct .q-feedback-label{color:var(--green)}
.q-feedback.wrong{border-color:rgba(232,120,120,.35);background:rgba(232,120,120,.05)}
.q-feedback.wrong .q-feedback-label{color:var(--red)}
.q-reco{margin-top:.5rem;padding-top:.5rem;border-top:1px solid var(--border);font-style:italic}
/* Hide the inner block-level chips when nested inside a compound block — only
   the outer compound's chip row should show near the block border. */
.compound-part .block-wrap > .q-topics-tags{display:none}
/* Inline result icon beside assertion */
.q-result{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:50%;
  font-family:var(--mono);font-size:.65rem;font-weight:600;
  margin-left:.5rem;vertical-align:middle;
}
.q-result-correct{background:rgba(93,212,159,.15);color:var(--green)}
.q-result-wrong{background:rgba(232,120,120,.15);color:var(--red)}
.q-doubt{
  width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border-strong);
  background:var(--bg-elevated);color:var(--text-mute);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;flex-shrink:0;opacity:.65;
}
.q-doubt:hover{opacity:1;border-color:#e8a857;color:#e8a857;background:rgba(232,168,87,.08)}
.q-doubt.active{opacity:1;border-color:#e8a857;color:#e8a857;background:rgba(232,168,87,.15)}
.q-doubt svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.q-score{
  font-family:var(--mono);font-size:.7rem;color:var(--text-mute);
  white-space:nowrap;padding-top:.3rem;
}

/* — ESSAY BLOCK — */
.essay-item{
  background:var(--bg-elevated);
  border:1px solid var(--border);border-radius:4px;
  padding:1.8rem 2rem;margin-bottom:1.4rem;
}
.essay-header{display:flex;gap:1.2rem;align-items:flex-start;margin-bottom:1.3rem}
.essay-num{
  font-family:var(--serif);font-weight:300;font-size:2.4rem;
  color:var(--accent);opacity:.55;line-height:1;flex-shrink:0;
}
.essay-hbody{flex:1;min-width:0}
.essay-command{
  font-family:var(--serif);font-weight:400;
  font-size:1.2rem;line-height:1.4;color:var(--text);
}
/* Y3: bullets / listas dentro do enunciado ficam INDENTADAS pra não
   vazar pra fora do card. Antes os <ul>/<ol> vinham com padding-left:0
   (reset do browser) e os bullets ficavam fora do limite esquerdo. */
.essay-command ul,
.essay-command ol{
  padding-left:1.6rem;margin:.6rem 0;
}
.essay-command li{
  margin-bottom:.25rem;line-height:1.55;
}
.essay-command li:last-child{margin-bottom:0}
.essay-command p:first-child{margin-top:0}
.essay-command p:last-child{margin-bottom:0}
.essay-command strong{font-weight:500}
.essay-command em{font-style:italic}
.essay-meta{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.7rem}
.essay-chip{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);
  padding:.3rem .7rem;border:1px solid var(--border);border-radius:2px;
}
.essay-chip strong{color:var(--accent);font-weight:400}
.essay-layout{display:grid;grid-template-columns:1.4fr 1fr;gap:1.8rem}

/* Y3 Fase M — Gabarito da discursiva (3 abas: criterios/oficial/modelos) */
.essay-gabarito{
  margin-top:1rem;border:1px solid var(--border);border-radius:4px;
  background:var(--bg-card);padding:.9rem 1.1rem;
}
.essay-gabarito-tabs{
  display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.9rem;
  border-bottom:1px solid var(--border);padding-bottom:.5rem;
}
.essay-gab-tab{
  background:transparent;border:1px solid var(--border);
  padding:.4rem .8rem;border-radius:3px;cursor:pointer;
  font-family:var(--sans);font-weight:300;font-size:.66rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);
  transition:all .2s ease;
}
.essay-gab-tab:hover{color:var(--accent);border-color:var(--accent-border)}
.essay-gab-tab.active{
  background:var(--accent-lo);color:var(--accent);
  border-color:var(--accent);font-weight:400;
}
.essay-gab-pane{
  font-family:var(--serif);font-size:.92rem;line-height:1.7;
  color:var(--text-dim);
}
.essay-gab-pane p:first-child{margin-top:0}
.essay-gab-pane p:last-child{margin-bottom:0}
.essay-gab-pane .essay-criterion{
  padding:.7rem .9rem;margin-bottom:.6rem;
  background:var(--bg-elevated);border-radius:3px;
  border-left:2px solid var(--accent);
}
.essay-gab-pane .essay-criterion:last-child{margin-bottom:0}
.essay-gab-pane .essay-criterion-head{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:.4rem;gap:.6rem;
}
.essay-gab-pane .essay-criterion-label{
  font-family:var(--sans);font-weight:400;font-size:.78rem;
  color:var(--accent);letter-spacing:.04em;text-transform:uppercase;
}
.essay-gab-pane .essay-criterion-max{
  font-family:var(--mono);font-size:.7rem;color:var(--text-mute);
}
.essay-gab-pane .essay-criterion-desc{
  font-family:var(--serif);font-size:.88rem;line-height:1.65;color:var(--text);
  margin-bottom:.4rem;
}
.essay-gab-pane .essay-criterion-model{
  margin-top:.4rem;padding-top:.4rem;border-top:1px dashed var(--border);
}
.essay-gab-pane .essay-criterion-model summary{
  cursor:pointer;font-family:var(--mono);font-size:.65rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--accent);
}
.essay-gab-pane .essay-criterion-model-body{
  font-family:var(--serif);font-size:.86rem;line-height:1.65;
  color:var(--text-dim);margin-top:.4rem;font-style:italic;
}
.essay-gab-pane .emodel-author{
  font-family:var(--mono);font-size:.7rem;color:var(--text-mute);
  margin-bottom:.4rem;font-style:italic;
}
.essay-gab-pane .emodel-body{
  font-family:var(--serif);font-size:.88rem;line-height:1.75;color:var(--text);
}
.essay-prior-score{
  display:inline-block;margin-top:.4rem;
  font-family:var(--mono);font-size:.7rem;
  color:#4caf50;letter-spacing:.06em;
}
.essay-toggle-gabarito{
  font-family:var(--mono);font-size:.65rem;letter-spacing:.06em;
  text-transform:uppercase;
}
/* Y3 — texto-base em card no rodapé (igual ao layout original):
   imagem à esquerda CLICÁVEL (lightbox), texto à direita.
   Imagem agora é uma figura significativa (não amassada em 120px). */
.essay-refs{margin-top:1.4rem;display:flex;flex-direction:column;gap:1rem}
.essay-refs .essay-ref{
  display:grid;grid-template-columns:240px 1fr;gap:1.4rem;
  padding:1rem 1.2rem;background:var(--bg-elevated);border-radius:3px;
  border-left:2px solid var(--accent);align-items:start;
}
.essay-refs .essay-ref-img{
  display:block;border:0;background:transparent;padding:0;
  cursor:zoom-in;transition:transform .2s var(--ease,ease);
}
.essay-refs .essay-ref-img:hover{transform:scale(1.02)}
.essay-refs .essay-ref-img img{
  display:block;width:100%;max-height:280px;
  border-radius:var(--radius);object-fit:cover;
}
.essay-refs .essay-ref-content{min-width:0}
@media(max-width:720px){
  .essay-refs .essay-ref{grid-template-columns:1fr}
  .essay-refs .essay-ref-img img{max-height:380px;object-fit:contain}
}
.essay-refs .essay-ref-label{
  font-family:var(--mono);font-size:.62rem;color:var(--accent);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:.2rem;
}
.essay-refs .essay-ref-title{
  font-family:var(--serif);font-size:.98rem;color:var(--text);
  margin-bottom:.3rem;
}
.essay-refs .essay-ref-body{
  font-family:var(--serif);font-size:.92rem;line-height:1.7;
  color:var(--text-dim);font-style:italic;
}
.essay-refs .essay-ref-body p:first-child{margin-top:0}
.essay-refs .essay-ref-body p:last-child{margin-bottom:0}

/* Y3 fix #4: toggle data-font (serif/sans) afeta o essay block também.
   Antes só `.tb-body` respondia ao toggle; o essay tinha font-family
   hardcoded em serif, ignorando a preferência do aluno. */
html[data-font="sans"] .essay-command,
html[data-font="sans"] .essay-refs .essay-ref-body,
html[data-font="sans"] .essay-refs .essay-ref-title,
html[data-font="sans"] .essay-textarea,
html[data-font="sans"] .essay-gab-pane,
html[data-font="sans"] .essay-gab-pane .essay-criterion-desc,
html[data-font="sans"] .essay-gab-pane .essay-criterion-model-body,
html[data-font="sans"] .essay-gab-pane .emodel-body {
  font-family: var(--sans) !important;
  font-weight: 300;
  font-style: normal;
}
html[data-font="sans"] .essay-refs .essay-ref-body{
  /* sans não fica bem em itálico */
  font-style: normal;
}

.essay-panel{
  background:var(--accent-glow);
  border:1px solid var(--border);
  border-radius:3px;padding:1.2rem 1.3rem;margin-bottom:1rem;
}
.essay-panel-label{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.7rem;
}
.essay-textarea{
  width:100%;min-height:220px;resize:vertical;
  background:transparent;border:1px solid var(--border);
  border-radius:2px;padding:.9rem 1rem;
  font-family:var(--sans);font-weight:300;font-size:.92rem;
  line-height:1.75;color:var(--text);
}
.essay-textarea:focus{outline:none;border-color:var(--accent)}
.essay-textarea-foot{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:.7rem;gap:.8rem;
}
.essay-counter{
  font-family:var(--mono);font-size:.62rem;color:var(--text-mute);
  letter-spacing:.08em;
}
/* Criteria slider */
.ecrit-slider{
  border:1px solid var(--border);border-radius:6px;
  background:var(--bg-elevated);overflow:hidden;margin-bottom:1rem;
}
.ecrit-header{
