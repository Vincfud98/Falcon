.bio-modal > *{position:relative;z-index:1}
@keyframes fsIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.bio-portrait-wrap{display:flex;flex-direction:column;gap:1rem}
.bio-portrait-frame{
  position:relative;width:100%;max-width:518px;aspect-ratio:3/4;
  border-radius:2px;overflow:hidden;
  box-shadow:0 18px 48px rgba(0,0,0,.6),
             0 4px 16px rgba(0,0,0,.35),
             0 0 0 1px rgba(200,169,126,.3),
             0 0 0 8px rgba(200,169,126,.05);
}
.bio-portrait-frame::before{
  content:'';position:absolute;inset:8px;
  border:1px solid rgba(200,169,126,.28);
  pointer-events:none;z-index:2;
}
.bio-portrait-img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  filter:brightness(.92) saturate(.95);
}
.bio-portrait-glow{
  position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(11,12,15,.38) 100%);
}
.bio-portrait-caption{
  font-family:var(--serif);font-weight:400;font-style:italic;
  font-size:.78rem;color:var(--text-mute);text-align:center;
}
.bio-content{display:flex;flex-direction:column}
.bio-eyebrow{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.3em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.9rem;
}
.bio-name{
  font-family:var(--serif);font-weight:300;
  font-size:clamp(2.2rem,4.2vw,3.6rem);line-height:1.05;
  color:var(--text);letter-spacing:-.02em;margin-bottom:.5rem;
}
.bio-dates{
  font-family:var(--serif);font-weight:400;font-style:italic;
  font-size:1rem;color:var(--accent);letter-spacing:.04em;margin-bottom:.2rem;
}
.bio-divider{
  width:60px;height:2px;background:var(--accent);
  opacity:.6;margin:1.2rem 0 1.4rem;
}
.bio-roles{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.3rem}
.bio-role{
  font-family:var(--sans);font-weight:400;font-size:.56rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);
  padding:4px 11px;border:1px solid rgba(200,169,126,.22);
  border-radius:12px;background:rgba(200,169,126,.04);
}
.bio-modal-body{
  font-family:var(--serif);font-weight:300;font-size:1rem;
  line-height:1.75;color:var(--text-dim);
  max-width:640px;margin-bottom:1.6rem;white-space:pre-line;
}
.bio-modal-body strong{color:var(--text);font-weight:400}
.bio-pullquote{
  position:relative;padding:.5rem 0 .3rem 2.4rem;max-width:580px;margin-top:.4rem;
}
.bio-pullquote-mark{
  position:absolute;left:0;top:-.3rem;
  font-family:var(--serif);font-size:3.8rem;color:var(--accent);opacity:.35;
  line-height:.8;
}
.bio-pullquote-text{
  font-family:var(--serif);font-weight:300;font-style:italic;
  font-size:1.05rem;line-height:1.55;color:var(--text);
}
.bio-modal-backlink{margin-top:1.6rem}
@media(max-width:900px){
  .bio-modal{grid-template-columns:1fr;gap:2rem;text-align:center}
  .bio-portrait-wrap{order:-1;align-items:center}
  .bio-portrait-frame{max-width:312px;margin:0 auto}
  .bio-content{align-items:center}
  .bio-pullquote{text-align:left}
}

/* ─── QUOTE MODAL — full-bleed background image with centered content ─── */
.quote-block .carousel-slide.active{display:flex;justify-content:center}
.quote-modal{
  display:flex;flex-direction:column;align-items:center;
  text-align:center;width:100%;
  position:relative;overflow:hidden;border-radius:6px;
  padding:clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem);
  gap:0;
  animation:fsIn .5s var(--ease);
}
/* Full-bleed background image */
.quote-modal::before{
  content:'';position:absolute;inset:0;z-index:0;
  background:var(--bg-img) center/cover no-repeat;
  opacity:.35;pointer-events:none;
}
/* Dark vignette overlay */
.quote-modal::after{
  content:'';position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse at center, rgba(10,8,6,.55) 0%, rgba(10,8,6,.88) 70%, rgba(10,8,6,.96) 100%);
  pointer-events:none;
}
.quote-modal > *{position:relative;z-index:1}
/* Portrait circle */
.quote-modal-portrait{
  width:clamp(120px,15vw,180px);
  height:clamp(120px,15vw,180px);
  border-radius:50%;overflow:hidden;
  border:2px solid var(--accent);
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 6px rgba(200,169,126,.1);
  background:var(--bg-elevated);
  margin-bottom:1.6rem;
}
.quote-modal-portrait img{width:100%;height:100%;object-fit:cover}
/* Large quotation mark */
.quote-modal-mark{
  font-family:var(--serif);font-weight:500;
  font-size:clamp(3rem,5.5vw,5.5rem);color:var(--accent);opacity:.3;
  line-height:.5;margin-bottom:.8rem;
}
/* Quote text */
.quote-modal-text{
  font-family:var(--serif);font-weight:300;font-style:italic;
  font-size:clamp(1.2rem,2vw,2rem);line-height:1.4;
  color:#f5f0e8;max-width:720px;
  margin-bottom:1.6rem;
  text-shadow:0 1px 8px rgba(0,0,0,.3);
}
/* Author line — name + context inline */
.quote-modal-divider{width:48px;height:1px;background:var(--accent);opacity:.4;margin-bottom:1rem}
.quote-modal-attr{
  display:flex;align-items:baseline;justify-content:center;gap:.5rem;flex-wrap:wrap;
  margin-bottom:.3rem;
}
.quote-modal-author{
  font-family:var(--sans);font-weight:600;font-size:.72rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--accent);
}
.quote-modal-ctx{
  font-family:var(--serif);font-weight:300;font-style:italic;font-size:.76rem;
  color:rgba(245,240,232,.55);letter-spacing:.02em;
}
/* Context body */
.quote-modal-body{
  font-family:var(--serif);font-weight:300;font-style:italic;font-size:.82rem;
  color:rgba(245,240,232,.5);line-height:1.75;max-width:600px;
  margin-top:1.2rem;
}
.quote-modal .q-topics-tags{justify-content:center;margin-top:1.4rem}

/* ─── GLOSSARY 2-col layout (matches concept template) ─── */
.gloss-layout{
  display:grid;grid-template-columns:240px 1fr;gap:2rem;margin-top:1rem;
  align-items:flex-start;
}
.gloss-sidebar{
  border-right:1px solid var(--border);
  padding-right:1rem;max-height:70vh;overflow-y:auto;
  position:sticky;top:calc(var(--nav-h) + 7rem);
}
.gloss-sidebar-label{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.7rem;
}
.gloss-side-item{
  display:block;width:100%;text-align:left;
  font-family:var(--serif);font-weight:400;font-size:.95rem;
  color:var(--text-dim);background:transparent;
  padding:.6rem .7rem;margin-bottom:.2rem;
  border-left:2px solid transparent;border-radius:0 2px 2px 0;
  transition:all .3s ease;cursor:pointer;
}
.gloss-side-item:hover{color:var(--accent)}
.gloss-side-item.active{
  color:var(--accent);border-left-color:var(--accent);
  background:var(--accent-lo);
}
.gloss-panel{
  padding:.5rem 0 1rem;
}
.gloss-panel-term{
  font-family:var(--serif);font-weight:300;
  font-size:clamp(1.8rem,3.4vw,3.2rem);line-height:1.1;
  color:var(--text);margin-bottom:.6rem;
}
.gloss-panel-meta{
  font-family:var(--sans);font-weight:300;font-size:.62rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.8rem;
}
.gloss-panel-divider{width:60px;height:1px;background:var(--accent);opacity:.5;margin:1rem 0 1.2rem}
.gloss-panel-def{
  font-family:var(--serif);font-weight:400;font-style:italic;
  font-size:1.2rem;line-height:1.55;color:var(--text);
  max-width:640px;margin-bottom:1.4rem;
}
.gloss-panel-body{
  font-family:var(--sans);font-weight:300;font-size:.92rem;
  line-height:1.8;color:var(--text-dim);max-width:680px;
}
.gloss-panel.has-image{
  display:grid;grid-template-columns:1fr 200px;gap:2rem;align-items:flex-start;
}
.gloss-panel-img{
  border:1px solid var(--border);border-radius:4px;overflow:hidden;
  aspect-ratio:3/4;background:var(--bg-elevated);
}
.gloss-panel-img img{width:100%;height:100%;object-fit:cover;display:block}
@media(max-width:640px){
  .gloss-panel.has-image{grid-template-columns:1fr}
  .gloss-panel-img{max-width:200px}
}
@media(max-width:900px){
  .gloss-layout{grid-template-columns:1fr}
  .gloss-sidebar{position:static;border-right:none;border-bottom:1px solid var(--border);padding:0 0 1rem;max-height:240px}
}

/* ─── TIMELINE (matches slide-display timeline template) ─── */
.tl-fidelity{
  position:relative;padding:.4rem 0;margin-top:1.2rem;
  max-width:720px;
}
.tl-fid-item{
  position:relative;padding:1rem 0 1rem 2.4rem;
  cursor:pointer;
}
.tl-fid-item::before{
  content:'';position:absolute;left:11.25px;top:0;bottom:0;width:1.5px;
  background:rgba(200,169,126,.4);
}
.tl-fid-item:first-child::before{top:1.2rem}
.tl-fid-item:last-child::before{bottom:calc(100% - 1.7rem)}
.tl-fid-dot{
  position:absolute;top:1.2rem;left:6px;
  width:12px;height:12px;border-radius:50%;
  border:2px solid var(--accent);background:var(--bg);
  transition:all .3s ease;z-index:2;
}
.tl-fid-item:hover .tl-fid-dot,
.tl-fid-item.active .tl-fid-dot{
  background:var(--accent);
  box-shadow:0 0 0 5px rgba(200,169,126,.15);
}
.tl-fid-head{display:flex;gap:1.2rem;align-items:baseline;flex-wrap:wrap}
.tl-fid-date{
  font-family:var(--serif);font-weight:500;font-size:1.3rem;
  color:var(--accent);white-space:nowrap;
}
.tl-fid-title{
  font-family:var(--serif);font-weight:400;font-size:1.15rem;
  color:var(--text);line-height:1.3;flex:1;
}
.tl-fid-body{
  margin-top:.6rem;
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  line-height:1.7;color:var(--text-dim);max-width:620px;
}
/* Timeline right-panel — image appears on hover in a fixed aside */
.tl-fid-group-layout{
  display:grid;grid-template-columns:1fr 1fr;gap:1.8rem;align-items:flex-start;
}
.tl-fid-side{
  position:sticky;top:calc(var(--nav-h) + 1rem);
  border:1px solid var(--border);border-radius:4px;
  background:var(--bg-elevated);overflow:hidden;
  aspect-ratio:3/4;
  transition:opacity .35s ease;opacity:.3;
}
.tl-fid-side.has-thumb{opacity:1}
.tl-fid-side img{width:100%;height:100%;object-fit:cover;display:block}
.tl-fid-side-cap{
  position:absolute;bottom:0;left:0;right:0;
  padding:.5rem .7rem;background:linear-gradient(transparent,rgba(0,0,0,.75));
  font-family:var(--sans);font-weight:300;font-size:.6rem;
  color:#fff;letter-spacing:.05em;
}
@media(max-width:640px){
  .tl-fid-group-layout{grid-template-columns:1fr}
  .tl-fid-side{display:none}
}
.tl-fid-group{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;padding:1.6rem 1.8rem;margin-bottom:1.4rem;
}
.tl-fid-group-title{
  font-family:var(--serif);font-weight:400;font-size:1.35rem;
  color:var(--text);margin-bottom:.4rem;
}
.tl-fid-group-sub{
  font-family:var(--sans);font-weight:300;font-size:.6rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);
  margin-bottom:.5rem;
}

/* ─── REFERENCE TABLE (data-table) ─── */
.ref-datatable-wrap{
  max-width:1100px;width:100%;
  margin-bottom:1.4rem;
  overflow-x:auto;
  border:1px solid var(--border);border-radius:5px;
  background:var(--bg-card);
}
.ref-datatable-head{
  padding:1.2rem 1.4rem .8rem;
}
.ref-datatable-title{
  font-family:var(--serif);font-weight:400;font-size:1.25rem;
  color:var(--text);margin-bottom:.2rem;
}
.ref-datatable-sub{
  font-family:var(--sans);font-weight:300;font-size:.6rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);
}
.ref-datatable{
  width:100%;border-collapse:collapse;min-width:500px;
}
.ref-datatable th{
  font-family:var(--sans);font-weight:400;font-size:.62rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  padding:1rem 1.2rem;text-align:left;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border-strong);
}
.ref-datatable td{
  padding:.9rem 1.2rem;
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  color:var(--text-dim);line-height:1.55;
  border-top:1px solid rgba(200,169,126,.06);
}
.ref-datatable td:first-child{
  font-family:var(--serif);font-weight:500;font-size:1rem;color:var(--text);
}
.ref-datatable tbody tr{transition:background .25s ease}
.ref-datatable tbody tr:hover{background:rgba(200,169,126,.05)}
.ref-datatable-notes{
  padding:.8rem 1.4rem 1rem;
  font-family:var(--serif);font-weight:300;font-style:italic;
  font-size:.78rem;color:var(--text-mute);line-height:1.55;
  border-top:1px solid var(--border);
}

/* ─── REFERENCES grid with gold left border ─── */
.ref-grid{
  display:grid;gap:1rem;margin-top:1rem;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
}
.ref-item{
  display:grid;grid-template-columns:88px 1fr;gap:1.1rem;
  padding:1rem 1.2rem 1rem 1rem;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:5px;
  transition:all .4s var(--ease);
}
.ref-item:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.25)}
.ref-item.no-cover{grid-template-columns:1fr;padding:1.1rem 1.3rem}
.ref-cover{
  width:88px;height:124px;border-radius:3px;
  border:1px solid var(--border);
  background:var(--bg-elevated);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);
}
.ref-cover svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:1.4}
.ref-body{min-width:0}
.ref-type-badge{
  display:inline-flex;align-items:center;gap:.35rem;
  font-family:var(--sans);font-weight:400;font-size:.55rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.4rem;
}
.ref-type-badge svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:1.8}
.ref-title{
  font-family:var(--serif);font-weight:500;font-size:1.05rem;
  color:var(--text);line-height:1.35;margin-bottom:.3rem;
}
.ref-desc{
  font-family:var(--sans);font-weight:300;font-size:.75rem;
  color:var(--text-dim);line-height:1.55;
}
.ref-link{
  font-family:var(--mono);font-size:.62rem;color:var(--accent);
  margin-top:.4rem;display:inline-block;word-break:break-all;
}
.ref-link:hover{text-decoration:underline}

/* ─── IMAGE-EXPLORE (figures) ─── */
.imgx-wrap{
  position:relative;margin-bottom:1.4rem;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;overflow:hidden;
}
.imgx-viewport{
  position:relative;width:100%;height:440px;
  background:var(--bg);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.imgx-stage{
  position:relative;max-width:100%;max-height:100%;
  display:inline-block;
}
.imgx-img{
  max-width:100%;max-height:440px;
  object-fit:contain;display:block;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.imgx-info{
  padding:1.2rem 1.4rem;
  border-top:1px solid var(--border);
}
.imgx-title{
  font-family:var(--serif);font-weight:500;font-size:1.2rem;
  color:var(--text);margin-bottom:.3rem;
}
.imgx-caption{
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  line-height:1.65;color:var(--text-dim);max-width:760px;
}
.imgx-caption-plate{
  position:absolute;bottom:1rem;left:1.2rem;z-index:4;
  font-family:var(--serif);font-weight:300;font-style:italic;
  font-size:.75rem;color:var(--text-dim);
  background:rgba(19,21,26,.82);padding:.55rem .95rem;
  border-radius:3px;border-left:2px solid var(--accent);
  max-width:320px;
}
html[data-theme="light"] .imgx-caption-plate{background:rgba(255,255,255,.82)}

/* ─── FLASHCARDS fidelity (header with counter + gold underline) ─── */
.fc-group-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:1rem;padding-bottom:.7rem;margin-bottom:1rem;
  border-bottom:1px solid var(--border-strong);
}
.fc-group-label{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.3rem;
}
.fc-group-title{
  font-family:var(--serif);font-weight:400;font-size:1.3rem;
  color:var(--text);line-height:1.2;
}
.fc-group-counter{
  display:inline-flex;align-items:center;gap:.35rem;
  font-family:var(--serif);font-weight:500;font-size:1.15rem;
  color:var(--accent);
  padding:.4rem .9rem;
  border:1px solid rgba(200,169,126,.22);border-radius:4px;
  background:var(--accent-lo);
  white-space:nowrap;
}
.fc-group-counter-sep{opacity:.4;margin:0 .2rem;font-size:.9rem}
.fc-group-counter-total{color:var(--text-dim);font-weight:300}

/* ─── QUIZ with groups + reference-text panel (matches slide-display slide 15) ─── */
.q-list{display:flex;flex-direction:column;gap:.6rem}
.q-group{
  display:flex;flex-direction:column;gap:1rem;
  padding:1.2rem 1.3rem 1.3rem;
  background:rgba(19,21,26,.6);
  border:1px solid var(--border);
  border-radius:6px;
}
html[data-theme="light"] .q-group{background:rgba(255,255,255,.7)}
.q-group-bare{padding:0;background:transparent;border:none;gap:.85rem}
.q-group-header{
  display:flex;flex-direction:column;gap:.5rem;
  padding-bottom:.9rem;
  border-bottom:1px solid var(--border);
}
.q-group-label{
  font-family:var(--sans);font-weight:400;
  font-size:.56rem;letter-spacing:.28em;
  text-transform:uppercase;color:var(--accent);opacity:.85;
}
.q-group-enunciado{
  font-family:var(--serif);font-weight:400;
  font-size:1.05rem;line-height:1.5;
  color:var(--text);font-style:italic;
}
html[data-theme="light"] .q-group-enunciado{color:#1a1a1a}
.q-group-items{display:flex;flex-direction:column;gap:.7rem}

/* Reference-text panel (texto-base) */
.q-ref{
  display:grid;grid-template-columns:1fr auto;gap:1.1rem;
  padding:1rem 1.1rem;
  background:rgba(11,12,15,.55);
  border-left:2px solid var(--accent);
  border-radius:4px;
}
html[data-theme="light"] .q-ref{background:rgba(244,241,236,.8)}
.q-ref:not(:has(.q-ref-media)){grid-template-columns:1fr}
.q-ref-text{min-width:0;display:flex;flex-direction:column;gap:.35rem}
.q-ref-label{
  font-family:var(--sans);font-weight:400;
  font-size:.55rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--accent);
}
.q-ref-title{
  font-family:var(--serif);font-weight:500;
  font-size:1rem;color:var(--text);line-height:1.3;
}
.q-ref-body{
  font-family:var(--serif);font-weight:300;
  font-size:.92rem;line-height:1.65;
  color:var(--text-dim);font-style:italic;margin-top:.2rem;
  white-space:pre-line;
}
.q-ref-source{
  font-family:var(--sans);font-weight:300;
  font-size:.65rem;color:var(--text-mute);
  letter-spacing:.04em;margin-top:.35rem;
}
.q-ref-media{
  position:relative;width:200px;
  border-radius:3px;overflow:hidden;cursor:zoom-in;
  flex-shrink:0;background:var(--bg-elevated);
  align-self:start;
  border:1px solid var(--border);
}
.q-ref-media img{width:100%;height:auto;display:block}
.q-ref-media-caption{
  padding:.4rem .6rem;
  font-family:var(--sans);font-weight:300;font-size:.62rem;
  color:var(--text-dim);line-height:1.4;
  border-top:1px solid var(--border);
}
@media(max-width:700px){
  .q-ref{grid-template-columns:1fr}
  .q-ref-media{width:100%}
}

/* ─── SOURCES inline block (matches .ref-grid in the portal) ─── */
.sources-block .srcs-grid{
  display:grid;gap:.8rem;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
}
.sources-block .srcs-item{
  display:flex;gap:.9rem;align-items:flex-start;
  padding:1rem 1.1rem;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:4px;
}
.sources-block .srcs-icon{
  flex-shrink:0;width:32px;height:32px;border-radius:3px;
  background:var(--accent-lo);color:var(--accent);
  display:flex;align-items:center;justify-content:center;
}
.sources-block .srcs-icon svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
.sources-block .srcs-body{min-width:0;flex:1}
.sources-block .srcs-label{
  font-family:var(--sans);font-weight:400;font-size:.55rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.2rem;
}
.sources-block .srcs-citation{
  font-family:var(--serif);font-weight:400;font-size:.95rem;
  color:var(--text);line-height:1.4;
}
.sources-block .srcs-link{
  font-family:var(--mono);font-size:.62rem;color:var(--accent);
  margin-top:.3rem;display:inline-block;word-break:break-all;
}
.sources-block .srcs-link:hover{text-decoration:underline}
.sources-block .srcs-thumb{
  flex-shrink:0;width:64px;height:86px;border-radius:3px;overflow:hidden;
  background:var(--bg-elevated);border:1px solid var(--border);
}
.sources-block .srcs-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.sources-block .srcs-author{
  font-family:var(--serif);font-weight:400;font-style:italic;
  font-size:.78rem;color:var(--text-dim);margin-top:.15rem;
}
.sources-block .srcs-desc{
  font-family:var(--sans);font-weight:300;font-size:.76rem;
  color:var(--text-dim);line-height:1.55;margin-top:.35rem;
  max-width:480px;
}

/* ─── KEYPOINTS block ─── */
.keypoints-block .kp-intro{
  font-family:var(--sans);font-weight:300;font-size:.88rem;
  line-height:1.7;color:var(--text-dim);max-width:680px;margin-bottom:1.2rem;
}
.keypoints-block .kp-grid{
  display:grid;gap:.9rem;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
}
.keypoints-block .kp-item{
  position:relative;padding:1.3rem 1.4rem 1.4rem 3.4rem;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:4px;
}
.keypoints-block .kp-num{
  position:absolute;left:1rem;top:1.1rem;
  font-family:var(--serif);font-weight:500;font-size:1.5rem;
  color:var(--accent);opacity:.7;line-height:1;
  width:1.6rem;text-align:right;
}
.keypoints-block .kp-label{
  font-family:var(--sans);font-weight:400;font-size:.58rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.35rem;
}
.keypoints-block .kp-title{
  font-family:var(--serif);font-weight:500;font-size:1.05rem;
  color:var(--text);line-height:1.3;margin-bottom:.4rem;
}
.keypoints-block .kp-body{
  font-family:var(--sans);font-weight:300;font-size:.82rem;
  line-height:1.7;color:var(--text-dim);
}

/* ─── UNIT CARD with cover image (matches module card treatment) ─── */
.unit-card{
  position:relative;
  aspect-ratio:3/4;
  padding:0;
  background:var(--bg-card);
  border:1px solid var(--border);border-radius:4px;
  cursor:pointer;overflow:hidden;display:block;text-align:left;
  transition:transform .6s var(--ease),border-color .4s ease;
}
.unit-card:hover{transform:translateY(-4px);border-color:var(--accent)}
.unit-card-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  opacity:.55;transition:opacity .6s var(--ease);
}
.unit-card:hover .unit-card-bg{opacity:.78}
.unit-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(11,12,15,.96) 12%,rgba(11,12,15,.5) 55%,transparent);
}
html[data-theme="light"] .unit-card-overlay{
  background:linear-gradient(to top,rgba(244,241,236,.96) 12%,rgba(244,241,236,.55) 55%,transparent);
}
.unit-card-progress{
  position:absolute;top:0;left:0;height:2px;background:var(--accent);z-index:3;
}
.unit-card-num{
  position:absolute;top:1rem;right:1.2rem;z-index:2;
  font-family:var(--serif);font-weight:300;
  font-size:2.2rem;color:var(--accent);opacity:.7;line-height:1;
}
.unit-card-status{
  position:absolute;top:1.15rem;left:1.2rem;z-index:3;
  width:8px;height:8px;border-radius:50%;background:var(--border-strong);
}
.unit-card-status.seen{background:var(--accent)}
.unit-card-status.completed{background:var(--green)}
.unit-card-content{
  position:absolute;left:1.2rem;right:1.2rem;bottom:1.1rem;z-index:2;
}
.unit-card-label{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.35rem;
}
.unit-card-title{
  font-family:var(--serif);font-weight:400;font-size:1.25rem;
  line-height:1.2;color:var(--text);margin-bottom:.45rem;padding:0;
}
.unit-card-desc{
  font-family:var(--sans);font-weight:300;font-size:.74rem;
  line-height:1.55;color:var(--text-dim);
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.unit-card-meta{
  display:flex;align-items:center;gap:.7rem;margin-top:.7rem;
  font-family:var(--sans);font-weight:300;font-size:.56rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-mute);
}

/* ─── NOTE MODAL (tag notes with topics + tags, capture selection) ─── */
.note-modal{
  position:fixed;inset:0;z-index:1200;
  display:none;align-items:flex-start;justify-content:center;
  background:rgba(11,12,15,.92);backdrop-filter:blur(14px);
  padding:6vh 4vw 4vh;overflow-y:auto;
}
html[data-theme="light"] .note-modal{background:rgba(244,241,236,.94)}
.note-modal.open{display:flex}
.note-modal-body{
  width:100%;max-width:720px;
  background:var(--bg-card);
  border:1px solid var(--border-strong);
  border-radius:6px;
  padding:2rem 2.2rem 2.2rem;
  box-shadow:0 24px 64px rgba(0,0,0,.5);
  animation:fsIn .4s var(--ease);
  position:relative;
}
.note-modal-close{
  position:absolute;top:1rem;right:1rem;
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--accent);font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s ease;
}
.note-modal-close:hover{border-color:var(--accent);background:var(--accent-lo)}
.note-modal-eyebrow{
  font-family:var(--sans);font-weight:300;font-size:.58rem;
  letter-spacing:.28em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.5rem;
}
.note-modal-title{
  font-family:var(--serif);font-weight:400;font-size:1.6rem;
  color:var(--text);line-height:1.2;margin-bottom:.4rem;
}
.note-modal-context{
  font-family:var(--sans);font-weight:300;font-size:.72rem;
  color:var(--text-dim);line-height:1.55;margin-bottom:1.4rem;
}
.note-modal-context strong{color:var(--accent);font-weight:400}
.note-modal-divider{width:44px;height:1px;background:var(--accent);opacity:.45;margin:1rem 0 1.2rem}
.note-type-toggle{
  display:flex;gap:.3rem;margin-bottom:1rem;
  background:var(--accent-glow);border:1px solid var(--border);
  border-radius:16px;padding:2px;align-self:flex-start;
}
.ntt-btn{
  padding:.35rem .8rem;border-radius:14px;background:transparent;border:none;
  cursor:pointer;font-family:var(--sans);font-weight:400;font-size:.58rem;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text-mute);transition:all .2s ease;
}
.ntt-btn.active{background:var(--accent-lo);color:var(--accent)}
.ntt-btn:hover{color:var(--accent)}
.note-modal-field{margin-bottom:1.1rem}
.note-modal-label{
  font-family:var(--sans);font-weight:400;font-size:.55rem;
  letter-spacing:.22em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.5rem;display:block;
}
.note-modal-quote{
  padding:.9rem 1.1rem;
  border-left:2px solid var(--accent);
  background:var(--accent-glow);
  border-radius:0 3px 3px 0;
  font-family:var(--serif);font-weight:300;font-style:italic;
  font-size:.95rem;line-height:1.55;color:var(--text);
  max-height:180px;overflow-y:auto;
}
.note-modal-quote-empty{
  padding:.8rem 1rem;
  font-family:var(--sans);font-weight:300;font-size:.72rem;
  color:var(--text-mute);font-style:italic;
  border:1px dashed var(--border);border-radius:3px;
}
.note-modal-textarea{
  width:100%;min-height:140px;resize:vertical;
  background:transparent;border:1px solid var(--border);
  border-radius:3px;padding:.9rem 1rem;
  font-family:var(--sans);font-weight:300;font-size:.92rem;
  line-height:1.7;color:var(--text);
}
.note-modal-textarea:focus{outline:none;border-color:var(--accent)}
.note-modal-filter{
  width:100%;padding:.55rem .75rem;margin-bottom:.5rem;
  background:transparent;border:1px solid var(--border);border-radius:3px;
  font-family:var(--sans);font-weight:300;font-size:.75rem;color:var(--text);
}
.note-modal-filter:focus{outline:none;border-color:var(--accent)}
.chip-option.filtered-out{display:none}
/* Floating "Add note" button shown near text selection */
/* ─── Contextual annotation toolbar ─── */
.ctx-toolbar{
  position:fixed;z-index:1500;display:none;
  padding:.4rem .65rem;border-radius:22px;
  background:var(--bg-card);border:1px solid var(--border-strong);
  box-shadow:0 8px 28px rgba(0,0,0,.45);
  align-items:center;gap:.3rem;
  backdrop-filter:blur(12px);
}
.ctx-toolbar.visible{display:inline-flex}
.ctx-color{
  width:18px;height:18px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:all .15s ease;flex-shrink:0;
}
.ctx-color:hover{transform:scale(1.3);border-color:rgba(255,255,255,.35)}
.ctx-color[data-color="yellow"]{background:#e8d44d}
.ctx-color[data-color="green"]{background:#5dd49f}
.ctx-color[data-color="blue"]{background:#6ba3d6}
.ctx-color[data-color="orange"]{background:#e8a857}
.ctx-color[data-color="pink"]{background:#e491b8}
.ctx-color[data-color="red"]{background:#e87878}
.ctx-color[data-color="veil"]{background:var(--text);border:1.5px dashed var(--text-mute)}
.ctx-sep{width:1px;height:16px;background:var(--border);margin:0 .15rem;flex-shrink:0}
.ctx-action{
  width:24px;height:24px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s ease;flex-shrink:0;
}
.ctx-action:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}
.ctx-action svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ctx-hint-row{display:flex;align-items:center;gap:.3rem}
.ctx-hint-input{
  width:120px;padding:.25rem .5rem;border:1px solid var(--border);border-radius:12px;
  background:var(--bg);color:var(--text);font-family:'Caveat',cursive;font-size:.78rem;
  outline:none;transition:border-color .2s ease;
}
.ctx-hint-input:focus{border-color:var(--accent)}
.ctx-hint-input::placeholder{color:var(--text-mute);font-family:var(--sans);font-size:.55rem;font-style:normal}
.ctx-hint-apply{
  padding:.25rem .5rem;border:1px solid var(--accent);border-radius:12px;
  background:var(--accent-lo);color:var(--accent);cursor:pointer;
  font-family:var(--sans);font-size:.55rem;letter-spacing:.08em;
  transition:all .2s ease;
}
.ctx-hint-apply:hover{background:var(--accent);color:var(--bg)}
/* Applied highlights */
.hl-mark{border-radius:2px;padding:0 1px;transition:background .2s ease}
.hl-mark[data-hl-color="red"]{background:rgba(232,120,120,.25)}
.hl-mark[data-hl-color="pink"]{background:rgba(228,145,184,.25)}
.hl-mark[data-hl-color="orange"]{background:rgba(232,168,87,.25)}
.hl-mark[data-hl-color="blue"]{background:rgba(107,163,214,.25)}
.hl-mark[data-hl-color="green"]{background:rgba(93,212,159,.25)}
.hl-mark[data-hl-color="yellow"]{background:rgba(232,212,77,.3)}
.hl-mark[data-hl-color="underline"]{text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:3px}
.hl-mark[data-hl-color="veil"]{background:var(--text);color:var(--text);border-radius:3px;cursor:pointer;transition:all .25s ease;position:relative}
.hl-mark[data-hl-color="veil"]:hover{background:rgba(200,169,126,.15);color:inherit}
.hl-mark[data-hl-color="veil"][data-hl-hint]::before{
  content:attr(data-hl-hint);
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat','Segoe Script','Comic Sans MS',cursive;
  font-size:.85em;font-weight:400;
  color:#5b8abf;
  pointer-events:none;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 0 1px rgba(91,138,191,.3);
}
.hl-mark[data-hl-color="veil"]:hover::before{opacity:0}
html[data-theme="light"] .hl-mark[data-hl-color="veil"]{background:var(--text);color:var(--text)}
.chip-picker{
  display:flex;flex-wrap:wrap;gap:.4rem;
  padding:.6rem;border:1px solid var(--border);border-radius:3px;
  min-height:48px;
}
.chip-option{
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.35rem .7rem;border-radius:12px;
  border:1px solid var(--border-strong);
  background:transparent;
  font-family:var(--sans);font-weight:300;font-size:.65rem;
  letter-spacing:.08em;color:var(--text-dim);
  transition:all .25s ease;cursor:pointer;
}
.chip-option:hover{border-color:var(--accent);color:var(--accent)}
.chip-option.on{background:var(--accent-lo);border-color:var(--accent);color:var(--accent)}
.chip-option.on::before{content:'✓ ';opacity:.7}
.chip-option.topic-option{font-family:var(--serif);font-size:.72rem;font-weight:400}
.chip-picker-empty{
  font-family:var(--sans);font-weight:300;font-size:.68rem;
  color:var(--text-mute);font-style:italic;padding:.4rem;
}
.note-modal-actions{
  display:flex;justify-content:space-between;align-items:center;gap:.8rem;
  margin-top:1.4rem;padding-top:1.2rem;
  border-top:1px solid var(--border);
}
.note-modal-actions-left{font-family:var(--mono);font-size:.62rem;color:var(--text-mute);letter-spacing:.06em}

/* ─── NOTES PAGE (aggregation + filters) ─── */
.notes-grid{
  display:grid;gap:1.1rem;margin-top:1.5rem;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
}
/* User flashcards — flip cards, portrait 9:14 */
.ufc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.4rem}
.ufc-card{
  perspective:800px;cursor:pointer;aspect-ratio:9/14;
}
.ufc-card.flipped .ufc-inner{transform:rotateY(180deg)}
.ufc-inner{
  position:relative;width:100%;height:100%;
  transition:transform .5s var(--ease);transform-style:preserve-3d;
}
.ufc-face{
  position:absolute;inset:0;backface-visibility:hidden;
  border:1px solid var(--border);border-radius:8px;
  background:var(--bg-card);padding:1.2rem;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;overflow:hidden;
}
.ufc-back-face{transform:rotateY(180deg);background:var(--bg-elevated);justify-content:space-between}
.ufc-term{
  font-family:var(--serif);font-size:1.05rem;color:var(--text);line-height:1.4;
  overflow-y:auto;max-height:100%;width:100%;
  scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent;
}
.ufc-def{
  font-family:var(--sans);font-weight:300;font-size:.85rem;color:var(--text-dim);line-height:1.6;
  flex:1;width:100%;overflow-y:auto;display:flex;align-items:center;
  scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent;
}
.ufc-actions{display:flex;gap:.5rem;width:100%;justify-content:center;margin-top:.8rem}
.ufc-btn{
  padding:.35rem .7rem;border-radius:3px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;
  font-family:var(--sans);font-size:.55rem;letter-spacing:.08em;text-transform:uppercase;
  transition:all .2s ease;
}
.ufc-btn:hover{border-color:var(--accent);color:var(--accent)}
.ufc-btn-learn.active{border-color:#e8a857;color:#e8a857;background:rgba(232,168,87,.1)}
.ufc-btn-master.active{border-color:var(--green);color:var(--green);background:rgba(93,212,159,.1)}
.ufc-btn-edit{border-style:dashed}
.ufc-top-actions{
  position:absolute;top:.5rem;right:.5rem;display:flex;gap:.3rem;z-index:2;
}
.ufc-icon-btn{
  width:22px;height:22px;border-radius:50%;border:1px solid var(--border);
  background:rgba(0,0,0,.3);backdrop-filter:blur(4px);
  color:var(--text-mute);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s ease;
}
.ufc-icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.ufc-icon-btn svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:1.8}
.ufc-card.mastered .ufc-face{border-color:rgba(93,212,159,.25)}
.ufc-card.learning .ufc-face{border-color:rgba(232,168,87,.25)}

/* Highlights compilation */
.hl-comp-grid{margin-top:.5rem}
.hl-comp-unit{margin-bottom:2rem}
.hl-comp-unit-title{
  font-family:var(--sans);font-weight:400;font-size:.58rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
  padding-bottom:.5rem;margin-bottom:.8rem;border-bottom:1px solid var(--border);
}
.hl-comp-item{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:.65rem .8rem;margin-bottom:.35rem;
  border-radius:4px;background:var(--bg-card);border:1px solid var(--border);
  transition:border-color .2s ease;
}
.hl-comp-item:hover{border-color:rgba(200,169,126,.3)}
.hl-comp-swatch{
  width:14px;height:14px;border-radius:3px;flex-shrink:0;margin-top:.15rem;
}
.hl-comp-swatch[data-hl-color="red"]{background:rgba(232,120,120,.5)}
.hl-comp-swatch[data-hl-color="pink"]{background:rgba(228,145,184,.5)}
.hl-comp-swatch[data-hl-color="orange"]{background:rgba(232,168,87,.5)}
.hl-comp-swatch[data-hl-color="blue"]{background:rgba(107,163,214,.5)}
.hl-comp-swatch[data-hl-color="green"]{background:rgba(93,212,159,.5)}
.hl-comp-swatch[data-hl-color="yellow"]{background:rgba(232,212,77,.55)}
.hl-comp-swatch[data-hl-color="veil"]{background:var(--text);border:1px dashed var(--text-mute)}
.hl-comp-swatch[data-hl-color="underline"]{background:transparent;border-bottom:2px solid var(--accent)}
.hl-comp-text{
  flex:1;font-family:var(--serif);font-weight:300;font-size:.88rem;
  color:var(--text);line-height:1.55;min-width:0;
}
.hl-comp-veil{
  color:var(--text);background:var(--text);border-radius:2px;
  cursor:pointer;transition:all .3s ease;
}
.hl-comp-veil:hover{background:transparent;color:var(--text)}
.hl-comp-type{
  flex-shrink:0;font-family:var(--sans);font-size:.48rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--text-mute);
  padding:.2rem .5rem;border:1px solid var(--border);border-radius:10px;
  align-self:center;
}
.hl-comp-hint{
  flex-shrink:0;font-family:'Caveat',cursive;font-size:.78rem;
  color:#5b8abf;padding:.15rem .5rem;
  align-self:center;
}
.hl-comp-remove{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;
  border:1px solid transparent;background:transparent;
  color:var(--text-mute);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .2s ease;align-self:center;
}
.hl-comp-remove svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8}
.hl-comp-item:hover .hl-comp-remove{opacity:1}
.hl-comp-remove:hover{border-color:var(--red);color:var(--red);background:rgba(232,120,120,.1)}
.hl-comp-link{
  flex-shrink:0;width:24px;height:24px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--text-mute);text-decoration:none;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;transition:all .2s ease;align-self:center;
  opacity:0;
}
.hl-comp-item:hover .hl-comp-link{opacity:1}
.hl-comp-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-glow)}

.note-card{
  padding:1.3rem 1.4rem 1.4rem;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:4px;
  transition:all .35s var(--ease);
  display:flex;flex-direction:column;gap:.8rem;
}
.note-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 10px 24px rgba(0,0,0,.25)}
.note-card-source{
  font-family:var(--sans);font-weight:300;font-size:.55rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-mute);
  line-height:1.55;
}
.note-card-source strong{color:var(--accent);font-weight:400}
.note-card-quote{
  padding:.7rem .9rem;
  border-left:2px solid var(--accent);
  background:var(--accent-glow);
  font-family:var(--serif);font-weight:300;font-style:italic;
  font-size:.85rem;line-height:1.55;color:var(--text);
  max-height:120px;overflow:hidden;position:relative;
}
.note-card-quote::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(transparent,var(--accent-glow));
  pointer-events:none;
}
.note-card-body{
  font-family:var(--sans);font-weight:300;font-size:.85rem;
  line-height:1.7;color:var(--text-dim);
  display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden;
}
.note-card-foot{
  display:flex;justify-content:space-between;align-items:center;
  gap:.6rem;padding-top:.7rem;margin-top:auto;
  border-top:1px solid var(--border);
}
.note-card-date{
  font-family:var(--mono);font-size:.6rem;color:var(--text-mute);letter-spacing:.06em;
}
.note-card-link{
  font-family:var(--sans);font-weight:300;font-size:.55rem;
  letter-spacing:.16em;text-transform:uppercase;color:var(--accent);
}
.note-card-link:hover{text-decoration:underline}
.note-card-chips{display:flex;flex-wrap:wrap}

/* ─── TOPBAR nav link ─── */
.tb-navlink{
  font-family:var(--sans);font-weight:300;font-size:.6rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);
  padding:.4rem .75rem;border-radius:16px;
  border:1px solid transparent;transition:all .25s ease;
}
.tb-navlink:hover{color:var(--accent);border-color:var(--border)}
.tb-navlink.active{color:var(--accent);border-color:var(--accent);background:var(--accent-lo)}
.tb-navlink-icon{padding:.4rem .55rem;display:inline-flex;align-items:center}
.tb-navlink-icon svg{display:block}

/* ─── Global search page ─── */
.search-page{max-width:1000px;margin:0 auto;padding:0 4.5vw 3rem}
.search-input-xl{
  width:100%;font-family:var(--serif);font-weight:400;
  font-size:1.35rem;padding:1rem 1.2rem;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;color:var(--text);
  transition:border-color .25s ease;
}
.search-input-xl:focus{border-color:var(--accent);outline:none}
.search-input-xl::placeholder{color:var(--text-mute);font-style:italic}
.search-summary{
  font-family:var(--sans);font-weight:300;font-size:.6rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);
  margin:1.2rem 0 0;
}
.search-group{margin-top:2rem}
.search-group-head{
  font-family:var(--sans);font-weight:400;font-size:.6rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
  margin-bottom:.8rem;display:flex;align-items:center;gap:.6rem;
}
.search-group-count{color:var(--text-dim);font-weight:300}
.search-hit{
  display:block;padding:.95rem 1.1rem;
  border:1px solid var(--border);border-radius:4px;
  margin-bottom:.5rem;text-decoration:none;color:var(--text);
  transition:border-color .25s ease, transform .25s ease;
}
.search-hit:hover{border-color:var(--accent);transform:translateY(-1px)}
.search-hit-crumb{
  font-family:var(--sans);font-weight:300;font-size:.55rem;
  letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);
  margin-bottom:.35rem;
}
.search-hit-title{
  font-family:var(--serif);font-weight:400;font-size:1.05rem;color:var(--text);line-height:1.3;
}
.search-hit-excerpt{
  font-family:var(--sans);font-weight:300;font-size:.78rem;
  color:var(--text-mute);margin-top:.4rem;line-height:1.55;
}
.search-hit-excerpt mark{
  background:color-mix(in srgb, var(--accent) 30%, transparent);
  color:var(--text);padding:0 .22em;border-radius:2px;
}
.search-suggestions{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1.2rem}
.search-suggestion{
  font-family:var(--sans);font-weight:300;font-size:.6rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);
  padding:.4rem .8rem;border:1px solid var(--border);border-radius:16px;
  text-decoration:none;transition:all .2s ease;
}
.search-suggestion:hover{color:var(--accent);border-color:var(--accent)}
.search-empty{
  text-align:center;padding:3rem 1rem;color:var(--text-mute);
  font-family:var(--serif);font-style:italic;
}

/* ─── Flashcard status states (portal detail) ─── */
.fc-card.hidden-by-filter{display:none}
.fc-card[data-shuffle-order]{order:attr(data-shuffle-order number)}
.fb-action-btn{
  font-family:var(--sans);font-weight:300;font-size:.6rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);
  padding:.4rem .9rem;border:1px solid var(--border-strong);
  border-radius:3px;background:transparent;
  display:inline-flex;align-items:center;gap:.4rem;
  transition:all .25s ease;
}
.fb-action-btn:hover{border-color:var(--accent);color:var(--accent)}
.fb-action-btn.active{background:var(--accent-lo);color:var(--accent);border-color:var(--accent)}
.fb-action-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:1.8}

/* ═══ Reading list page ═══ */
.rl-list{display:flex;flex-direction:column;gap:.8rem;margin-top:2rem}
.rl-row{
  display:grid;grid-template-columns:auto 1fr auto;gap:1.2rem;align-items:center;
  padding:1.1rem 1.4rem;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;
  transition:border-color .25s ease, transform .25s ease;
}
.rl-row:hover{border-color:var(--accent);transform:translateY(-1px)}
.rl-row.is-done{opacity:.88}
.rl-index{
  font-family:var(--serif);font-size:1.6rem;font-weight:300;color:var(--accent);
  min-width:2.4rem;text-align:center;
}
.rl-body{min-width:0}
.rl-crumb{font-family:var(--sans);font-weight:300;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:.35rem}
.rl-title{font-family:var(--serif);font-weight:400;font-size:1.1rem;color:var(--text);line-height:1.3}
.rl-meta{display:flex;gap:.6rem;align-items:center;margin-top:.45rem;flex-wrap:wrap}
.rl-type{
  display:inline-flex;align-items:center;gap:.35rem;
  font-family:var(--sans);font-weight:300;font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);
  padding:.22rem .55rem;border:1px solid var(--border-strong);border-radius:2px;
}
.rl-type-icon svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:1.8;display:block}
.rl-status{
  font-family:var(--sans);font-weight:300;font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:var(--green,#5dd49f);
}
.rl-actions{display:flex;gap:.5rem;flex-shrink:0}
@media (max-width:900px){
  .rl-row{grid-template-columns:auto 1fr;}
  .rl-actions{grid-column:1 / -1;justify-content:flex-start;margin-top:.5rem}
}

/* ═══ Performance page ═══ */
/* ═══ Course Certificate ═══ */
.cert-page{display:flex;flex-direction:column;align-items:center;padding:2rem 0}
.cert-frame{
  width:1000px;max-width:95vw;aspect-ratio:1.414/1;background:#f8f5ef;
  box-shadow:0 12px 48px rgba(0,0,0,.3);
}
.cert-border{
  margin:12px;padding:8px;
  border:2px solid #8a6a24;
}
.cert-inner{
  border:1px solid rgba(138,106,36,.4);
  padding:2.4rem 4rem;text-align:center;
  position:relative;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(200,169,126,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(200,169,126,.06) 0%, transparent 50%),
    #f8f5ef;
}
.cert-logo{display:flex;align-items:center;justify-content:center;gap:.6rem;color:#8a6a24;margin-bottom:.8rem}
.cert-logo svg{width:32px;height:32px}
.cert-logo svg path{fill:#8a6a24}
.cert-logo-text{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;font-size:1.1rem;letter-spacing:.15em;text-transform:uppercase;color:#8a6a24}
.cert-ornament{font-size:.7rem;color:rgba(138,106,36,.4);letter-spacing:1rem;margin-bottom:1.2rem}
.cert-title{
  font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;
  font-size:2.2rem;color:#1a1712;letter-spacing:.04em;margin-bottom:.4rem;
}
.cert-line{width:80px;height:2px;background:#8a6a24;margin:1rem auto}
.cert-conferido{
  font-family:'Outfit',sans-serif;font-weight:300;font-size:.7rem;
  letter-spacing:.25em;text-transform:uppercase;color:#8a7e68;margin-bottom:.6rem;
}
.cert-name{
  font-family:'Caveat',cursive;font-weight:500;
  font-size:2.6rem;color:#1a1712;margin-bottom:1rem;
}
.cert-body{
  font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;
  font-size:1rem;color:#3a3228;line-height:1.8;margin-bottom:1.6rem;
}
.cert-body strong{font-weight:500;color:#1a1712}
.cert-body em{font-style:italic;color:#5a4f3f}
.cert-grades{
  display:flex;justify-content:center;gap:2rem;margin-bottom:1.8rem;flex-wrap:wrap;
}
.cert-grade{text-align:center}
.cert-grade-value{
  font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;
  font-size:1.8rem;color:#8a6a24;
}
.cert-grade-label{
  font-family:'Outfit',sans-serif;font-weight:300;font-size:.55rem;
  letter-spacing:.15em;text-transform:uppercase;color:#8a7e68;margin-top:.15rem;
}
.cert-date{
  font-family:'Outfit',sans-serif;font-weight:300;font-size:.68rem;
  color:#8a7e68;letter-spacing:.08em;margin-bottom:2rem;
}
.cert-signature{margin-top:1rem}
.cert-sig-line{width:200px;height:1px;background:#8a6a24;margin:0 auto .5rem}
.cert-sig-name{font-family:'Cormorant Garamond',Georgia,serif;font-weight:400;font-size:1.1rem;color:#1a1712}
.cert-sig-role{font-family:'Outfit',sans-serif;font-weight:300;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#8a7e68;margin-top:.1rem}
.cert-professor{
  font-family:'Outfit',sans-serif;font-weight:300;font-size:.72rem;
  color:#5a4f3f;letter-spacing:.04em;margin-bottom:1.2rem;
}
.cert-grade-detail{
  font-family:'Outfit',sans-serif;font-weight:300;font-size:.5rem;
  color:#8a7e68;margin-top:.1rem;
}
/* ═══ Guided Tour — bottom floating bar ═══ */
.tour-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:10000;
  background:var(--bg-card);border-top:1px solid var(--accent);
  box-shadow:0 -8px 32px rgba(0,0,0,.4);
  padding:1.2rem 2rem;
}
.tour-bar.active{display:block}
.tour-inner{
  max-width:900px;margin:0 auto;
  display:grid;grid-template-columns:auto 1fr auto;gap:1.4rem;align-items:center;
}
.tour-step-num{
  font-family:var(--mono);font-size:.5rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent);
  width:60px;text-align:center;
}
.tour-content{min-width:0}
.tour-title{
  font-family:var(--serif);font-weight:400;font-size:1.1rem;
  color:var(--text);line-height:1.2;margin-bottom:.25rem;
}
.tour-body{
  font-family:var(--sans);font-weight:300;font-size:.76rem;
  color:var(--text-dim);line-height:1.55;
}
.tour-nav{display:flex;gap:.5rem;align-items:center}
.tour-btn{
  padding:.45rem 1rem;border-radius:4px;cursor:pointer;
  font-family:var(--sans);font-weight:400;font-size:.58rem;
  letter-spacing:.12em;text-transform:uppercase;transition:all .2s ease;
  white-space:nowrap;
}
.tour-btn-back{border:1px solid var(--border);background:transparent;color:var(--text-dim)}
.tour-btn-back:hover{border-color:var(--accent);color:var(--accent)}
.tour-btn-next{border:1px solid var(--accent);background:var(--accent);color:var(--bg)}
.tour-btn-next:hover{background:var(--text);border-color:var(--text)}
.tour-close{
  width:26px;height:26px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--text-mute);cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s ease;
  margin-left:.3rem;
}
.tour-close:hover{border-color:var(--accent);color:var(--accent)}
.tour-dots{display:flex;gap:.3rem;margin-top:.4rem}
.tour-dot{width:5px;height:5px;border-radius:50%;background:var(--border-strong)}
.tour-dot.active{background:var(--accent);transform:scale(1.4)}
.cert-ornament-bottom{font-size:.6rem;color:rgba(138,106,36,.3);margin-top:1.5rem}
.cert-actions{display:flex;gap:1rem;margin-top:2rem;justify-content:center}
@media print{
  .cert-page{padding:0}
  .cert-actions{display:none}
  .cert-frame{box-shadow:none;width:100%}
}

.perf-summary{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:.9rem;margin:2rem 0 1.5rem;
}
.perf-summary-card{
  padding:1.2rem 1.3rem;background:var(--bg-card);
  border:1px solid var(--border);border-radius:4px;
  display:flex;flex-direction:column;gap:.3rem;
}
.perf-summary-label{font-family:var(--sans);font-weight:300;font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
.perf-summary-value{
  font-family:var(--serif);font-weight:300;font-size:2rem;color:var(--text);line-height:1;
}
.perf-summary-value span{font-size:.9rem;color:var(--text-dim);margin-left:.2rem}
.perf-summary-sub{font-family:var(--sans);font-weight:300;font-size:.68rem;color:var(--text-dim)}
.perf-section{margin-top:1.8rem}
/* Notes page prominent search bar — spans full width above the tab bar */
.notes-search-bar{
  display:flex;align-items:center;gap:.8rem;
  margin:2rem 0 .6rem;padding:.9rem 1.2rem;
  background:var(--bg-card);border:1px solid var(--border);border-radius:4px;
  transition:border-color .25s ease;
}
.notes-search-bar:focus-within{border-color:var(--accent)}
.notes-search-icon{color:var(--text-dim);flex-shrink:0}
.notes-search-bar:focus-within .notes-search-icon{color:var(--accent)}
.notes-search-input{
  flex:1;min-width:0;background:transparent;border:none;outline:none;
  font-family:var(--serif);font-weight:400;font-size:1.05rem;
  color:var(--text);padding:.2rem 0;
}
.notes-search-input::placeholder{color:var(--text-mute);font-style:italic}
/* Notes page tab bar — elongated pill with dividers */
.notes-tab-bar{
  display:inline-flex;align-items:stretch;
  border:1px solid var(--border);border-radius:28px;
  overflow:hidden;margin:1.6rem 0 1rem;
  background:var(--bg-card);
}
.ntb-btn{
  padding:.6rem 1.6rem;background:transparent;border:none;cursor:pointer;
  font-family:var(--sans);font-weight:300;font-size:.68rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute);
  transition:all .25s ease;position:relative;
}
.ntb-btn:hover{color:var(--accent)}
.ntb-btn.active{background:var(--accent-lo);color:var(--accent);font-weight:500}
.ntb-sep{
  width:1px;align-self:stretch;margin:.5rem 0;
  background:var(--border);flex-shrink:0;
}

.perf-view-toggle{display:flex;gap:.4rem;margin:1.6rem 0 .8rem}
.perf-view-btn{
  padding:.45rem 1rem;border:1px solid var(--border);border-radius:16px;
  background:transparent;cursor:pointer;
  font-family:var(--sans);font-weight:300;font-size:.62rem;
  letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);
  transition:all .25s ease;
}
.perf-view-btn.active{background:var(--accent-lo);border-color:var(--accent);color:var(--accent);font-weight:400}
.perf-view-btn:hover{border-color:var(--accent);color:var(--accent)}
.perf-ctx{display:block;font-size:.55rem;color:var(--text-mute);margin-top:.1rem}
.perf-section-label{
  font-family:var(--sans);font-weight:300;font-size:.62rem;letter-spacing:.22em;
  text-transform:uppercase;color:var(--accent);margin-bottom:.7rem;
}
.perf-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px;background:var(--bg-card)}
.perf-table{width:100%;border-collapse:collapse;font-family:var(--sans);font-size:.8rem;color:var(--text);table-layout:fixed}
.perf-table thead th{
  font-family:var(--sans);font-weight:300;font-size:.56rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--text-dim);text-align:right;
  padding:.9rem 1rem;border-bottom:1px solid var(--accent);background:transparent;
}
.perf-table thead th:first-child{text-align:left}
.perf-table tbody td{
  padding:.85rem 1rem;border-bottom:1px solid var(--border);text-align:right;
  vertical-align:middle;
}
.perf-table tbody tr:last-child td{border-bottom:none}
.perf-table tbody tr.perf-row:hover{background:var(--accent-glow)}
/* td stays as table-cell so its border-bottom aligns with sibling cells in the row.
   The flex layout is pushed to an inner wrapper. */
.perf-label{text-align:left;font-family:var(--serif);font-weight:400;font-size:.95rem;color:var(--text);vertical-align:middle}
.perf-label-inner{display:flex;align-items:center;gap:.6rem}
.perf-num{
  display:inline-block;min-width:2.4rem;
  font-family:var(--sans);font-weight:300;font-size:.66rem;letter-spacing:.12em;
  color:var(--accent);padding:.2rem .45rem;border:1px solid var(--border-strong);border-radius:2px;
}
.perf-hash{font-family:var(--serif);color:var(--accent);font-size:1.1rem}
.perf-name{font-family:var(--serif);color:var(--text)}
.perf-num-cell{font-family:var(--sans);font-weight:300;font-size:.85rem;color:var(--text)}
.perf-dim{color:var(--text-dim)}
.perf-fc-cell{min-width:140px;white-space:nowrap}
.perf-c-correct{color:var(--green);font-weight:500}
.perf-c-cdoubt{color:#e8a857;font-weight:400}
.perf-c-wrong{color:var(--red);font-weight:500}
.perf-c-wdoubt{color:#e87878;font-weight:400;opacity:.7}
.perf-fc-mastered{font-family:var(--sans);font-weight:500;color:var(--green);font-size:.82rem}
.perf-fc-learning{font-family:var(--sans);font-weight:400;color:var(--accent);font-size:.82rem}
.perf-fc-unseen{font-family:var(--sans);font-weight:300;color:var(--text-mute);font-size:.82rem}
.perf-fc-sep{font-family:var(--sans);color:var(--text-dim);margin:0 .15rem}
.perf-fc-total{font-family:var(--sans);color:var(--text);font-size:.82rem}
.perf-fc-review{
  display:block;font-family:var(--sans);font-weight:300;font-size:.56rem;
  letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-top:.2rem;
}
.perf-completion{min-width:140px}
.perf-bar{
  display:inline-block;width:110px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;
  vertical-align:middle;
}
.perf-bar span{display:block;height:100%;background:var(--accent);transition:width .4s ease}
.perf-bar-label{font-family:var(--sans);font-weight:300;font-size:.65rem;color:var(--text-dim);margin-top:.25rem}
.perf-expand{
  width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;
  border:1px solid var(--border);background:transparent;border-radius:2px;cursor:pointer;color:var(--text-dim);
  transition:transform .25s ease, color .25s ease, border-color .25s ease;flex-shrink:0;
}
.perf-expand svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
.perf-expand:hover{border-color:var(--accent);color:var(--accent)}
.perf-expand.open{transform:rotate(180deg);border-color:var(--accent);color:var(--accent)}
.perf-expand-placeholder{width:22px;height:22px;display:inline-block;border:1px dashed transparent}
.perf-empty{text-align:center;color:var(--text-dim);padding:2rem 1rem;font-style:italic}

.perf-breakdown > td{background:var(--accent-glow);padding:0 !important;border-bottom:1px solid var(--accent) !important}
.perf-breakdown-inner{padding:.6rem 0 .8rem}
.perf-breakdown-table{width:100%;border-collapse:collapse;font-family:var(--sans);font-size:.74rem;table-layout:fixed}
.perf-breakdown-table thead th{
  font-family:var(--sans);font-weight:300;font-size:.52rem;letter-spacing:.16em;
  text-transform:uppercase;color:var(--accent);text-align:right;padding:.55rem 1rem;
  border-bottom:1px solid var(--border-strong);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.perf-breakdown-table thead th:first-child{text-align:left}
.perf-breakdown-table tbody td{padding:.6rem 1rem;border-bottom:1px dashed var(--border);text-align:right;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.perf-breakdown-table td.perf-bd-ctx{text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:calc(1rem + 22px + .6rem)}
.perf-bd-indent{display:inline-block;width:0;vertical-align:middle}
.perf-bd-indent-chapter{width:.8rem}
.perf-bd-indent-unit{width:1.6rem}
.perf-bd-kind{
  font-family:var(--sans);font-weight:300;font-size:.5rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);
  padding:.18rem .4rem;border:1px solid var(--border);border-radius:2px;
}
.perf-bd-module .perf-bd-kind{color:var(--accent);border-color:var(--accent)}
.perf-bd-name{font-family:var(--serif);color:var(--text);font-size:.88rem}
.perf-bd-module .perf-bd-name{font-weight:400}
.perf-bd-unit .perf-bd-name{color:var(--text-dim)}

.admin-shell{
  display:grid;
  grid-template-columns:minmax(220px,260px) minmax(0,1fr);
  gap:1.6rem;
  align-items:start;
}

}

              groups:[

                  blocks:[
                    {
                      id:'b1-1-1', type:'textgallery',
                      title:'Uma frota rumo às Índias',
                      description:'A partida de Lisboa, a volta do mar e o avistamento do Monte Pascoal — os eventos que levaram ao primeiro contato com a terra que se chamaria Brasil.',
                      audio_url:'https://upload.wikimedia.org/wikipedia/commons/4/47/Beethoven_-_Moonlight_Sonata.ogg',
                      topics:['t_brcol_desc'], tags:['tg_cabral','tg_1500'],
                      paragraphs:[
                        { id:'p1', title:null,
                          content:'<p>Em <strong>9 de março de 1500</strong>, uma frota de treze naus comandada por <strong>Pedro Álvares Cabral</strong> partiu de Lisboa. O destino oficial era Calicute, na Índia, seguindo a rota aberta por Vasco da Gama dois anos antes.</p>',
                          description:'Parágrafo de abertura — situa a expedição no contexto das navegações.',
                          fragments:[
                            { id:'f-cabral', text:'Pedro Álvares Cabral',
                              definition:'Navegador português que comandou a frota de 1500. Fidalgo da Casa Real, foi escolhido por D. Manuel I para liderar a segunda expedição portuguesa às Índias.',
                              images:[{name:'Retrato idealizado de Cabral',description:'Retrato do séc. XIX — Biblioteca Nacional',url:'https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=400&q=80'}],
                              link:null, relatedTerms:['f-vasco','f-caminha'], topics:null, tags:null },
                            { id:'f-calicute', text:'Calicute',
                              definition:'Cidade-porto na costa do Malabar (atual Kozhikode, Índia). Principal entreposto de especiarias no Oceano Índico e destino oficial da frota de Cabral.',
                              images:null, link:'https://pt.wikipedia.org/wiki/Kozhikode', relatedTerms:['f-vasco'], topics:null, tags:null },
                            { id:'f-vasco', text:'Vasco da Gama',
                              definition:'Navegador que em 1497–1498 completou a primeira viagem marítima direta da Europa à Índia, contornando o cabo da Boa Esperança.',
                              images:[{name:'Rota de Vasco da Gama',description:'Mapa da rota de 1497–1498',url:'https://images.unsplash.com/photo-1524661135-423995f22d0b?w=400&q=80'}],
                              link:null, relatedTerms:['f-cabral'], topics:null, tags:null }
                          ] },
                        { id:'p2', title:null,
                          content:'<p>A frota incluía homens como <em>Bartolomeu Dias</em>, <em>Nicolau Coelho</em> e o escrivão <em>Pero Vaz de Caminha</em>, cuja carta ao rei D. Manuel I se tornaria o primeiro documento escrito sobre o Brasil.</p>',
                          description:'Apresenta os principais tripulantes e o papel de Caminha.',
                          fragments:[
                            { id:'f-caminha', text:'Pero Vaz de Caminha',
                              definition:'Escrivão da frota de Cabral. Sua carta a D. Manuel I, datada de 1º de maio de 1500, é considerada a certidão de nascimento do Brasil.',
                              images:[{name:'Fac-símile da Carta',description:'Página da carta — Arquivo Nacional da Torre do Tombo',url:'https://images.unsplash.com/photo-1524661135-423995f22d0b?w=400&q=80'}],
                              link:null, relatedTerms:['f-cabral','f-manuelI'], topics:null, tags:null },
                            { id:'f-bartolomeu', text:'Bartolomeu Dias',
                              definition:'Navegador que em 1488 dobrou o cabo da Boa Esperança pela primeira vez. Integrou a frota de Cabral em 1500 e morreu em naufrágio na costa africana.',
                              images:null, link:null, relatedTerms:['f-cabral'], topics:null, tags:null }
                          ] },
                        { id:'p3', title:'A rota da volta do mar',
                          content:'<p>Para aproveitar os ventos, Cabral desviou-se para oeste numa manobra conhecida como <em>volta do mar</em>. Em <strong>22 de abril</strong>, avistaram o Monte Pascoal.</p>',
                          description:'Explica a manobra náutica que levou ao avistamento do Brasil.',
                          fragments:[
                            { id:'f-voltadomar', text:'volta do mar',
                              definition:'Técnica de navegação que consiste em desviar a rota para oeste no Atlântico Sul, aproveitando os ventos alísios e as correntes marítimas para contornar o continente africano.',
                              images:[
                                {name:'Diagrama dos ventos',description:'Padrão de ventos no Atlântico Sul',url:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=400&q=80'},
                                {name:'Rota da volta do mar',description:'Traçado hipotético da manobra de Cabral',url:'https://images.unsplash.com/photo-1551269901-5c5e14c25df7?w=400&q=80'}
                              ],
                              link:null, relatedTerms:['f-cabral','f-montepascoal'], topics:null, tags:null },
                            { id:'f-montepascoal', text:'Monte Pascoal',
                              definition:'Elevação na costa da Bahia, primeiro ponto do continente avistado pela frota de Cabral em 22 de abril de 1500. O nome remete à Páscoa, celebrada no dia seguinte.',
                              images:[{name:'Monte Pascoal hoje',description:'Vista do monte a partir da costa',url:'https://images.unsplash.com/photo-1569974280040-0b3c0b6eb2aa?w=400&q=80'}],
                              link:null, relatedTerms:['f-voltadomar'], topics:null, tags:null }
                          ] },
                        { id:'p4', title:null,
                          content:'<blockquote>\u201cEsta terra, Senhor, me parece que da ponta que mais contra o sul vimos, até a outra ponta que contra o norte vem, (...) será tamanha, que haverá nela bem vinte ou vinte e cinco léguas por costa.\u201d \u2014 Pero Vaz de Caminha</blockquote>',
                          description:'Citação direta da Carta de Caminha sobre a extensão da terra avistada.',
                          fragments:[] },
                        { id:'p5', title:'O primeiro contato',
                          content:'<p>Ao aproximarem-se da costa, os portugueses avistaram homens que andavam pela praia. Eram Tupiniquins, povo de língua tupi que ocupava o litoral entre o atual sul da Bahia e o norte do Espírito Santo. O contato inicial foi marcado por curiosidade mútua: os indígenas apontavam para o navio e para a água, enquanto os marinheiros acenavam do convés.</p>',
                          description:'Descreve o primeiro contato entre portugueses e Tupiniquins.',
                          fragments:[
                            { id:'f-tupiniquins', text:'Tupiniquins',
                              definition:'Povo indígena de tronco linguístico tupi que habitava o litoral entre o sul da Bahia e o Espírito Santo. Foram o primeiro grupo a entrar em contato com a frota de Cabral em abril de 1500.',
                              images:[{name:'Gravura de indígenas tupis',description:'Gravura europeia do séc. XVI representando povos tupis do litoral',url:'https://images.unsplash.com/photo-1582719471384-894fbb16e074?w=400&q=80'}],
                              link:'https://pt.wikipedia.org/wiki/Tupiniquins', relatedTerms:['f-caminha','f-montepascoal'], topics:['t_brcol_desc'], tags:null }
                          ] },
                        { id:'p6', title:null,
                          content:'<p>Nos dias seguintes, Cabral enviou Nicolau Coelho num batel para tentar comunicação. Segundo Caminha, os Tupiniquins ofereceram cocares de penas e colares, recebendo em troca um barrete vermelho e uma carapuça de linho. O escambo inaugurava um padrão que se repetiria por décadas: objetos europeus de baixo valor trocados por curiosidades locais.</p>',
                          description:'O primeiro escambo e o padrão de troca que se estabeleceria.',
                          fragments:[
                            { id:'f-escambo', text:'escambo',
                              definition:'Troca direta de mercadorias sem uso de moeda. No contexto colonial, refere-se à prática de trocar objetos europeus de baixo custo (espelhos, tecidos, ferramentas) por produtos nativos (pau-brasil, penas, alimentos). Foi a base da economia colonial nos primeiros trinta anos.',
                              images:null, link:null, relatedTerms:['f-paubrasil','f-tupiniquins'], topics:null, tags:null },
                            { id:'f-nicolaucoelho', text:'Nicolau Coelho',
                              definition:'Navegador experiente que já havia participado da expedição de Vasco da Gama (1497–1498). Na frota de Cabral, comandou uma das naus e foi o primeiro a descer em batel para contatar os indígenas na costa.',
                              images:null, link:null, relatedTerms:['f-cabral','f-vasco'], topics:null, tags:null }
                          ] },
                        { id:'p7', title:'A posse e a missa',
                          content:'<p>Em <strong>26 de abril</strong>, frei Henrique de Coimbra celebrou a primeira missa em território brasileiro, numa ilhota próxima à costa que Cabral batizou de Vera Cruz. Uma grande cruz de madeira foi erguida, e o ato foi interpretado simultaneamente como ritual religioso e gesto de posse — conforme o Direito das Gentes e as bulas papais que sustentavam o Tratado de Tordesilhas.</p>',
                          description:'A primeira missa como ato religioso e jurídico de posse territorial.',
                          fragments:[
                            { id:'f-freihenrique', text:'frei Henrique de Coimbra',
                              definition:'Frade franciscano que acompanhou a frota de Cabral e celebrou a primeira missa no Brasil em 26 de abril de 1500. Posteriormente foi nomeado bispo de Ceuta.',
                              images:[{name:'A Primeira Missa no Brasil',description:'Óleo de Victor Meirelles (1860) — Museu Nacional de Belas Artes',url:'https://images.unsplash.com/photo-1582719471384-894fbb16e074?w=400&q=80'}],
                              link:null, relatedTerms:['f-cabral','f-veracruz'], topics:null, tags:null },
                            { id:'f-veracruz', text:'Vera Cruz',
                              definition:'Primeiro nome dado por Cabral à terra avistada. Refletia o caráter religioso da expedição. Posteriormente, a terra foi chamada de Ilha de Vera Cruz, Terra de Santa Cruz e, finalmente, Brasil — por conta do pau-brasil.',
                              images:null, link:null, relatedTerms:['f-paubrasil'], topics:null, tags:null },
                            { id:'f-tordesilhas', text:'Tratado de Tordesilhas',
                              definition:'Acordo de 1494 entre Portugal e Espanha que dividiu o mundo não-cristão em duas zonas de influência. Uma linha imaginária a 370 léguas a oeste de Cabo Verde separava as posses: a leste, Portugal; a oeste, Espanha. O Brasil caía no lado português.',
                              images:[{name:'Documento do Tratado',description:'Instrumento diplomático original — Arquivo da Torre do Tombo',url:'https://images.unsplash.com/photo-1524661135-423995f22d0b?w=400&q=80'}],
                              link:'https://pt.wikipedia.org/wiki/Tratado_de_Tordesilhas', relatedTerms:['f-manuelI','f-cabral'], topics:null, tags:['tg_1500'] }
                          ] },
                        { id:'p8', title:null,
                          content:'<p>Após nove dias na costa, Cabral decidiu retomar a viagem rumo à Índia. Deixou dois degredados entre os Tupiniquins e despachou o navio de mantimentos, comandado por Gaspar de Lemos, de volta a Lisboa levando a carta de Caminha e amostras de pau-brasil. Era o início de uma relação colonial que duraria mais de três séculos.</p>',
                          description:'A partida da frota e os primeiros atos coloniais: degredados e pau-brasil.',
                          fragments:[
                            { id:'f-degredados', text:'degredados',
                              definition:'Condenados pela justiça portuguesa que eram deixados em terras recém-descobertas para aprender a língua local e servir de intérpretes em expedições futuras. Os dois degredados deixados por Cabral entre os Tupiniquins são considerados os primeiros europeus a viver permanentemente no Brasil.',
                              images:null, link:null, relatedTerms:['f-tupiniquins','f-cabral'], topics:null, tags:null },
                            { id:'f-paubrasil', text:'pau-brasil',
                              definition:'Árvore nativa da Mata Atlântica (Caesalpinia echinata) cuja madeira produzia um valioso corante vermelho. Foi o primeiro produto de exportação da colônia, motivou as primeiras feitorias e acabou por dar nome à terra.',
                              images:[{name:'Tronco de pau-brasil',description:'Corte transversal mostrando o cerne avermelhado',url:'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&q=80'}],
                              link:'https://pt.wikipedia.org/wiki/Pau-brasil', relatedTerms:['f-escambo','f-veracruz'], topics:['t_brcol_desc'], tags:null },
                            { id:'f-gaspardelemos', text:'Gaspar de Lemos',
                              definition:'Capitão do navio de mantimentos da frota de Cabral. Foi destacado para retornar a Portugal com a carta de Caminha, amostras de pau-brasil e as primeiras notícias sobre a terra encontrada.',
                              images:null, link:null, relatedTerms:['f-caminha','f-cabral'], topics:null, tags:null }
                          ] },
                        { id:'p9', title:null,
                          content:'<blockquote>\u201cA melhor coisa que dela se pode tirar me parece que será salvar esta gente. E esta deve ser a principal semente que Vossa Alteza em ela deve lançar.\u201d \u2014 Pero Vaz de Caminha, trecho final da carta ao rei D. Manuel I</blockquote>',
                          description:'Citação da proposta catequética de Caminha — encerramento retórico da leitura.',
                          fragments:[] },
                        { id:'p10', title:null,
                          content:'<p>Os mapas produzidos entre 1500 e 1540 \u2014 ao lado \u2014 mostram a incerteza inicial sobre a forma do continente recém-encontrado. O rei <strong>D. Manuel I</strong> recebeu relatórios que variavam entre otimismo comercial e cautela territorial. O planisfério de Cantino, de 1502, já registrava parte do litoral brasileiro, mas a real extensão da terra permaneceria incerta por décadas.</p>',
                          description:'Contextualiza a recepção cartográfica e política do achamento.',
                          fragments:[
                            { id:'f-manuelI', text:'D. Manuel I',
                              definition:'Rei de Portugal (1495–1521), cognominado o Venturoso. Patrocinou as grandes expedições marítimas, incluindo as de Vasco da Gama e Cabral. Sua política expansionista consolidou o império comercial português no Índico.',
                              images:null, link:'https://pt.wikipedia.org/wiki/Manuel_I_de_Portugal', relatedTerms:['f-cabral','f-caminha','f-tordesilhas'], topics:null, tags:null },
                            { id:'f-cantino', text:'planisfério de Cantino',
                              definition:'Mapa-múndi de 1502, obtido por espionagem pelo italiano Alberto Cantino em Lisboa. É o mais antigo documento cartográfico que representa o litoral brasileiro, revelando o conhecimento geográfico que Portugal guardava em sigilo.',
                              images:[{name:'Planisfério de Cantino (detalhe)',description:'Detalhe do litoral brasileiro no mapa de 1502',url:'https://images.unsplash.com/photo-1551269901-5c5e14c25df7?w=400&q=80'}],
                              link:'https://pt.wikipedia.org/wiki/Planisf%C3%A9rio_de_Cantino', relatedTerms:['f-manuelI','f-tordesilhas'], topics:null, tags:null }
                          ] }
                      ],
                      images:[
                        { url:'https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=600&q=80', caption:'Reconstituição da nau capitânia', alt:'Nau portuguesa' },
                        { url:'https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=600&q=80', caption:'A costa de Porto Seguro hoje', alt:'Costa brasileira' },
                        { url:'https://images.unsplash.com/photo-1524661135-423995f22d0b?w=700&q=80', caption:'Mapa de Cantino (1502)', alt:'Mapa' },

                    {
                      id:'b1-1-5', type:'comments',
                      title:'Discussão — A expedição de Cabral',
                      prompt:'Compartilhe suas reflexões sobre a expedição de 1500. Por que Cabral desviou para o oeste? O achamento foi acidental ou intencional? Como a Carta de Caminha molda nossa compreensão do evento?',
                      topics:['t_brcol_desc'], tags:['tg_cabral'],
                      comments:[
                        { id:'mock-c1', author:'Ana Beatriz', authorId:'ana', text:'Achei fascinante a teoria do achamento intencional. Se olharmos a rota da volta do mar, o desvio para oeste faz sentido náutico, mas o quanto dele era planejado pela Coroa para assegurar o que Tordesilhas já garantia?', createdAt:Date.now()-86400000*5 },
                        { id:'mock-c2', author:'Carlos Eduardo', authorId:'carlos', text:'Concordo, Ana. O que me intriga é o fato de a frota ter levado tantos homens — mais do que uma simples passagem para as Índias exigiria. Havia claramente uma expectativa de parada.', createdAt:Date.now()-86400000*4, parentId:'mock-c1' },
                        { id:'mock-c3', author:'Fernanda Lima', authorId:'fernanda', text:'A Carta de Caminha é um documento impressionante pela riqueza etnográfica. Mas precisamos lembrar que ela reflete a perspectiva do colonizador — os Tupiniquins não tiveram voz nesse registro.', createdAt:Date.now()-86400000*3 },
                        { id:'mock-c4', author:'Rafael Souza', authorId:'rafael', text:'Excelente ponto, Fernanda. A historiografia mais recente tenta reconstruir a perspectiva indígena a partir de vestígios arqueológicos e relatos de outros viajantes. Recomendo o livro "1499" de Reinaldo José Lopes.', createdAt:Date.now()-86400000*2, parentId:'mock-c3' }

                {
                  id:'g1-2',
                  title:'Leitura de fontes',
                  blocks:[
                    {
                      id:'b1-2-0', type:'text',
                      title:'A Carta de Caminha como documento',
                      description:'Leitura crítica da carta como fonte histórica: o que ela revela, o que silencia e como a historiografia a interpreta.',
                      topics:['t_brcol_desc'], tags:['tg_cabral'],
                      html:'<p>A carta escrita por <strong>Pero Vaz de Caminha</strong> em maio de 1500 é o <em>primeiro documento português sobre o Brasil</em>. Endereçada a D. Manuel I, combina registro administrativo, impressões etnográficas e linguagem solene da chancelaria.</p><h4>Por que lê-la hoje</h4><p>O texto serve como fonte para três eixos:</p><ul style="margin:.6rem 0 1rem 1.2rem;line-height:1.9"><li>o contato inicial com povos originários;</li><li>a percepção portuguesa do território recém-encontrado;</li><li>os protocolos de tomada de posse no direito ibérico do século XVI.</li></ul><p>As questões abaixo trabalham trechos selecionados da carta, cada um seguido de asserções a serem julgadas.</p>'
                    },
                    {
                      id:'b1-2-1', type:'quiz',
                      description:'Questões no estilo CESPE/CEBRASPE sobre trechos selecionados da Carta de Caminha.',

                            },

                              type:'image',

                            }
