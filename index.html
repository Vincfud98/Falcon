Renderers.admin.mount = function(stageEl){
  const links = Array.from(stageEl.querySelectorAll('.admin-side-link'));
  const sections = Array.from(stageEl.querySelectorAll('[data-admin-section]'));
  const analytics = AdminAnalytics.build();
  const modalEl = stageEl.querySelector('#adminModal');
  const modalTitleEl = stageEl.querySelector('#adminModalTitle');
  const modalCopyEl = stageEl.querySelector('#adminModalCopy');
  const modalBodyEl = stageEl.querySelector('#adminModalBody');
  let questionChart = null;
  let accessChart = null;
  let profilePieChart = null;
  let profileBarChart = null;
  function setActive(id){ links.forEach(link => link.classList.toggle('active', link.getAttribute('data-target') === id)); }
  links.forEach(link => {
    link.addEventListener('click', () => {
      const id = link.getAttribute('data-target');
      const section = stageEl.querySelector('#' + CSS.escape(id));
      if(section) section.scrollIntoView({ behavior:'smooth', block:'start' });
      setActive(id);
    });
  });
  if('IntersectionObserver' in window){
    const observer = new IntersectionObserver(entries => {
      const visible = entries.filter(entry => entry.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if(visible) setActive(visible.target.id);
    }, { rootMargin:'-20% 0px -55% 0px', threshold:[0.15, 0.35, 0.6] });
    sections.forEach(section => observer.observe(section));
  }
  function destroyProfileCharts(){
    if(profilePieChart){ profilePieChart.destroy(); profilePieChart = null; }
    if(profileBarChart){ profileBarChart.destroy(); profileBarChart = null; }
  }
  function openModal(title, copy, bodyHtml){
    modalTitleEl.textContent = title;
    modalCopyEl.textContent = copy;
    modalBodyEl.innerHTML = bodyHtml;
    modalEl.classList.add('open');
    modalEl.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeModal(){
    modalEl.classList.remove('open');
    modalEl.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    destroyProfileCharts();
  }
  stageEl.querySelector('#adminModalClose').addEventListener('click', closeModal);
  modalEl.addEventListener('click', e => { if(e.target === modalEl) closeModal(); });
  function chartPalette(){
    return { line:'#c8a97e', fill:'rgba(200,169,126,.12)', muted:'rgba(240,236,228,.55)', grid:'rgba(200,169,126,.10)', pie:['#5dd49f', '#e87878'], bars:['rgba(200,169,126,.92)', 'rgba(200,169,126,.74)', 'rgba(200,169,126,.56)', 'rgba(200,169,126,.4)'] };
  }
  function ensureCharts(targetId, message){
    const canvas = stageEl.querySelector('#' + CSS.escape(targetId));
    if(window.Chart || !canvas) return canvas;
    canvas.parentElement.innerHTML = `<div class="admin-empty-chart">${Util.esc(message || 'Chart.js nao carregou. Conecte a internet para visualizar os graficos.')}</div>`;
    return null;
  }
  function renderQuestionChart(filter){
    const canvas = ensureCharts('adminQuestionChart', 'Chart.js nao carregou para o grafico principal.');
    const meta = stageEl.querySelector('#adminQuestionMeta');
    if(!canvas || !window.Chart) return;
    const palette = chartPalette();
    const series = AdminAnalytics.questionSeries(analytics, filter);
    if(questionChart) questionChart.destroy();
    meta.textContent = ({ week:'Semana atual', month:'Mes atual', half:'Ultimos 6 meses', year:'Ultimos 12 meses' })[filter] || 'Semana atual';
    questionChart = new window.Chart(canvas.getContext('2d'), { type:'line', data:{ labels:series.map(item => item.label), datasets:[{ label:'Questoes resolvidas', data:series.map(item => item.value), borderColor:palette.line, backgroundColor:palette.fill, pointBackgroundColor:'#f0ece4', pointBorderColor:palette.line, pointRadius:4, tension:.34, fill:true }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false }, tooltip:{ displayColors:false } }, scales:{ x:{ ticks:{ color:palette.muted }, grid:{ color:'transparent' } }, y:{ ticks:{ color:palette.muted }, grid:{ color:palette.grid } } } } });
  }
  function renderAccessChart(){
    const canvas = ensureCharts('adminAccessChart', 'Chart.js nao carregou para o grafico de acessos.');
    if(!canvas || !window.Chart) return;
    const palette = chartPalette();
    const series = AdminAnalytics.accessSeries(analytics);
    if(accessChart) accessChart.destroy();
    accessChart = new window.Chart(canvas.getContext('2d'), {
      type:'line',
      data:{ labels:series.map(item => item.label), datasets:[{ label:'Acessos unicos', data:series.map(item => item.value), borderColor:'#f0ece4', backgroundColor:'rgba(240,236,228,.08)', pointBackgroundColor:palette.line, pointBorderColor:'#f0ece4', pointRadius:4, tension:.28, fill:true }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false }, tooltip:{ displayColors:false } }, scales:{ x:{ ticks:{ color:palette.muted }, grid:{ color:'transparent' } }, y:{ ticks:{ color:palette.muted }, grid:{ color:palette.grid } } }, onClick:(evt, activeEls) => { if(!activeEls || !activeEls.length) return; const point = series[activeEls[0].index]; openUsersForDay(point.key, point.label); } }
    });
  }
  function attachModalUserOpeners(){
    modalBodyEl.querySelectorAll('[data-admin-open-user]').forEach(btn => {
      btn.addEventListener('click', () => {
        const userId = btn.getAttribute('data-admin-open-user');
        if(userId) openUserProfile(userId);
      });
    });
  }
  function openUsersForDay(dayKey, label){
    const users = AdminAnalytics.usersForDay(analytics, dayKey);
    const rows = users.map(user => `<button class="admin-user-row" data-admin-open-user="${Util.attr(user.id)}"><div class="admin-avatar"><img src="${Util.attr(user.avatar)}" alt="${Util.attr(user.name)}"></div><div><div class="admin-user-name">${Util.esc(user.name)}</div><div class="admin-user-meta">${Util.esc(user.email)} · ${user.lessonsCompleted} aulas concluidas · ${user.averageAccuracy}% de acerto medio</div></div><div class="admin-user-pulse">abrir perfil</div></button>`).join('');
    openModal(`Acessos em ${label}`, `${users.length} usuarios unicos registrados neste dia.`, rows || '<div class="admin-empty-chart">Nenhum usuario encontrado para este dia.</div>');
    attachModalUserOpeners();
  }
  function openUserProfile(userId){
    const user = analytics.userMap[userId];
    if(!user) return;
    openModal(`Perfil de ${user.name}`, 'Visao administrativa completa do usuario selecionado. A ofensiva considera dias com questao resolvida ou leitura marcada no material.', `<div class="admin-profile-head"><div class="admin-profile-avatar"><img src="${Util.attr(user.avatar)}" alt="${Util.attr(user.name)}"></div><div><div class="admin-profile-name">${Util.esc(user.name)}</div><div class="admin-profile-email">${Util.esc(user.email)}</div><div class="admin-profile-role">${Util.esc(user.role === 'admin' ? 'Admin' : 'Aluno')}</div></div></div><div class="admin-profile-stats"><div class="admin-profile-stat"><strong>${user.lessonsCompleted}</strong><span>Aulas concluidas</span></div><div class="admin-profile-stat"><strong>${user.averageAccuracy}%</strong><span>Acerto medio</span></div><div class="admin-profile-stat"><strong>${user.streakDays}</strong><span>Ofensiva de dias</span></div></div><div class="admin-modal-user-grid" style="margin-top:1rem"><div class="admin-chart-card"><div class="admin-chart-title">Grafico de pizza de acertos</div><div class="admin-chart-copy">Distribuicao entre respostas corretas e erros acumulados.</div><div class="admin-mini-chart"><canvas id="adminProfilePie"></canvas></div></div><div class="admin-chart-card"><div class="admin-chart-title">Desempenho pedagogico</div><div class="admin-chart-copy">O modal abre por aula como padrao, mas voce pode alternar para materia, modulo ou capitulo.</div><div class="admin-modal-controls"><button class="admin-filter-btn" data-admin-view="subject">Materia</button><button class="admin-filter-btn" data-admin-view="module">Modulo</button><button class="admin-filter-btn" data-admin-view="chapter">Capitulo</button><button class="admin-filter-btn active" data-admin-view="lesson">Aula</button></div><div class="admin-mini-chart"><canvas id="adminProfileBar"></canvas></div></div></div>`);
    if(!window.Chart) return;
    const palette = chartPalette();
    const pieCanvas = modalBodyEl.querySelector('#adminProfilePie');
    const barCanvas = modalBodyEl.querySelector('#adminProfileBar');
    if(pieCanvas){
      profilePieChart = new window.Chart(pieCanvas.getContext('2d'), { type:'pie', data:{ labels:['Acertos', 'Erros'], datasets:[{ data:[user.correctAnswers, user.incorrectAnswers], backgroundColor:palette.pie, borderColor:'rgba(11,12,15,.7)', borderWidth:1 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ labels:{ color:palette.muted } } } } });
    }
    function renderProfilePerformance(view){
      if(profileBarChart){ profileBarChart.destroy(); profileBarChart = null; }
      const series = AdminAnalytics.performanceSeries(user, view);
      if(!barCanvas || !series.length) return;
      profileBarChart = new window.Chart(barCanvas.getContext('2d'), { type:'bar', data:{ labels:series.map(item => item.label), datasets:[{ label:'Acuracia', data:series.map(item => item.accuracy), backgroundColor:series.map((_, idx) => palette.bars[idx % palette.bars.length]), borderRadius:8 }] }, options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ ticks:{ color:palette.muted }, grid:{ color:'transparent' } }, y:{ suggestedMax:100, ticks:{ color:palette.muted }, grid:{ color:palette.grid } } } } });
    }
    renderProfilePerformance('lesson');
    modalBodyEl.querySelectorAll('[data-admin-view]').forEach(btn => {
      btn.addEventListener('click', () => {
        const view = btn.getAttribute('data-admin-view') || 'lesson';
        modalBodyEl.querySelectorAll('[data-admin-view]').forEach(node => node.classList.toggle('active', node === btn));
        renderProfilePerformance(view);
      });
    });
  }
  stageEl.querySelectorAll('[data-admin-user]').forEach(btn => {
    btn.addEventListener('click', () => {
      const userId = btn.getAttribute('data-admin-user');
      if(userId) openUserProfile(userId);
    });
  });
  const sortButtons = Array.from(stageEl.querySelectorAll('[data-admin-sort]'));
  const userListEl = stageEl.querySelector('#adminUserList');
  function sortUserList(mode){
    if(!userListEl) return;
    const rows = Array.from(userListEl.querySelectorAll('[data-admin-user]'));
    rows.sort((a, b) => {
      const aAccuracy = parseFloat(a.getAttribute('data-user-accuracy') || '0');
      const bAccuracy = parseFloat(b.getAttribute('data-user-accuracy') || '0');
      const aStreak = parseFloat(a.getAttribute('data-user-streak') || '0');
      const bStreak = parseFloat(b.getAttribute('data-user-streak') || '0');
      return mode === 'streak' ? (bStreak - aStreak || bAccuracy - aAccuracy) : (bAccuracy - aAccuracy || bStreak - aStreak);
    });
    rows.forEach(row => userListEl.appendChild(row));
  }
  sortButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.getAttribute('data-admin-sort') || 'accuracy';
      sortButtons.forEach(node => node.classList.toggle('active', node === btn));
      sortUserList(mode);
    });
  });
  const filterButtons = Array.from(stageEl.querySelectorAll('[data-admin-filter]'));
  filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.getAttribute('data-admin-filter') || 'week';
      filterButtons.forEach(node => node.classList.toggle('active', node === btn));
      renderQuestionChart(filter);
    });
  });
  renderQuestionChart('week');
  renderAccessChart();
};

const FSModal = (function(){
  let _items = [];
  let _idx = 0;
  let _render = null;
  let _onClose = null;
  let _escBound = false;

  function update(){
    const item = _items[_idx];
    if(!item) return;
    document.getElementById('fsBody').innerHTML = _render(item, _idx, _items.length);
    document.getElementById('fsCounter').textContent = `${_idx+1} / ${_items.length}`;
    document.getElementById('fsPrev').style.display = _items.length>1?'flex':'none';
    document.getElementById('fsNext').style.display = _items.length>1?'flex':'none';
  }
  function open(items, startIdx, renderFn){
    _items = items; _idx = Math.max(0, Math.min(startIdx, items.length-1));
    _render = renderFn;
    document.getElementById('fsModal').classList.add('open');
    document.body.style.overflow = 'hidden';
    update();
    if(!_escBound){ document.addEventListener('keydown', onKey); _escBound = true; }
  }
  function close(){
    document.getElementById('fsModal').classList.remove('open');
    document.body.style.overflow = '';
  }
  function prev(){ if(_items.length>1){ _idx = (_idx-1+_items.length)%_items.length; update(); } }
  function next(){ if(_items.length>1){ _idx = (_idx+1)%_items.length; update(); } }
  function onKey(e){
    if(!document.getElementById('fsModal').classList.contains('open')) return;
    if(e.key === 'Escape') close();
    else if(e.key === 'ArrowLeft') prev();
    else if(e.key === 'ArrowRight') next();
  }
  return { open, close, prev, next };
})();
window.FSModal = FSModal;
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fsClose').addEventListener('click', FSModal.close);
  document.getElementById('fsPrev').addEventListener('click', FSModal.prev);
  document.getElementById('fsNext').addEventListener('click', FSModal.next);
  document.getElementById('fsModal').addEventListener('click', e => {
    if(e.target.id === 'fsModal') FSModal.close();
  });
});

/* ─ Note modal ─ */
const NoteModal = (function(){
  let _ctx = null;
  let _selectedTopics = new Set();
  let _selectedTags = new Set();
  let _escBound = false;

  function captureSelection(){
    const sel = window.getSelection && window.getSelection();
    if(!sel || sel.rangeCount === 0) return '';
    const txt = sel.toString().trim();
    return txt;
  }

  function renderChips(){
    const tTopics = document.getElementById('noteTopics');
    const tTags = document.getElementById('noteTags');
    // topics available = block topics + unit topics + course macro topics
    const topicIds = new Set();
    const tagIds = new Set();
    if(_ctx.block){
      (_ctx.block.topics||[]).forEach(id => topicIds.add(id));
      (_ctx.block.tags||[]).forEach(id => tagIds.add(id));
      (_ctx.block.items||[]).forEach(it => {
        (it.topics||[]).forEach(id => topicIds.add(id));
        (it.tags||[]).forEach(id => tagIds.add(id));
      });
      (_ctx.block.concepts||[]).forEach(it => {
        (it.topics||[]).forEach(id => topicIds.add(id));
        (it.tags||[]).forEach(id => tagIds.add(id));
      });
    }
    if(_ctx.unit){
      (_ctx.unit.topics||[]).forEach(id => topicIds.add(id));
      (_ctx.unit.tags||[]).forEach(id => tagIds.add(id));
    }
    // Also offer all course-level top-level topics for broader tagging
    Object.values(window.TOPIC_REGISTRY).filter(t => !t.parentId).forEach(t => topicIds.add(t.id));

    const topicList = Array.from(topicIds).map(id => window.TOPIC_REGISTRY[id]).filter(Boolean)
      .sort((a,b) => a.number.localeCompare(b.number, undefined, { numeric:true }));
    const tagList = Array.from(tagIds).map(id => window.TAG_REGISTRY[id]).filter(Boolean);

    tTopics.innerHTML = topicList.length ? topicList.map(t => {
      const active = _selectedTopics.has(t.id);
      return `<button type="button" class="chip-option topic-option${active?' on':''}" data-topic="${Util.attr(t.id)}">${Util.esc(t.number)} · ${Util.esc(t.name)}</button>`;
    }).join('') : '<div class="chip-picker-empty">Nenhum tópico disponível.</div>';

    tTags.innerHTML = tagList.length ? tagList.map(t => {
      const active = _selectedTags.has(t.id);
      return `<button type="button" class="chip-option${active?' on':''}" data-tag="${Util.attr(t.id)}">#${Util.esc(t.name)}</button>`;
    }).join('') : '<div class="chip-picker-empty">Nenhuma tag disponível — use os tópicos.</div>';

    // Bind toggles
    tTopics.querySelectorAll('[data-topic]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-topic');
        if(_selectedTopics.has(id)){ _selectedTopics.delete(id); btn.classList.remove('on'); }
        else { _selectedTopics.add(id); btn.classList.add('on'); }
      });
    });
    tTags.querySelectorAll('[data-tag]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-tag');
        if(_selectedTags.has(id)){ _selectedTags.delete(id); btn.classList.remove('on'); }
        else { _selectedTags.add(id); btn.classList.add('on'); }
      });
    });
  }

  function open(ctx){
    _ctx = ctx || {};
    _selectedTopics = new Set([
      ...((_ctx.block && _ctx.block.topics) || []),
      ...((_ctx.unit && _ctx.unit.topics) || [])
    ]);
    _selectedTags = new Set([
      ...((_ctx.block && _ctx.block.tags) || []),
      ...((_ctx.unit && _ctx.unit.tags) || [])
    ]);

    // Context header
    const bits = [];
    if(_ctx.unit) bits.push(`<strong>${Util.esc(_ctx.unit.label||'Unidade')} ${Util.esc(_ctx.unit.number||'')}</strong> · ${Util.esc(_ctx.unit.title||'')}`);
    if(_ctx.block && _ctx.block.title) bits.push(`bloco <strong>${Util.esc(_ctx.block.title)}</strong>`);
    document.getElementById('noteContext').innerHTML = bits.join(' · ') || 'Sem contexto de bloco';

    // Quote (hidden entirely when no selection)
    const quoteField = document.getElementById('noteQuoteField');
    const quoteEl = document.getElementById('noteQuote');
    const selText = _ctx.selection || '';
    if(selText){
      quoteEl.textContent = selText;
      quoteEl.classList.remove('note-modal-quote-empty');
      quoteField.style.display = '';
    } else {
      quoteEl.textContent = '';
      quoteField.style.display = 'none';
    }

    document.getElementById('noteBody').value = '';
    document.getElementById('noteSavedAt').textContent = '';

    // Reset chip filters
    const tf = document.getElementById('noteTopicsFilter'); if(tf) tf.value = '';
    const gf = document.getElementById('noteTagsFilter'); if(gf) gf.value = '';

    renderChips();

    document.getElementById('noteModal').classList.add('open');
    document.body.style.overflow = 'hidden';
    // Reset type toggle to "note"
    document.getElementById('noteType').value = 'note';
    document.querySelectorAll('.ntt-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-type') === 'note'));
    document.getElementById('noteQuoteLabel').textContent = 'Trecho selecionado';
    document.getElementById('noteBodyLabel').textContent = 'Seu comentário';
    document.getElementById('noteBody').placeholder = 'Escreva sua anotação, insight ou dúvida…';
    document.getElementById('noteSave').textContent = 'Salvar nota';

    setTimeout(() => document.getElementById('noteBody').focus(), 60);

    if(!_escBound){
      document.addEventListener('keydown', onKey);
      _escBound = true;
    }
  }

  function close(){
    document.getElementById('noteModal').classList.remove('open');
    document.body.style.overflow = '';
  }

  function save(){
    const quote = document.getElementById('noteQuote').textContent.trim();
    const body = document.getElementById('noteBody').value.trim();
    if(!body && !quote){
      alert('Escreva um comentário ou selecione um trecho antes de salvar.');
      return;
    }
    const noteType = document.getElementById('noteType').value || 'note';
    const payload = {
      type: noteType,
      moduleId: _ctx.moduleId || null,
      chapterId: _ctx.chapterId || null,
      unitId: _ctx.unit ? _ctx.unit.id : null,
      unitTitle: _ctx.unit ? _ctx.unit.title : '',
      blockId: _ctx.block ? _ctx.block.id : null,
      blockTitle: _ctx.block ? _ctx.block.title : '',
      blockType: _ctx.block ? _ctx.block.type : '',
      quote,
      body,
      topics: Array.from(_selectedTopics),
      tags: Array.from(_selectedTags)
    };
    const savedNote = Store.addNote(payload);
    document.getElementById('noteSavedAt').textContent = noteType === 'flashcard' ? 'Flashcard salvo.' : 'Nota salva.';
    // Insert inline note marker immediately without full re-render
    if(savedNote && savedNote.quote && savedNote.blockId){
      const blockSection = document.querySelector('#block-' + CSS.escape(savedNote.blockId));
      if(blockSection){
        const body = blockSection.querySelector('.tb-body');
        if(body){
          const searchStr = savedNote.quote.slice(0, 30);
          const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
          let node;
          while(node = walker.nextNode()){
            if(node.textContent.indexOf(searchStr) >= 0){
              const marker = document.createElement('span');
              marker.className = 'inline-note-marker';
              marker.title = savedNote.body || 'Nota';
              marker.setAttribute('data-note-id', savedNote.id);
              marker.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>';
              const parent = node.parentElement;
              if(parent && !parent.querySelector('.inline-note-marker')){
                parent.style.position = 'relative';
                parent.appendChild(marker);
              }
              break;
            }
          }
        }
      }
    }
    setTimeout(close, 500);
  }

  function onKey(e){
    if(!document.getElementById('noteModal').classList.contains('open')) return;
    if(e.key === 'Escape') close();
    if((e.ctrlKey || e.metaKey) && e.key === 'Enter') save();
  }

  return { open, close, save, captureSelection };
})();
window.NoteModal = NoteModal;

/* ───────── Note List Modal — shows and edits notes for a specific block ───────── */
const NoteListModal = (function(){
  let _el = null;
  function ensureEl(){
    if(_el) return _el;
    _el = document.createElement('div');
    _el.className = 'note-list-modal';
    _el.innerHTML = '<div class="nlm-backdrop"></div><div class="nlm-panel"><div class="nlm-header"><span class="nlm-title">Notas deste bloco</span><button class="nlm-close">&times;</button></div><div class="nlm-body"></div></div>';
    document.body.appendChild(_el);
    _el.querySelector('.nlm-backdrop').addEventListener('click', close);
    _el.querySelector('.nlm-close').addEventListener('click', close);
    _el.addEventListener('click', e => {
      const saveBtn = e.target.closest('.nlm-save');
      if(saveBtn){
        const card = saveBtn.closest('.nlm-note');
        const id = card.getAttribute('data-note-id');
        const body = card.querySelector('.nlm-note-body').value;
        Store.updateNote(id, { body, updatedAt:Date.now() });
        saveBtn.textContent = 'Salvo ✓';
        setTimeout(() => { saveBtn.textContent = 'Salvar'; }, 1200);
      }
      const delBtn = e.target.closest('.nlm-delete');
      if(delBtn){
        const card = delBtn.closest('.nlm-note');
        const id = card.getAttribute('data-note-id');
        if(confirm('Excluir esta nota?')){ Store.deleteNote(id); card.remove(); }
      }
    });
    return _el;
  }
  function open(notes, unitId, blockId){
    const el = ensureEl();
    const body = el.querySelector('.nlm-body');
    body.innerHTML = notes.map(n => {
      const date = new Date(n.updatedAt||n.createdAt).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      return `<div class="nlm-note" data-note-id="${Util.attr(n.id)}">
        ${n.quote ? `<div class="nlm-note-quote">${Util.esc(n.quote)}</div>` : ''}
        <textarea class="nlm-note-body" rows="3">${Util.esc(n.body||'')}</textarea>
        <div class="nlm-note-foot">
          <span class="nlm-note-date">${date}</span>
          <div class="nlm-note-actions">
            <button class="nlm-delete">Excluir</button>
            <button class="nlm-save">Salvar</button>
          </div>
        </div>
      </div>`;
    }).join('');
    el.classList.add('open');
  }
  function close(){ if(_el) _el.classList.remove('open'); }
  return { open, close };
})();

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('noteClose').addEventListener('click', NoteModal.close);
  // Note/Flashcard type toggle
  document.querySelectorAll('.ntt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.getAttribute('data-type');
      document.querySelectorAll('.ntt-btn').forEach(b => b.classList.toggle('active', b === btn));
      document.getElementById('noteType').value = type;
      const isFC = type === 'flashcard';

      const quoteEl = document.getElementById('noteQuote');
      document.getElementById('noteQuoteLabel').textContent = isFC ? 'Verso do cartão (resposta)' : 'Trecho selecionado';
      document.getElementById('noteBodyLabel').textContent = isFC ? 'Frente do cartão (pergunta)' : 'Seu comentário';
      document.getElementById('noteBody').placeholder = isFC ? 'Escreva a pergunta ou conceito…' : 'Escreva sua anotação, insight ou dúvida…';
      document.getElementById('noteSave').textContent = isFC ? 'Salvar flashcard' : 'Salvar nota';
      // In flashcard mode, always show the quote/back field (even without selection)
      if(isFC){
        quoteField.style.display = '';
        if(!quoteEl.textContent.trim()) quoteEl.setAttribute('contenteditable','true');
      } else if(!quoteEl.textContent.trim()){
        quoteField.style.display = 'none';
      }
    });
  });
  document.getElementById('noteCancel').addEventListener('click', NoteModal.close);
  document.getElementById('noteSave').addEventListener('click', NoteModal.save);
  document.getElementById('noteModal').addEventListener('click', e => {
    if(e.target.id === 'noteModal') NoteModal.close();
  });
  // Tag/topic chip filter inputs
  function bindChipFilter(inputId, pickerId){
    const input = document.getElementById(inputId);
    const picker = document.getElementById(pickerId);
    if(!input || !picker) return;
    input.addEventListener('input', () => {
      const q = input.value.trim().toLowerCase();
      picker.querySelectorAll('.chip-option').forEach(btn => {
        const text = (btn.textContent||'').toLowerCase();
        btn.classList.toggle('filtered-out', q && text.indexOf(q) === -1);
      });
    });
  }
  bindChipFilter('noteTopicsFilter','noteTopics');
  bindChipFilter('noteTagsFilter','noteTags');

  // ─── Contextual annotation toolbar ───
  const ctxToolbar = document.getElementById('ctxToolbar');
  let _pendingSel = '';
  let _pendingRange = null;
  function hideToolbar(){ ctxToolbar.classList.remove('visible'); _pendingSel = ''; _pendingRange = null; const hr=document.getElementById('ctxHintRow'); if(hr) hr.style.display='none'; }
  function inUnitStage(node){
    let el = node && (node.nodeType === 1 ? node : node.parentElement);
    while(el){
      if(el.id === 'blockStage' || (el.classList && el.classList.contains('unit-main')) || el.classList && el.classList.contains('sim-stage')) return true;
      el = el.parentElement;
    }
    return false;
  }
  function getBlockContext(){
    const stage = document.getElementById('blockStage');
    const unitId = stage && stage.getAttribute('data-unit-id');
    const route = Router.parse(location.hash);
    // Find which block-section the selection is in
    let blockId = null;
    if(_pendingRange){
      const section = _pendingRange.commonAncestorContainer.nodeType === 1
        ? _pendingRange.commonAncestorContainer.closest('.block-section')
        : _pendingRange.commonAncestorContainer.parentElement?.closest('.block-section');
      if(section) blockId = section.id.replace('block-','');
    }
    const moduleId = route.params.moduleId || null;
    const chapterId = route.params.chapterId || null;
    const found = moduleId && unitId ? Util.findUnit(moduleId, unitId) : null;
    const unit = found ? found.unit : null;
    const block = unit && blockId
      ? (unit.groups||[]).flatMap(g=>g.blocks||[]).find(b => b.id === blockId) || null
      : null;
    return { unitId, blockId, moduleId, chapterId, unit, block };
  }
  function applyHighlightToSelection(color, hint){
    // Use saved range if current selection is collapsed (e.g. after hint input)
    let sel = window.getSelection();
    let range;
    if(sel && sel.rangeCount > 0 && !sel.isCollapsed){
      range = sel.getRangeAt(0);
    } else if(_pendingRange){
      range = _pendingRange;
    } else { return; }
    const text = _pendingSel || range.toString().trim();
    if(!text) return;
    const mark = document.createElement('span');
    mark.className = 'hl-mark';
    mark.setAttribute('data-hl-color', color);
    if(color === 'veil' && hint){
      mark.setAttribute('data-hl-hint', hint);
    }
    try {
      range.surroundContents(mark);
    } catch(e){
      const frag = range.extractContents();
      mark.appendChild(frag);
      range.insertNode(mark);
    }
    if(sel) try{ sel.removeAllRanges(); }catch(e){}
    // Persist
    const ctx = getBlockContext();
    if(ctx.unitId && ctx.blockId){
      const hlPayload = { unitId:ctx.unitId, blockId:ctx.blockId, text, color };
      if(hint) hlPayload.hint = hint;
      Store.addHighlight(hlPayload.unitId, hlPayload.blockId, hlPayload.text, hlPayload.color, hlPayload.hint);
    }
    hideToolbar();
  }

  // Show toolbar on text selection
  document.addEventListener('mouseup', () => {
    setTimeout(() => {
      // Don't hide toolbar if hint input is active
      const hintRow = document.getElementById('ctxHintRow');
      if(hintRow && hintRow.style.display !== 'none') return;
      const sel = window.getSelection && window.getSelection();
      if(!sel || sel.rangeCount === 0 || sel.isCollapsed){ hideToolbar(); return; }
      const text = sel.toString().trim();
      if(!text || text.length < 2){ hideToolbar(); return; }
      const range = sel.getRangeAt(0);
      if(!inUnitStage(range.commonAncestorContainer)){ hideToolbar(); return; }
      const rect = range.getBoundingClientRect();
      if(!rect || (rect.width === 0 && rect.height === 0)){ hideToolbar(); return; }
      _pendingSel = text;
      _pendingRange = range;
      ctxToolbar.classList.add('visible');
      const bw = ctxToolbar.offsetWidth || 300;
      let left = rect.left + rect.width/2 - bw/2;
      left = Math.max(8, Math.min(window.innerWidth - bw - 8, left));
      const top = Math.min(window.innerHeight - 48, rect.bottom + 8);
      ctxToolbar.style.left = left + 'px';
      ctxToolbar.style.top = top + 'px';
    }, 10);
  });
  document.addEventListener('mousedown', e => {
    if(e.target.closest('#ctxToolbar')){
      // Allow input focus but prevent selection collapse for other elements
      if(!e.target.closest('input')) e.preventDefault();
      return;
    }
    hideToolbar();
  });
  document.addEventListener('scroll', () => {
    const hintRow = document.getElementById('ctxHintRow');
    if(hintRow && hintRow.style.display !== 'none') return;
    hideToolbar();
  }, true);

  // Toolbar actions
  ctxToolbar.querySelectorAll('.ctx-color').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      const color = btn.getAttribute('data-color');
      if(color === 'veil'){
        // Show inline hint input instead of prompt
        const hintRow = document.getElementById('ctxHintRow');
        const hintInput = document.getElementById('ctxHintInput');
        hintRow.style.display = 'flex';
        hintInput.value = '';
        hintInput.focus();
      } else {
        applyHighlightToSelection(color);
      }
    });
  });
  // Veil hint: apply on OK click or Enter key
  function submitVeilHint(){
    const hint = document.getElementById('ctxHintInput').value.trim();
    document.getElementById('ctxHintRow').style.display = 'none';
    applyHighlightToSelection('veil', hint);
  }
  document.getElementById('ctxHintApply').addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); submitVeilHint(); });
  document.getElementById('ctxHintInput').addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); submitVeilHint(); } });

  ctxToolbar.querySelector('[data-action="underline"]').addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    applyHighlightToSelection('underline');
  });
  ctxToolbar.querySelector('[data-action="clear-format"]').addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    const sel = window.getSelection();
    if(!sel || sel.rangeCount === 0) { hideToolbar(); return; }
    const range = sel.getRangeAt(0);
    // Find all .hl-mark spans within or overlapping the selection
    const container = range.commonAncestorContainer.nodeType === 1
      ? range.commonAncestorContainer
      : range.commonAncestorContainer.parentElement;
    const marks = container.querySelectorAll ? Array.from(container.querySelectorAll('.hl-mark')) : [];
    // Also check if the container itself is a mark
    const allMarks = container.closest && container.closest('.hl-mark')
      ? [container.closest('.hl-mark'), ...marks]
      : marks;
    allMarks.forEach(mark => {
      // Unwrap: replace the span with its children
      const parent = mark.parentNode;
      while(mark.firstChild) parent.insertBefore(mark.firstChild, mark);
      parent.removeChild(mark);
      parent.normalize(); // merge adjacent text nodes
    });
    sel.removeAllRanges();
    hideToolbar();
  });
  ctxToolbar.querySelector('[data-action="note"]').addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    const selection = _pendingSel;
    const ctx = getBlockContext();
    hideToolbar();
    NoteModal.open({ moduleId:ctx.moduleId, chapterId:ctx.chapterId, unit:ctx.unit, block:ctx.block, selection });
  });
});

function bindQuizItems(stageEl, items){
  stageEl.querySelectorAll('.q-item[data-item-id]').forEach(itemEl => {
    const itemId = itemEl.getAttribute('data-item-id');
    const unitId = itemEl.getAttribute('data-unit-id');
    const blockId = itemEl.getAttribute('data-block-id');
    const item = items.find(x => x.id === itemId); if(!item) return;
    const norm = normalizeOptions(item.options);
    // Pre-fill if previously answered
    const prior = Store.getQuizAnswer(unitId, blockId, itemId);
    if(prior){
      const keyIdx = quizItemKeyIndex(item, norm);
      const selIdx = norm.values.findIndex(v => String(v) === String(prior.selected));
      itemEl.querySelectorAll('.q-option').forEach((b,j) => {
        if(j === keyIdx) b.classList.add('correct');
        if(j === selIdx && selIdx !== keyIdx) b.classList.add('wrong');
        if(j === selIdx && selIdx === keyIdx) b.classList.add('correct','selected');
      });
      const fb = itemEl.querySelector('.q-feedback');
      fb.className = 'q-feedback show '+(prior.correct?'correct':'wrong');
      fb.innerHTML = `<span class="q-feedback-label">${prior.correct?'Correto':'Incorreto'}</span>${Util.esc(item.comments||'')}`;
      itemEl.querySelector('.q-score').textContent = prior.correct?'✓':'✗';
    }
    itemEl.querySelectorAll('.q-option').forEach(btn => {
      btn.addEventListener('click', () => {
        const value = btn.getAttribute('data-value');
        const idx = parseInt(btn.getAttribute('data-idx'),10);
        const keyIdx = quizItemKeyIndex(item, norm);
        const correct = idx === keyIdx;
        Store.updateQuizAnswer(unitId, blockId, itemId, { selected:value, correct });
        itemEl.querySelectorAll('.q-option').forEach((b,j) => {
          b.classList.remove('selected','correct','wrong');
          if(j === keyIdx) b.classList.add('correct');
          if(j === idx && idx !== keyIdx) b.classList.add('wrong');
          if(j === idx && idx === keyIdx) b.classList.add('correct','selected');
        });
        const fb = itemEl.querySelector('.q-feedback');
        fb.className = 'q-feedback show '+(correct?'correct':'wrong');
        fb.innerHTML = `<span class="q-feedback-label">${correct?'Correto':'Incorreto'}</span>${Util.esc(item.comments||'')}`;
        itemEl.querySelector('.q-score').textContent = correct?'✓':'✗';
      });
    });
  });
}
function bindEssayItems(stageEl, items){
  stageEl.querySelectorAll('.essay-item[data-item-id]').forEach(itemEl => {
    const itemId = itemEl.getAttribute('data-item-id');
    const unitId = itemEl.getAttribute('data-unit-id');
    const blockId = itemEl.getAttribute('data-block-id');
    const item = items.find(x => x.id === itemId); if(!item) return;
    const prior = Store.getEssayAnswer(unitId, blockId, itemId);
    const ta = itemEl.querySelector('.essay-textarea');
    const counter = itemEl.querySelector('.ec-n');
    if(prior){
      ta.value = prior.text||'';
      counter.textContent = ta.value.length;
      injectEssayEvaluation(itemEl, item, prior);
    }
    ta.addEventListener('input', () => { counter.textContent = ta.value.length; });
    itemEl.querySelector('.essay-submit').addEventListener('click', () => {
      const text = ta.value.trim(); if(!text){ ta.focus(); return; }
      const payload = generateMockEssayFeedback(item, text);
      Store.updateEssay(unitId, blockId, itemId, payload);
      injectEssayEvaluation(itemEl, item, payload);
    });
  });
}
function bindFlashcardItems(stageEl, items){
  stageEl.querySelectorAll('.fc-card[data-card-id]').forEach(cardEl => {
    const cardId = cardEl.getAttribute('data-card-id');
    const unitId = cardEl.getAttribute('data-unit-id');
    const blockId = cardEl.getAttribute('data-block-id');
    const prior = Store.getFlashcardState(unitId, blockId, cardId);
    if(prior){ cardEl.classList.add(prior.status||'new'); cardEl.querySelectorAll('.fc-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-status')===prior.status)); }
    cardEl.addEventListener('click', e => { if(e.target.closest('.fc-btn')) return; cardEl.classList.toggle('flipped'); });
    cardEl.addEventListener('mouseleave', () => {
      if(cardEl.classList.contains('flipped')) cardEl.classList.remove('flipped');
    });
    cardEl.querySelectorAll('.fc-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const status = btn.getAttribute('data-status');
        Store.updateFlashcard(unitId, blockId, cardId, status);
        cardEl.classList.remove('new','learning','mastered');
        cardEl.classList.add(status);
        cardEl.querySelectorAll('.fc-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-status')===status));
      });
    });
  });
}

const Theme = {
  init(){
    // Display preferences popover toggle
    const prefsBtn = document.getElementById('displayPrefsBtn');
    const prefsPopover = document.getElementById('displayPrefsPopover');
    if(prefsBtn && prefsPopover){
      prefsBtn.addEventListener('click', e => {
        e.stopPropagation();
        prefsPopover.classList.toggle('open');
      });
      document.addEventListener('click', e => {
        if(!e.target.closest('#displayPrefs')) prefsPopover.classList.remove('open');
      });
    }

    const btn = document.getElementById('themeBtn');
    const themeLabel = document.getElementById('themeBtnLabel');
    function updateThemeLabel(){
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      if(themeLabel) themeLabel.textContent = isDark ? 'Mudar para modo claro' : 'Mudar para modo escuro';
    }
    btn.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      try{ localStorage.setItem('ubique.theme', next); }catch(e){}
      updateThemeLabel();
    });
    updateThemeLabel();
    try{
      const saved = localStorage.getItem('ubique.theme');
      if(saved) document.documentElement.setAttribute('data-theme', saved);
    }catch(e){}
  }
};

const AppShell = {
  wrap(route, content){
    return content;
  },
  syncChrome(route){
    const user = Auth.getUser();
    document.body.setAttribute('data-app-section', route.section || 'student');
    const appLabel = document.getElementById('tbAppLabel');
    if(appLabel) appLabel.textContent = route.section === 'admin' ? 'Admin Area' : 'Course Platform';
    const brand = document.getElementById('tbBrand');
    if(brand) brand.onclick = () => { location.hash = user ? (route.section === 'admin' ? '#/admin' : '#/') : '#/login'; };
    const navAdmin = document.getElementById('navAdmin');
    if(navAdmin) navAdmin.style.display = (user && user.role === 'admin') ? '' : 'none';
    const controls = document.querySelectorAll('#navSearch,#navTour,#navSimulados,#navEdital,#navPortal,#navPerformance,#navReading,#navNotes');
    controls.forEach(el => { if(el) el.style.display = user ? '' : 'none'; });
    const prefs = document.getElementById('displayPrefs');
    if(prefs) prefs.style.display = user ? '' : 'none';
    const breadcrumb = document.getElementById('breadcrumb');
    if(breadcrumb) breadcrumb.style.display = route.view === 'login' ? 'none' : '';
    const userAvatar = document.getElementById('tbAvatar');
    const userName = document.getElementById('tbUserName');
    const userRole = document.getElementById('tbUserRole');
    const logoutBtn = document.getElementById('tbLogout');
    if(userAvatar) userAvatar.textContent = user ? Util.initials(user.name) : '•';
    if(userName) userName.textContent = user ? (user.nickname || user.name) : 'Visitante';
    if(userRole) userRole.textContent = user ? (user.role === 'admin' ? 'Admin' : 'Aluno') : 'Login';
    if(logoutBtn) logoutBtn.style.display = user ? '' : 'none';
  }
};

const App = {
  render(){
    let route = Router.parse();
    const user = Auth.getUser();
    if(!user && route.view !== 'login'){
      location.hash = '#/login';
      route = Router.parse();
    } else if(user && route.view === 'login'){
      location.hash = Auth.landingRoute(user);
      route = Router.parse();
    } else if(user && !Auth.canAccess(route)){
      const wasContent = ['module','chapter','unit','portal','portalDetail'].includes(route.view);
      location.hash = user.role === 'admin' ? '#/admin' : '#/';
      route = Router.parse();
      if(wasContent) App._showAccessToast();
    }
    AppShell.syncChrome(route);
    renderBreadcrumb(route);
    const stage = document.getElementById('stage');
    const renderer = Renderers[route.view];
    if(!renderer){ stage.innerHTML = `<div class="empty"><div class="empty-title">Página não encontrada</div></div>`; return; }
    stage.innerHTML = AppShell.wrap(route, renderer(route));
    if(renderer.mount) renderer.mount(stage, route);
    // Highlight top-bar nav links
    const navNotes = document.getElementById('navNotes');
    if(navNotes) navNotes.classList.toggle('active', route.view === 'notes');
    const navReading = document.getElementById('navReading');
    if(navReading) navReading.classList.toggle('active', route.view === 'reading');
    const navPerf = document.getElementById('navPerformance');
    if(navPerf) navPerf.classList.toggle('active', route.view === 'performance');
    const navPortal = document.getElementById('navPortal');
    if(navPortal) navPortal.classList.toggle('active', route.view === 'coursePortal' || route.view === 'coursePortalDetail');
    const navAdmin = document.getElementById('navAdmin');
    if(navAdmin) navAdmin.classList.toggle('active', route.view === 'admin' && !!user && user.role === 'admin');
    const navSim = document.getElementById('navSimulados');
    if(navSim) navSim.classList.toggle('active', route.view === 'simulados' || route.view === 'simuladoDetail');
    const navEdital = document.getElementById('navEdital');
    if(navEdital) navEdital.classList.toggle('active', route.view === 'edital');
    window.scrollTo(0,0);
  },
  _showAccessToast(msg){
    const text = msg || 'Conteúdo não disponível no seu plano. Fale com o administrador.';
    let toast = document.getElementById('_accessToast');
    if(!toast){
      toast = document.createElement('div');
      toast.id = '_accessToast';
      toast.style.cssText = [
        'position:fixed','bottom:1.5rem','left:50%','transform:translateX(-50%) translateY(20px)',
        'background:#1a1d23','border:1px solid rgba(200,169,126,.3)','border-radius:5px',
        'padding:.7rem 1.2rem','font-family:var(--sans)','font-size:.85rem','font-weight:300',
        'color:#f0ece4','z-index:9999','opacity:0','transition:opacity .25s,transform .25s',
        'pointer-events:none','white-space:nowrap','box-shadow:0 4px 16px rgba(0,0,0,.45)',
        'display:flex','align-items:center','gap:.55rem',
      ].join(';');
      document.body.appendChild(toast);
    }
    toast.innerHTML = `<span style="color:#e87878;font-size:1rem">⊘</span> ${text}`;
    requestAnimationFrame(() => {
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(0)';
    });
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(20px)';
    }, 3500);
  },
  boot(force){
    // Handoff de sessão vindo do admin.html: auto-login sem precisar digitar nada
    try{
      const raw = sessionStorage.getItem('ubique.panel.handoff');
      if(raw && !Auth.getUser()){
        sessionStorage.removeItem('ubique.panel.handoff');
        const h = JSON.parse(raw);
        if(h && h.email && (Date.now() - h.ts < 30000)){
          // tenta logar com o e-mail do handoff (procura nos mock users)
          const matched = (window.AUTH_USERS||[]).find(u => u.email === h.email);
          if(matched) Auth.login(matched.email, matched.password);
        }
      }
    }catch(_){}

    const user = Auth.getUser();
    if(user) Store.init(user.id, window.COURSE);
    if(force){
      App.render();
      return;
    }
    Theme.init();
    FontSize.init();
    window.addEventListener('hashchange', () => App.render());
    const logoutBtn = document.getElementById('tbLogout');
    if(logoutBtn){
      logoutBtn.onclick = () => window.doLogout();
    }

    // Handoff de sessão: ao clicar em "Admin", passa o usuário logado para admin.html
    const navAdmin = document.getElementById('navAdmin');
    if(navAdmin){
      navAdmin.addEventListener('click', (e) => {
        const u = Auth.getUser();
        if(u){
          try{
            sessionStorage.setItem('ubique.panel.handoff', JSON.stringify({
              email: u.email, name: u.name || u.nickname || '', role: u.role, ts: Date.now()
            }));
          }catch(_){}
        }
        // deixa a navegação normal (href="admin.html") acontecer
      });
    }

    App.render();
    console.log('[Ubique Course Platform] booted', { user:user ? user.id : null, course:window.COURSE.id });
  }
};
window.App = App;

// Logout global — bulletproof
window.doLogout = function(){
  ['ubique.auth.session','ubique.platform.access','ubique.panel.handoff','ubique.admin.token'].forEach(function(k){
    try{ localStorage.removeItem(k); }catch(_){}
    try{ sessionStorage.removeItem(k); }catch(_){}
  });
  location.reload();
};

  let idx = 0;
  const bar = document.createElement('div');
  bar.className = 'tour-bar';
  bar.id = 'tourBar';
  document.body.appendChild(bar);

  function goTo(step){
    if(step.route) location.hash = step.route;
    setTimeout(() => {
      if(step.scroll){
        const el = document.querySelector(step.scroll);
        if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
      } else {
        window.scrollTo(0,0);
      }
    }, 250);
  }

  function render(){
    const s = steps[idx];
    const dots = steps.map((_,i) => '<span class="tour-dot'+(i===idx?' active':'')+'"></span>').join('');
    bar.innerHTML = '<div class="tour-inner">'+
      '<div class="tour-step-num">'+(idx+1)+' / '+steps.length+'</div>'+
      '<div class="tour-content">'+
        '<div class="tour-title">'+s.title+'</div>'+
        '<div class="tour-body">'+s.body+'</div>'+
        '<div class="tour-dots">'+dots+'</div>'+
      '</div>'+
      '<div class="tour-nav">'+
        (idx > 0 ? '<button class="tour-btn tour-btn-back" id="tourBack">Anterior</button>' : '')+
        (idx < steps.length-1 ? '<button class="tour-btn tour-btn-next" id="tourNext">Próximo</button>' : '<button class="tour-btn tour-btn-next" id="tourFinish">Finalizar</button>')+
        '<button class="tour-close" id="tourClose">&times;</button>'+
      '</div>'+
    '</div>';
    bar.querySelector('#tourClose').addEventListener('click', close);
    var back = bar.querySelector('#tourBack');
    if(back) back.addEventListener('click', function(){ idx--; goTo(steps[idx]); render(); });
    var next = bar.querySelector('#tourNext');
    if(next) next.addEventListener('click', function(){ idx++; goTo(steps[idx]); render(); });
    var finish = bar.querySelector('#tourFinish');
    if(finish) finish.addEventListener('click', close);
  }
  function open(){ idx = 0; bar.classList.add('active'); goTo(steps[0]); render(); }
  function close(){ bar.classList.remove('active'); }
  window.GuidedTour = { open, close };
})();
</script>
