name: Deploy para Firebase Hosting

# Publica o site no Firebase Hosting automaticamente a cada push na branch main.
# Restaura o comportamento "push = site atualiza" (que o GitHub Pages fazia).
# Requer o secret FIREBASE_SERVICE_ACCOUNT_UBIQUE_FALCON configurado no repositório.

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_UBIQUE_FALCON }}
          channelId: live
          projectId: ubique-falcon
